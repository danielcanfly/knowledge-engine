name: M23.7.7 Final Readiness

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_7_final_readiness.py"
      - "scripts/m23_7_7_final_readiness.py"
      - "tests/test_m23_7_7_final_readiness.py"
      - "docs/architecture/m23-7-7-final-readiness.md"
      - "pilot/m23/m23-7-7-final-readiness-report.json"
      - ".github/workflows/m23-7-7-final-readiness.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  final-readiness:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Quality gates
        run: |
          ruff check \
            src/knowledge_engine/m23_7_7_final_readiness.py \
            scripts/m23_7_7_final_readiness.py \
            tests/test_m23_7_7_final_readiness.py
          pytest -q tests/test_m23_7_7_final_readiness.py
      - name: Deterministic readiness replay
        run: |
          python scripts/m23_7_7_final_readiness.py --output /tmp/m23-7-7-report.json
          cmp /tmp/m23-7-7-report.json pilot/m23/m23-7-7-final-readiness-report.json
      - name: Privacy authority and mutation scan
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("docs/architecture/m23-7-7-final-readiness.md").read_text()
          assert "hold_for_m23_7_8" in text
          assert "blocked_pending_latency" in text
          assert "blocked_pending_retrieval_quality" in text
          assert "No promotion eligibility is granted" in text
          assert "Production mutation dispatched: false" in text
          PY
      - name: Compile accepted scope
        run: python -m compileall -q src tests scripts
