name: M23.7 R3.8.16 Post-Delete Recovery Absence Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-16/post-delete-recovery-absence-reconciliation.json"
      - "docs/architecture/m23-7-r3-8-16-post-delete-recovery-absence-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-16-post-delete-recovery-absence-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 21fc78551829d1f8a9538f57e6ecd64d829d0542 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-16/post-delete-recovery-absence-reconciliation.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "48d972c9ad154db6f00f941fe804e0502dc530437ccb9a0288c0ca21aff958cd"
          assert value["seal_issue"] == 591
          assert value["seal_pr"] == 592
          assert value["seal_accepted_head"] == "aaf7c386d92657f2c00c025a453c42f349879663"
          assert value["seal_merge_sha"] == "21fc78551829d1f8a9538f57e6ecd64d829d0542"
          assert value["seal_sha256"] == "7b654301285c8a0485c8b853eb84153fd2f1f6bad4e10e9454d04e2c91378eaf"
          assert value["artifact_zip_sha256"] == "95eea0d47014a7716b315885840791c5138d71fecb2936b8dc15803294fb3433"
          assert value["receipt_file_sha256"] == "ef262d9b67759849fada2904887d48456243ce4847601f39d7cf4eace3a5693a"
          assert value["receipt_self_digest"] == "5278d87873f60133c471f5991fd9e1597f40d3283ab62fd9581509650662d269"
          assert value["result"]["worker_state"] == "worker_absent"
          assert value["result"]["control_plane_absence_proven"] is True
          assert value["result"]["worker_absence_inferred"] is True
          assert value["result"]["worker_presence_inferred"] is False
          assert value["strict_zero_verified"] is True
          assert value["authority"]["production_retrieval"] == "lexical"
          assert value["authority"]["blockers_cleared"] is False
          assert value["authority"]["worker_deletion_replay_authorized"] is False
          assert value["authority"]["request_permit_merge_authorized_after_reconciliation"] is True
          PY
      - name: Verify scope and sealed evidence preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-16/post-delete-recovery-absence-reconciliation.json",
              "docs/architecture/m23-7-r3-8-16-post-delete-recovery-absence-reconciliation.md",
              ".github/workflows/m23-7-r3-8-16-post-delete-recovery-absence-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "21fc78551829d1f8a9538f57e6ecd64d829d0542", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 21fc78551829d1f8a9538f57e6ecd64d829d0542 HEAD -- \
            .github/evidence/m23-7-r3-8-16/post-delete-recovery-29539090953-seal.json \
            scripts/m23_7_r3_8_post_delete_recovery.py \
            scripts/m23_operator_pr_permit.py \
            .github/workflows/m23-operator-command-bus.yml \
            .github/workflows/m23-operator-request-ci.yml
