name: M23.7 Repair R3.8.4 Worker Absence Probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  historical-r3-8-4:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 11329f01f5faa49af2481b6eb6f6f744bea390aa
          fetch-depth: 0
      - name: Verify historical exact head
        run: test "$(git rev-parse HEAD)" = "11329f01f5faa49af2481b6eb6f6f744bea390aa"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install historical package
        run: python -m pip install -e '.[dev]'
      - name: Revalidate historical R3.8.4 scope
        run: |
          ruff check tests/test_m23_7_r3_8_worker_absence_probe.py
          bash -n scripts/m23_7_r3_8_worker_absence_probe.sh
          pytest -q tests/test_m23_7_r3_8_worker_absence_probe.py
          pytest -q tests/test_m23_7_r3_8_latency_repair.py
          pytest -q tests/test_m23_7_r3_8_wrangler_bootstrap.py
          node --test workers/m23-7-r3-8-latency-repair/worker.test.mjs
