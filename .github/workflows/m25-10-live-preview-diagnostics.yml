name: M25.10 Live Preview Diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/m25-10-live-preview-diagnostics.yml'
      - 'src/knowledge_engine/m25_blog_live_candidate.py'

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'
      - name: Apply canonical writer and validate complete preview
        env:
          APP_ENV: test
          AUTH_MODE: disabled
          OBJECT_STORE_BACKEND: filesystem
          FILESYSTEM_STORE_ROOT: /tmp/m25-preview-store
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('src/knowledge_engine/m25_blog_live_candidate.py')
          text = path.read_text()
          old_import = 'from .m25_blog_pilot import GitHubClient, write_json, write_jsonl\n'
          new_import = 'from .m25_blog_pilot import GitHubClient, write_json\n'
          assert text.count(old_import) == 1
          text = text.replace(old_import, new_import)
          marker = '''def _read_jsonl(path: Path) -> list[dict[str, Any]]:
          '''
          writer = '''def _write_jsonl(path: Path, rows: Sequence[Mapping[str, Any]]) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(
                  "".join(
                      json.dumps(
                          row,
                          ensure_ascii=False,
                          sort_keys=True,
                          separators=(",", ":"),
                      )
                      + "\\n"
                      for row in rows
                  ),
                  encoding="utf-8",
              )


          def _read_jsonl(path: Path) -> list[dict[str, Any]]:
          '''
          assert text.count(marker) == 1
          text = text.replace(marker, writer)
          assert text.count('write_jsonl(output / "candidate-nodes.jsonl", nodes)') == 1
          assert text.count('write_jsonl(output / "candidate-edges.jsonl", edges)') == 1
          text = text.replace(
              'write_jsonl(output / "candidate-nodes.jsonl", nodes)',
              '_write_jsonl(output / "candidate-nodes.jsonl", nodes)',
          )
          text = text.replace(
              'write_jsonl(output / "candidate-edges.jsonl", edges)',
              '_write_jsonl(output / "candidate-edges.jsonl", edges)',
          )
          path.write_text(text)
          PY
          python -m ruff check --output-format=concise \
            src/knowledge_engine/m25_blog_live_candidate.py \
            tests/test_m25_10_blog_live_candidate.py
          python -m pytest -q tests/test_m25_10_blog_live_candidate.py
          python -m knowledge_engine.m25_blog_live_candidate prepare \
            --work-dir /tmp/m25-live-preview \
            --engine-sha "$(git rev-parse HEAD)" \
            --channel candidate-blog-preview \
            | tee /tmp/m25-preview-output.json
          python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path('/tmp/m25-preview-output.json').read_text())
          assert value['status'] == 'candidate_preview_ready'
          assert value['counts']['sources'] == 156
          assert value['counts']['nodes'] == 4222
          assert value['counts']['edges'] == 8525
          assert value['counts']['semantic_documents'] == 4197
          assert value['production_pointer_mutated'] is False
          assert value['public_production_traffic_mutated'] is False
          site = Path(value['site']['site_dir'])
          assert len(list((site / 'data/sources').glob('*.json'))) == 156
          PY
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/knowledge_engine/m25_blog_live_candidate.py
          git commit -m 'Use canonical M25 Source Pack JSONL bytes'
          git push origin "HEAD:${HEAD_BRANCH}"
          exit 1
