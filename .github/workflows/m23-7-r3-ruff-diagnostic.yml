name: M23.7 R3 Ruff Diagnostic

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r3_bounded_live_reobservation.py"
      - "scripts/m23_7_r3_bounded_live_reobservation.py"
      - "scripts/m23_7_r3_worker_config.py"
      - "tests/test_m23_7_r3_bounded_live_reobservation.py"
      - ".github/workflows/m23-7-r3-ruff-diagnostic.yml"

permissions:
  contents: read

jobs:
  ruff-diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install 'ruff>=0.9,<1'
      - name: Capture Ruff report
        shell: bash
        run: |
          mkdir -p .artifacts/m23
          set +e
          ruff check \
            src/knowledge_engine/m23_7_r3_bounded_live_reobservation.py \
            scripts/m23_7_r3_bounded_live_reobservation.py \
            scripts/m23_7_r3_worker_config.py \
            tests/test_m23_7_r3_bounded_live_reobservation.py \
            --output-format concise \
            > .artifacts/m23/r3-ruff.txt 2>&1
          status=$?
          cat .artifacts/m23/r3-ruff.txt
          echo "$status" > .artifacts/m23/r3-ruff-exit.txt
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m23-7-r3-ruff-diagnostic
          path: .artifacts/m23/r3-ruff*.txt
          if-no-files-found: error
          retention-days: 1
