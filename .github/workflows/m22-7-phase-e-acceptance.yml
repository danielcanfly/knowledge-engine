name: M22.7 Phase E Acceptance

on:
  pull_request:
    paths:
      - '.github/workflows/m22-7-phase-e-acceptance.yml'
      - 'docs/architecture/m22/m22-7-phase-e-acceptance.md'
      - 'src/knowledge_engine/m22_phase_e_acceptance.py'
      - 'tests/test_m22_7_phase_e_acceptance.py'

permissions:
  contents: read

jobs:
  phase-e-acceptance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -q -e '.[dev]'
      - name: Lint M22.7 scope
        run: >-
          python -m ruff check --output-format concise
          src/knowledge_engine/m22_phase_e_acceptance.py
          tests/test_m22_7_phase_e_acceptance.py
      - name: Test M22.1 through M22.7 contracts
        run: >-
          python -m pytest -q
          tests/test_m22_1_reasoning_modes.py
          tests/test_m22_2_activation_decision.py
          tests/test_m22_3_bounded_plan.py
          tests/test_m22_4_execution_trace.py
          tests/test_m22_5_grounded_answer.py
          tests/test_m22_6_offline_evaluation.py
          tests/test_m22_7_phase_e_acceptance.py
      - name: Prove exact Phase E pins and non-authority boundary
        run: |
          python - <<'PY'
          from knowledge_engine.m22_phase_e_acceptance import (
              EXPECTED_CAPABILITIES,
              EXPECTED_MILESTONES,
              FINAL_ENGINE_SHA,
              FOUNDATION_SHA,
              SOURCE_SHA,
          )

          assert len(EXPECTED_MILESTONES) == 6
          assert EXPECTED_MILESTONES[-1]['reconciliation_merge'] == FINAL_ENGINE_SHA
          assert SOURCE_SHA == 'a6ba738d910d01d2ae99b1968f0831989934c549'
          assert FOUNDATION_SHA == 'e5ef644053d34e89c70d2ceb37521e1c59234832'
          assert EXPECTED_CAPABILITIES['graph_neural_retrieval'] is False
          assert EXPECTED_CAPABILITIES['rollout'] is False
          assert EXPECTED_CAPABILITIES['production_authority'] is False
          PY
      - name: Scan executor, provider, rollout, mutation, and secret boundary
        run: |
          if grep -nE 'requests|httpx|aiohttp|urllib.request|subprocess|boto3|openai|anthropic|sentence_transformers|raw_query|answer_text|api_key|token=' \
            src/knowledge_engine/m22_phase_e_acceptance.py; then
            exit 1
          fi
          test -z "$(find . -type f \( -name '*traffic-allocation.json' -o -name '*rollout-decision.json' \) -print -quit)"
      - name: Compile M22.7 scope
        run: >-
          python -m compileall -q
          src/knowledge_engine/m22_phase_e_acceptance.py
          tests/test_m22_7_phase_e_acceptance.py
