name: R2 Synthesis Integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/r2_synthesis_integration.py'
      - '.github/workflows/r2-synthesis-integration.yml'
      - 'src/knowledge_engine/synthesis.py'
      - 'src/knowledge_engine/synthesis_cli.py'
      - 'src/knowledge_engine/intake.py'
  push:
    branches: [main]
    paths:
      - 'scripts/r2_synthesis_integration.py'
      - '.github/workflows/r2-synthesis-integration.yml'
      - 'src/knowledge_engine/synthesis.py'
      - 'src/knowledge_engine/synthesis_cli.py'
      - 'src/knowledge_engine/intake.py'

permissions:
  contents: read

concurrency:
  group: r2-synthesis-integration
  cancel-in-progress: false

jobs:
  synthesis-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - name: Exercise evidence-bound synthesis and replay
        env:
          APP_ENV: test
          AUTH_MODE: disabled
          OBJECT_STORE_BACKEND: r2
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
          R2_REGION: auto
        shell: bash
        run: |
          set -o pipefail
          python scripts/r2_synthesis_integration.py \
            --run-id 'synthesis-${{ github.run_id }}-${{ github.run_attempt }}' \
            | tee /tmp/r2-synthesis-integration.log
      - name: Upload R2 synthesis failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: r2-synthesis-integration-log
          path: /tmp/r2-synthesis-integration.log
          if-no-files-found: ignore
          retention-days: 7
