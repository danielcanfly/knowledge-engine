name: M23.7 R3.8.37 Worker-Present Seal Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-37/worker-present-seal-reconciliation-29559298060.json"
      - "docs/architecture/m23-7-r3-8-37-worker-present-seal-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-37-worker-present-seal-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 7e6614009139e77685b578398d21f74754e563f2 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-37/worker-present-seal-reconciliation-29559298060.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "e4bc3c93894c0f205954d902837ef44d58392cc2b982ca1f16ee566e0b36649e"
          assert value["issue"] == 712
          assert value["seal_issue"] == 710
          assert value["seal_pr"] == 711
          assert value["seal_accepted_head"] == "fdc7c2ff978f586464205c193252ea64fa5f6832"
          assert value["seal_merge_sha"] == "7e6614009139e77685b578398d21f74754e563f2"
          assert value["seal_sha256"] == "8631f092d07e0b898e55ff59124db987ddf585770fa8c3eff440b91f1aa752bc"
          assert value["seal_exact_head_runs"] == {
              "architecture_canon": 29559569035,
              "ci": 29559569048,
              "graph_v2": 29559569033,
              "seal": 29559569031,
          }
          result = value["result"]
          assert result["worker_present_evidence_reconciled"] is True
          assert result["worker_state"] == "worker_present"
          assert result["worker_lifecycle_clean"] is False
          assert result["deletion_authorization_next_gate"] is True
          assert result["blocker_clearance_eligible"] is False
          assert result["production_retrieval"] == "lexical"
          assert value["worker"]["name"] == "knowledge-engine-r3-8-29558980092"
          assert value["worker"]["versions"]["identity_count"] == 4
          assert value["worker"]["deployments"]["identity_count"] == 4
          authority = value["authority"]
          assert authority["evidence_reconciliation_only"] is True
          assert authority["worker_deletion_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-37/worker-present-seal-reconciliation-29559298060.json",
              "docs/architecture/m23-7-r3-8-37-worker-present-seal-reconciliation.md",
              ".github/workflows/m23-7-r3-8-37-worker-present-seal-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "7e6614009139e77685b578398d21f74754e563f2", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 7e6614009139e77685b578398d21f74754e563f2 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
