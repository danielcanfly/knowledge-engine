name: M9 Production Promotion Reconciliation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "governed_batches/m9-001-agent-planning-strategies.json"
      - "governed_batches/registry-v2.json"
      - "governed_batches/evidence/m9-001-production-promotion-observation.json"
      - "governed_batches/evidence/m9-001-idempotent-replay-observation.json"
      - "governed_batches/evidence/m9-001-lifecycle-history.json"
      - "tests/test_m9_request_spec.py"
      - "tests/test_m9_planned_batch.py"
      - "tests/test_production_promotion_approval.py"
      - ".github/workflows/m9-production-promotion-reconciliation.yml"

permissions:
  contents: read

jobs:
  validate-promotion-history:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      EVIDENCE_DIR: evidence/m9-production-reconciliation
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install exact Engine
        run: python -m pip install -e '.[dev]'
      - name: Verify live M9 production target read-only
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          from knowledge_engine.config import Settings
          from knowledge_engine.storage import create_object_store

          promotion = json.loads(Path('governed_batches/evidence/m9-001-production-promotion-observation.json').read_text())
          target = promotion['production_target']
          raw = create_object_store(Settings.from_env()).get('channels/production.json')
          pointer = json.loads(raw)
          digest = hashlib.sha256(raw).hexdigest()
          assert pointer['release_id'] == target['release_id']
          assert pointer['manifest_sha256'] == target['manifest_sha256']
          assert digest == target['pointer_sha256']
          root = Path(os.environ['EVIDENCE_DIR'])
          root.mkdir(parents=True, exist_ok=True)
          (root / 'live-production-pointer.json').write_bytes(raw)
          (root / 'live-production-observation.json').write_text(json.dumps({
              'status': 'passed',
              'pointer_sha256': digest,
              'read_only': True,
              'mutations_performed': [],
          }, indent=2, sort_keys=True) + '\n')
          PY
      - name: Run production history tests
        run: |
          python -m pytest -q \
            tests/test_m9_request_spec.py \
            tests/test_m9_planned_batch.py \
            tests/test_production_promotion_approval.py
      - name: Write promotion-history summary
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          spec = json.loads(Path('governed_batches/m9-001-agent-planning-strategies.json').read_text())
          lifecycle = json.loads(Path('governed_batches/evidence/m9-001-lifecycle-history.json').read_text())
          promotion = json.loads(Path('governed_batches/evidence/m9-001-production-promotion-observation.json').read_text())
          replay = json.loads(Path('governed_batches/evidence/m9-001-idempotent-replay-observation.json').read_text())
          live = json.loads(Path(os.environ['EVIDENCE_DIR'], 'live-production-observation.json').read_text())
          assert spec['lifecycle_state'] == 'closed'
          assert lifecycle['final_state'] == 'closed'
          assert promotion['promotion']['status'] == 'promoted'
          assert promotion['promotion']['idempotent'] is False
          assert replay['replay']['status'] == 'already_promoted'
          assert replay['replay']['idempotent'] is True
          assert replay['production_target']['pointer_byte_exact_unchanged'] is True
          assert live['pointer_sha256'] == promotion['production_target']['pointer_sha256']
          summary = {
              'schema_version': 'm9-production-promotion-history/v1',
              'status': 'passed',
              'lifecycle_state': 'closed',
              'promotion_run': promotion['promotion']['run_id'],
              'promotion_artifact': promotion['promotion']['artifact_id'],
              'production_pointer_sha256': live['pointer_sha256'],
              'promotion_ledger_comment': promotion['ledger']['comment_id'],
              'replay_run': replay['replay']['run_id'],
              'replay_idempotent': True,
              'replay_mutated_production': False,
              'rollback_observed': False,
              'next_legal_action': 'start_next_batch',
          }
          root = Path(os.environ['EVIDENCE_DIR'])
          (root / 'summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True) + '\n')
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY
      - name: Upload production history evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m9-production-history-${{ github.sha }}
          path: evidence/m9-production-reconciliation/
          if-no-files-found: error
          retention-days: 90
