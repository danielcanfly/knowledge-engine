name: M18.6 Runtime compatibility

on:
  pull_request:
    paths:
      - "src/knowledge_engine/api.py"
      - "src/knowledge_engine/cli.py"
      - "src/knowledge_engine/config.py"
      - "src/knowledge_engine/m14_retrieval.py"
      - "src/knowledge_engine/runtime.py"
      - "tests/test_m18_6_runtime_compatibility.py"
      - "docs/architecture/m18/m18-6-runtime-compatibility.md"
      - ".github/workflows/m18-6-runtime-compatibility.yml"
  push:
    branches:
      - main
    paths:
      - "src/knowledge_engine/api.py"
      - "src/knowledge_engine/cli.py"
      - "src/knowledge_engine/config.py"
      - "src/knowledge_engine/m14_retrieval.py"
      - "src/knowledge_engine/runtime.py"
      - "tests/test_m18_6_runtime_compatibility.py"
      - "docs/architecture/m18/m18-6-runtime-compatibility.md"
      - ".github/workflows/m18-6-runtime-compatibility.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-compatibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - name: Lint M18.6 scope
        run: |
          ruff check \
            src/knowledge_engine/api.py \
            src/knowledge_engine/cli.py \
            src/knowledge_engine/config.py \
            src/knowledge_engine/m14_retrieval.py \
            src/knowledge_engine/runtime.py \
            tests/test_m18_6_runtime_compatibility.py
      - name: Test Runtime compatibility and regression boundaries
        run: |
          pytest -q \
            tests/test_m18_6_runtime_compatibility.py \
            tests/test_runtime.py \
            tests/test_m14_retrieval.py \
            tests/test_config.py \
            tests/test_m14_public_query.py
      - name: Compile M18.6 scope
        run: |
          python -m compileall -q \
            src/knowledge_engine/api.py \
            src/knowledge_engine/cli.py \
            src/knowledge_engine/config.py \
            src/knowledge_engine/m14_retrieval.py \
            src/knowledge_engine/runtime.py \
            tests/test_m18_6_runtime_compatibility.py
