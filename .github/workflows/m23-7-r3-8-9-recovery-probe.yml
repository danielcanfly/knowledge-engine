name: M23.7 R3.8.9 Recovery Probe

on:
  workflow_dispatch:
    inputs:
      expected_head:
        description: Exact main SHA containing the reconciled schema-v2 probe
        required: true
        type: string
      affected_run_id:
        description: Authorized R3.8 observation run id
        required: true
        default: "29506217284"
        type: string
      confirmation:
        description: Enter PROBE_R3_8_RUN_<affected_run_id>_SCHEMA_V2
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: m23-7-r3-8-9-recovery-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-24.04
    environment: m23-r3-diagnostic
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      EVIDENCE_DIR: r3-8-9-recovery-evidence
    steps:
      - name: Reject rerun attempts and unrelated identities
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$GITHUB_REF" = "refs/heads/main"
          case "${{ inputs.affected_run_id }}" in
            29506217284|29546336917|29548837457|29550965495|29553221650|29557251118|29558980092|29561411876|29564569280|29568576968|29568662778|29572790495|29574526665|29576200306|29578234650|29579965754|29582316388|29584764087|29587264678|29589719171|29592583765|29595625175|29597922646|29600412694|29602737093|29604923286|29607698618|29610393567|29613277172|29636761264) ;;
            *) echo "affected_run_identity_mismatch"; exit 23 ;;
          esac
          test "${{ inputs.confirmation }}" = "PROBE_R3_8_RUN_${{ inputs.affected_run_id }}_SCHEMA_V2"

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_head }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact accepted main head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ inputs.expected_head }}"
          test "$GITHUB_SHA" = "${{ inputs.expected_head }}"
          git merge-base --is-ancestor c61cbe221fca50b045cbb847cf8d768d31d4e779 HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install exact Engine
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify bounded adapter and preserved recovery probe
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            scripts/m23_7_r3_8_remote_recovery_probe_296367.py
          pytest -q \
            tests/test_m23_7_r3_8_remote_recovery_probe.py \
            tests/test_m23_7_r3_8_remote_recovery_probe_296367.py

      - name: Read official Cloudflare control-plane collections only
        id: recovery
        shell: bash
        run: |
          set +e
          rm -rf "$EVIDENCE_DIR"
          if [ "${{ inputs.affected_run_id }}" = "29636761264" ]; then
            probe_module="scripts.m23_7_r3_8_remote_recovery_probe_296367"
          else
            probe_module="scripts.m23_7_r3_8_remote_recovery_probe"
          fi
          python -m "$probe_module" \
            --expected-head "${{ inputs.expected_head }}" \
            --affected-run-id "${{ inputs.affected_run_id }}" \
            --confirmation "${{ inputs.confirmation }}" \
            --output-dir "$EVIDENCE_DIR"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload privacy-safe schema-v2 recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m23-7-r3-8-9-recovery-${{ github.run_id }}
          path: r3-8-9-recovery-evidence/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30
          compression-level: 9

      - name: Return governed recovery result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          code="${{ steps.recovery.outputs.exit_code }}"
          case "$code" in
            0|30) exit "$code" ;;
            23) exit 23 ;;
            *) exit 23 ;;
          esac
