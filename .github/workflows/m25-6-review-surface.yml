name: M25.6 Review Surface

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/m25-6-review-surface.yml'
      - 'docs/architecture/m25/m25-6-*.md'
      - 'pilot/m25/m25-6-*.json'
      - 'schemas/m25-review-*.schema.json'
      - 'src/knowledge_engine/m25_review_*.py'
      - 'tests/test_m25_6_review_surface*.py'
      - 'scripts/m25_6_browser_acceptance.py'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  review-surface:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and predecessor
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor d68be491f8d07a727bcf1f521a2e5e75256eede3 HEAD
          python - <<'PY'
          import json
          from pathlib import Path
          a=json.loads(Path('pilot/m25/m25-5-acceptance.json').read_text())
          assert a['status']=='m25_5_identity_governance_accepted'
          assert a['implementation']['merge_sha']=='8ae3e77b8f9ffbd3df5ec820cca04b0b47413e02'
          assert a['next_stage']['stage_id']=='M25.6'
          assert a['next_stage']['daniel_browser_acceptance_required_before_m25_6_closure'] is True
          PY
      - name: Install exact dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint M25.6
        run: |
          python -m ruff check \
            src/knowledge_engine/m25_review_surface.py \
            src/knowledge_engine/m25_review_surface_cli.py \
            src/knowledge_engine/m25_review_demo.py \
            tests/test_m25_6_review_surface.py \
            tests/test_m25_6_review_surface_contracts.py \
            scripts/m25_6_browser_acceptance.py
      - name: Test contracts and inherited governance
        run: |
          python -m pytest -q \
            tests/test_m25_6_review_surface.py \
            tests/test_m25_6_review_surface_contracts.py \
            tests/test_m25_5_identity_governance.py \
            tests/test_m25_5_identity_governance_contracts.py
      - name: Rebuild deterministic review batch
        run: |
          mkdir -p /tmp/m25-6
          knowledge-m25-review-surface build \
            --suite pilot/m25/m25-4-gold-suite.json \
            --baseline pilot/m25/m25-4-baseline-report.json \
            --policy pilot/m25/m25-5-calibration-policy.json \
            --report pilot/m25/m25-5-calibrated-report.json \
            --acceptance pilot/m25/m25-5-acceptance.json \
            --output /tmp/m25-6/review-batch.json
          cmp /tmp/m25-6/review-batch.json pilot/m25/m25-6-review-batch.json
      - name: Enforce readiness and protected boundaries
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          batch=json.loads(Path('pilot/m25/m25-6-review-batch.json').read_text())
          plan=json.loads(Path('pilot/m25/m25-6-browser-acceptance-plan.json').read_text())
          gate=json.loads(Path('pilot/m25/m25-6-readiness-gate.json').read_text())
          assert batch['item_count']==30 and batch['bulk_approval_permitted'] is False
          assert set(batch['decision_actions'])=={'approve','map','edit','split','reject','defer'}
          assert plan['daniel_browser_acceptance_required'] is True
          assert gate['status']=='m25_6_awaiting_daniel_browser_acceptance'
          assert gate['exit_gates']['daniel_browser_acceptance_recorded'] is False
          assert gate['source_write_permitted'] is False
          assert gate['github_pr_creation_permitted'] is False
          assert gate['m25_7_authorized'] is False
          assert not any(gate['protected_mutations'].values())
          PY
          changed="$(git diff --name-only origin/main...HEAD)"
          ! printf '%s\n' "$changed" | grep -Eq '^(workers/|channels/|foundation/|release/|r2/|qdrant/|production/|src/knowledge_engine/m21_|src/knowledge_engine/m25_identity_governance.py$|pilot/m25/m25-5-)'
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Run authenticated browser journeys
        run: |
          python scripts/m25_6_browser_acceptance.py /tmp/m25-6/browser
          python - <<'PY'
          import json
          from pathlib import Path
          r=json.loads(Path('/tmp/m25-6/browser/browser-evidence.json').read_text())
          assert r['unauthenticated_review_status']==401
          assert r['scenario_count']==6
          assert {s['action'] for s in r['scenarios']}=={'approve','map','edit','split','reject','defer'}
          assert all(s['result']=='passed' for s in r['scenarios'])
          assert r['audit_summary']['admission_ready'] is False
          assert r['audit_summary']['source_write_permitted'] is False
          assert r['audit_summary']['github_pr_creation_permitted'] is False
          assert r['audit_summary']['m25_7_authorized'] is False
          assert r['daniel_browser_acceptance_recorded'] is False
          PY
      - name: Assemble exact-head evidence
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          cp pilot/m25/m25-6-review-batch.json /tmp/m25-6/
          cp pilot/m25/m25-6-browser-acceptance-plan.json /tmp/m25-6/browser-acceptance-plan.json
          cp pilot/m25/m25-6-readiness-gate.json /tmp/m25-6/readiness-gate.json
          python - <<'PY'
          import hashlib,json,os
          from pathlib import Path
          files=[
            Path('/tmp/m25-6/review-batch.json'),
            Path('/tmp/m25-6/browser-acceptance-plan.json'),
            Path('/tmp/m25-6/readiness-gate.json'),
            Path('/tmp/m25-6/browser/browser-evidence.json'),
            Path('/tmp/m25-6/browser/audit-export.json'),
          ]
          e={
            'schema_version':'knowledge-engine-m25-6-exact-head-evidence/v1',
            'head_sha':os.environ['HEAD_SHA'],
            'workflow_run_id':int(os.environ['GITHUB_RUN_ID']),
            'artifacts':{p.name:hashlib.sha256(p.read_bytes()).hexdigest() for p in files},
            'authenticated_review_ui':True,
            'browser_journeys_verified':True,
            'daniel_browser_acceptance_recorded':False,
            'source_write_permitted':False,
            'github_pr_creation_permitted':False,
            'm25_7_authorized':False,
          }
          Path('/tmp/m25-6/exact-head-evidence.json').write_text(json.dumps(e,indent=2,sort_keys=True)+'\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: m25-6-review-surface-evidence
          path: /tmp/m25-6
          if-no-files-found: error
          retention-days: 30
      - name: Compile M25.6
        run: |
          python -m compileall -q \
            src/knowledge_engine/m25_review_surface.py \
            src/knowledge_engine/m25_review_surface_cli.py \
            src/knowledge_engine/m25_review_demo.py \
            tests/test_m25_6_review_surface.py \
            tests/test_m25_6_review_surface_contracts.py \
            scripts/m25_6_browser_acceptance.py
