name: M23.7 Repair R3.6 Candidate Reingestion

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r3_6_candidate_reingestion.py"
      - "scripts/m23_7_r3_6_candidate_reingestion_operator.py"
      - "tests/test_m23_7_r3_6_candidate_reingestion.py"
      - "pilot/m23/m23-7-r3-6-candidate-reingestion-contract.json"
      - "docs/architecture/m23-7-r3-6-candidate-reingestion.md"
      - ".github/workflows/m23-7-r3-6-candidate-reingestion.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  candidate-reingestion:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Ruff accepted scope
        run: |
          ruff check \
            src/knowledge_engine/m23_7_r3_6_candidate_reingestion.py \
            scripts/m23_7_r3_6_candidate_reingestion_operator.py \
            tests/test_m23_7_r3_6_candidate_reingestion.py
      - name: R3.5 accepted regression
        run: pytest -q tests/test_m23_7_r3_5_rank_quality_calibration.py
      - name: R3.6 candidate reingestion regressions
        run: pytest -q tests/test_m23_7_r3_6_candidate_reingestion.py
      - name: Verify deterministic contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from knowledge_engine.m23_7_r3_6_candidate_reingestion import (
              canonical_contract,
              canonical_json_bytes,
          )

          path = Path('pilot/m23/m23-7-r3-6-candidate-reingestion-contract.json')
          stored = json.loads(path.read_text(encoding='utf-8'))
          generated = canonical_contract()
          assert stored == generated
          assert canonical_json_bytes(generated) + b'\n' == path.read_bytes()
          assert generated['contract_sha256'] == (
              'c888e10741d402f5214dbfe0191ff8a77730b7f8cc5f57b42bdef2efa28809ca'
          )
          assert generated['collection']['name'] == (
              'llm_wiki_m23_r3_5_candidate_8eed54902c73'
          )
          assert generated['collection']['must_be_absent_before_create'] is True
          assert generated['authority']['live_acceptance_authorized'] is False
          assert generated['authority']['retrieval_quality_blocker_cleared'] is False
          PY
      - name: Privacy and authority scan
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = (
              Path('pilot/m23/m23-7-r3-6-candidate-reingestion-contract.json'),
              Path('docs/architecture/m23-7-r3-6-candidate-reingestion.md'),
          )
          text = '\n'.join(path.read_text(encoding='utf-8') for path in paths)
          for forbidden in ('QDRANT_API_KEY', 'CLOUDFLARE_API_TOKEN', 'https://'):
              assert forbidden not in text
          assert '"historical_pilot_mutation_authorized":false' in text
          assert '"production_collection_mutation_authorized":false' in text
          assert '"retrieval_quality_blocker_cleared":false' in text
          PY
      - name: Compile accepted Python scope
        run: |
          python -m compileall -q \
            src/knowledge_engine/m23_7_r3_6_candidate_reingestion.py \
            scripts/m23_7_r3_6_candidate_reingestion_operator.py \
            tests/test_m23_7_r3_6_candidate_reingestion.py
