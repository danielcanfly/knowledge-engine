name: M25.9 BGE-M3 Request Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-bge-m3-request-diagnostic.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-bge-m3-request-diagnostic.yml'

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 20
          show-progress: false
      - name: Verify one-file inference-only boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-bge-m3-request-diagnostic.yml
          grep -q "method='POST'" .github/workflows/m25-9-bge-m3-request-diagnostic.yml
          grep -q "external_service_mutations': 0" .github/workflows/m25-9-bge-m3-request-diagnostic.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-bge-m3-request-diagnostic.yml'
          fi

  diagnose:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: m23-r3-diagnostic
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DIAG_DIR: /tmp/m25-9-bge-m3-request-diagnostic
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify fresh exact-SHA attempt-1 authority
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_AI_TOKEN"
          mkdir -p "$DIAG_DIR"
      - name: Install repository dependencies
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'
      - name: Diagnose exact BGE-M3 synchronous request boundary
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          from knowledge_engine.m25_blog_live_candidate import (
              build_candidate_release,
              materialize_pack,
          )

          diag_dir = Path(os.environ['DIAG_DIR'])
          work_dir = diag_dir / 'work'
          pack_root = work_dir / 'source-pack'
          materialize_pack(pack_root, os.environ.get('GITHUB_TOKEN'))
          _, context = build_candidate_release(pack_root, work_dir, os.environ['GITHUB_SHA'])
          rows = context['semantic_inputs']
          assert isinstance(rows, list) and len(rows) == 4197
          texts = [str(row['text']) for row in rows]

          account = os.environ['CLOUDFLARE_ACCOUNT_ID']
          token = os.environ['CLOUDFLARE_AI_TOKEN']
          model = '@cf/baai/bge-m3'
          encoded_model = urllib.parse.quote(model, safe='@/')
          url = (
              'https://api.cloudflare.com/client/v4/accounts/'
              f'{account}/ai/run/{encoded_model}'
          )
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/json',
              'Content-Type': 'application/json',
              'User-Agent': 'knowledge-engine-m25.9-bge-m3-request-diagnostic/1',
          }

          def sanitize(value):
              if not isinstance(value, str):
                  return None
              value = value.replace(account, '<redacted-account-id>')
              value = re.sub(r'https?://\S+', '<redacted-url>', value)
              value = re.sub(r'\b[0-9a-fA-F]{32,64}\b', '<redacted-hex-id>', value)
              return value[:500]

          records = []

          def probe(label, indexes):
              selected = [texts[index] for index in indexes]
              body = json.dumps({'text': selected}, ensure_ascii=False).encode('utf-8')
              request = urllib.request.Request(
                  url=url,
                  method='POST',
                  headers=headers,
                  data=body,
              )
              try:
                  with urllib.request.urlopen(request, timeout=180) as response:
                      status = response.status
                      response_body = response.read(2_000_000)
                      content_type = response.headers.get_content_type()
              except urllib.error.HTTPError as exc:
                  status = exc.code
                  response_body = exc.read(2_000_000)
                  content_type = exc.headers.get_content_type() if exc.headers else None
              except Exception as exc:
                  record = {
                      'label': label,
                      'indexes': indexes,
                      'input_count': len(indexes),
                      'request_bytes': len(body),
                      'minimum_text_characters': min(map(len, selected)),
                      'maximum_text_characters': max(map(len, selected)),
                      'total_text_characters': sum(map(len, selected)),
                      'http_status': None,
                      'success': False,
                      'network_error_category': type(exc).__name__,
                      'error_message': sanitize(str(exc)),
                      'raw_body_recorded': False,
                  }
                  records.append(record)
                  return record
              try:
                  payload = json.loads(response_body.decode('utf-8'))
              except Exception:
                  payload = None
              errors = []
              messages = []
              if isinstance(payload, dict):
                  for item in payload.get('errors', [])[:5]:
                      if isinstance(item, dict):
                          errors.append({
                              'code': item.get('code'),
                              'message': sanitize(item.get('message')),
                          })
                  for item in payload.get('messages', [])[:5]:
                      if isinstance(item, dict):
                          messages.append({
                              'code': item.get('code'),
                              'message': sanitize(item.get('message')),
                          })
                  success = payload.get('success') is True
                  result = payload.get('result')
              else:
                  success = False
                  result = None
              data = result.get('data') if isinstance(result, dict) else None
              output_count = len(data) if isinstance(data, list) else None
              shape = result.get('shape') if isinstance(result, dict) else None
              record = {
                  'label': label,
                  'indexes': indexes,
                  'input_count': len(indexes),
                  'request_bytes': len(body),
                  'minimum_text_characters': min(map(len, selected)),
                  'maximum_text_characters': max(map(len, selected)),
                  'total_text_characters': sum(map(len, selected)),
                  'http_status': status,
                  'content_type': content_type,
                  'success': success,
                  'errors': errors,
                  'messages': messages,
                  'result_shape': type(result).__name__ if result is not None else None,
                  'embedding_output_count': output_count,
                  'embedding_shape': shape,
                  'response_bytes': len(response_body),
                  'response_sha256': hashlib.sha256(response_body).hexdigest(),
                  'raw_body_recorded': False,
              }
              records.append(record)
              return record

          lengths = [len(text) for text in texts]
          ordered = sorted(range(len(texts)), key=lambda index: lengths[index])
          representative = {
              'shortest': ordered[0],
              'median': ordered[len(ordered) // 2],
              'longest': ordered[-1],
          }
          for label, index in representative.items():
              probe(f'single_{label}', [index])

          prefix_sizes = [1, 2, 4, 8, 16, 32, 64, 100]
          prefix_records = {}
          for size in prefix_sizes:
              prefix_records[size] = probe(f'prefix_{size}', list(range(size)))

          failing_groups = []
          if prefix_records[100].get('success') is not True:
              for start in range(0, 100, 10):
                  record = probe(f'group_{start}_{start + 9}', list(range(start, start + 10)))
                  if record.get('success') is not True:
                      failing_groups.append((start, start + 10))
              for start, stop in failing_groups:
                  for index in range(start, stop):
                      probe(f'individual_{index}', [index])

          by_label = {record['label']: record for record in records}
          failed_individuals = [
              record for record in records
              if record['label'].startswith('individual_')
              and record.get('success') is not True
          ]
          representative_failed = [
              label for label in ('single_shortest', 'single_median', 'single_longest')
              if by_label[label].get('success') is not True
          ]
          successful_prefixes = [
              size for size, record in prefix_records.items()
              if record.get('success') is True
          ]
          failed_prefixes = [
              size for size, record in prefix_records.items()
              if record.get('success') is not True
          ]

          if prefix_records[100].get('success') is True:
              classification = 'prefix_100_passed_original_failure_transient_or_later_batch_specific'
          elif representative_failed:
              classification = 'single_input_length_or_content_failure'
          elif failed_individuals:
              classification = 'specific_input_content_failure'
          elif failing_groups:
              classification = 'aggregate_group_failure_without_single_failure'
          else:
              classification = 'synchronous_batch_size_or_payload_limit'

          evidence = {
              'schema_version': 'knowledge-engine-m25-9-bge-m3-request-diagnostic/v1',
              'engine_sha': os.environ['GITHUB_SHA'],
              'workflow_run_id': os.environ['GITHUB_RUN_ID'],
              'workflow_run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'model': model,
              'semantic_population': len(texts),
              'text_character_distribution': {
                  'minimum': min(lengths),
                  'median': sorted(lengths)[len(lengths) // 2],
                  'maximum': max(lengths),
                  'total': sum(lengths),
              },
              'representative_indexes': representative,
              'successful_prefix_sizes': successful_prefixes,
              'failed_prefix_sizes': failed_prefixes,
              'failing_ten_item_groups': [list(item) for item in failing_groups],
              'failed_individual_indexes': [
                  record['indexes'][0] for record in failed_individuals
              ],
              'records': records,
              'classification': classification,
              'http_methods_used': ['POST'],
              'inference_requests_only': True,
              'external_service_mutations': 0,
              'qdrant_mutations': 0,
              'r2_mutations': 0,
              'cloudflare_deployment_mutations': 0,
              'production_pointer_mutations': 0,
              'secret_values_recorded': False,
              'authorization_headers_recorded': False,
              'raw_response_bodies_recorded': False,
          }
          evidence['evidence_sha256'] = hashlib.sha256(
              json.dumps(evidence, sort_keys=True, separators=(',', ':')).encode()
          ).hexdigest()
          output = diag_dir / 'bge-m3-request-diagnostic.json'
          output.write_text(json.dumps(evidence, indent=2, sort_keys=True) + '\n')
          print(json.dumps({
              'classification': classification,
              'successful_prefix_sizes': successful_prefixes,
              'failed_prefix_sizes': failed_prefixes,
              'failed_individual_indexes': evidence['failed_individual_indexes'],
              'external_service_mutations': 0,
          }, sort_keys=True))
          PY
      - name: Upload sanitized diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-bge-m3-request-diagnostic-${{ github.sha }}
          path: /tmp/m25-9-bge-m3-request-diagnostic/bge-m3-request-diagnostic.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish diagnostic result
        if: always()
        run: |
          set -euo pipefail
          evidence="$DIAG_DIR/bge-m3-request-diagnostic.json"
          classification='evidence_unavailable'
          if test -s "$evidence"; then
            classification="$(jq -r '.classification' "$evidence")"
          fi
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-bge-m3-request-diagnostic' \
            -f description="run $GITHUB_RUN_ID a$GITHUB_RUN_ATTEMPT $classification" \
            -f target_url="$run_url" >/dev/null
          gh issue comment 1092 \
            --repo "$GITHUB_REPOSITORY" \
            --body "M25.9 BGE-M3 inference-only request diagnostic at exact SHA \`$GITHUB_SHA\` (run \`$GITHUB_RUN_ID\`, attempt \`$GITHUB_RUN_ATTEMPT\`): \`$classification\`. Qdrant, R2, deployment, pointer and public-traffic mutations: \`0\`."
