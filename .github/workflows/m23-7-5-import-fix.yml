name: M23.7.5 One-Shot Import Repair

on:
  pull_request:
    paths:
      - ".github/workflows/m23-7-5-import-fix.yml"

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m23-7-5-bounded-live-shadow
          fetch-depth: 0
      - name: Repair import and remove one-shot workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/knowledge_engine/m23_7_5_live_shadow.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "    embed_sections,\n    validate_embedding,\n    validate_qdrant_collection_response,\n)",
              "    embed_sections,\n    validate_qdrant_collection_response,\n)\nfrom .m23_candidate_semantic_runtime import validate_embedding",
          )
          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/m23-7-5-import-fix.yml").unlink()
          PY
      - name: Commit repaired source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: import candidate embedding validator"
          git push origin HEAD:agent/m23-7-5-bounded-live-shadow
