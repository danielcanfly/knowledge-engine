name: M20.6 Lexical enrichment

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m20_lexical_enrichment.py"
      - "tests/test_m20_6_lexical_enrichment.py"
      - "docs/architecture/m20/m20-6-lexical-enrichment.md"
      - ".github/workflows/m20-6-lexical-enrichment.yml"
      - "src/knowledge_engine/m20_hybrid_fusion.py"
      - "src/knowledge_engine/m20_retrieval_modes.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lexical-enrichment:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install exact project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Lint M20.6 scope
        run: |
          ruff check \
            src/knowledge_engine/m20_lexical_enrichment.py \
            tests/test_m20_6_lexical_enrichment.py
      - name: Test M20.1 through M20.6 contracts
        run: |
          pytest -q \
            tests/test_m20_1_embedding_contract.py \
            tests/test_m20_2_semantic_artifacts.py \
            tests/test_m20_3_runtime_semantic.py \
            tests/test_m20_4_retrieval_modes.py \
            tests/test_m20_5_hybrid_fusion.py \
            tests/test_m20_6_lexical_enrichment.py \
            tests/test_runtime.py
      - name: Prove fixed deterministic lexical signals
        run: |
          python - <<'PY'
          from knowledge_engine.m20_lexical_enrichment import (
              ALIAS_WEIGHT,
              MAX_RELATION_SCORE,
              MAX_TAG_SCORE,
              RELATION_WEIGHT,
              TAG_WEIGHT,
          )

          assert ALIAS_WEIGHT == 120
          assert TAG_WEIGHT == 20
          assert RELATION_WEIGHT == 10
          assert MAX_TAG_SCORE == 60
          assert MAX_RELATION_SCORE == 40
          PY
      - name: Scan authority and dependency boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          scope = Path(
              'src/knowledge_engine/m20_lexical_enrichment.py'
          ).read_text(encoding='utf-8')
          api = Path('src/knowledge_engine/api.py').read_text(encoding='utf-8')
          runtime = Path('src/knowledge_engine/runtime.py').read_text(encoding='utf-8')
          forbidden = (
              'import numpy',
              'import torch',
              'sentence_transformers',
              'qdrant',
              'faiss',
              'chromadb',
              'requests.',
              'httpx.',
              'boto3.',
              'put_object',
              'production pointer',
              'learned_weight',
          )
          findings = [token for token in forbidden if token in scope]
          assert not findings, findings
          assert 'm20_lexical_enrichment' not in api
          assert 'm20_lexical_enrichment' not in runtime
          PY
      - name: Compile M20.6 scope
        run: |
          python -m compileall -q \
            src/knowledge_engine/m20_lexical_enrichment.py \
            tests/test_m20_6_lexical_enrichment.py
