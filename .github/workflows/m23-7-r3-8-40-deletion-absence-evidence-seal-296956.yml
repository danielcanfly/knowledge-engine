name: M23.7 R3.8.40 Deletion/Absence Evidence Seal 296956

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-40/deletion-absence-evidence-seal-29695654053.json"
      - "docs/architecture/m23-7-r3-8-40-deletion-absence-evidence-seal-296956.md"
      - ".github/workflows/m23-7-r3-8-40-deletion-absence-evidence-seal-296956.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and deletion authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 343b1a994eba3dea7efd37b9ca3348fc563ae50a HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic deletion absence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-40/deletion-absence-evidence-seal-29695654053.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "e8f7717c60ed1a97627af238cd04e4abf9d744228332372d92882adcff512b9c"
          assert value["issue"] == 947
          auth = value["deletion_authorization"]
          assert auth["authorization_issue"] == 945
          assert auth["authorization_pr"] == 946
          assert auth["authorization_merge_sha"] == "343b1a994eba3dea7efd37b9ca3348fc563ae50a"
          assert auth["authorization_sha256"] == "4a4abe3e65725a971f8e66bba265f491c93866a4a671e98b48365179c710ef5c"
          deletion = value["deletion_run"]
          assert deletion["run_id"] == "29694753814"
          assert deletion["artifact_id"] == 8444646168
          assert deletion["artifact_zip_sha256"] == "716855410b4da936b2e3016c15845518ad945450887d3f115ff762a24c67ee0c"
          assert deletion["failure_file_sha256"] == "37fbe4a07d722e4a818ee35adfa8c9003f07c0df110db80f090e48bfe890e3c3"
          assert deletion["failure_self_digest"] == "d48f77c9c09a582643a80f01e95c9b3f8bf98efa817c9c36dd89f1efe8fe8b00"
          assert deletion["conclusion"] == "failure"
          assert deletion["exit_code"] == 23
          assert deletion["failure_stage"] == "worker_delete"
          assert deletion["failure_code"] == "delete_cloudflare_error_code"
          assert deletion["worker_delete_dispatched"] is True
          probe = value["post_delete_probe"]
          assert probe["run_id"] == "29695654053"
          assert probe["artifact_id"] == 8444910746
          assert probe["artifact_zip_sha256"] == "03851d8f9d5879346a100299d55cadea1c513b632adc8c7c59862815e34ca187"
          assert probe["receipt_file_sha256"] == "bfdff48d13424dcea81d4a7d5d808c6bb7d81280971f52310343df47e2b3d083"
          assert probe["receipt_self_digest"] == "4c8b5b8aa5e323d73011ee7961093627179af4bd5581133135319da6b1ce7d15"
          assert probe["worker_state"] == "worker_absent"
          for collection in ("versions", "deployments"):
              assert probe[collection]["state"] == "absent"
              assert probe[collection]["http_status"] == 404
              assert probe[collection]["error_codes"] == [10007]
              assert probe[collection]["identity_count"] == 0
          result = value["result"]
          assert result["deletion_dispatch_confirmed"] is True
          assert result["post_delete_absence_observed"] is True
          assert result["worker_lifecycle_clean_pending_reconciliation"] is True
          assert result["blocker_clearance_eligible"] is False
          authority = value["authority"]
          assert authority["evidence_seal_only"] is True
          assert authority["worker_deletion_replay_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-40/deletion-absence-evidence-seal-29695654053.json",
              "docs/architecture/m23-7-r3-8-40-deletion-absence-evidence-seal-296956.md",
              ".github/workflows/m23-7-r3-8-40-deletion-absence-evidence-seal-296956.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "280f164dcca5bcef3e4a5f0031790aa28881dd65", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 280f164dcca5bcef3e4a5f0031790aa28881dd65 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_operator_region_v3.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
