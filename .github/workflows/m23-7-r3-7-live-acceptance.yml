name: M23.7 Repair R3.7 Live Acceptance

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r3_7_live_acceptance.py"
      - "scripts/m23_7_r3_7_live_acceptance_operator.py"
      - "tests/test_m23_7_r3_7_live_acceptance.py"
      - "pilot/m23/m23-7-r3-7-live-acceptance-contract.json"
      - "docs/architecture/m23-7-r3-7-live-acceptance.md"
      - ".github/workflows/m23-7-r3-7-live-acceptance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-acceptance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Verify R3.6 reconciliation ancestry
        run: git merge-base --is-ancestor 6fc46f9e129d0260e024677f3b45b0760582fc3a HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Ruff accepted scope
        run: |
          set +e
          ruff check \
            src/knowledge_engine/m23_7_r3_7_live_acceptance.py \
            scripts/m23_7_r3_7_live_acceptance_operator.py \
            tests/test_m23_7_r3_7_live_acceptance.py \
            --output-format=json > r3-7-ruff-diagnostics.json
          status=$?
          cat r3-7-ruff-diagnostics.json
          exit "$status"
      - name: Upload Ruff diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: r3-7-ruff-diagnostics-${{ github.event.pull_request.head.sha || github.sha }}
          path: r3-7-ruff-diagnostics.json
          retention-days: 1
      - name: R3.5 accepted regression
        run: pytest -q tests/test_m23_7_r3_5_rank_quality_calibration.py
      - name: R3.6 accepted regression
        run: pytest -q tests/test_m23_7_r3_6_candidate_reingestion.py
      - name: R3.7 live acceptance regressions
        run: pytest -q tests/test_m23_7_r3_7_live_acceptance.py
      - name: Verify deterministic contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from knowledge_engine import m23_7_r3_7_live_acceptance as subject

          expected = json.loads(
              Path("pilot/m23/m23-7-r3-7-live-acceptance-contract.json")
              .read_text(encoding="utf-8")
          )
          assert subject.canonical_contract() == expected
          assert subject.CONTRACT_SHA256 == "11faa597fe15e39f2589963b30e00e3b1580d6f7bb186ffe9ef180139d427d8d"
          assert expected["entry"]["engine_sha"] == "6fc46f9e129d0260e024677f3b45b0760582fc3a"
          assert expected["collection"]["name"] == "llm_wiki_m23_r3_5_candidate_8eed54902c73"
          assert expected["collection"]["point_count"] == 107
          assert expected["queries"]["query_count"] == 24
          assert expected["queries"]["separate_live_calls"] is True
          assert expected["quality"]["min_recall_at_5"] == 0.82
          assert expected["quality"]["min_mrr_at_10"] == 0.68
          assert expected["quality"]["min_ndcg_at_10"] == 0.72
          assert expected["latency"]["max_live_p95_ms"] == 1200
          assert expected["latency"]["batch_amortisation_allowed"] is False
          PY
      - name: Privacy and authority scan
        run: |
          python - <<'PY'
          import inspect
          import json
          from pathlib import Path
          from knowledge_engine import m23_7_r3_7_live_acceptance as subject

          contract = json.loads(
              Path("pilot/m23/m23-7-r3-7-live-acceptance-contract.json")
              .read_text(encoding="utf-8")
          )
          source = inspect.getsource(subject.HttpLiveAcceptanceClient)
          assert '.put(' not in source
          assert '.delete(' not in source
          assert contract["authority"]["qdrant_read_authorized"] is True
          assert contract["authority"]["qdrant_write_authorized"] is False
          assert contract["authority"]["qdrant_delete_authorized"] is False
          assert contract["authority"]["qdrant_reindex_authorized"] is False
          assert contract["authority"]["historical_pilot_mutation_authorized"] is False
          assert contract["authority"]["production_collection_mutation_authorized"] is False
          assert contract["authority"]["production_retrieval"] == "lexical"
          assert contract["authority"]["promotion_eligibility_granted"] is False
          assert contract["authority"]["retrieval_quality_blocker_cleared"] is False
          assert all(value is False for value in contract["privacy"].values())
          text = "\n".join(
              path.read_text(encoding="utf-8")
              for path in (
                  Path("pilot/m23/m23-7-r3-7-live-acceptance-contract.json"),
                  Path("docs/architecture/m23-7-r3-7-live-acceptance.md"),
              )
          )
          for forbidden in ("QDRANT_API_KEY", "CLOUDFLARE_API_TOKEN", "https://"):
              assert forbidden not in text
          PY
      - name: Compile accepted Python scope
        run: |
          python -m py_compile \
            src/knowledge_engine/m23_7_r3_7_live_acceptance.py \
            scripts/m23_7_r3_7_live_acceptance_operator.py \
            tests/test_m23_7_r3_7_live_acceptance.py
