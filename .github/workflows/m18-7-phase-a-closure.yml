name: M18.7 Phase A closure

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m18_phase_a_closure.py"
      - "tests/test_m18_7_phase_a_closure.py"
      - "docs/architecture/m18/m18-7-phase-a-closure.json"
      - "docs/architecture/m18/m18-7-phase-a-closure.md"
      - ".github/workflows/m18-7-phase-a-closure.yml"
  push:
    branches:
      - main
    paths:
      - "src/knowledge_engine/m18_phase_a_closure.py"
      - "tests/test_m18_7_phase_a_closure.py"
      - "docs/architecture/m18/m18-7-phase-a-closure.json"
      - "docs/architecture/m18/m18-7-phase-a-closure.md"
      - ".github/workflows/m18-7-phase-a-closure.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phase-a-closure:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - name: Lint and compile M18.7 closure scope
        run: |
          ruff check \
            src/knowledge_engine/m18_phase_a_closure.py \
            tests/test_m18_7_phase_a_closure.py
          python -m compileall -q \
            src/knowledge_engine/m18_phase_a_closure.py \
            tests/test_m18_7_phase_a_closure.py
      - name: Test Phase A closure and adversarial boundaries
        run: pytest -q tests/test_m18_7_phase_a_closure.py
      - name: Verify deterministic closure identity
        run: |
          python -m knowledge_engine.m18_phase_a_closure \
            docs/architecture/m18/m18-7-phase-a-closure.json \
            > /tmp/m18-7-closure-a.json
          python -m knowledge_engine.m18_phase_a_closure \
            docs/architecture/m18/m18-7-phase-a-closure.json \
            > /tmp/m18-7-closure-b.json
          diff -u /tmp/m18-7-closure-a.json /tmp/m18-7-closure-b.json
