name: M23.7.3 Cross-Runtime Identity

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_3_shadow_replay.py"
      - "tests/test_m23_7_3_shadow_replay.py"
      - "docs/architecture/m23-7-3-reconciliation.md"
      - ".github/workflows/m23-7-3-cross-runtime-identity.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  replay-identity:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Python package
        run: python -m pip install -e '.[dev]'
      - name: Emit executable replay identity
        run: |
          mkdir -p .artifacts/m23
          python - <<'PY' > .artifacts/m23/replay-sha.txt
          from knowledge_engine.m23_7_3_shadow_replay import (
              build_shadow_replay_report,
              canonical_shadow_replay_payload,
          )

          report = build_shadow_replay_report(canonical_shadow_replay_payload())
          print(report["shadow_replay_sha256"])
          PY
          cat .artifacts/m23/replay-sha.txt
      - name: Upload diagnostic identity and source
        uses: actions/upload-artifact@v4
        with:
          name: m23-7-3-python-${{ matrix.python-version }}
          path: |
            .artifacts/m23/replay-sha.txt
            src/knowledge_engine/m23_7_3_shadow_replay.py
          retention-days: 1
      - name: Run replay tests
        run: pytest -q tests/test_m23_7_3_shadow_replay.py
