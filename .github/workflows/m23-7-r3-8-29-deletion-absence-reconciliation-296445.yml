name: M23.7 R3.8.29 Deletion/Absence Reconciliation 296445

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-29/deletion-absence-reconciliation-29644550908.json"
      - "docs/architecture/m23-7-r3-8-29-deletion-absence-reconciliation-296445.md"
      - ".github/workflows/m23-7-r3-8-29-deletion-absence-reconciliation-296445.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and accepted seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor e9531780c8dce57689e424c2fd4863e7acd5f128 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic deletion absence reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-29/deletion-absence-reconciliation-29644550908.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "c0868c312080d0a5ef561a6cdc0470d98bffcb50271388e9c41e1b4204a1d09b"
          assert value["issue"] is None
          assert value["seal_issue"] == 913
          assert value["seal_pr"] == 914
          assert value["seal_accepted_head"] == "7c9c2256ebd007cd2ac0534ae2d2d96fe5781e61"
          assert value["seal_merge_sha"] == "e9531780c8dce57689e424c2fd4863e7acd5f128"
          assert value["seal_sha256"] == "48ba212c0d14e586879ab05a9812f469962a3f0e41f75b9fc5b008247dcd1968"
          assert value["seal_exact_head_runs"] == {
              "architecture_canon": 29645605859,
              "ci": 29645605843,
              "graph_v2": 29645605852,
              "seal": 29645605888,
          }
          result = value["result"]
          assert result["worker_lifecycle_clean"] is True
          assert result["retained_worker_cleanup_complete"] is True
          assert result["deletion_dispatch_reconciled"] is True
          assert result["post_delete_absence_reconciled"] is True
          assert result["worker_state"] == "worker_absent"
          assert result["next_gate"] == "latency_root_cause_repair_and_fresh_observation"
          assert result["blocker_clearance_eligible"] is False
          assert result["production_retrieval"] == "lexical"
          evidence = value["sealed_evidence"]
          assert evidence["deletion"]["run_id"] == "29642001997"
          assert evidence["deletion"]["worker_delete_dispatched"] is True
          assert evidence["deletion"]["failure_code"] == "delete_absence_not_proven"
          assert evidence["deletion"]["failure_self_digest"] == "253fbcc755d7d348b0389dac748a91929acb7f0c294c6d5631c23e4e26c61899"
          assert evidence["post_delete_probe"]["run_id"] == "29644550908"
          assert evidence["post_delete_probe"]["worker_state"] == "worker_absent"
          assert evidence["post_delete_probe"]["receipt_self_digest"] == "4a33adb9b0dfdfb85cb52b5ac92536109135cb406f791132d642a8568126f9ec"
          authority = value["authority"]
          assert authority["evidence_reconciliation_only"] is True
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["promotion_eligibility_granted"] is False
          assert authority["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-29/deletion-absence-reconciliation-29644550908.json",
              "docs/architecture/m23-7-r3-8-29-deletion-absence-reconciliation-296445.md",
              ".github/workflows/m23-7-r3-8-29-deletion-absence-reconciliation-296445.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "e9531780c8dce57689e424c2fd4863e7acd5f128", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code e9531780c8dce57689e424c2fd4863e7acd5f128 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
