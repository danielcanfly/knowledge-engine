name: M23.7 R3.8.38 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29558980092.json"
      - "docs/architecture/m23-7-r3-8-38-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-38-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 6234e873d0026a950d163257564d5e46b26fe3f9 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization

          path = Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29558980092.json")
          value = validate_authorization(path)
          assert value["authorization_sha256"] == "5d84a62a092bae56348941b0a0171c9c35ce58ffcf7045688d0ac295c18fc939"
          assert value["worker_name"] == "knowledge-engine-r3-8-29558980092"
          assert value["observation_run_id"] == "29558980092"
          assert value["recovery_run_id"] == "29559298060"
          assert value["receipt_sha256"] == "939994463dd5aba84baf1d35afd01e575224d62652c1bc208b483f832c0196bf"
          assert value["evidence_seal_sha256"] == "8631f092d07e0b898e55ff59124db987ddf585770fa8c3eff440b91f1aa752bc"
          assert value["independent_reconciliation_sha256"] == "e4bc3c93894c0f205954d902837ef44d58392cc2b982ca1f16ee566e0b36649e"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29558980092.json",
              "docs/architecture/m23-7-r3-8-38-exact-deletion-authorization.md",
              ".github/workflows/m23-7-r3-8-38-exact-deletion-authorization.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "6234e873d0026a950d163257564d5e46b26fe3f9", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 6234e873d0026a950d163257564d5e46b26fe3f9 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
