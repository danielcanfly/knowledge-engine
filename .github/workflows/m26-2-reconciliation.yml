name: M26.2 Reconciliation
on:
  pull_request:
    paths:
      - '.github/workflows/m26-2-reconciliation.yml'
      - 'docs/architecture/m26/m26-2-reconciliation.md'
      - 'pilot/m26/m26-2-acceptance.json'
      - 'tests/test_m26_2_reconciliation.py'
permissions:
  contents: read
  actions: read
  issues: read
  pull-requests: read
jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify remote implementation identity
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor 7507c61f245f1027b1935c8cbcd1826f82d03e52 HEAD
          python - <<'PY'
          import json
          import os
          import urllib.request
          base='https://api.github.com/repos/danielcanfly/knowledge-engine'
          token=os.environ['GH_TOKEN']
          def get(path):
              request=urllib.request.Request(
                  base+path,
                  headers={
                      'Authorization':f'Bearer {token}',
                      'Accept':'application/vnd.github+json',
                      'X-GitHub-Api-Version':'2022-11-28',
                  },
              )
              return json.load(urllib.request.urlopen(request))
          pr=get('/pulls/1059')
          issue=get('/issues/1058')
          assert pr['merged_at']
          assert pr['head']['sha']=='68604fc1d80015ea5706709a1c2eda205bd1feaa'
          assert pr['merge_commit_sha']=='7507c61f245f1027b1935c8cbcd1826f82d03e52'
          assert issue['state']=='closed' and issue['state_reason']=='completed'
          runs=[
              29994182155,
              29994182135,
              29994182171,
              29994182161,
              29994182146,
              29994182131,
          ]
          for run_id in runs:
              run=get(f'/actions/runs/{run_id}')
              assert run['head_sha']=='68604fc1d80015ea5706709a1c2eda205bd1feaa'
              assert run['conclusion']=='success'
          artifact=get('/actions/artifacts/8558250962')
          assert artifact['name']=='m26-2-retrieval-envelope-evidence'
          assert artifact['digest']=='sha256:f6683b286f5db33af3fe0f8f7c05ce40649bd1ca7c9c4c247225980d338e0e8a'
          open('/tmp/m26-2-resolved-remote.json','w').write(
              json.dumps(
                  {
                      'reconciliation_head':os.environ['HEAD_SHA'],
                      'implementation_head':'68604fc1d80015ea5706709a1c2eda205bd1feaa',
                      'implementation_merge':'7507c61f245f1027b1935c8cbcd1826f82d03e52',
                      'workflow_runs':runs,
                      'artifact_id':8558250962,
                      'artifact_digest':artifact['digest'],
                  },
                  indent=2,
                  sort_keys=True,
              )+'\n'
          )
          PY
      - name: Download accepted M26.2 evidence
        uses: actions/download-artifact@v4
        with:
          name: m26-2-retrieval-envelope-evidence
          run-id: 29994182146
          github-token: ${{ github.token }}
          path: /tmp/m26-2-evidence
      - name: Validate acceptance and evidence contracts
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m ruff check tests/test_m26_2_reconciliation.py
          python -m pytest -q \
            tests/test_m26_2_reconciliation.py \
            tests/test_m26_2_retrieval_envelope.py \
            tests/test_m26_2_retrieval_envelope_contracts.py \
            tests/test_m26_1_architecture_authority.py \
            tests/test_m26_1_reconciliation.py
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          acceptance=json.loads(Path('pilot/m26/m26-2-acceptance.json').read_text())
          evidence=json.loads(Path('/tmp/m26-2-evidence/evidence.json').read_text())
          latency=json.loads(Path('/tmp/m26-2-evidence/latency.json').read_text())
          assert evidence['head_sha']==acceptance['implementation']['final_head_sha']
          assert evidence['workflow_run_id']==acceptance['evidence_artifact']['workflow_run_id']
          assert evidence['status']=='m26_2_retrieval_envelope_ready'
          assert evidence['synthetic_only'] is True
          assert evidence['real_corpus_bound'] is False
          assert evidence['authoritative_retrieval_lane']=='lexical'
          assert evidence['semantic_or_hybrid_used'] is False
          assert evidence['provider_called'] is False
          assert evidence['production_answer_serving'] is False
          assert evidence['m26_3_authorized'] is False
          frozen=acceptance['frozen_identities']
          bindings={
              'pilot/m26/m26-2-retrieval-policy.json':'retrieval_policy_sha256',
              'pilot/m26/m26-2-synthetic-corpus.json':'synthetic_corpus_sha256',
              'pilot/m26/m26-2-benchmark-cases.json':'benchmark_cases_sha256',
              'pilot/m26/m26-2-contract-registry.json':'contract_registry_sha256',
              'pilot/m26/m26-2-entry-contract.json':'entry_contract_sha256',
          }
          for path,key in bindings.items():
              actual=hashlib.sha256(Path(path).read_bytes()).hexdigest()
              assert actual==frozen[key]
              assert evidence['artifacts'][path]==actual
          assert evidence['artifacts']['/tmp/m26-2-a/report.json']==frozen['benchmark_report_sha256']
          assert evidence['artifacts']['/tmp/m26-2-evidence/latency.json']==frozen['latency_evidence_sha256']
          assert hashlib.sha256(Path('/tmp/m26-2-evidence/latency.json').read_bytes()).hexdigest()==frozen['latency_evidence_sha256']
          assert latency['iterations']==acceptance['latency']['iterations']
          assert latency['p50_ms']==acceptance['latency']['p50_ms']
          assert latency['p95_ms']==acceptance['latency']['p95_ms']
          assert latency['max_ms']==acceptance['latency']['max_ms']
          PY
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m26-2-reconciliation.yml' \
            'docs/architecture/m26/m26-2-reconciliation.md' \
            'pilot/m26/m26-2-acceptance.json' \
            'tests/test_m26_2_reconciliation.py' | sort)"
          test "$changed" = "$expected"
          ! printf '%s\n' "$changed" | grep -Eq '^(workers/|channels/|foundation/|release/|r2/|qdrant/|production/|src/|pilot/m25/)'
          python -m compileall -q tests/test_m26_2_reconciliation.py
      - name: Build resolved identity evidence
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          value={
              'schema_version':'knowledge-engine-m26-2-resolved-identity/v1',
              'head_sha':os.environ['HEAD_SHA'],
              'implementation_merge':'7507c61f245f1027b1935c8cbcd1826f82d03e52',
              'acceptance_sha256':hashlib.sha256(Path('pilot/m26/m26-2-acceptance.json').read_bytes()).hexdigest(),
              'remote_identity_sha256':hashlib.sha256(Path('/tmp/m26-2-resolved-remote.json').read_bytes()).hexdigest(),
              'status':'m26_2_retrieval_envelope_accepted',
              'm26_3_authorized':True,
              'synthetic_only':True,
              'provider_calls_permitted':False,
              'real_corpus_binding_permitted':False,
              'production_answer_serving_permitted':False,
          }
          Path('/tmp/m26-2-resolved.json').write_text(json.dumps(value,indent=2,sort_keys=True)+'\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: m26-2-resolved-identity
          path: |
            /tmp/m26-2-resolved.json
            /tmp/m26-2-resolved-remote.json
          if-no-files-found: error
          retention-days: 30
