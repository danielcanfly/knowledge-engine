name: M25.9 Blog Pilot Batch B

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/m25-9-blog-batch-b.yml'
      - 'docs/architecture/m25/m25-9-blog-batch-b.md'
      - 'pilot/m25/blog-batch-b-plan.json'
      - 'schemas/m25-blog-batch-b-plan-v1.schema.json'
      - 'src/knowledge_engine/m25_blog_pilot_batch_b.py'
      - 'tests/test_m25_blog_pilot_batch_b.py'

permissions:
  contents: read

jobs:
  blog-batch-b:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 200
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify exact head and accepted Batch A predecessor
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor \
            6286a21d67164ded2cb677618ffe95db8db10938 HEAD
          python - <<'PY'
          import json
          from pathlib import Path

          plan = json.loads(
              Path('pilot/m25/blog-batch-b-plan.json').read_text()
          )
          accepted = plan['accepted_predecessor']
          assert accepted['knowledge_engine_merge_sha'] == (
              '6286a21d67164ded2cb677618ffe95db8db10938'
          )
          assert all(value is False for value in plan['boundary'].values())
          PY

      - name: Install dependencies
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'

      - name: Capture Batch B lint findings
        run: |
          mkdir -p /tmp/m25-9-blog-b
          python -m ruff check --quiet --output-format=concise \
            src/knowledge_engine/m25_blog_pilot_batch_b.py \
            tests/test_m25_blog_pilot_batch_b.py \
            >/tmp/m25-9-blog-b/ruff-findings.txt 2>&1 || true

      - uses: actions/upload-artifact@v4
        with:
          name: m25-9-blog-batch-b-ruff-findings
          path: /tmp/m25-9-blog-b/ruff-findings.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce clean Batch B lint
        run: |
          if test -s /tmp/m25-9-blog-b/ruff-findings.txt; then
            cat /tmp/m25-9-blog-b/ruff-findings.txt
            exit 1
          fi

      - name: Validate signed Batch B plan
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          import jsonschema

          plan_path = Path('pilot/m25/blog-batch-b-plan.json')
          schema_path = Path(
              'schemas/m25-blog-batch-b-plan-v1.schema.json'
          )
          plan = json.loads(plan_path.read_text())
          schema = json.loads(schema_path.read_text())
          jsonschema.Draft202012Validator.check_schema(schema)
          jsonschema.validate(plan, schema)

          claimed = plan.pop('plan_sha256')
          actual = hashlib.sha256(
              json.dumps(
                  plan,
                  sort_keys=True,
                  separators=(',', ':'),
              ).encode()
          ).hexdigest()
          assert claimed == actual
          assert plan['master_population']['expected_article_count'] == 156
          assert plan['partition']['batch_b_count'] == 78
          assert plan['partition']['batch_b_is_exact_complement'] is True
          PY

      - name: Test complement, baseline and graph contracts
        run: |
          python -m pytest -q \
            tests/test_m25_blog_pilot_batch_b.py \
            tests/test_m25_blog_series_convergence.py \
            tests/test_m25_blog_pilot.py \
            tests/test_m25_9_controlled_pilot.py

      - name: Acquire exact upstream corpus and build Batch B
        env:
          BLOG_GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m knowledge_engine.m25_blog_pilot_batch_b \
            --repository huaihsuanbusiness/daniel-blog \
            --commit 97821b6547ce3c0b8b8acf11cbbf4795684df458 \
            --expected-count 156 \
            --batch-size 78 \
            --output-dir /tmp/m25-9-blog-b \
            >/tmp/m25-9-blog-b/cli-output.json

      - name: Validate accepted population and Batch B candidate graph
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('/tmp/m25-9-blog-b')
          master = json.loads((root / 'master-inventory.json').read_text())
          batch_a = json.loads((root / 'batch-a-inventory.json').read_text())
          batch_b = json.loads((root / 'batch-b-inventory.json').read_text())
          receipt = json.loads((root / 'batch-b-receipt.json').read_text())
          nodes = [
              json.loads(line)
              for line in (root / 'candidate-nodes.jsonl').read_text().splitlines()
              if line
          ]

          assert master['inventory_sha256'] == (
              'ee8589e4e2ce19005507fc5b9f3aa47d3c0320ab34848e81948c5cdaad7f729e'
          )
          assert batch_a['batch_inventory_sha256'] == (
              '734b6d5d346ad1e283d8d420332e6dab0f6c77074f7a4ed445bbcba62144f879'
          )
          assert batch_b['batch_inventory_sha256'] == (
              'f58b1be75093ad4f530e5317c35055a9b1cc21d56cef6b921550fd544b976988'
          )
          assert master['article_count'] == 156
          assert master['formal_series_count'] == 24
          assert master['parent_collection_count'] == 25
          assert batch_a['source_count'] == 78
          assert batch_b['source_count'] == 78

          a_ids = {item['article_id'] for item in batch_a['articles']}
          b_ids = {item['article_id'] for item in batch_b['articles']}
          master_ids = {item['article_id'] for item in master['articles']}
          assert not a_ids & b_ids
          assert a_ids | b_ids == master_ids
          assert len(list((root / 'sources').glob('*.md'))) == 78
          assert all(
              item['terminal_acquisition_state'] == 'acquired_verified'
              for item in batch_b['articles']
          )

          batch_b_series_ids = {
              item['series_id'] for item in batch_b['articles']
          }
          series_nodes = [
              node for node in nodes if node['node_type'] == 'Series'
          ]
          article_nodes = [
              node for node in nodes if node['node_type'] == 'Article'
          ]
          section_nodes = [
              node for node in nodes if node['node_type'] == 'Section'
          ]
          assert len(series_nodes) == len(batch_b_series_ids)
          assert len(article_nodes) == 78
          assert len(section_nodes) > 0
          assert receipt['batch_b_source_count'] == 78
          assert receipt['snapshot_count'] == 78
          assert receipt['intersection_count'] == 0
          assert receipt['missing_count'] == 0
          assert receipt['series_node_count'] == len(batch_b_series_ids)
          assert receipt['source_write_permitted'] is False
          assert receipt['production_mutation_permitted'] is False
          assert receipt['m25_9b_authorized'] is False
          assert receipt['m25_9c_authorized'] is False
          PY

      - name: Enforce exact changed-file and protected-mutation boundaries
        run: |
          git fetch --quiet --no-tags origin main
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m25-9-blog-batch-b.yml' \
            'docs/architecture/m25/m25-9-blog-batch-b.md' \
            'pilot/m25/blog-batch-b-plan.json' \
            'schemas/m25-blog-batch-b-plan-v1.schema.json' \
            'src/knowledge_engine/m25_blog_pilot_batch_b.py' \
            'tests/test_m25_blog_pilot_batch_b.py' | sort)"
          test "$changed" = "$expected"
          ! printf '%s\n' "$changed" | grep -Eq \
            '^(bundle/|provenance/|registry/|reviews/|foundation/|release/|r2/|qdrant/|production/|workers/|channels/)'

      - name: Assemble exact-head Batch B evidence
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path('/tmp/m25-9-blog-b')
          receipt = json.loads((root / 'batch-b-receipt.json').read_text())
          paths = [
              root / 'master-inventory.json',
              root / 'batch-a-inventory.json',
              root / 'batch-b-inventory.json',
              root / 'candidate-nodes.jsonl',
              root / 'candidate-edges.jsonl',
              root / 'batch-b-receipt.json',
          ]
          evidence = {
              'schema_version': (
                  'knowledge-engine-m25-9-blog-batch-b-exact-head/v1'
              ),
              'head_sha': os.environ['HEAD_SHA'],
              'workflow_run_id': int(os.environ['GITHUB_RUN_ID']),
              'upstream_repository': 'huaihsuanbusiness/daniel-blog',
              'upstream_commit': (
                  '97821b6547ce3c0b8b8acf11cbbf4795684df458'
              ),
              'accepted_predecessor_sha': (
                  '6286a21d67164ded2cb677618ffe95db8db10938'
              ),
              'artifact_sha256': {
                  str(path.relative_to(root)): hashlib.sha256(
                      path.read_bytes()
                  ).hexdigest()
                  for path in paths
              },
              'master_source_count': receipt['master_source_count'],
              'batch_a_source_count': receipt['batch_a_source_count'],
              'batch_b_source_count': receipt['batch_b_source_count'],
              'intersection_count': receipt['intersection_count'],
              'missing_count': receipt['missing_count'],
              'snapshot_count': receipt['snapshot_count'],
              'series_node_count': receipt['series_node_count'],
              'article_node_count': receipt['article_node_count'],
              'section_node_count': receipt['section_node_count'],
              'node_count': receipt['node_count'],
              'edge_count': receipt['edge_count'],
              'source_write_permitted': False,
              'production_mutation_permitted': False,
              'm25_9b_authorized': False,
              'm25_9c_authorized': False,
          }
          (root / 'exact-head-evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n'
          )
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: m25-9-blog-batch-b-evidence
          path: /tmp/m25-9-blog-b
          if-no-files-found: error
          retention-days: 30

      - name: Compile Batch B executor
        run: |
          python -m compileall -q \
            src/knowledge_engine/m25_blog_pilot_batch_b.py \
            tests/test_m25_blog_pilot_batch_b.py
