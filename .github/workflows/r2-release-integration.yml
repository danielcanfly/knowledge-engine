name: R2 Release Integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/r2_release_integration.py'
      - '.github/workflows/r2-release-integration.yml'
      - 'src/knowledge_engine/**'
      - 'examples/okf-bundle/**'
  push:
    branches: [main]
    paths:
      - 'scripts/r2_release_integration.py'
      - '.github/workflows/r2-release-integration.yml'
      - 'src/knowledge_engine/**'
      - 'examples/okf-bundle/**'

permissions:
  contents: read

concurrency:
  group: r2-release-integration
  cancel-in-progress: false

jobs:
  production-config-gate:
    runs-on: ubuntu-latest
    env:
      AUTH_MODE: ${{ vars.AUTH_MODE || secrets.AUTH_MODE }}
      JWT_ISSUER: ${{ vars.JWT_ISSUER || secrets.JWT_ISSUER }}
      JWT_JWKS_URL: ${{ vars.JWT_JWKS_URL || secrets.JWT_JWKS_URL }}
      JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE || secrets.JWT_AUDIENCE }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
    steps:
      - name: Validate required values and safe formats
        shell: bash
        run: |
          set -euo pipefail
          for name in AUTH_MODE JWT_ISSUER JWT_JWKS_URL JWT_AUDIENCE R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET R2_ENDPOINT_URL; do
            test -n "${!name:-}" || { echo "MISSING_${name}"; exit 2; }
          done
          test "$AUTH_MODE" = "supabase_jwt" || { echo "INVALID_AUTH_MODE_EXPECTED_SUPABASE_JWT"; exit 3; }
          [[ "$JWT_ISSUER" == https://*/auth/v1 ]] || { echo "INVALID_JWT_ISSUER_FORMAT"; exit 4; }
          [[ "$JWT_JWKS_URL" == https://*/auth/v1/.well-known/jwks.json ]] || { echo "INVALID_JWT_JWKS_URL_FORMAT"; exit 5; }
          test "$JWT_AUDIENCE" = "authenticated" || { echo "INVALID_JWT_AUDIENCE_EXPECTED_AUTHENTICATED"; exit 6; }
          [[ "$R2_ENDPOINT_URL" == https://*.r2.cloudflarestorage.com ]] || { echo "INVALID_R2_ENDPOINT_EXPECTED_S3_API_ENDPOINT"; exit 7; }
          echo "PRODUCTION_CONFIG_GATE_PASSED"

  release-lifecycle:
    needs: production-config-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - name: Exercise release promotion, query, ACL, and rollback
        env:
          APP_ENV: test
          AUTH_MODE: disabled
          OBJECT_STORE_BACKEND: r2
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
          R2_REGION: auto
        run: python scripts/r2_release_integration.py --run-id '${{ github.run_id }}-${{ github.run_attempt }}'
