name: R2 Release Integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/r2_release_integration.py'
      - '.github/workflows/r2-release-integration.yml'
      - 'src/knowledge_engine/**'
      - 'examples/okf-bundle/**'
  push:
    branches: [main]
    paths:
      - 'scripts/r2_release_integration.py'
      - '.github/workflows/r2-release-integration.yml'
      - 'src/knowledge_engine/**'
      - 'examples/okf-bundle/**'

permissions:
  contents: read

concurrency:
  group: r2-release-integration
  cancel-in-progress: false

jobs:
  release-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - name: Normalize repository configuration
        env:
          RAW_AUTH_MODE: ${{ vars.AUTH_MODE || secrets.AUTH_MODE }}
          RAW_JWT_ISSUER: ${{ vars.JWT_ISSUER || secrets.JWT_ISSUER }}
          RAW_JWT_JWKS_URL: ${{ vars.JWT_JWKS_URL || secrets.JWT_JWKS_URL }}
          RAW_JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE || secrets.JWT_AUDIENCE }}
          RAW_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RAW_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RAW_R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          RAW_R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
        shell: bash
        run: |
          set -euo pipefail
          normalize() {
            local name="$1"
            local value="$2"
            value="${value//$'\r'/}"
            value="${value//$'\n'/}"
            value="${value#${value%%[![:space:]]*}}"
            value="${value%${value##*[![:space:]]}}"
            if [[ "$value" == "$name="* ]]; then
              value="${value#*=}"
            fi
            if [[ ${#value} -ge 2 ]]; then
              if [[ "${value:0:1}" == '"' && "${value: -1}" == '"' ]]; then
                value="${value:1:${#value}-2}"
              elif [[ "${value:0:1}" == "'" && "${value: -1}" == "'" ]]; then
                value="${value:1:${#value}-2}"
              fi
            fi
            printf '%s' "$value"
          }
          {
            echo "AUTH_MODE=$(normalize AUTH_MODE "${RAW_AUTH_MODE:-}")"
            echo "JWT_ISSUER=$(normalize JWT_ISSUER "${RAW_JWT_ISSUER:-}")"
            echo "JWT_JWKS_URL=$(normalize JWT_JWKS_URL "${RAW_JWT_JWKS_URL:-}")"
            echo "JWT_AUDIENCE=$(normalize JWT_AUDIENCE "${RAW_JWT_AUDIENCE:-}")"
            echo "R2_ACCESS_KEY_ID=$(normalize R2_ACCESS_KEY_ID "${RAW_R2_ACCESS_KEY_ID:-}")"
            echo "R2_SECRET_ACCESS_KEY=$(normalize R2_SECRET_ACCESS_KEY "${RAW_R2_SECRET_ACCESS_KEY:-}")"
            echo "R2_BUCKET=$(normalize R2_BUCKET "${RAW_R2_BUCKET:-}")"
            echo "R2_ENDPOINT_URL=$(normalize R2_ENDPOINT_URL "${RAW_R2_ENDPOINT_URL:-}")"
            echo "R2_REGION=auto"
          } >> "$GITHUB_ENV"
      - name: Validate production configuration
        env:
          APP_ENV: production
          OBJECT_STORE_BACKEND: r2
        run: python -c 'from knowledge_engine.config import Settings; Settings.from_env(); print("PRODUCTION_CONFIG_PASSED")'
      - name: Exercise release promotion, query, ACL, and rollback
        env:
          APP_ENV: test
          AUTH_MODE: disabled
          OBJECT_STORE_BACKEND: r2
        shell: bash
        run: |
          set -o pipefail
          python scripts/r2_release_integration.py \
            --run-id '${{ github.run_id }}-${{ github.run_attempt }}' \
            > /tmp/r2-release-integration.log 2>&1 || {
              tail -n 160 /tmp/r2-release-integration.log
              exit 1
            }
          cat /tmp/r2-release-integration.log
      - name: Upload lifecycle failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: r2-release-integration-log
          path: /tmp/r2-release-integration.log
          if-no-files-found: error
          retention-days: 7
