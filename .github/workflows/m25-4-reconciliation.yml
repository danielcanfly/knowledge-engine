name: M25.4 Reconciliation

on:
  pull_request:
    paths:
      - '.github/workflows/m25-4-reconciliation.yml'
      - 'docs/architecture/m25/m25-4-reconciliation.md'
      - 'pilot/m25/m25-4-acceptance.json'
      - 'tests/test_m25_4_reconciliation.py'

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read

jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - name: Resolve and verify implementation and authority identity
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repository = os.environ['GH_REPOSITORY']
          token = os.environ['GH_TOKEN']
          owner, name = repository.split('/', 1)
          approved_candidate = 'cf56bad3b9128020214c3a30100ec741d6842e56'
          final_head = 'a58df21e1ace0bf5793fab3de3aca161818df528'
          merge_sha = '9b75e467678889980aa91d31f1c41bfb72e41ee6'
          approval_comment_id = 5053875354
          approval_body_sha256 = (
              '1c3d9bf81e384e0e388b26f934a1204d380223af89f2ab9183fe1c9ca50e0072'
          )
          required = {
              'CI': 29978054382,
              'M17 Architecture Canon Acceptance': 29978054490,
              'M17 Independent Operator GA Acceptance': 29978054417,
              'M18 Graph v2 acceptance': 29978054422,
              'M25.2 Intake Orchestrator': 29978054379,
              'M25.3 Extraction Worker': 29978054430,
              'M25.4 Identity Gold Benchmark': 29978054451,
              'M25.4 Daniel Approval Finalization': 29978054409,
              'R2 Release Integration': 29978054390,
          }
          required_artifacts = {
              29978054451: {
                  'name': 'm25-4-identity-gold-benchmark-evidence',
                  'digest': (
                      'sha256:091aa7a584c2ba7ba056647dbaeeab73ba95bca3b0c66ac52ea1a8e247f43e81'
                  ),
              },
              29978054409: {
                  'name': 'm25-4-daniel-approval-evidence',
                  'digest': (
                      'sha256:1eef2312f88d38d7316c05911ba175c8a38ee058f9cfea6b5fbf710aab1960f1'
                  ),
              },
          }

          def request_json(url: str, *, body: dict | None = None) -> dict:
              data = None if body is None else json.dumps(body).encode('utf-8')
              request = urllib.request.Request(
                  url,
                  data=data,
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          issue = request_json(f'https://api.github.com/repos/{repository}/issues/1046')
          assert issue['state'] == 'closed'
          assert issue['state_reason'] == 'completed'

          pr = request_json(f'https://api.github.com/repos/{repository}/pulls/1047')
          assert pr['merged'] is True
          assert pr['head']['sha'] == final_head
          assert pr['merge_commit_sha'] == merge_sha
          subprocess.run(['git', 'merge-base', '--is-ancestor', approved_candidate, 'HEAD'], check=True)
          subprocess.run(['git', 'merge-base', '--is-ancestor', merge_sha, 'HEAD'], check=True)

          comment = request_json(
              f'https://api.github.com/repos/{repository}/issues/comments/{approval_comment_id}'
          )
          assert comment['user']['login'] == 'huaihsuanbusiness'
          assert hashlib.sha256(comment['body'].encode('utf-8')).hexdigest() == approval_body_sha256

          query = urllib.parse.urlencode(
              {'event': 'pull_request', 'head_sha': final_head, 'per_page': 100}
          )
          runs = request_json(
              f'https://api.github.com/repos/{repository}/actions/runs?{query}'
          )['workflow_runs']
          runs_by_id = {run['id']: run for run in runs if run['head_sha'] == final_head}
          for workflow_name, run_id in required.items():
              run = runs_by_id[run_id]
              assert run['name'] == workflow_name
              assert run['status'] == 'completed'
              assert run['conclusion'] == 'success'

          resolved_artifacts = []
          for run_id, required_artifact in required_artifacts.items():
              artifacts = request_json(
                  f'https://api.github.com/repos/{repository}/actions/runs/{run_id}/artifacts'
              )['artifacts']
              artifact = next(
                  item for item in artifacts if item['name'] == required_artifact['name']
              )
              assert artifact['expired'] is False
              assert artifact['digest'] == required_artifact['digest']
              resolved_artifacts.append(
                  {
                      'artifact_id': artifact['id'],
                      'workflow_run_id': run_id,
                      'name': artifact['name'],
                      'digest': artifact['digest'],
                      'expired': artifact['expired'],
                  }
              )

          graphql = request_json(
              'https://api.github.com/graphql',
              body={
                  'query': '''
                  query($owner: String!, $name: String!, $number: Int!) {
                    repository(owner: $owner, name: $name) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 100) { nodes { isResolved } }
                      }
                    }
                  }
                  ''',
                  'variables': {'owner': owner, 'name': name, 'number': 1047},
              },
          )
          threads = graphql['data']['repository']['pullRequest']['reviewThreads']['nodes']
          unresolved_threads = sum(not thread['isResolved'] for thread in threads)
          assert unresolved_threads == 0

          acceptance_path = Path('pilot/m25/m25-4-acceptance.json')
          resolved = {
              'schema_version': 'knowledge-engine-m25-4-resolved-identity/v1',
              'issue': {
                  'number': 1046,
                  'state': issue['state'],
                  'state_reason': issue['state_reason'],
              },
              'implementation_pr': 1047,
              'approved_candidate_head_sha': approved_candidate,
              'final_head_sha': final_head,
              'merge_sha': merge_sha,
              'merged_at': pr['merged_at'],
              'implementation_merge_is_ancestor': True,
              'approved_candidate_is_ancestor': True,
              'authority': {
                  'actor': comment['user']['login'],
                  'comment_id': comment['id'],
                  'body_sha256': approval_body_sha256,
                  'm25_5_authorized_by_approval': False,
              },
              'unresolved_review_threads': unresolved_threads,
              'workflow_runs': [
                  {
                      'name': workflow_name,
                      'run_id': run_id,
                      'run_number': runs_by_id[run_id]['run_number'],
                      'conclusion': runs_by_id[run_id]['conclusion'],
                      'head_sha': final_head,
                  }
                  for workflow_name, run_id in sorted(required.items())
              ],
              'artifacts': sorted(resolved_artifacts, key=lambda item: item['name']),
              'acceptance_sha256': hashlib.sha256(acceptance_path.read_bytes()).hexdigest(),
              'codex_used': False,
              'daniel_gate_required': True,
              'daniel_gate_satisfied': True,
              'protected_mutations_zero': True,
          }
          Path('/tmp/m25-4-resolved-identity.json').write_text(
              json.dumps(resolved, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
      - name: Upload resolved implementation identity
        uses: actions/upload-artifact@v4
        with:
          name: m25-4-resolved-identity
          path: /tmp/m25-4-resolved-identity.json
          if-no-files-found: error
          retention-days: 30
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint reconciliation scope
        run: python -m ruff check tests/test_m25_4_reconciliation.py
      - name: Test reconciliation contract
        run: python -m pytest -q tests/test_m25_4_reconciliation.py
      - name: Reject protected or unrelated mutations
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python - <<'PY'
          import os
          import subprocess

          changed = set(
              subprocess.check_output(
                  ['git', 'diff', '--name-only', os.environ['BASE_SHA'], 'HEAD'],
                  text=True,
              ).splitlines()
          )
          allowed = {
              '.github/workflows/m25-4-reconciliation.yml',
              'docs/architecture/m25/m25-4-reconciliation.md',
              'pilot/m25/m25-4-acceptance.json',
              'tests/test_m25_4_reconciliation.py',
          }
          assert changed == allowed, (changed - allowed, allowed - changed)
          PY
      - name: Compile reconciliation test
        run: python -m compileall -q tests/test_m25_4_reconciliation.py
