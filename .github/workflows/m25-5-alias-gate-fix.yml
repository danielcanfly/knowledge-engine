name: M25.5 Alias Gate Fix
on:
  pull_request:
    paths:
      - '.github/workflows/m25-5-alias-gate-fix.yml'
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true
      - name: Apply bounded alias gate repair
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/knowledge_engine/m25_identity_governance.py')
          s=p.read_text()
          old='''        exact_signal_present = bool(signals & EXACT_SIGNALS) or outcome == "attach_alias_candidate"\n        merge_gate_pass = outcome not in MERGE_OUTCOMES or (\n            exact_signal_present\n            and top_score >= validated_policy["merge_gate"]["minimum_exact_match_score"]\n        )\n'''
          new='''        ranking_exact_signal_present = any(\n            target["exact_identity_signal"]\n            for ranking in rankings\n            for target in ranking.get("targets", [])\n        )\n        exact_signal_present = bool(signals & EXACT_SIGNALS) or ranking_exact_signal_present\n        minimum_score = (\n            validated_policy["merge_gate"]["minimum_alias_score"]\n            if outcome == "attach_alias_candidate"\n            else validated_policy["merge_gate"]["minimum_exact_match_score"]\n        )\n        merge_gate_pass = outcome not in MERGE_OUTCOMES or (\n            exact_signal_present and top_score >= minimum_score\n        )\n'''
          assert s.count(old)==1
          p.write_text(s.replace(old,new))
          p=Path('tests/test_m25_5_identity_governance.py')
          s=p.read_text()
          anchor='def test_ambiguous_and_policy_blocked_items_fail_closed() -> None:\n'
          test='''def test_alias_gate_uses_alias_threshold_and_real_identity_signal() -> None:\n    item = _item("approved_alias")\n    base = _synthetic_runner(item["case"])\n    policy = build_calibration_policy(SUITE, BASELINE)\n    policy["merge_gate"]["minimum_alias_score"] = 10.0\n    policy = sign(policy, "policy_sha256")\n    packet = build_governance_packet(item["case"], base, policy)\n    resolution = packet["governed_resolutions"][0]\n    assert resolution["merge_gate_pass"] is False\n    assert resolution["blocks_destructive_action"] is True\n    assert packet["critical_false_merge_risk_count"] == 1\n    case = json.loads(json.dumps(item["case"]))\n    case["candidates"][0]["target_label"] = "Unrelated Target"\n    packet = build_governance_packet(case, base, build_calibration_policy(SUITE, BASELINE))\n    resolution = packet["governed_resolutions"][0]\n    assert resolution["merge_gate_pass"] is False\n    assert resolution["blocks_destructive_action"] is True\n\n\n'''
          assert test not in s and s.count(anchor)==1
          p.write_text(s.replace(anchor,test+anchor))
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate bounded repair
        run: |
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m ruff check src/knowledge_engine/m25_identity_governance.py tests/test_m25_5_identity_governance.py
          python -m pytest -q tests/test_m25_5_identity_governance.py tests/test_m25_5_identity_governance_contracts.py tests/test_m25_4_identity_benchmark.py tests/test_m25_4_identity_benchmark_contracts.py tests/test_m25_4_daniel_approval.py
          mkdir -p /tmp/m25-5
          knowledge-m25-identity-governance run --suite pilot/m25/m25-4-gold-suite.json --baseline pilot/m25/m25-4-baseline-report.json --policy pilot/m25/m25-5-calibration-policy.json --output /tmp/m25-5/report.json --gate-output /tmp/m25-5/gate.json
          cmp /tmp/m25-5/report.json pilot/m25/m25-5-calibrated-report.json
          cmp /tmp/m25-5/gate.json pilot/m25/m25-5-governance-gate.json
      - name: Commit verified bounded repair
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/knowledge_engine/m25_identity_governance.py tests/test_m25_5_identity_governance.py
          git commit -m 'Harden M25.5 alias merge gate'
          git push origin "HEAD:$BRANCH"
