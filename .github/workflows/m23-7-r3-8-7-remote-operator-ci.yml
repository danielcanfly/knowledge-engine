name: M23.7 Repair R3.8.7 Remote Operator

on:
  pull_request:
    paths:
      - "scripts/m23_7_r3_8_remote_operator.py"
      - "scripts/m23_7_r3_8_remote_entrypoint.py"
      - "scripts/m23_7_r3_8_remote_operator_placement_v2.py"
      - "scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py"
      - "scripts/m23_7_r3_8_remote_operator_region_v3.py"
      - "scripts/m23_7_r3_8_remote_entrypoint_region_v3.py"
      - "tests/test_m23_7_r3_8_remote_operator.py"
      - "tests/test_m23_7_r3_8_remote_entrypoint.py"
      - "tests/test_m23_7_r3_8_placement_semantics_v2.py"
      - "tests/test_m23_7_r3_8_region_placement_v3.py"
      - "workers/m23-7-r3-8-latency-repair/worker.mjs"
      - "workers/m23-7-r3-8-latency-repair/worker.test.mjs"
      - "pilot/m23/m23-7-r3-8-7-remote-operator-contract.json"
      - "pilot/m23/m23-7-r3-8-placement-semantics-v2-contract.json"
      - "pilot/m23/m23-7-r3-8-region-placement-v3-contract.json"
      - ".github/workflows/m23-7-r3-8-remote-observe.yml"
      - ".github/workflows/m23-7-r3-8-7-remote-operator-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remote-operator-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor a5fca48683567b48a196e67657bd7dc4a4b9c554 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate accepted cores and adapters
        run: |
          python -m pip install -e '.[dev]'
          ruff check \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_entrypoint.py \
            scripts/m23_7_r3_8_remote_operator_placement_v2.py \
            scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py \
            scripts/m23_7_r3_8_remote_operator_region_v3.py \
            scripts/m23_7_r3_8_remote_entrypoint_region_v3.py \
            tests/test_m23_7_r3_8_remote_operator.py \
            tests/test_m23_7_r3_8_remote_entrypoint.py \
            tests/test_m23_7_r3_8_placement_semantics_v2.py \
            tests/test_m23_7_r3_8_region_placement_v3.py
          pytest -q \
            tests/test_m23_7_r3_8_remote_operator.py \
            tests/test_m23_7_r3_8_remote_entrypoint.py \
            tests/test_m23_7_r3_8_placement_semantics_v2.py \
            tests/test_m23_7_r3_8_region_placement_v3.py \
            tests/test_m23_7_r3_8_latency_repair.py
          node --test workers/m23-7-r3-8-latency-repair/worker.test.mjs
      - name: Preserve historical remote core byte-exact
        run: |
          scope_base="${{ github.event.pull_request.base.sha || '3a25fbde6b1b16061478632abd0844968790f84e' }}"
          git diff --exit-code "$scope_base" HEAD -- \
            docs/architecture/m23-7-r3-8-7-remote-operator.md \
            pilot/m23/m23-7-r3-8-7-remote-operator-contract.json \
            scripts/m23_7_r3_8_remote_entrypoint.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            tests/test_m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs \
            workers/m23-7-r3-8-latency-repair/worker.test.mjs
          python - <<'PY'
          import subprocess

          allowed = {
              ".github/workflows/m23-7-r3-8-7-remote-operator-ci.yml",
              ".github/workflows/m23-7-r3-8-placement-semantics-v2-ci.yml",
              ".github/workflows/m23-7-r3-8-region-placement-v3-ci.yml",
              ".github/workflows/m23-7-r3-8-remote-observe.yml",
              "scripts/m23_7_r3_8_remote_operator.py",
              "scripts/m23_7_r3_8_remote_operator_placement_v2.py",
              "tests/test_m23_7_r3_8_remote_operator.py",
              "tests/test_m23_7_r3_8_placement_semantics_v2.py",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "${{ github.event.pull_request.base.sha || '3a25fbde6b1b16061478632abd0844968790f84e' }}", "HEAD"],
              text=True,
          ).splitlines())
          assert changed <= allowed, (changed, allowed)
          PY
          test -f scripts/m23_7_r3_8_remote_operator_placement_v2.py
          test -f scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py
          test -f scripts/m23_7_r3_8_remote_operator_region_v3.py
          test -f scripts/m23_7_r3_8_remote_entrypoint_region_v3.py
      - name: Validate manual workflow and secret boundaries
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          path = Path(".github/workflows/m23-7-r3-8-remote-observe.yml")
          payload = yaml.safe_load(path.read_text(encoding="utf-8"))
          assert "workflow_dispatch" in payload[True]
          assert "pull_request" not in payload[True]
          text = path.read_text(encoding="utf-8")
          assert "m23_7_r3_8_remote_entrypoint_region_v3" in text
          assert "RUN_R3_8_REMOTE_ONCE" in text
          assert "GITHUB_RUN_ATTEMPT" in text
          assert "actions/upload-artifact@v4" in text
          assert "wrangler delete" not in text
          assert "path: r3-8-remote-evidence/" in text
          PY
      - name: Verify pinned Wrangler surface
        run: |
          test "$(npx --yes wrangler@4.111.0 --version | tr -d '\r')" = "4.111.0"
          npx --yes wrangler@4.111.0 deploy --help | grep -- --secrets-file >/dev/null
          npx --yes wrangler@4.111.0 deploy --help | grep -- --keep-vars >/dev/null
