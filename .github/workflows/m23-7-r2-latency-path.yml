name: M23.7 Repair R2 Latency Path

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r2_latency_path.py"
      - "scripts/m23_7_r2_latency_path.py"
      - "tests/test_m23_7_r2_latency_path.py"
      - "pilot/m23/m23-7-r2-latency-path-contract.json"
      - "pilot/m23/m23-7-r2-latency-path-fixture-report.json"
      - "docs/architecture/m23-7-r2-batched-latency-path.md"
      - ".github/workflows/m23-7-r2-latency-path.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latency-path:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Quality and adversarial tests
        run: |
          ruff check \
            src/knowledge_engine/m23_7_r2_latency_path.py \
            scripts/m23_7_r2_latency_path.py \
            tests/test_m23_7_r2_latency_path.py
          pytest -q \
            tests/test_m23_7_r1_semantic_alignment.py \
            tests/test_m23_7_r2_latency_path.py
      - name: Deterministic contract and report replay
        run: |
          mkdir -p .artifacts/m23
          python - <<'PY'
          import json
          from pathlib import Path
          from knowledge_engine.m23_7_r2_latency_path import canonical_contract

          Path('.artifacts/m23/contract.json').write_text(
              json.dumps(
                  canonical_contract(),
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(',', ':'),
              ) + '\n',
              encoding='utf-8',
          )
          PY
          cmp \
            .artifacts/m23/contract.json \
            pilot/m23/m23-7-r2-latency-path-contract.json
          python scripts/m23_7_r2_latency_path.py \
            --mode fixture \
            --origin-label fixture-local \
            --output .artifacts/m23/report-a.json
          python scripts/m23_7_r2_latency_path.py \
            --mode fixture \
            --origin-label fixture-local \
            --output .artifacts/m23/report-b.json
          cmp .artifacts/m23/report-a.json .artifacts/m23/report-b.json
          cmp \
            .artifacts/m23/report-a.json \
            pilot/m23/m23-7-r2-latency-path-fixture-report.json
      - name: Privacy authority and budget scan
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path('pilot/m23/m23-7-r2-latency-path-fixture-report.json').read_text()
          )
          assert report['comparison']['ranked_results_equivalent'] is True
          assert report['comparison']['connection_reuse_preserved'] is True
          assert report['paths']['baseline']['data_plane_requests'] == 16
          assert report['paths']['candidate']['data_plane_requests'] == 2
          assert report['acceptance']['canonical_max_shadow_p95_ms'] == 1200
          assert report['acceptance']['canonical_budget_changed'] is False
          assert report['acceptance']['budget_inflation_used'] is False
          assert report['exit']['retrieval_quality_blocker_cleared'] is False
          assert report['exit']['promotion_eligibility_granted'] is False
          assert report['authority']['production_retrieval'] == 'lexical'
          assert report['authority']['protected_mutations_dispatched'] is False
          assert report['external_calls']['qdrant_write'] == 0
          encoded = json.dumps(report, sort_keys=True)
          assert 'What does' not in encoded
          assert 'What is' not in encoded
          assert 'How does' not in encoded
          assert 'Which source' not in encoded
          PY
      - name: Compile accepted scope
        run: python -m compileall -q src tests scripts
