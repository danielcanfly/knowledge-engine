name: M23.7 R3.8.112 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29587264678.json"
      - "docs/architecture/m23-7-r3-8-112-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-112-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 2118c1ddcf0a6b362876568c40cdf30e60ec928f HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization
          value=validate_authorization(Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29587264678.json"))
          assert value["authorization_sha256"] == "3bdfdea12920380e5dc67f968f86314214de5c9114a30b485b026ea897045a52"
          assert value["worker_name"] == "knowledge-engine-r3-8-29587264678"
          assert value["observation_run_id"] == "29587264678"
          assert value["recovery_run_id"] == "29587564980"
          assert value["receipt_sha256"] == "eaadc828b631564e0a51dd434572afde8824851f71a87ed5e0e2d8444bf2ad57"
          assert value["evidence_seal_sha256"] == "5a3e9b01940acb8b453f4cd3ebfd8622897a1dab9a1f897f1e67103a2480555f"
          assert value["independent_reconciliation_sha256"] == "0694d6bcf83051ccd7b0aa7e95c09d73426977a249188e0807d272014e2e52ef"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed={"deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29587264678.json","docs/architecture/m23-7-r3-8-112-exact-deletion-authorization.md",".github/workflows/m23-7-r3-8-112-exact-deletion-authorization.yml"}
          changed=set(subprocess.check_output(["git","diff","--name-only","2118c1ddcf0a6b362876568c40cdf30e60ec928f","HEAD"],text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 2118c1ddcf0a6b362876568c40cdf30e60ec928f HEAD --             scripts/m23_7_r3_8_remote_delete.py             tests/test_m23_7_r3_8_remote_delete.py             .github/workflows/m23-7-r3-8-remote-delete.yml             scripts/m23_7_r3_8_remote_operator.py             src/knowledge_engine/m23_7_r3_8_latency_repair.py
