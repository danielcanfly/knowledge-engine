name: M5 Production Promotion

on:
  workflow_dispatch:
    inputs:
      request_path:
        description: Committed production promotion request spec path
        required: true
        default: production_promotions/m5-agent-architecture-6d-6254725c.json
        type: string

permissions:
  contents: read

concurrency:
  group: m5-production-promotion
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      REQUEST_PATH: ${{ inputs.request_path }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install exact Engine
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate request and export fields
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence

          for name in R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET R2_ENDPOINT_URL; do
            test -n "${!name:-}" || { echo "Missing $name"; exit 2; }
          done

          knowledge-engine validate-promotion-request \
            --request-path "$REQUEST_PATH" \
            --control-plane-sha "$GITHUB_SHA" \
            --github-env "$GITHUB_ENV" \
            --evidence-dir evidence \
            | tee evidence/request-validation.json

      - name: Verify current production pointer
        shell: bash
        run: |
          set -euo pipefail
          knowledge-engine refresh --channel production | tee evidence/precondition.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          current = json.loads(Path("evidence/precondition.json").read_text())
          expected_previous = {
              "release_id": os.environ["EXPECTED_PREVIOUS_RELEASE_ID"],
              "manifest_sha256": os.environ["EXPECTED_PREVIOUS_MANIFEST_SHA256"],
          }
          expected_target = {
              "release_id": os.environ["RELEASE_ID"],
              "manifest_sha256": os.environ["MANIFEST_SHA256"],
          }

          current_pointer = {
              "release_id": current["release_id"],
              "manifest_sha256": current["manifest_sha256"],
          }
          if current_pointer == expected_previous:
              state = "ready_to_promote"
          elif current_pointer == expected_target:
              state = "already_target"
          else:
              raise SystemExit(
                  "production pointer precondition failed: "
                  f"current={current_pointer!r}, "
                  f"expected_previous={expected_previous!r}, "
                  f"expected_target={expected_target!r}"
              )

          Path("evidence/idempotency_observation.json").write_text(
              json.dumps(
                  {
                      "state": state,
                      "current": current_pointer,
                      "expected_previous": expected_previous,
                      "expected_target": expected_target,
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"PROMOTION_PRECONDITION_STATE={state}\n")
          print(f"production_precondition={state}")
          PY

      - name: Verify requested candidate identity
        shell: bash
        run: |
          set -euo pipefail
          knowledge-engine verify-promotion-candidate \
            --operation-id "$OPERATION_ID" \
            --candidate-channel "$CANDIDATE_CHANNEL" \
            --release-id "$RELEASE_ID" \
            --manifest-sha256 "$MANIFEST_SHA256" \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-sha "$SOURCE_SHA" \
            --builder-sha "$BUILDER_SHA" \
            --foundation-sha "$FOUNDATION_SHA" \
            --expected-previous-release-id "$EXPECTED_PREVIOUS_RELEASE_ID" \
            --expected-previous-manifest-sha256 "$EXPECTED_PREVIOUS_MANIFEST_SHA256" \
            --control-plane-sha "$GITHUB_SHA" \
            --reason "$REASON" \
            --actor "$ACTOR" \
            | tee evidence/candidate_identity.json

      - name: Promote candidate to production
        shell: bash
        run: |
          set -euo pipefail
          if [ "${PROMOTION_PRECONDITION_STATE:-}" = "already_target" ]; then
            knowledge-engine verify-already-promoted \
              --operation-id "$OPERATION_ID" \
              --candidate-channel "$CANDIDATE_CHANNEL" \
              --release-id "$RELEASE_ID" \
              --manifest-sha256 "$MANIFEST_SHA256" \
              --source-repository "$SOURCE_REPOSITORY" \
              --source-sha "$SOURCE_SHA" \
              --builder-sha "$BUILDER_SHA" \
              --foundation-sha "$FOUNDATION_SHA" \
              --expected-previous-release-id "$EXPECTED_PREVIOUS_RELEASE_ID" \
              --expected-previous-manifest-sha256 "$EXPECTED_PREVIOUS_MANIFEST_SHA256" \
              --control-plane-sha "$GITHUB_SHA" \
              --reason "$REASON" \
              --actor "$ACTOR" \
              | tee evidence/promotion_result.json
          else
            knowledge-engine promote-release \
              --operation-id "$OPERATION_ID" \
              --candidate-channel "$CANDIDATE_CHANNEL" \
              --release-id "$RELEASE_ID" \
              --manifest-sha256 "$MANIFEST_SHA256" \
              --source-repository "$SOURCE_REPOSITORY" \
              --source-sha "$SOURCE_SHA" \
              --builder-sha "$BUILDER_SHA" \
              --foundation-sha "$FOUNDATION_SHA" \
              --expected-previous-release-id "$EXPECTED_PREVIOUS_RELEASE_ID" \
              --expected-previous-manifest-sha256 "$EXPECTED_PREVIOUS_MANIFEST_SHA256" \
              --control-plane-sha "$GITHUB_SHA" \
              --reason "$REASON" \
              --actor "$ACTOR" \
              | tee evidence/promotion_result.json
          fi

      - name: Verify production runtime after promotion
        shell: bash
        run: |
          set -euo pipefail
          knowledge-engine refresh --channel production | tee evidence/post_refresh.json
          knowledge-engine query \
            --channel production \
            --query "$POST_PROMOTE_PUBLIC_QUERY" \
            --audiences public \
            --limit 5 \
            | tee evidence/post-promote-public-query.json

          if [ -n "${POST_PROMOTE_ACL_QUERY:-}" ]; then
            knowledge-engine query \
              --channel production \
              --query "$POST_PROMOTE_ACL_QUERY" \
              --audiences public \
              --limit 5 \
              | tee evidence/post-promote-acl-query.json
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def load(path: str) -> dict:
              return json.loads(Path(path).read_text())

          after = load("evidence/post_refresh.json")
          if after["release_id"] != os.environ["RELEASE_ID"]:
              raise SystemExit("production release did not update")
          if after["manifest_sha256"] != os.environ["MANIFEST_SHA256"]:
              raise SystemExit("production manifest did not update")

          public_query = load("evidence/post-promote-public-query.json")
          expected_status = os.environ["EXPECTED_PUBLIC_STATUS"]
          if public_query.get("status") != expected_status:
              raise SystemExit(
                  "post promotion public query status mismatch: "
                  f"expected {expected_status!r}, got {public_query.get('status')!r}"
              )
          if public_query.get("retrieval", {}).get("raw_fallback_used") is not False:
              raise SystemExit("post promotion query used raw fallback")

          expected_citation_url = os.environ["EXPECTED_CITATION_URL"]
          citations = [
              citation
              for result in public_query.get("results", [])
              for citation in result.get("citations", [])
          ]
          if not any(citation.get("uri") == expected_citation_url for citation in citations):
              raise SystemExit(
                  "post promotion query did not return expected citation URL"
              )

          acceptance = {
              "promotion": json.loads(Path("evidence/promotion_result.json").read_text()),
              "public_query": {
                  "status": public_query.get("status"),
                  "expected_status": expected_status,
                  "expected_citation_url": expected_citation_url,
                  "citation_count": len(citations),
                  "raw_fallback_used": public_query.get("retrieval", {}).get(
                      "raw_fallback_used"
                  ),
              }
          }

          acl_query_path = Path("evidence/post-promote-acl-query.json")
          if acl_query_path.exists():
              acl_query = json.loads(acl_query_path.read_text())
              expected_acl_status = os.environ["EXPECTED_ACL_STATUS"]
              if acl_query.get("status") != expected_acl_status:
                  raise SystemExit(
                      "post promotion ACL query status mismatch: "
                      f"expected {expected_acl_status!r}, "
                      f"got {acl_query.get('status')!r}"
                  )
              if acl_query.get("retrieval", {}).get("raw_fallback_used") is not False:
                  raise SystemExit("post promotion ACL query used raw fallback")
              acceptance["acl_query"] = {
                  "status": acl_query.get("status"),
                  "expected_status": expected_acl_status,
                  "acl_filtered_count": acl_query.get("retrieval", {}).get(
                      "acl_filtered_count"
                  ),
                  "raw_fallback_used": acl_query.get("retrieval", {}).get(
                      "raw_fallback_used"
                  ),
              }

          Path("evidence/post_query_acceptance.json").write_text(
              json.dumps(acceptance, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print("M5_PRODUCTION_PROMOTION_PASSED")
          PY

      - name: Upload promotion evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m5-production-promotion-${{ github.sha }}
          path: evidence/
          if-no-files-found: error
          retention-days: 90
