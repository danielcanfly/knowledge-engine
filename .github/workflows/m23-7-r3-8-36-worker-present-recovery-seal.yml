name: M23.7 R3.8.36 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-36/worker-present-recovery-seal-29559298060.json"
      - "docs/architecture/m23-7-r3-8-36-worker-present-recovery-seal.md"
      - ".github/workflows/m23-7-r3-8-36-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 31d463d3874170d029ffd7185f5b842d46ed0d06 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-36/worker-present-recovery-seal-29559298060.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "8631f092d07e0b898e55ff59124db987ddf585770fa8c3eff440b91f1aa752bc"
          assert value["seal_issue"] == 710
          assert value["recovery_authorization_issue"] == 708
          assert value["recovery_authorization_pr"] == 709
          assert value["recovery_authorization_merge_sha"] == "31d463d3874170d029ffd7185f5b842d46ed0d06"
          assert value["recovery_run_id"] == "29559298060"
          assert value["artifact"]["artifact_id"] == 8398623196
          assert value["artifact"]["zip_sha256"] == "b63c089ad97d537a56a4f8b517683fba52e897edcfec0cd02e1c40c885631652"
          assert value["artifact"]["receipt_file_sha256"] == "2f61fb544c7a5cb323a2c7b6f6acff844730c5ff5ffb816bcd00f6b3fdf2d4d2"
          assert value["artifact"]["receipt_self_digest"] == "939994463dd5aba84baf1d35afd01e575224d62652c1bc208b483f832c0196bf"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_read_only_recovery_probe"
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29558980092"
          assert receipt["affected_run_id"] == "29558980092"
          assert receipt["affected_engine_sha"] == "3aca4b793a841858bd0682fe61cc0febe8b649cd"
          assert receipt["probe_engine_sha"] == "31d463d3874170d029ffd7185f5b842d46ed0d06"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          assert receipt["production_retrieval"] == "lexical"
          assert receipt["blockers_cleared"] is False
          for field in (
              "worker_delete_dispatched",
              "worker_deploy_dispatched",
              "worker_route_invoked",
              "worker_secret_mutation_dispatched",
              "qdrant_read_dispatched",
              "qdrant_mutation_dispatched",
              "r2_read_dispatched",
              "r2_mutation_dispatched",
              "protected_mutations_dispatched",
          ):
              assert receipt[field] is False
          authority = value["authority"]
          assert authority["evidence_seal_only"] is True
          assert authority["worker_deletion_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-36/worker-present-recovery-seal-29559298060.json",
              "docs/architecture/m23-7-r3-8-36-worker-present-recovery-seal.md",
              ".github/workflows/m23-7-r3-8-36-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "31d463d3874170d029ffd7185f5b842d46ed0d06", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 31d463d3874170d029ffd7185f5b842d46ed0d06 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
