name: M25.9 Build Step Log Evidence

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-build-step-log-evidence.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-build-step-log-evidence.yml'

permissions:
  contents: read
  actions: read
  issues: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 20
          show-progress: false
      - name: Verify one-file read-only boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-build-step-log-evidence.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-build-step-log-evidence.yml'
          fi

  extract-step-log:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_RUN_ID: '30061441749'
      TARGET_JOB_ID: '89383975673'
      TARGET_SHA: 31a2ff0df1e44ab80681b138a53b3d1ff732726c
      TARGET_STEP: Build, embed, fully verify Qdrant, and publish R2 candidate
      EVIDENCE_DIR: /tmp/m25-9-build-step-log-evidence
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 20
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify fresh extractor authority
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          mkdir -p "$EVIDENCE_DIR"
      - name: Download existing deploy-job log
        run: |
          set -euo pipefail
          gh run view "$TARGET_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --job "$TARGET_JOB_ID" \
            --log > "$EVIDENCE_DIR/deploy-job.log"
      - name: Extract and sanitize exact failed step
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          root = Path(os.environ['EVIDENCE_DIR'])
          log_path = root / 'deploy-job.log'
          output = root / 'build-step-log-summary.json'
          target_step = os.environ['TARGET_STEP']

          def sanitize(value: str) -> str:
              value = value.replace('\x1b', '')
              value = re.sub(r'\[[0-9;]*m', '', value)
              value = re.sub(r'https?://\S+', '<redacted-url>', value)
              value = re.sub(
                  r'(?i)(bearer|token|secret|password|authorization|api[_-]?key)\s*[:=]?\s*\S+',
                  r'\1=<redacted>',
                  value,
              )
              value = re.sub(r'\b[0-9a-fA-F]{32,64}\b', '<redacted-hex>', value)
              value = re.sub(r'\b[A-Za-z0-9_\-]{100,}\b', '<redacted-long-value>', value)
              return value[:1000]

          selected = []
          for raw in log_path.read_text(errors='replace').splitlines():
              parts = raw.split('\t', 2)
              if len(parts) != 3:
                  continue
              _, step, message = parts
              if step == target_step:
                  selected.append(sanitize(message))

          compact = []
          for line in selected:
              if line and (not compact or compact[-1] != line):
                  compact.append(line)

          error_lines = [
              line for line in compact
              if any(word in line.lower() for word in (
                  '##[error]', 'traceback', 'exception', 'error:', 'failed',
                  'failure', 'timeout', 'timed out', 'refused', 'unauthorized',
                  'forbidden', 'qdrant', 'r2', 'embedding', 'exit code',
              ))
          ]

          classification = 'unclassified_build_step_failure'
          joined = '\n'.join(compact).lower()
          if 'qdrant' in joined and ('timeout' in joined or 'timed out' in joined):
              classification = 'qdrant_timeout'
          elif 'qdrant' in joined and ('unauthorized' in joined or 'forbidden' in joined):
              classification = 'qdrant_auth_or_permission_failure'
          elif 'qdrant' in joined and ('connection' in joined or 'refused' in joined):
              classification = 'qdrant_connectivity_failure'
          elif 'embedding' in joined or 'embedd' in joined:
              classification = 'embedding_or_model_failure'
          elif 'r2' in joined and ('unauthorized' in joined or 'forbidden' in joined):
              classification = 'r2_auth_or_permission_failure'
          elif 'r2' in joined and ('connection' in joined or 'timeout' in joined):
              classification = 'r2_connectivity_failure'
          elif 'no space left' in joined or 'memoryerror' in joined or 'out of memory' in joined:
              classification = 'runner_resource_exhaustion'

          summary = {
              'schema_version': 'knowledge-engine-m25-9-build-step-log-evidence/v1',
              'source_run_id': int(os.environ['TARGET_RUN_ID']),
              'source_job_id': int(os.environ['TARGET_JOB_ID']),
              'source_engine_sha': os.environ['TARGET_SHA'],
              'target_step': target_step,
              'source_run_reexecuted': False,
              'external_service_mutations': 0,
              'secret_values_recorded': False,
              'authorization_headers_recorded': False,
              'raw_log_recorded': False,
              'selected_line_count': len(compact),
              'classification': classification,
              'error_lines': error_lines[-80:],
              'step_tail': compact[-180:],
          }
          summary['evidence_sha256'] = hashlib.sha256(
              json.dumps(summary, sort_keys=True, separators=(',', ':')).encode()
          ).hexdigest()
          output.write_text(json.dumps(summary, indent=2, sort_keys=True) + '\n')
          print(json.dumps({
              'classification': classification,
              'selected_line_count': len(compact),
              'error_line_count': len(error_lines),
              'external_service_mutations': 0,
          }, sort_keys=True))
          PY
      - name: Upload sanitized exact-step evidence
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-build-step-log-evidence-${{ github.sha }}
          path: /tmp/m25-9-build-step-log-evidence/build-step-log-summary.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish exact-step result
        run: |
          set -euo pipefail
          summary="$EVIDENCE_DIR/build-step-log-summary.json"
          classification="$(jq -r '.classification' "$summary")"
          digest="$(jq -r '.evidence_sha256' "$summary")"
          lines="$(jq -r '.selected_line_count' "$summary")"
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$TARGET_SHA" \
            -f state='success' \
            -f context='m25-9-build-step-log-evidence' \
            -f description="run $GITHUB_RUN_ID $classification lines=$lines" \
            -f target_url="$run_url" >/dev/null
          gh issue comment 1092 \
            --repo "$GITHUB_REPOSITORY" \
            --body "M25.9 exact failed-step evidence extracted from existing run \`$TARGET_RUN_ID\` without rerun: classification \`$classification\`, selected lines \`$lines\`, extractor run \`$GITHUB_RUN_ID\`, evidence SHA-256 \`$digest\`. External service mutations by extractor: \`0\`."
