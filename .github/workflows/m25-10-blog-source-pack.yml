name: M25.10 Blog Source Pack Runtime

on:
  pull_request:
    paths:
      - 'src/knowledge_engine/m25_blog_candidate_release.py'
      - 'tests/test_m25_10_blog_candidate_release.py'
      - 'docs/architecture/m25/m25-10-blog-source-admission-deployment.md'
      - '.github/workflows/m25-10-blog-source-pack.yml'

permissions:
  contents: read

jobs:
  source-pack-runtime:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and accepted Batch B predecessor
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor 93f0a7761dee795488a3435f2bfecc6a4d6702e6 HEAD
      - name: Install
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'
      - name: Capture Ruff findings and fixed candidate
        run: |
          mkdir -p /tmp/m25-10/fixed/src/knowledge_engine /tmp/m25-10/fixed/tests
          cp src/knowledge_engine/m25_blog_candidate_release.py \
            /tmp/m25-10/fixed/src/knowledge_engine/
          cp tests/test_m25_10_blog_candidate_release.py \
            /tmp/m25-10/fixed/tests/
          python -m ruff check --output-format=concise \
            src/knowledge_engine/m25_blog_candidate_release.py \
            tests/test_m25_10_blog_candidate_release.py \
            >/tmp/m25-10/ruff-findings.txt 2>&1 || true
          python -m ruff check --fix \
            /tmp/m25-10/fixed/src/knowledge_engine/m25_blog_candidate_release.py \
            /tmp/m25-10/fixed/tests/test_m25_10_blog_candidate_release.py
      - uses: actions/upload-artifact@v4
        with:
          name: m25-10-blog-source-pack-ruff-findings
          path: /tmp/m25-10/ruff-findings.txt
          if-no-files-found: error
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: m25-10-blog-source-pack-ruff-fixed
          path: /tmp/m25-10/fixed/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce clean Ruff
        run: |
          if test -s /tmp/m25-10/ruff-findings.txt; then
            cat /tmp/m25-10/ruff-findings.txt
            exit 1
          fi
      - name: Focused tests
        run: python -m pytest -q tests/test_m25_10_blog_candidate_release.py
      - name: Compile
        run: |
          python -m compileall -q \
            src/knowledge_engine/m25_blog_candidate_release.py \
            tests/test_m25_10_blog_candidate_release.py
      - name: Enforce exact changed-file boundary
        run: |
          git fetch --quiet --no-tags origin main
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m25-10-blog-source-pack.yml' \
            'docs/architecture/m25/m25-10-blog-source-admission-deployment.md' \
            'src/knowledge_engine/m25_blog_candidate_release.py' \
            'tests/test_m25_10_blog_candidate_release.py' | sort)"
          test "$changed" = "$expected"
          ! printf '%s\n' "$changed" | grep -Eq \
            '^(production/|release/production|r2/production|workers/production|credentials/)'
