name: M23.7 R3.8.47 Worker-Present Seal Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-47/worker-present-seal-reconciliation-29565032873.json"
      - "docs/architecture/m23-7-r3-8-47-worker-present-seal-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-47-worker-present-seal-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor fd6566a359ff32ebc72bbd8a7ad16620231ca7a2 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-47/worker-present-seal-reconciliation-29565032873.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "01b2e036f51a9eeef8b01713f2470d039da8d32cb0f08610986b57e1991fb6e6"
          assert value["issue"] == 739
          assert value["seal_issue"] == 737
          assert value["seal_pr"] == 738
          assert value["seal_accepted_head"] == "79576b1070407b84613f193a4be814b2482d739e"
          assert value["seal_merge_sha"] == "fd6566a359ff32ebc72bbd8a7ad16620231ca7a2"
          assert value["seal_sha256"] == "3a6e8e2d1bf8127aad0ef4b090528cb0dbe7997c488c6d681b68f503edcceb4f"
          assert value["seal_exact_head_runs"] == {
              "architecture_canon": 29565368792,
              "ci": 29565368819,
              "graph_v2": 29565368795,
              "seal": 29565368857,
          }
          result = value["result"]
          assert result["worker_present_evidence_reconciled"] is True
          assert result["worker_state"] == "worker_present"
          assert result["worker_lifecycle_clean"] is False
          assert result["deletion_authorization_next_gate"] is True
          assert result["blocker_clearance_eligible"] is False
          assert result["production_retrieval"] == "lexical"
          assert value["worker"]["name"] == "knowledge-engine-r3-8-29564569280"
          assert value["worker"]["versions"]["identity_count"] == 4
          assert value["worker"]["deployments"]["identity_count"] == 4
          authority = value["authority"]
          assert authority["evidence_reconciliation_only"] is True
          assert authority["worker_deletion_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-47/worker-present-seal-reconciliation-29565032873.json",
              "docs/architecture/m23-7-r3-8-47-worker-present-seal-reconciliation.md",
              ".github/workflows/m23-7-r3-8-47-worker-present-seal-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "fd6566a359ff32ebc72bbd8a7ad16620231ca7a2", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code fd6566a359ff32ebc72bbd8a7ad16620231ca7a2 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
