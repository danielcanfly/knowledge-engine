name: M23.7 R3.8.26 Worker-Present Seal Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-26/worker-present-seal-reconciliation-29605835592.json"
      - ".github/evidence/m23-7-r3-8-26/worker-present-seal-reconciliation-29608526669.json"
      - "docs/architecture/m23-7-r3-8-26-worker-present-seal-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-26-worker-present-seal-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor fae5269c5d3672ff502748fa3ae7e9f20230d206 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-26/worker-present-seal-reconciliation-29608526669.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "acf9f1f230226c50e2d741b03670bc9c1a63448e45fa7a254888f87988d9b0f5"
          assert value["issue"] is None
          assert value["seal_issue"] is None
          assert value["seal_pr"] == 871
          assert value["seal_accepted_head"] == "3775185eb8a5387f74c3008206e46c9e1ea7c3ed"
          assert value["seal_merge_sha"] == "fae5269c5d3672ff502748fa3ae7e9f20230d206"
          assert value["seal_sha256"] == "fea02c64c22ff1682c91c207e432c922b562625c17c36015b5bb957b3b92cbe1"
          assert value["seal_exact_head_runs"] == {
              "architecture_canon": 29608764958,
              "ci": 29608764955,
              "graph_v2": 29608765138,
              "seal": 29608764974,
          }
          assert value["recovery_authorization_issue"] is None
          assert value["recovery_authorization_pr"] == 870
          assert value["recovery_authorization_merge_sha"] == "7f780deb368f07b797a72e401ef09068d56dd04d"
          assert value["recovery_run_id"] == "29608526669"
          assert value["artifact"]["artifact_id"] == 8417812324
          assert value["artifact"]["zip_sha256"] == "859d6d49a5167a8445ac995e4f4ba04dd5b0693c274ebaebd6fdb9dd02d3ab12"
          assert value["artifact"]["receipt_file_sha256"] == "6be6426d899f82a4f8cbda85e38a2d2daba7268e63b7ea61aa6a929581cfeb4a"
          assert value["artifact"]["receipt_self_digest"] == "62432f713ec0de751505697ff5002b75431839195e61eba6e16d5c34a1a11f09"
          result = value["result"]
          assert result["worker_present_evidence_reconciled"] is True
          assert result["worker_state"] == "worker_present"
          assert result["worker_lifecycle_clean"] is False
          assert result["deletion_authorization_next_gate"] is True
          assert result["next_gate"] == "separate_exact_deletion_authorization"
          assert result["blocker_clearance_eligible"] is False
          assert result["production_retrieval"] == "lexical"
          worker = value["worker"]
          assert worker["name"] == "knowledge-engine-r3-8-29607698618"
          assert worker["versions"]["identities"] == [
              "423166e8-19b8-4dfb-aa65-5b5d6a9d5495",
              "8022cda9-d2bf-4018-9031-d5b67db1478e",
              "93930eb3-1a8b-4c4d-8688-67105d94e2ed",
              "f39035e3-9629-4377-949b-d0fd4b93d0db",
          ]
          assert worker["deployments"]["identities"] == [
              "5764fe7a-1513-4bed-9169-8e0d5c8ed3d4",
              "89c3ccc1-f647-4899-86fb-21d6a7150e8c",
              "a99588fb-9af7-4fde-a4ca-1e51a04bb245",
              "e308a1da-0b2e-413f-abfd-516c8bacbad3",
          ]
          assert worker["versions"]["identity_count"] == 4
          assert worker["deployments"]["identity_count"] == 4
          assert worker["versions"]["state"] == "present"
          assert worker["deployments"]["state"] == "present"
          authority = value["authority"]
          assert authority["evidence_reconciliation_only"] is True
          assert authority["worker_deletion_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          assert authority["source_mutation_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          assert value["strict_zero_verified"] is True
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess

          allowed = {
              ".github/evidence/m23-7-r3-8-26/worker-present-seal-reconciliation-29608526669.json",
              "docs/architecture/m23-7-r3-8-26-worker-present-seal-reconciliation.md",
              ".github/workflows/m23-7-r3-8-26-worker-present-seal-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "fae5269c5d3672ff502748fa3ae7e9f20230d206", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code fae5269c5d3672ff502748fa3ae7e9f20230d206 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
