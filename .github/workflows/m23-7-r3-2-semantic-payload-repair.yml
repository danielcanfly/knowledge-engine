name: M23.7 Repair R3.2 Semantic Payload Repair

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r3_2_semantic_payload_repair.py"
      - "scripts/m23_7_r3_2_semantic_payload_repair.py"
      - "tests/test_m23_7_r3_2_semantic_payload_repair.py"
      - "docs/architecture/m23-7-r3-2-semantic-payload-repair.md"
      - "pilot/m23/m23-7-r3-2-semantic-payload-repair-contract.json"
      - ".github/workflows/m23-7-r3-2-semantic-payload-repair.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semantic-payload-repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Ruff accepted scope
        id: ruff
        continue-on-error: true
        run: |
          mkdir -p .artifacts/m23
          set -o pipefail
          ruff check \
            src/knowledge_engine/m23_7_r3_2_semantic_payload_repair.py \
            scripts/m23_7_r3_2_semantic_payload_repair.py \
            tests/test_m23_7_r3_2_semantic_payload_repair.py \
            --output-format=concise 2>&1 | tee .artifacts/m23/r3-2-ruff.txt
      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m23-7-r3-2-ruff-${{ github.event.pull_request.head.sha || github.sha }}
          path: .artifacts/m23/r3-2-ruff.txt
          if-no-files-found: error
          retention-days: 3
      - name: Repair and regression tests
        run: |
          pytest -q \
            tests/test_m23_6_2_qdrant_ingestion_manifest.py \
            tests/test_m23_7_r1_semantic_alignment.py \
            tests/test_m23_7_r3_1_root_cause.py \
            tests/test_m23_7_r3_2_semantic_payload_repair.py
      - name: Deterministic repair contract replay
        run: |
          mkdir -p .artifacts/m23
          python scripts/m23_7_r3_2_semantic_payload_repair.py \
            --output .artifacts/m23/r3-2-a.json
          python scripts/m23_7_r3_2_semantic_payload_repair.py \
            --output .artifacts/m23/r3-2-b.json
          cmp .artifacts/m23/r3-2-a.json .artifacts/m23/r3-2-b.json
          cmp \
            .artifacts/m23/r3-2-a.json \
            pilot/m23/m23-7-r3-2-semantic-payload-repair-contract.json
      - name: Privacy and authority scan
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path('pilot/m23/m23-7-r3-2-semantic-payload-repair-contract.json')
              .read_text(encoding='utf-8')
          )
          assert report['implementation_issue'] == 484
          assert report['repair']['primary_root_cause'] == 'identifier_humanisation_query_collision'
          assert report['repair']['payload_schema'] == 'knowledge-engine-m23-qdrant-payload/v2'
          assert report['repair']['payload_additions'] == ['section_title', 'language']
          assert report['repair']['embedding_model_changed'] is False
          assert report['repair']['embedding_prefix_changed'] is False
          assert report['repair']['full_reingestion_required'] is True
          assert report['authority']['production_retrieval'] == 'lexical'
          assert report['authority']['qdrant_write_authorized'] is False
          assert report['authority']['promotion_eligibility_granted'] is False
          assert report['next_gate'] == 'offline_rebuild_and_retrieval_evaluation'
          encoded = json.dumps(report, sort_keys=True)
          for forbidden in (
              'QDRANT_API_KEY',
              'CLOUDFLARE_API_TOKEN',
              'https://',
          ):
              assert forbidden not in encoded
          PY
      - name: Compile accepted Python scope
        run: python -m compileall -q src tests scripts
      - name: Enforce Ruff result
        if: always()
        run: test "${{ steps.ruff.outcome }}" = "success"
