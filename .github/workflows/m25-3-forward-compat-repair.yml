name: M25.3 Forward Compatibility Repair

on:
  pull_request:
    paths:
      - '.github/workflows/m25-3-forward-compat-repair.yml'
      - 'scripts/m25_3_fix_m25_2_forward_compat.py'

permissions:
  contents: write

jobs:
  repair:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/m25-3-extraction-worker
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Apply bounded M25.2 forward-compat repair
        run: python scripts/m25_3_fix_m25_2_forward_compat.py
      - name: Verify M25.2 lint scope
        run: >-
          python -m ruff check
          src/knowledge_engine/m25_intake_*.py
          tests/test_m25_2_intake_orchestrator*.py
      - name: Verify M25.2 and M25.3 contracts
        run: >-
          PYTHONPATH=tests python -m pytest -q
          tests/test_intake_v1.py
          tests/test_m21_2_resumable_batch.py
          tests/test_m21_3_extraction_candidates.py
          tests/test_m25_1_architecture.py
          tests/test_m25_1_reconciliation.py
          tests/test_m25_2_intake_orchestrator.py
          tests/test_m25_2_intake_orchestrator_contracts.py
          tests/test_m25_2_reconciliation.py
          tests/test_m25_3_extraction_worker.py
          tests/test_m25_3_extraction_contracts.py
          tests/test_m25_3_extraction_integration.py
      - name: Commit and push bounded repair
        run: |
          git config user.name 'ChatGPT M25 Subagent'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Repair M25.2 lint forward compatibility for M25.3'
          git push origin HEAD:chatgpt/m25-3-extraction-worker
