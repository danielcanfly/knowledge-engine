name: M23.7 R3.8.48 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29564569280.json"
      - "docs/architecture/m23-7-r3-8-48-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-48-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 093c6b67c2fc1c29cb7caa02ea002ddb48fabbff HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization

          path = Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29564569280.json")
          value = validate_authorization(path)
          assert value["authorization_sha256"] == "7cd2c6377f85544804fd06e4d9dbbdb9158f69933bd77b9edcf4ee9e7454ae4f"
          assert value["worker_name"] == "knowledge-engine-r3-8-29564569280"
          assert value["observation_run_id"] == "29564569280"
          assert value["recovery_run_id"] == "29565032873"
          assert value["receipt_sha256"] == "8576942d225bd82c3efd150c6aac0f93355386ab3c151ff98beff24e9b7cb779"
          assert value["evidence_seal_sha256"] == "3a6e8e2d1bf8127aad0ef4b090528cb0dbe7997c488c6d681b68f503edcceb4f"
          assert value["independent_reconciliation_sha256"] == "01b2e036f51a9eeef8b01713f2470d039da8d32cb0f08610986b57e1991fb6e6"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29564569280.json",
              "docs/architecture/m23-7-r3-8-48-exact-deletion-authorization.md",
              ".github/workflows/m23-7-r3-8-48-exact-deletion-authorization.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "093c6b67c2fc1c29cb7caa02ea002ddb48fabbff", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 093c6b67c2fc1c29cb7caa02ea002ddb48fabbff HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
