name: M25.2 Intake Orchestrator

on:
  pull_request:
    paths:
      - '.github/workflows/m25-2-intake-orchestrator.yml'
      - '.github/workflows/m25-1-admission-architecture.yml'
      - 'docs/architecture/m25/m25-2-intake-orchestrator.md'
      - 'docs/architecture/m25/examples/m25-2-source-descriptors.example.json'
      - 'pilot/m25/m25-2-*.json'
      - 'schemas/m25-source-inventory-v1.schema.json'
      - 'schemas/m25-batch-plan-v1.schema.json'
      - 'schemas/m25-admission-checkpoint-v1.schema.json'
      - 'schemas/m25-normalized-output-v1.schema.json'
      - 'schemas/m25-orchestrator-report-v1.schema.json'
      - 'src/knowledge_engine/m25_intake_*.py'
      - 'tests/test_m25_2_intake_orchestrator*.py'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  intake-orchestrator:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Capture M25.2 lint diagnostics
        id: lint
        continue-on-error: true
        run: |
          python -m ruff check \
            src/knowledge_engine/m25_intake_*.py \
            tests/test_m25_2_intake_orchestrator*.py \
            --output-format json > /tmp/m25-2-ruff.json
      - name: Upload M25.2 lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m25-2-ruff-diagnostics
          path: /tmp/m25-2-ruff.json
          if-no-files-found: error
          retention-days: 7
      - name: Enforce M25.2 lint result
        if: always()
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
        run: |
          cat /tmp/m25-2-ruff.json
          test "$LINT_OUTCOME" = success
      - name: Capture inherited and M25.2 test diagnostics
        run: |
          set +e
          PYTHONPATH=tests python -m pytest -q \
            --junitxml=/tmp/m25-2-pytest.xml \
            tests/test_intake_v1.py \
            tests/test_m21_2_resumable_batch.py \
            tests/test_m25_1_architecture.py \
            tests/test_m25_1_reconciliation.py \
            tests/test_m25_2_intake_orchestrator.py \
            tests/test_m25_2_intake_orchestrator_contracts.py \
            tests/test_m25_2_reconciliation.py \
            > /tmp/m25-2-pytest.log 2>&1
          status=$?
          echo "$status" > /tmp/m25-2-pytest.exit
          exit 0
      - name: Upload M25.2 test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m25-2-pytest-diagnostics
          path: |
            /tmp/m25-2-pytest.log
            /tmp/m25-2-pytest.xml
            /tmp/m25-2-pytest.exit
          if-no-files-found: error
          retention-days: 7
      - name: Enforce M25.2 test result
        run: test "$(cat /tmp/m25-2-pytest.exit)" = "0"
      - name: Prove deterministic operator vertical slice
        run: |
          set -euo pipefail
          mkdir -p /tmp/m25-source/documents /tmp/m25-store-a /tmp/m25-store-b
          printf '# M25.2\n\nDeterministic evidence.\n' > /tmp/m25-source/documents/example.md
          cat > /tmp/m25-descriptors.json <<'JSON'
          {
            "schema_version": "knowledge-engine-m25-source-descriptor-set/v1",
            "items": [
              {
                "adapter_id": "m25_adapter_intake_v1_local_markdown",
                "locator": "documents/example.md",
                "original_uri": "file:///tmp/m25-source/documents/example.md",
                "retrieved_at": "2026-07-23T00:00:00Z",
                "owner": {
                  "status": "resolved",
                  "value": "Daniel Huang",
                  "observation_source": "operator_asserted"
                },
                "license": {
                  "status": "resolved",
                  "value": "first-party",
                  "observation_source": "operator_asserted"
                },
                "audience": "public",
                "access_policy": {
                  "policy_type": "public",
                  "principals": [],
                  "observation_source": "operator_asserted",
                  "native_evidence_ref": "ci:m25-2"
                },
                "adapter_config": {}
              }
            ]
          }
          JSON
          for suffix in a b; do
            knowledge-m25-admission prepare \
              --descriptors /tmp/m25-descriptors.json \
              --allowed-root /tmp/m25-source \
              --store-root "/tmp/m25-store-${suffix}" \
              --captured-at 2026-07-23T00:00:00Z \
              --created-at 2026-07-23T00:00:00Z \
              --output-dir "/tmp/m25-output-${suffix}" \
              > "/tmp/m25-prepare-${suffix}.json"
            plan_id="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["plan_id"])' "/tmp/m25-prepare-${suffix}.json")"
            knowledge-m25-admission resume \
              --plan-id "$plan_id" \
              --allowed-root /tmp/m25-source \
              --store-root "/tmp/m25-store-${suffix}" \
              --run-at "2026-07-2$([ "$suffix" = a ] && echo 3 || echo 4)T01:00:00Z" \
              --output-dir "/tmp/m25-output-${suffix}" \
              > "/tmp/m25-report-${suffix}.json"
          done
          cmp /tmp/m25-output-a/inventory.json /tmp/m25-output-b/inventory.json
          cmp /tmp/m25-output-a/admission-plan.json /tmp/m25-output-b/admission-plan.json
          cmp /tmp/m25-output-a/batch-plan.json /tmp/m25-output-b/batch-plan.json
          normalized_a="$(find /tmp/m25-store-a/admission/v1/normalized -name '*.json' -print -quit)"
          normalized_b="$(find /tmp/m25-store-b/admission/v1/normalized -name '*.json' -print -quit)"
          cmp "$normalized_a" "$normalized_b"
          python - <<'PY'
          import json
          from pathlib import Path
          for suffix in ('a', 'b'):
              report = json.loads(Path(f'/tmp/m25-report-{suffix}.json').read_text())
              assert report['ready_for_m25_3'] is True
              assert report['silent_exclusion_count'] == 0
              assert report['population']['coverage_complete'] is True
              assert report['source_mutation_performed'] is False
          PY
      - name: Enforce M25.2 authority and namespace boundary
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python - <<'PY'
          import ast
          import os
          import subprocess
          from pathlib import Path

          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', os.environ['BASE_SHA'], 'HEAD'],
              text=True,
          ).splitlines()
          forbidden = (
              'workers/',
              'packages/',
              'pilot/m24/',
              'channels/production.json',
          )
          assert not [path for path in changed if path.startswith(forbidden)]

          modules = sorted(Path('src/knowledge_engine').glob('m25_intake_*.py'))
          forbidden_imports = {'boto3', 'httpx', 'requests', 'subprocess', 'socket'}
          serialized = ''
          for module in modules:
              source = module.read_text(encoding='utf-8')
              serialized += source
              tree = ast.parse(source)
              observed = {
                  node.names[0].name.split('.')[0]
                  for node in ast.walk(tree)
                  if isinstance(node, ast.Import)
              }
              observed.update(
                  node.module.split('.')[0]
                  for node in ast.walk(tree)
                  if isinstance(node, ast.ImportFrom) and node.module
              )
              assert not (observed & forbidden_imports)

          assert 'knowledge-source/' not in serialized
          assert 'channels/production.json' in serialized
          assert 'intake/v1/' in serialized
          assert 'admission/v1/' in serialized
          PY
      - name: Compile M25.2 scope
        run: >-
          python -m compileall -q
          src/knowledge_engine/m25_intake_*.py
          tests/test_m25_2_intake_orchestrator*.py
