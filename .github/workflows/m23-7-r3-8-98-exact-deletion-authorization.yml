name: M23.7 R3.8.98 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29582316388.json"
      - "docs/architecture/m23-7-r3-8-98-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-98-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 2c21a27af09678abec8f36af7c289bdd3f75020a HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization

          path = "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29582316388.json"
          value = validate_authorization(Path(path))
          assert value["authorization_sha256"] == "c54ed215a2cff8743462a52b44b6ec5a4e2096c4ecb4393e173a0c1ca4e81338"
          assert value["worker_name"] == "knowledge-engine-r3-8-29582316388"
          assert value["observation_run_id"] == "29582316388"
          assert value["recovery_run_id"] == "29582686914"
          assert value["receipt_sha256"] == "b9497142ad9daf744488e433364d3e2e97b2f1604304e43f2b3263bdbe75b9ff"
          assert value["evidence_seal_sha256"] == "039e0dfd0eb9dd79fbc3b5e490daf8c667070232c196ea996266a1036db41214"
          assert value["independent_reconciliation_sha256"] == "a79cb6968c5399a00977e4a4d560ee3e45a70c908fcbb6e9f36af1d9383842e0"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29582316388.json",
              "docs/architecture/m23-7-r3-8-98-exact-deletion-authorization.md",
              ".github/workflows/m23-7-r3-8-98-exact-deletion-authorization.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "2c21a27af09678abec8f36af7c289bdd3f75020a", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 2c21a27af09678abec8f36af7c289bdd3f75020a HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
