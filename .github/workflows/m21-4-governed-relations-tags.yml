name: M21.4 Governed Relations and Tags

on:
  pull_request:
    paths:
      - '.github/workflows/m21-4-governed-relations-tags.yml'
      - 'docs/architecture/m21/m21-4-governed-relations-tags.md'
      - 'src/knowledge_engine/m21_governed_relations.py'
      - 'tests/test_m21_4_governed_relations.py'

permissions:
  contents: read

jobs:
  governed-relations-tags:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint M21.4 scope
        run: >-
          python -m ruff check
          src/knowledge_engine/m21_governed_relations.py
          tests/test_m21_4_governed_relations.py
      - name: Test M20 through M21.4 contracts
        run: >-
          python -m pytest -q
          tests/test_m20_1_embedding_contract.py
          tests/test_m20_2_semantic_artifacts.py
          tests/test_m20_3_runtime_semantic.py
          tests/test_m20_4_retrieval_modes.py
          tests/test_m20_5_hybrid_fusion.py
          tests/test_m20_6_lexical_enrichment.py
          tests/test_m20_7_phase_c_acceptance.py
          tests/test_m21_1_blog_inventory.py
          tests/test_m21_2_resumable_batch.py
          tests/test_m21_3_extraction_candidates.py
          tests/test_m21_4_governed_relations.py
      - name: Prove governed contract closure
        run: |
          python - <<'PY'
          from knowledge_engine.m21_governed_relations import (
              FOUNDATION_SHA,
              PRIMARY_TYPES,
              RELATIONS,
              TAG_ALIASES,
              TAG_DIMENSIONS,
          )

          assert FOUNDATION_SHA == 'e5ef644053d34e89c70d2ceb37521e1c59234832'
          assert len(RELATIONS) == 20
          assert len(PRIMARY_TYPES) == 12
          assert sum(len(tags) for tags in TAG_DIMENSIONS.values()) == 16
          assert len(TAG_ALIASES) == 3
          assert all(item[0] in {relation[0] for relation in RELATIONS} for item in RELATIONS)
          PY
      - name: Scan authority and dependency boundary
        run: |
          if grep -R -nE 'requests|httpx|aiohttp|urllib.request|subprocess|boto3|production_pointer|openai|anthropic|sentence_transformers' \
            src/knowledge_engine/m21_governed_relations.py; then
            exit 1
          fi
          test -z "$(find . -type f \( -name '*governed-candidates.json' -o -name '*typed-relations.json' \) -print -quit)"
      - name: Compile M21.4 scope
        run: >-
          python -m compileall -q
          src/knowledge_engine/m21_governed_relations.py
          tests/test_m21_4_governed_relations.py
