name: M21.6 Bootstrap Materializer

on:
  pull_request:
    paths:
      - '.github/workflows/m21-6-bootstrap.yml'

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - name: Decode documentation payload
        run: |
          python - <<'PY'
          import base64, zlib
          from pathlib import Path
          payload = Path('.m21-6-bootstrap/docs.b64').read_text().strip()
          data = zlib.decompress(base64.b64decode(payload, validate=True))
          target = Path('docs/architecture/m21/m21-6-review-source-pr-preparation.md')
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(data)
          print(len(payload), len(data))
          PY
      - name: Decode source payload
        run: |
          python - <<'PY'
          import base64, zlib
          from pathlib import Path
          payload = Path('.m21-6-bootstrap/source.b64').read_text().strip()
          data = zlib.decompress(base64.b64decode(payload, validate=True))
          target = Path('src/knowledge_engine/m21_review_source_pr.py')
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(data)
          print(len(payload), len(data))
          PY
      - name: Decode tests payload
        run: |
          python - <<'PY'
          import base64, zlib
          from pathlib import Path
          payload = Path('.m21-6-bootstrap/tests.b64').read_text().strip()
          data = zlib.decompress(base64.b64decode(payload, validate=True))
          target = Path('tests/test_m21_6_review_source_pr.py')
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(data)
          print(len(payload), len(data))
          PY
      - name: Remove payloads
        run: rm -rf .m21-6-bootstrap
      - name: Commit non-workflow implementation scope
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          test -f docs/architecture/m21/m21-6-review-source-pr-preparation.md
          test -f src/knowledge_engine/m21_review_source_pr.py
          test -f tests/test_m21_6_review_source_pr.py
          test ! -e .m21-6-bootstrap
          git commit -m 'feat: materialize M21.6 review preparation'
          git push origin "HEAD:${HEAD_BRANCH}"
