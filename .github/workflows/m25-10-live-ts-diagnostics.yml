name: M25.10 Worker Type Diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/m25-10-live-ts-diagnostics.yml'
      - 'packages/m25-blog-candidate-runtime/**'

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply and push exact TypeScript repair
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/m25-blog-candidate-runtime/src/index.ts')
          lines = path.read_text().splitlines()
          output = []
          index = 0
          replaced = 0
          while index < len(lines):
              line = lines[index]
              if line.strip() == 'const object = response as Record<string, unknown>;':
                  assert lines[index + 1].strip() == (
                      'const text = object.response || '
                      '(object.result as Record<string, unknown>)?.response;'
                  )
                  output.extend(
                      [
                          '  if (',
                          '    !response ||',
                          '    typeof response !== "object" ||',
                          '    response instanceof ReadableStream',
                          '  ) {',
                          '    throw new Error("answer model returned a non-object response");',
                          '  }',
                          '  const object = response as unknown as Record<string, unknown>;',
                          '  const nested = object.result;',
                          '  const nestedResponse =',
                          '    nested && typeof nested === "object"',
                          '      ? (nested as Record<string, unknown>).response',
                          '      : undefined;',
                          '  const text = object.response || nestedResponse;',
                      ]
                  )
                  index += 2
                  replaced += 1
                  continue
              output.append(line)
              index += 1
          assert replaced == 1, replaced
          path.write_text('\n'.join(output) + '\n')
          PY
          cd packages/m25-blog-candidate-runtime
          npm install --ignore-scripts
          npm run check
          cd ../..
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/m25-blog-candidate-runtime/src/index.ts
          git commit -m 'Guard M25 Worker response object type'
          git push origin "HEAD:${HEAD_BRANCH}"
          exit 1
