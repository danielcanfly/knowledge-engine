name: M25.10 Worker Type Diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/m25-10-live-ts-diagnostics.yml'
      - 'packages/m25-blog-candidate-runtime/**'

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply and push exact TypeScript repair
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/m25-blog-candidate-runtime/src/index.ts')
          text = path.read_text()
          old = '''  const object = response as Record<string, unknown>;
          const text = object.response || (object.result as Record<string, unknown>)?.response;
          '''
          new = '''  if (
            !response ||
            typeof response !== "object" ||
            response instanceof ReadableStream
          ) {
            throw new Error("answer model returned a non-object response");
          }
          const object = response as unknown as Record<string, unknown>;
          const nested = object.result;
          const nestedResponse =
            nested && typeof nested === "object"
              ? (nested as Record<string, unknown>).response
              : undefined;
          const text = object.response || nestedResponse;
          '''
          assert text.count(old) == 1
          path.write_text(text.replace(old, new))
          PY
          cd packages/m25-blog-candidate-runtime
          npm install --ignore-scripts
          npm run check
          npm audit --omit=dev --audit-level=high
          cd ../..
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/m25-blog-candidate-runtime/src/index.ts
          git commit -m 'Guard M25 Worker response object type'
          git push origin "HEAD:${HEAD_BRANCH}"
          exit 1
