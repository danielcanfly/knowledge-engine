name: M25.9 R2 Write Preflight Builder

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-r2-write-preflight-builder.yml'
      - 'scripts/m25_9_r2_write_preflight_builder.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-r2-write-preflight-builder.yml'
      - 'scripts/m25_9_r2_write_preflight_builder.py'

permissions:
  contents: write
  statuses: write

jobs:
  validate-builder:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      OUTPUT_DIR: /tmp/m25-9-r2-write-preflight-builder
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact two-file non-deploying builder boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-r2-write-preflight-builder.yml
          test -f scripts/m25_9_r2_write_preflight_builder.py
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            changed="$(git diff --name-only origin/main...HEAD | sort)"
            expected="$(printf '%s\n' \
              '.github/workflows/m25-9-r2-write-preflight-builder.yml' \
              'scripts/m25_9_r2_write_preflight_builder.py' | sort)"
            test "$changed" = "$expected"
          else
            test "$GITHUB_RUN_ATTEMPT" = '1'
          fi
          mkdir -p "$OUTPUT_DIR"
      - name: Generate deterministic four-file R2 preflight repair
        run: |
          set -euo pipefail
          python scripts/m25_9_r2_write_preflight_builder.py
          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m25-9-blog-full-population-pilot.yml' \
            'docs/architecture/m25/m25-9-live-preflight-repair.md' \
            'scripts/m25_9_r2_write_preflight.py' \
            'tests/test_m25_9_r2_write_preflight.py' | sort)"
          test "$changed" = "$expected"
      - name: Validate generated repair
        run: |
          set -euo pipefail
          python -m pip install -q --disable-pip-version-check -e '.[dev]'
          python -m ruff check --output-format=concise \
            scripts/m25_9_r2_write_preflight_builder.py \
            scripts/m25_9_r2_write_preflight.py \
            tests/test_m25_9_r2_write_preflight.py
          python -m pytest -q \
            tests/test_m25_9_r2_write_preflight.py \
            tests/test_m25_9_cloudflare_live_preflight.py \
            tests/test_m25_10_blog_live_candidate.py
          python -m compileall -q \
            scripts/m25_9_r2_write_preflight_builder.py \
            scripts/m25_9_r2_write_preflight.py \
            tests/test_m25_9_r2_write_preflight.py
          grep -q '^  r2-write-preflight:' \
            .github/workflows/m25-9-blog-full-population-pilot.yml
          grep -q 'needs: \[verify, cloudflare-preflight, r2-write-preflight\]' \
            .github/workflows/m25-9-blog-full-population-pilot.yml
      - name: Create validated repair blobs
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          base_tree="$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$GITHUB_SHA" --jq '.tree.sha')"
          paths=(
            '.github/workflows/m25-9-blog-full-population-pilot.yml'
            'docs/architecture/m25/m25-9-live-preflight-repair.md'
            'scripts/m25_9_r2_write_preflight.py'
            'tests/test_m25_9_r2_write_preflight.py'
          )
          printf '{\n  "parent_sha": "%s",\n  "base_tree_sha": "%s",\n  "entries": [\n' \
            "$GITHUB_SHA" "$base_tree" > "$OUTPUT_DIR/repair-blobs.json"
          first=true
          for path in "${paths[@]}"; do
            encoded="$(base64 -w0 "$path")"
            blob="$(gh api --method POST \
              "repos/$GITHUB_REPOSITORY/git/blobs" \
              -f content="$encoded" -f encoding='base64' --jq '.sha')"
            if test "$first" = true; then
              first=false
            else
              printf ',\n' >> "$OUTPUT_DIR/repair-blobs.json"
            fi
            printf '    {"path": "%s", "mode": "100644", "type": "blob", "sha": "%s"}' \
              "$path" "$blob" >> "$OUTPUT_DIR/repair-blobs.json"
          done
          printf '\n  ],\n  "external_service_mutations": 0\n}\n' \
            >> "$OUTPUT_DIR/repair-blobs.json"
          jq -e '.entries | length == 4' "$OUTPUT_DIR/repair-blobs.json" >/dev/null
      - name: Upload repair blob metadata
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-r2-write-preflight-repair-blobs-${{ github.sha }}
          path: /tmp/m25-9-r2-write-preflight-builder/repair-blobs.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish builder result
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-r2-write-preflight-repair-blobs' \
            -f description="run $GITHUB_RUN_ID a$GITHUB_RUN_ATTEMPT four validated blobs" \
            -f target_url="$run_url" >/dev/null
