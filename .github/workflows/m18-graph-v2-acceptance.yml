name: M18 Graph v2 acceptance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  graph-v2:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check src/knowledge_engine/graph_v2.py tests/test_graph_v2.py
      - run: pytest -q tests/test_graph_v2.py
      - run: python -m compileall -q src tests
