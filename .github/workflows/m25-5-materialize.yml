name: M25.5 Materialize Implementation
on:
  push:
    branches: [chatgpt/m25-5-identity-governance]
    paths: ['.m25-5-payload/READY']
permissions:
  contents: write
jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true
      - name: Verify base and materialize bounded payload
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git merge-base --is-ancestor 3b35ed570e1a495e687259ae87a6c70139e5a9ac HEAD
          python - <<'PY'
          import base64, hashlib, io, tarfile
          from pathlib import Path, PurePosixPath
          parts=sorted(Path('.m25-5-payload').glob('part-*.b64'))
          assert len(parts)==8
          encoded=b''.join(p.read_bytes() for p in parts)
          archive=base64.b64decode(encoded, validate=True)
          assert hashlib.sha256(archive).hexdigest()=='1a077d2a17491ebad3e9fe25486bb1cb6ece4745d5322b0e5bbe2622b1ece6c1'
          expected=[".github/workflows/m25-5-identity-governance.yml", "docs/architecture/m25/m25-5-adversarial-and-edge-case-contract.md", "docs/architecture/m25/m25-5-identity-governance.md", "pilot/m25/m25-5-calibrated-report.json", "pilot/m25/m25-5-calibration-policy.json", "pilot/m25/m25-5-governance-gate.json", "pyproject.toml", "schemas/m25-calibrated-identity-governance-v1.schema.json", "schemas/m25-calibrated-identity-report-v1.schema.json", "schemas/m25-identity-calibration-policy-v1.schema.json", "src/knowledge_engine/m25_identity_governance.py", "src/knowledge_engine/m25_identity_governance_cli.py", "tests/test_m25_5_identity_governance.py", "tests/test_m25_5_identity_governance_contracts.py"]
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as tf:
              members=tf.getmembers()
              assert sorted(m.name for m in members)==sorted(expected)
              for member in members:
                  path=PurePosixPath(member.name)
                  assert not path.is_absolute() and '..' not in path.parts and member.isfile()
                  data=tf.extractfile(member).read()
                  target=Path(member.name)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(data)
          PY
          rm -rf .m25-5-payload .github/workflows/m25-5-materialize.yml
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate implementation
        run: |
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m ruff check src/knowledge_engine/m25_identity_governance.py src/knowledge_engine/m25_identity_governance_cli.py tests/test_m25_5_identity_governance.py tests/test_m25_5_identity_governance_contracts.py
          python -m pytest -q tests/test_m25_5_identity_governance.py tests/test_m25_5_identity_governance_contracts.py tests/test_m25_4_identity_benchmark.py tests/test_m25_4_identity_benchmark_contracts.py tests/test_m25_4_daniel_approval.py tests/test_m25_4_reconciliation.py
          mkdir -p /tmp/m25-5
          knowledge-m25-identity-governance policy --suite pilot/m25/m25-4-gold-suite.json --baseline pilot/m25/m25-4-baseline-report.json --output /tmp/m25-5/policy.json
          knowledge-m25-identity-governance run --suite pilot/m25/m25-4-gold-suite.json --baseline pilot/m25/m25-4-baseline-report.json --policy /tmp/m25-5/policy.json --output /tmp/m25-5/report.json --gate-output /tmp/m25-5/gate.json
          cmp /tmp/m25-5/policy.json pilot/m25/m25-5-calibration-policy.json
          cmp /tmp/m25-5/report.json pilot/m25/m25-5-calibrated-report.json
          cmp /tmp/m25-5/gate.json pilot/m25/m25-5-governance-gate.json
          python -m compileall -q src/knowledge_engine/m25_identity_governance.py src/knowledge_engine/m25_identity_governance_cli.py tests/test_m25_5_identity_governance.py tests/test_m25_5_identity_governance_contracts.py
      - name: Commit verified implementation
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git commit -m 'Implement M25.5 identity governance'
          git push origin "HEAD:$BRANCH"
