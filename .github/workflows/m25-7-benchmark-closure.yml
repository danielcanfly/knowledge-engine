name: M25.7 Benchmark Closure

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/m25-7-benchmark-closure.yml'
      - '.github/workflows/m25-7-source-pr-executor.yml'
      - 'docs/architecture/m25/m25-7-benchmark-closure.md'
      - 'pilot/m25/m25-7-benchmark-*.json'
      - 'tests/test_m25_7_benchmark_closure.py'

permissions:
  contents: read
  issues: read

jobs:
  benchmark-closure:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head, ancestors and Daniel authority
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor 134edbcfa3841321d3ea1106d35243b866cb6913 HEAD
          git merge-base --is-ancestor 209608c3821f2958b5238659e98a8f9fb7bd7840 HEAD
          python - <<'PY'
          import json, os, urllib.request
          request = urllib.request.Request(
              'https://api.github.com/repos/danielcanfly/knowledge-engine/issues/comments/5057486325',
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          comment = json.load(urllib.request.urlopen(request))
          assert comment['user']['login'] == 'huaihsuanbusiness'
          for phrase in [
              'all 30 items in the exact M25.6 gold benchmark review batch',
              'benchmark_only_reject',
              'no_write',
              'must not be written to live Source',
              'must not produce a Source branch or Source pull request',
              'must not authorize M25.8 or any production mutation',
              'future real pilot candidate batch',
          ]:
              assert phrase in comment['body']
          PY
      - name: Validate closure contracts
        run: |
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m ruff check tests/test_m25_7_benchmark_closure.py
          python -m pytest -q tests/test_m25_7_benchmark_closure.py tests/test_m25_7_source_pr_executor.py tests/test_m25_7_source_pr_executor_contracts.py tests/test_m25_6_review_surface.py tests/test_m25_6_review_surface_contracts.py
          python -m compileall -q tests/test_m25_7_benchmark_closure.py
      - name: Enforce exact changed-file boundary
        run: |
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          closure="$(printf '%s\n' \
            '.github/workflows/m25-7-benchmark-closure.yml' \
            '.github/workflows/m25-7-source-pr-executor.yml' \
            'docs/architecture/m25/m25-7-benchmark-closure.md' \
            'pilot/m25/m25-7-benchmark-closure.json' \
            'pilot/m25/m25-7-benchmark-decision-ledger.json' \
            'tests/test_m25_7_benchmark_closure.py' | sort)"
          m25_8_compat="$(printf '%s\n' \
            '.github/workflows/m25-7-benchmark-closure.yml' \
            '.github/workflows/m25-7-source-pr-executor.yml' \
            '.github/workflows/m25-8-adoption-release.yml' \
            'docs/architecture/m25/m25-8-adoption-release-rollback.md' \
            'pilot/m25/m25-8-adoption-evidence.synthetic.json' \
            'pilot/m25/m25-8-adoption-receipt.synthetic.json' \
            'pilot/m25/m25-8-readiness-gate.json' \
            'pyproject.toml' \
            'schemas/m25-adoption-evidence-v1.schema.json' \
            'schemas/m25-adoption-receipt-v1.schema.json' \
            'src/knowledge_engine/m25_adoption_release.py' \
            'src/knowledge_engine/m25_adoption_release_cli.py' \
            'tests/test_m25_8_adoption_release.py' | sort)"
          if test "$changed" = "$closure"; then
            ! printf '%s\n' "$changed" | grep -Eq '^(bundle/|provenance/|registry/|reviews/|foundation/|release/|r2/|qdrant/|production/|workers/|channels/|src/)'
          else
            test "$changed" = "$m25_8_compat"
            ! printf '%s\n' "$changed" | grep -Eq '^(bundle/|provenance/|registry/|reviews/|foundation/|release/|r2/|qdrant/|production/|workers/|channels/)'
          fi
      - name: Assemble exact-head evidence
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          paths = [Path('pilot/m25/m25-7-benchmark-decision-ledger.json'), Path('pilot/m25/m25-7-benchmark-closure.json')]
          evidence = {
              'schema_version': 'knowledge-engine-m25-7-benchmark-closure-evidence/v1',
              'head_sha': os.environ['HEAD_SHA'],
              'workflow_run_id': int(os.environ['GITHUB_RUN_ID']),
              'artifacts': {str(path): hashlib.sha256(path.read_bytes()).hexdigest() for path in paths},
              'terminal_item_count': 30,
              'source_operation_count': 0,
              'source_pr_created': False,
              'm25_8_authorized': False,
              'production_mutation_permitted': False,
          }
          Path('/tmp/m25-7-benchmark-closure-evidence.json').write_text(json.dumps(evidence, indent=2, sort_keys=True) + '\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: m25-7-benchmark-closure-evidence
          path: /tmp/m25-7-benchmark-closure-evidence.json
          if-no-files-found: error
          retention-days: 30
