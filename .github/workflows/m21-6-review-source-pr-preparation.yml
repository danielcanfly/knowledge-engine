name: M21.6 Review Packets and Source PR Preparation

on:
  pull_request:
    paths:
      - '.github/workflows/m21-6-review-source-pr-preparation.yml'
      - 'docs/architecture/m21/m21-6-review-source-pr-preparation.md'
      - 'src/knowledge_engine/m21_review_source_pr.py'
      - 'tests/test_m21_6_review_source_pr.py'

permissions:
  contents: read

jobs:
  review-source-pr-preparation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint M21.6 scope
        run: >-
          python -m ruff check
          src/knowledge_engine/m21_review_source_pr.py
          tests/test_m21_6_review_source_pr.py
      - name: Test M20 through M21.6 contracts
        run: >-
          python -m pytest -q
          tests/test_m20_1_embedding_contract.py
          tests/test_m20_2_semantic_artifacts.py
          tests/test_m20_3_runtime_semantic.py
          tests/test_m20_4_retrieval_modes.py
          tests/test_m20_5_hybrid_fusion.py
          tests/test_m20_6_lexical_enrichment.py
          tests/test_m20_7_phase_c_acceptance.py
          tests/test_m21_1_blog_inventory.py
          tests/test_m21_2_resumable_batch.py
          tests/test_m21_3_extraction_candidates.py
          tests/test_m21_4_governed_relations.py
          tests/test_m21_5_entity_resolution.py
          tests/test_m21_6_review_source_pr.py
      - name: Prove review preparation authority closure
        run: |
          python - <<'PY'
          from knowledge_engine.m21_review_source_pr import (
              ALLOWED_ACTIONS,
              FOUNDATION_SHA,
              SOURCE_SHA,
          )

          assert SOURCE_SHA == 'a6ba738d910d01d2ae99b1968f0831989934c549'
          assert FOUNDATION_SHA == 'e5ef644053d34e89c70d2ceb37521e1c59234832'
          assert ALLOWED_ACTIONS == {
              'create_concept',
              'update_concept',
              'attach_alias',
              'add_claim',
              'add_definition',
              'add_term',
              'add_tag',
              'add_relationship',
          }
          PY
      - name: Scan authority and dependency boundary
        run: |
          if grep -nE 'requests|httpx|aiohttp|urllib.request|subprocess|boto3|production_pointer|openai|anthropic|sentence_transformers' \
            src/knowledge_engine/m21_review_source_pr.py; then
            exit 1
          fi
          if grep -nE 'source_write_permitted[^F]*True|github_pr_creation_permitted[^F]*True|approval_granted[^F]*True' \
            src/knowledge_engine/m21_review_source_pr.py; then
            exit 1
          fi
          test -z "$(find . -type f \( -name '*human-review-packets.json' -o -name '*bulk-source-pr-preparation.json' \) -print -quit)"
      - name: Compile M21.6 scope
        run: >-
          python -m compileall -q
          src/knowledge_engine/m21_review_source_pr.py
          tests/test_m21_6_review_source_pr.py
