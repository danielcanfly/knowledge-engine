name: M23.7 R3.8.46 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-46/worker-present-recovery-seal-29565032873.json"
      - "docs/architecture/m23-7-r3-8-46-worker-present-recovery-seal.md"
      - ".github/workflows/m23-7-r3-8-46-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 7170e104e4fc5b59b19a19e0f3f770ed986a25f4 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-46/worker-present-recovery-seal-29565032873.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "3a6e8e2d1bf8127aad0ef4b090528cb0dbe7997c488c6d681b68f503edcceb4f"
          assert value["seal_issue"] == 737
          assert value["recovery_authorization_issue"] == 735
          assert value["recovery_authorization_pr"] == 736
          assert value["recovery_authorization_merge_sha"] == "7170e104e4fc5b59b19a19e0f3f770ed986a25f4"
          assert value["recovery_run_id"] == "29565032873"
          assert value["artifact"]["artifact_id"] == 8400766486
          assert value["artifact"]["zip_sha256"] == "2fd87bcabb0ef0046943dca732e190dafc828225e2acd79d426ebfb0b120e6ad"
          assert value["artifact"]["receipt_file_sha256"] == "34f34650414ed84204c3cf4bfa9cf65f60c9e8b9bc4ce6f23e7a58cfdbbe77d8"
          assert value["artifact"]["receipt_self_digest"] == "8576942d225bd82c3efd150c6aac0f93355386ab3c151ff98beff24e9b7cb779"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_read_only_recovery_probe"
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29564569280"
          assert receipt["affected_run_id"] == "29564569280"
          assert receipt["affected_engine_sha"] == "8cc41a192104d2361d7cf3b388f5fedb6bd1cf56"
          assert receipt["probe_engine_sha"] == "7170e104e4fc5b59b19a19e0f3f770ed986a25f4"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          assert receipt["production_retrieval"] == "lexical"
          assert receipt["blockers_cleared"] is False
          for field in (
              "worker_delete_dispatched",
              "worker_deploy_dispatched",
              "worker_route_invoked",
              "worker_secret_mutation_dispatched",
              "qdrant_read_dispatched",
              "qdrant_mutation_dispatched",
              "r2_read_dispatched",
              "r2_mutation_dispatched",
              "protected_mutations_dispatched",
          ):
              assert receipt[field] is False
          authority = value["authority"]
          assert authority["evidence_seal_only"] is True
          assert authority["worker_deletion_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-46/worker-present-recovery-seal-29565032873.json",
              "docs/architecture/m23-7-r3-8-46-worker-present-recovery-seal.md",
              ".github/workflows/m23-7-r3-8-46-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "7170e104e4fc5b59b19a19e0f3f770ed986a25f4", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 7170e104e4fc5b59b19a19e0f3f770ed986a25f4 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
