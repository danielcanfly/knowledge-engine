name: M25.6 Reconciliation
on:
  pull_request:
    paths:
      - '.github/workflows/m25-6-reconciliation.yml'
      - 'docs/architecture/m25/m25-6-reconciliation.md'
      - 'pilot/m25/m25-6-acceptance.json'
      - 'tests/test_m25_6_reconciliation.py'
permissions:
  contents: read
  actions: read
  issues: read
  pull-requests: read
jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify remote identity, Daniel authority and evidence
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor dd1559f7730c796933dfe0996acc0a558870a61e HEAD
          python - <<'PY'
          import json,os,urllib.request
          base='https://api.github.com/repos/danielcanfly/knowledge-engine'
          token=os.environ['GH_TOKEN']
          def get(path):
              request=urllib.request.Request(
                  base+path,
                  headers={
                      'Authorization':f'Bearer {token}',
                      'Accept':'application/vnd.github+json',
                      'X-GitHub-Api-Version':'2022-11-28',
                  },
              )
              return json.load(urllib.request.urlopen(request))
          pr=get('/pulls/1057')
          issue=get('/issues/1053')
          comment=get('/issues/comments/5056370409')
          assert pr['merged_at']
          assert pr['head']['sha']=='bf6ec965851f139e2dafa008c3efcab856ea6e77'
          assert pr['merge_commit_sha']=='dd1559f7730c796933dfe0996acc0a558870a61e'
          assert issue['state']=='closed' and issue.get('state_reason')=='completed'
          assert comment['user']['login']=='huaihsuanbusiness'
          assert 'bf6ec965851f139e2dafa008c3efcab856ea6e77' in comment['body']
          assert 'does **not** authorize M25.7' in comment['body']
          runs=[
              29990580001,29990580025,29990580048,29990579963,29990579959,
              29990580055,29990580015,29990580062,29990579964,29990579975,
          ]
          for run_id in runs:
              run=get(f'/actions/runs/{run_id}')
              assert run['head_sha']=='bf6ec965851f139e2dafa008c3efcab856ea6e77'
              assert run['conclusion']=='success'
          artifact=get('/actions/artifacts/8556895980')
          assert artifact['name']=='m25-6-review-surface-evidence'
          assert artifact['digest']=='sha256:5013f7a2b8a655e48564d4769c175a3a6704b3ddde4c3222d9caa2588dcf01f0'
          assert artifact['workflow_run']['head_sha']=='bf6ec965851f139e2dafa008c3efcab856ea6e77'
          resolved={
              'head_sha':os.environ['HEAD_SHA'],
              'implementation_merge':'dd1559f7730c796933dfe0996acc0a558870a61e',
              'daniel_authority_comment_id':5056370409,
              'verified_runs':runs,
              'artifact_id':8556895980,
              'artifact_digest':artifact['digest'],
              'm25_7_authorized':False,
          }
          open('/tmp/resolved.json','w').write(json.dumps(resolved,indent=2)+'\n')
          PY
      - name: Validate reconciliation contract
        run: |
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m ruff check tests/test_m25_6_reconciliation.py
          python -m pytest -q \
            tests/test_m25_6_reconciliation.py \
            tests/test_m25_6_review_surface.py \
            tests/test_m25_6_review_surface_contracts.py \
            tests/test_m25_5_identity_governance.py \
            tests/test_m25_5_identity_governance_contracts.py
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m25-6-reconciliation.yml' \
            'docs/architecture/m25/m25-6-reconciliation.md' \
            'pilot/m25/m25-6-acceptance.json' \
            'tests/test_m25_6_reconciliation.py' | sort)"
          test "$changed" = "$expected"
          python -m compileall -q tests/test_m25_6_reconciliation.py
      - uses: actions/upload-artifact@v4
        with:
          name: m25-6-resolved-identity
          path: /tmp/resolved.json
          if-no-files-found: error
          retention-days: 30
