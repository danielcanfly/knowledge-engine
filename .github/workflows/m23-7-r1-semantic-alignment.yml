name: M23.7 Repair R1 Semantic Alignment

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r1_semantic_alignment.py"
      - "scripts/m23_7_r1_semantic_alignment.py"
      - "tests/test_m23_7_r1_semantic_alignment.py"
      - "docs/architecture/m23-7-r1-live-probe-semantic-alignment.md"
      - "pilot/m23/m23-7-r1-semantic-alignment-manifest.json"
      - "pilot/m23/m23-7-r1-semantic-alignment-report.json"
      - ".github/workflows/m23-7-r1-semantic-alignment.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semantic-alignment:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Quality and adversarial tests
        run: |
          ruff check \
            src/knowledge_engine/m23_7_r1_semantic_alignment.py \
            scripts/m23_7_r1_semantic_alignment.py \
            tests/test_m23_7_r1_semantic_alignment.py
          pytest -q tests/test_m23_7_r1_semantic_alignment.py
      - name: Deterministic manifest and report replay
        run: |
          python scripts/m23_7_r1_semantic_alignment.py \
            --manifest-output /tmp/r1-manifest-a.json \
            --report-output /tmp/r1-report-a.json
          python scripts/m23_7_r1_semantic_alignment.py \
            --manifest-output /tmp/r1-manifest-b.json \
            --report-output /tmp/r1-report-b.json
          cmp /tmp/r1-manifest-a.json /tmp/r1-manifest-b.json
          cmp /tmp/r1-report-a.json /tmp/r1-report-b.json
          cmp /tmp/r1-manifest-a.json \
            pilot/m23/m23-7-r1-semantic-alignment-manifest.json
          cmp /tmp/r1-report-a.json \
            pilot/m23/m23-7-r1-semantic-alignment-report.json
      - name: Privacy authority and blocker scan
        run: |
          python - <<'PY'
          from knowledge_engine.m23_7_r1_semantic_alignment import (
              canonical_alignment_report,
              canonical_manifest,
          )

          manifest = canonical_manifest()
          report = canonical_alignment_report()
          assert manifest["probe_contract"]["user_queries_allowed"] is False
          assert manifest["probe_contract"]["raw_section_id_as_query_forbidden"] is True
          assert report["alignment"]["compiled_raw_query_persisted"] is False
          assert report["exit"]["retrieval_quality_blocker_cleared"] is False
          assert report["exit"]["latency_blocker_cleared"] is False
          assert report["exit"]["promotion_eligibility_granted"] is False
          assert report["authority"]["production_retrieval"] == "lexical"
          assert report["authority"]["protected_mutations_dispatched"] is False
          PY
      - name: Compile accepted scope
        run: python -m compileall -q src tests scripts
