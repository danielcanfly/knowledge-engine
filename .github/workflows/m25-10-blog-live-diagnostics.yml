name: M25.10 Live Candidate Diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/m25-10-blog-live-diagnostics.yml'
      - 'src/knowledge_engine/m25_blog_live_candidate.py'
      - 'tests/test_m25_10_blog_live_candidate.py'

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'
      - name: Apply exact bounded repair
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python -m ruff check --fix \
            src/knowledge_engine/m25_blog_live_candidate.py \
            tests/test_m25_10_blog_live_candidate.py
          python - <<'PY'
          from pathlib import Path
          path = Path('src/knowledge_engine/m25_blog_live_candidate.py')
          text = path.read_text()
          old = '        \'const EXPECTED_MANIFEST = "ef5ee828069731e3e7106e1b12fb82e3a578c377930568410bc78421d1600877";\',\n'
          new = (
              '        \'const EXPECTED_MANIFEST = \'\n'
              '        \'"ef5ee828069731e3e7106e1b12fb82e3a578c377930568410bc78421d1600877";\',\n'
          )
          assert text.count(old) == 1
          path.write_text(text.replace(old, new))
          PY
          python -m ruff check --output-format=concise \
            src/knowledge_engine/m25_blog_live_candidate.py \
            tests/test_m25_10_blog_live_candidate.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/knowledge_engine/m25_blog_live_candidate.py
          git commit -m 'Fix exact M25.10 live runner Ruff findings'
          git push origin "HEAD:${HEAD_BRANCH}"
          exit 1
