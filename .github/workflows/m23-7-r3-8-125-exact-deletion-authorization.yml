name: M23.7 R3.8.125 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29595625175.json"
      - "docs/architecture/m23-7-r3-8-125-exact-deletion-authorization-29595625175.md"
      - ".github/workflows/m23-7-r3-8-125-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 3de0fd420260737ce15fd8aedf13be9b252405ed HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization
          value=validate_authorization(Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29595625175.json"))
          assert value["authorization_sha256"] == "6765a4b7b930ddbbca7aee8d4c67afdd72b4a6844edaa0ec27d438c27d935ce9"
          assert value["worker_name"] == "knowledge-engine-r3-8-29595625175"
          assert value["observation_run_id"] == "29595625175"
          assert value["recovery_run_id"] == "29595999331"
          assert value["receipt_sha256"] == "4ca8ee3658bb3452e0c2e65737ea6fdec1cbdadbc24d647ca1f370b2580e6a1a"
          assert value["evidence_seal_sha256"] == "4f4d4ec0221a12f15da4fda6c402b2bf8d087ffa639da90d97f56cf7a6a80d50"
          assert value["independent_reconciliation_sha256"] == "5626a6e653765e494ef63305693c7b04e1cae70ceff0fd4fa3421c1050492ce0"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed={"deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29595625175.json","docs/architecture/m23-7-r3-8-125-exact-deletion-authorization-29595625175.md",".github/workflows/m23-7-r3-8-125-exact-deletion-authorization.yml"}
          changed=set(subprocess.check_output(["git","diff","--name-only","3de0fd420260737ce15fd8aedf13be9b252405ed","HEAD"],text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 3de0fd420260737ce15fd8aedf13be9b252405ed HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
