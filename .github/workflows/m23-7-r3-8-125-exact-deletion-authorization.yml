name: M23.7 R3.8.125 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29602737093.json"
      - "docs/architecture/m23-7-r3-8-125-exact-deletion-authorization-29602737093.md"
      - ".github/workflows/m23-7-r3-8-125-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 51a4ff17955b6e10c340865316b58dfcc289cfb1 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization
          value=validate_authorization(Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29602737093.json"))
          assert value["authorization_sha256"] == "a17f1bc4389734992c41ba71cbf1adcfb969827900a451a8eb061979c826558e"
          assert value["worker_name"] == "knowledge-engine-r3-8-29602737093"
          assert value["observation_run_id"] == "29602737093"
          assert value["recovery_run_id"] == "29603119791"
          assert value["receipt_sha256"] == "f767d7ba906f487da970d1a27577c8521e8ff73308b1cb4565423be33982b792"
          assert value["evidence_seal_sha256"] == "3ae42e3ddf43645b8302b6f96cce02aba7be7975443ccc4ce76b96914694ecd2"
          assert value["independent_reconciliation_sha256"] == "dd127ab719e3578c4e7bb5e315c48385897a8c62c463ce335480953b59011aba"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed={"deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29602737093.json","docs/architecture/m23-7-r3-8-125-exact-deletion-authorization-29602737093.md",".github/workflows/m23-7-r3-8-125-exact-deletion-authorization.yml"}
          changed=set(subprocess.check_output(["git","diff","--name-only","51a4ff17955b6e10c340865316b58dfcc289cfb1","HEAD"],text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 51a4ff17955b6e10c340865316b58dfcc289cfb1 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
