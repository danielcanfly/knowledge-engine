name: M23.7 R3.8.125 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29600412694.json"
      - "docs/architecture/m23-7-r3-8-125-exact-deletion-authorization-29600412694.md"
      - ".github/workflows/m23-7-r3-8-125-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 50b6de516bb39243b1af7b52020ec04e36edbad4 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization
          value=validate_authorization(Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29600412694.json"))
          assert value["authorization_sha256"] == "6faf0b0f0cd5c4e4580a73fa4f2083b78c24035a61c90dea3b2a419b70efe5bf"
          assert value["worker_name"] == "knowledge-engine-r3-8-29600412694"
          assert value["observation_run_id"] == "29600412694"
          assert value["recovery_run_id"] == "29600907404"
          assert value["receipt_sha256"] == "df2ab8d6d854ea55a64943d4ed6849a5a5358455603526683ce66ff70fc8baeb"
          assert value["evidence_seal_sha256"] == "fc5efeb8eded1e94b71dc8ae82e815010da0df7cb9d32244667dff67109c4d14"
          assert value["independent_reconciliation_sha256"] == "8d3e053ccf9027270120bfa0c4caceb3fd534d8ec8271256991ba3e0ddd6ff10"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed={"deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29600412694.json","docs/architecture/m23-7-r3-8-125-exact-deletion-authorization-29600412694.md",".github/workflows/m23-7-r3-8-125-exact-deletion-authorization.yml"}
          changed=set(subprocess.check_output(["git","diff","--name-only","50b6de516bb39243b1af7b52020ec04e36edbad4","HEAD"],text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 50b6de516bb39243b1af7b52020ec04e36edbad4 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
