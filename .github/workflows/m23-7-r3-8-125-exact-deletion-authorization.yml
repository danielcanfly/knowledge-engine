name: M23.7 R3.8.125 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29597922646.json"
      - "docs/architecture/m23-7-r3-8-125-exact-deletion-authorization-29597922646.md"
      - ".github/workflows/m23-7-r3-8-125-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 20c02e7d6f1427bd6d84b7a91af2a45a53b6da55 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization
          value=validate_authorization(Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29597922646.json"))
          assert value["authorization_sha256"] == "dc0891b17aac7e14c4984563d989c7d0050dd4d84e889da246bfb28395d5203e"
          assert value["worker_name"] == "knowledge-engine-r3-8-29597922646"
          assert value["observation_run_id"] == "29597922646"
          assert value["recovery_run_id"] == "29598351528"
          assert value["receipt_sha256"] == "a2a47edbce9423b2e4da976478f3efff339dcb499f3272bd642b6126b8f63cb2"
          assert value["evidence_seal_sha256"] == "748bd78dd7f524a6200239aa50f9984c82e50c0396e49dee5361bc12fd77bd23"
          assert value["independent_reconciliation_sha256"] == "23b8306601b7de3603c6559701a7c6c1a2d9e21c3db82b8b8131288b702b48cb"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed={"deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29597922646.json","docs/architecture/m23-7-r3-8-125-exact-deletion-authorization-29597922646.md",".github/workflows/m23-7-r3-8-125-exact-deletion-authorization.yml"}
          changed=set(subprocess.check_output(["git","diff","--name-only","20c02e7d6f1427bd6d84b7a91af2a45a53b6da55","HEAD"],text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 20c02e7d6f1427bd6d84b7a91af2a45a53b6da55 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
