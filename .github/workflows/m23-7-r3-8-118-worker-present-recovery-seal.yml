name: M23.7 R3.8.118 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-118/worker-present-recovery-seal-29590293423.json"
      - "docs/architecture/m23-7-r3-8-118-worker-present-recovery-seal.md"
      - ".github/workflows/m23-7-r3-8-118-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor ce5f7c08b97069f7cd21792b8aee53b89d5c49fe HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          path = Path(".github/evidence/m23-7-r3-8-118/worker-present-recovery-seal-29590293423.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "b34286308c12dea081d4b972918d08f23c1ea24cac5b7ea3ba9bad780eecaaff"
          assert value["recovery_authorization_prs"] == [816, 817]
          assert value["recovery_authorization_merge_sha"] == "ce5f7c08b97069f7cd21792b8aee53b89d5c49fe"
          assert value["recovery_run_id"] == "29590293423"
          assert value["artifact"]["artifact_id"] == 8410760455
          assert value["artifact"]["zip_sha256"] == "ea258d8908744777f2de74a511a5e242129a24ed165b9dd07e6872e11f018e1a"
          assert value["artifact"]["receipt_file_sha256"] == "ab709f563e7a752c00b3e301b9f5bd286c973123c6e4370cb73b1d6d33bee441"
          assert value["artifact"]["receipt_self_digest"] == "548bac0618d5f8295794888b9a92a79004ac764fc88fb7308200ade164df71a8"
          receipt = value["receipt"]
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29589719171"
          assert receipt["affected_run_id"] == "29589719171"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          for field in ("worker_delete_dispatched","worker_deploy_dispatched","worker_route_invoked","worker_secret_mutation_dispatched","qdrant_read_dispatched","qdrant_mutation_dispatched","r2_read_dispatched","r2_mutation_dispatched","protected_mutations_dispatched"):
              assert receipt[field] is False
          assert value["authority"]["worker_deletion_authorized"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-118/worker-present-recovery-seal-29590293423.json",
              "docs/architecture/m23-7-r3-8-118-worker-present-recovery-seal.md",
              ".github/workflows/m23-7-r3-8-118-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(["git", "diff", "--name-only", "ce5f7c08b97069f7cd21792b8aee53b89d5c49fe", "HEAD"], text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code ce5f7c08b97069f7cd21792b8aee53b89d5c49fe HEAD --             scripts/m23_7_r3_8_remote_recovery_probe.py             .github/workflows/m23-7-r3-8-9-recovery-probe.yml             scripts/m23_7_r3_8_remote_operator.py             scripts/m23_7_r3_8_remote_delete.py             src/knowledge_engine/m23_7_r3_8_latency_repair.py             workers/m23-7-r3-8-latency-repair/worker.mjs
