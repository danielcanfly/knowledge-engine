name: M25.2 Authority Diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/m25-2-authority-diagnostics.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/m25-3-extraction-worker
          fetch-depth: 0
      - name: Capture M25.2 authority assertions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mkdir -p /tmp/m25-2-authority
          python - <<'PY'
          import ast
          import json
          import os
          import subprocess
          from pathlib import Path

          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', os.environ['BASE_SHA'], 'HEAD'],
              text=True,
          ).splitlines()
          forbidden_paths = (
              'workers/',
              'packages/',
              'pilot/m24/',
              'channels/production.json',
          )
          modules = sorted(Path('src/knowledge_engine').glob('m25_intake_*.py'))
          forbidden_imports = {'boto3', 'httpx', 'requests', 'subprocess', 'socket'}
          serialized = ''
          module_imports = {}
          violations = {}
          for module in modules:
              source = module.read_text(encoding='utf-8')
              serialized += source
              tree = ast.parse(source)
              observed = {
                  node.names[0].name.split('.')[0]
                  for node in ast.walk(tree)
                  if isinstance(node, ast.Import)
              }
              observed.update(
                  node.module.split('.')[0]
                  for node in ast.walk(tree)
                  if isinstance(node, ast.ImportFrom) and node.module
              )
              module_imports[str(module)] = sorted(observed)
              bad = sorted(observed & forbidden_imports)
              if bad:
                  violations[str(module)] = bad

          result = {
              'head_sha': subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip(),
              'forbidden_path_matches': [
                  path for path in changed if path.startswith(forbidden_paths)
              ],
              'forbidden_import_matches': violations,
              'markers': {
                  'knowledge_source_absent': 'knowledge-source/' not in serialized,
                  'production_pointer_absent': 'channels/production.json' not in serialized,
                  'intake_namespace_present': 'intake/v1/' in serialized,
                  'admission_namespace_present': 'admission/v1/' in serialized,
              },
              'changed_files': changed,
              'module_imports': module_imports,
          }
          Path('/tmp/m25-2-authority/diagnostics.json').write_text(
              json.dumps(result, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: m25-2-authority-diagnostics
          path: /tmp/m25-2-authority/diagnostics.json
          if-no-files-found: error
          retention-days: 7
