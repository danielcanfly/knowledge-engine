name: M15 Observability Contract Acceptance

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m15_observability_contracts.py"
      - "tests/test_m15_observability_contracts.py"
      - "docs/architecture/m15/**"
      - ".github/workflows/m15-observability-contracts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run M15.1 adversarial contract tests
        run: pytest -q tests/test_m15_observability_contracts.py
      - name: Compile contract module
        run: python -m compileall -q src/knowledge_engine/m15_observability_contracts.py tests/test_m15_observability_contracts.py
      - name: Assert contract-only forbidden surfaces
        shell: bash
        run: |
          ! grep -R --line-number -E 'put_object|delete_object|update_ref|merge_pull_request|permanent_ledger_append_allowed: bool = True' \
            src/knowledge_engine/m15_observability_contracts.py \
            tests/test_m15_observability_contracts.py
