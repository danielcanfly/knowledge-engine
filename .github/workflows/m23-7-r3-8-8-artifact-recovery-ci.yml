name: M23.7 Repair R3.8.8 Artifact Recovery

on:
  pull_request:
    paths:
      - "scripts/m23_7_r3_8_remote_entrypoint.py"
      - "scripts/m23_7_r3_8_remote_recovery_probe.py"
      - "tests/test_m23_7_r3_8_remote_entrypoint.py"
      - "tests/test_m23_7_r3_8_remote_recovery_probe.py"
      - "pilot/m23/m23-7-r3-8-8-artifact-recovery-contract.json"
      - "docs/architecture/m23-7-r3-8-8-artifact-recovery.md"
      - ".github/workflows/m23-7-r3-8-remote-observe.yml"
      - ".github/workflows/m23-7-r3-8-remote-delete.yml"
      - ".github/workflows/m23-7-r3-8-7-remote-operator-ci.yml"
      - ".github/workflows/m23-7-r3-8-8-recovery-probe.yml"
      - ".github/workflows/m23-7-r3-8-8-artifact-recovery-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  artifact-recovery-regression:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head and accepted repair ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor e29591e3603b528e13662f7956b852f1da3594a8 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate recovery code and tests
        shell: bash
        run: |
          ruff check \
            scripts/m23_7_r3_8_remote_entrypoint.py \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            tests/test_m23_7_r3_8_remote_entrypoint.py \
            tests/test_m23_7_r3_8_remote_recovery_probe.py
          python -m py_compile \
            scripts/m23_7_r3_8_remote_entrypoint.py \
            scripts/m23_7_r3_8_remote_recovery_probe.py
          pytest -q \
            tests/test_m23_7_r3_8_remote_entrypoint.py \
            tests/test_m23_7_r3_8_remote_recovery_probe.py \
            tests/test_m23_7_r3_8_remote_operator.py \
            tests/test_m23_7_r3_8_remote_delete.py
      - name: Verify accepted incident contract remains exact
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          path = Path("pilot/m23/m23-7-r3-8-8-artifact-recovery-contract.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("contract_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "508111abd2d6291f1b13b44956811d9028b4832d26caeb8ec6905e693928dc33"
          assert value["incident"]["run_id"] == "29506217284"
          assert value["incident"]["worker_name"] == "knowledge-engine-r3-8-29506217284"
          assert value["repair"]["hidden_artifact_directories_allowed"] is False
          assert value["authority"]["workflow_rerun_authorized"] is False
          assert value["authority"]["production_retrieval"] == "lexical"
          PY
      - name: Verify artifact paths and read-only boundaries
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          observe = Path(".github/workflows/m23-7-r3-8-remote-observe.yml").read_text(encoding="utf-8")
          delete = Path(".github/workflows/m23-7-r3-8-remote-delete.yml").read_text(encoding="utf-8")
          probe = Path("scripts/m23_7_r3_8_remote_recovery_probe.py").read_text(encoding="utf-8")
          assert "path: r3-8-remote-evidence/" in observe
          assert "path: r3-8-deletion-evidence/" in delete
          assert "GITHUB_RUN_ATTEMPT" in delete
          assert "DELETE_RECONCILED_R3_8_WORKER" in delete
          assert probe.count("client.get(") == 2
          for forbidden in (
              "client.post(", "client.put(", "client.patch(", "client.delete(",
              "QDRANT_URL", "QDRANT_API_KEY", "R2_ACCESS_KEY_ID", "R2_SECRET_ACCESS_KEY",
          ):
              assert forbidden not in probe
          PY
      - name: Verify accepted recovery core remains exact
        shell: bash
        run: |
          git diff --exit-code 4729ee2264fdd3650770a9be227606e995973725 HEAD -- \
            scripts/m23_7_r3_8_remote_entrypoint.py \
            pilot/m23/m23-7-r3-8-8-artifact-recovery-contract.json \
            docs/architecture/m23-7-r3-8-8-artifact-recovery.md \
            .github/workflows/m23-7-r3-8-remote-observe.yml \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
