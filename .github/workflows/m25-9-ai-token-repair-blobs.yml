name: M25.9 Workers AI Repair Blobs

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-ai-token-repair-blobs.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-ai-token-repair-blobs.yml'

permissions:
  contents: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 30
          show-progress: false
      - name: Verify one-file publisher boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-ai-token-repair-blobs.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-ai-token-repair-blobs.yml'
          fi

  publish-validated-blobs:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      OUTPUT_DIR: /tmp/m25-9-ai-token-repair-blobs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify fresh attempt-1 publisher authority
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git merge-base --is-ancestor 31a2ff0df1e44ab80681b138a53b3d1ff732726c HEAD
          mkdir -p \
            "$OUTPUT_DIR/.github/workflows" \
            "$OUTPUT_DIR/docs/architecture/m25" \
            "$OUTPUT_DIR/evidence"
      - name: Install focused test dependencies
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'
      - name: Apply repair, validate, and create content blobs
        run: |
          set -euo pipefail
          python - <<'PY'
          import importlib.util
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          module_path = Path('.github/scripts/m25_9_build_ai_token_repair.py')
          spec = importlib.util.spec_from_file_location('m25_9_ai_repair', module_path)
          if spec is None or spec.loader is None:
              raise SystemExit('cannot load repair module')
          module = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = module
          spec.loader.exec_module(module)

          module.apply_repair()
          module.validate_repair()
          subprocess.run(
              [
                  'python', '-m', 'pytest', '-q',
                  'tests/test_m25_9_cloudflare_live_preflight.py',
                  'tests/test_m25_10_blog_live_candidate.py',
              ],
              check=True,
          )

          evidence = {
              'schema_version': 'knowledge-engine-m25-9-ai-token-repair-blobs/v1',
              'parent_sha': os.environ['GITHUB_SHA'],
              'workflow_blob_sha': module.create_blob(module.WORKFLOW),
              'docs_blob_sha': module.create_blob(module.DOCS),
              'preflight_script_blob_sha': module.existing_blob(module.PREFLIGHT_SCRIPT),
              'preflight_test_blob_sha': module.existing_blob(module.PREFLIGHT_TEST),
              'changed_paths': module.CHANGED_PATHS,
              'focused_tests_passed': True,
              'external_service_mutations': 0,
          }
          output = Path(os.environ['OUTPUT_DIR'])
          (output / 'evidence' / 'repair-blobs.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n'
          )
          (output / '.github/workflows/m25-9-blog-full-population-pilot.yml').write_bytes(
              module.WORKFLOW.read_bytes()
          )
          (output / 'docs/architecture/m25/m25-9-live-preflight-repair.md').write_bytes(
              module.DOCS.read_bytes()
          )
          print(json.dumps(evidence, sort_keys=True))
          PY
      - name: Upload validated repair blobs and sources
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-ai-token-repair-blobs-${{ github.sha }}
          path: /tmp/m25-9-ai-token-repair-blobs/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
      - name: Publish blob result
        run: |
          set -euo pipefail
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-ai-token-repair-blobs' \
            -f description="run $GITHUB_RUN_ID validated blobs ready" \
            -f target_url="$run_url" >/dev/null
