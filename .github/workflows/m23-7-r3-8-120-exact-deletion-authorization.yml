name: M23.7 R3.8.120 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29589719171.json"
      - "docs/architecture/m23-7-r3-8-120-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-120-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 5263c1889a175afef4dee17c2f889bd8717bcf99 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization
          value=validate_authorization(Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29589719171.json"))
          assert value["authorization_sha256"] == "5b0e481381eb6bdf64c91fff0d3aeb3c846dc9fd25eb3f25b69733fd61a67072"
          assert value["worker_name"] == "knowledge-engine-r3-8-29589719171"
          assert value["observation_run_id"] == "29589719171"
          assert value["recovery_run_id"] == "29590293423"
          assert value["receipt_sha256"] == "548bac0618d5f8295794888b9a92a79004ac764fc88fb7308200ade164df71a8"
          assert value["evidence_seal_sha256"] == "b34286308c12dea081d4b972918d08f23c1ea24cac5b7ea3ba9bad780eecaaff"
          assert value["independent_reconciliation_sha256"] == "540ee4fdccb4d38efe643ba8199c9c619a977e6d898e2ef42f7d6c9c0c057cf8"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed={"deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29589719171.json","docs/architecture/m23-7-r3-8-120-exact-deletion-authorization.md",".github/workflows/m23-7-r3-8-120-exact-deletion-authorization.yml"}
          changed=set(subprocess.check_output(["git","diff","--name-only","5263c1889a175afef4dee17c2f889bd8717bcf99","HEAD"],text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 5263c1889a175afef4dee17c2f889bd8717bcf99 HEAD --             scripts/m23_7_r3_8_remote_delete.py             tests/test_m23_7_r3_8_remote_delete.py             .github/workflows/m23-7-r3-8-remote-delete.yml             scripts/m23_7_r3_8_remote_operator.py             src/knowledge_engine/m23_7_r3_8_latency_repair.py
