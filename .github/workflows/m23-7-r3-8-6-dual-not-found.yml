name: M23.7 Repair R3.8.6 Dual Worker Not Found

on:
  pull_request:
    paths:
      - "scripts/m23_7_r3_8_worker_absence_probe.sh"
      - "tests/test_m23_7_r3_8_worker_absence_probe.py"
      - "pilot/m23/m23-7-r3-8-6-dual-not-found-contract.json"
      - "docs/architecture/m23-7-r3-8-6-dual-not-found.md"
      - ".github/workflows/m23-7-r3-8-6-dual-not-found.yml"
      - ".github/workflows/m23-7-r3-8-4-worker-absence-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dual-not-found-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Verify R3.8.5 ancestry
        run: git merge-base --is-ancestor 37e093b28b1cf11d47e95edaa59bd6a9f2b91765 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Ruff dual-code tests
        run: ruff check tests/test_m23_7_r3_8_worker_absence_probe.py
      - name: Parse absence probe shell
        run: bash -n scripts/m23_7_r3_8_worker_absence_probe.sh
      - name: Dual-code adversarial tests
        run: pytest -q tests/test_m23_7_r3_8_worker_absence_probe.py
      - name: Preserve accepted R3.8 regressions
        run: |
          pytest -q tests/test_m23_7_r3_8_latency_repair.py
          pytest -q tests/test_m23_7_r3_8_wrangler_bootstrap.py
          pytest -q tests/test_m23_7_r3_8_deploy_target.py
          node --test workers/m23-7-r3-8-latency-repair/worker.test.mjs
      - name: Verify deterministic dual-code contract
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path("pilot/m23/m23-7-r3-8-6-dual-not-found-contract.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          digest = payload.pop("contract_sha256")
          encoded = json.dumps(
              payload,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "69edbcbb9fcde5fe6384c4855b930f0cd722919986eb57dbcb418621acf63862"
          assert payload["entry"]["engine_sha"] == "37e093b28b1cf11d47e95edaa59bd6a9f2b91765"
          assert payload["probe"]["official_not_found_codes"] == [10007, 10090]
          assert payload["probe"]["accepted_code_cardinality"] == 1
          assert payload["probe"]["duplicate_code_records_rejected"] is True
          assert payload["probe"]["mixed_not_found_codes_rejected"] is True
          assert payload["safety"]["http_403_allows_deploy"] is False
          assert payload["safety"]["authentication_error_allows_deploy"] is False
          assert payload["preservation"]["latency_threshold_changed"] is False
          assert payload["authority"]["worker_deployment_authorized"] is False
          PY
      - name: Verify hotfix scope and accepted file preservation
        run: |
          python - <<'PY'
          import subprocess

          allowed = {
              "scripts/m23_7_r3_8_worker_absence_probe.sh",
              "tests/test_m23_7_r3_8_worker_absence_probe.py",
              "pilot/m23/m23-7-r3-8-6-dual-not-found-contract.json",
              "docs/architecture/m23-7-r3-8-6-dual-not-found.md",
              ".github/workflows/m23-7-r3-8-6-dual-not-found.yml",
              ".github/workflows/m23-7-r3-8-4-worker-absence-probe.yml",
          }
          changed = set(
              subprocess.check_output(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      "37e093b28b1cf11d47e95edaa59bd6a9f2b91765",
                      "HEAD",
                  ],
                  text=True,
              ).splitlines()
          )
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 37e093b28b1cf11d47e95edaa59bd6a9f2b91765 HEAD -- \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            scripts/m23_7_r3_8_latency_repair_operator.py \
            scripts/m23_7_r3_8_worker_config.py \
            scripts/m23_7_r3_8_wrangler_bootstrap.sh \
            scripts/m23_7_r3_8_deploy_target.py \
            tests/test_m23_7_r3_8_latency_repair.py \
            tests/test_m23_7_r3_8_wrangler_bootstrap.py \
            tests/test_m23_7_r3_8_deploy_target.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs \
            workers/m23-7-r3-8-latency-repair/worker.test.mjs \
            pilot/m23/m23-7-r3-8-latency-repair-contract.json \
            pilot/m23/m23-7-r3-8-latency-repair-fixture-report.json \
            pilot/m23/m23-7-r3-8-1-wrangler-bootstrap-contract.json \
            pilot/m23/m23-7-r3-8-2-bash32-bootstrap-contract.json \
            pilot/m23/m23-7-r3-8-3-version-output-contract.json \
            pilot/m23/m23-7-r3-8-4-worker-absence-probe-contract.json \
            pilot/m23/m23-7-r3-8-5-deploy-target-contract.json
      - name: Probe safety scan
        run: |
          python - <<'PY'
          from pathlib import Path

          shell = Path("scripts/m23_7_r3_8_worker_absence_probe.sh").read_text(
              encoding="utf-8"
          )
          assert 'codes[0] not in {"10007", "10090"}' in shell
          assert "len(codes) != 1" in shell
          assert "eval " not in shell
          for forbidden in (
              "declare -g",
              "declare -A",
              "local -n",
              "mapfile",
              "readarray",
              "https://",
              "api.cloudflare.com",
          ):
              assert forbidden not in shell
          PY
      - name: Compile accepted Python scope
        run: python -m py_compile tests/test_m23_7_r3_8_worker_absence_probe.py

  dual-not-found-macos-bash32:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify macOS system Bash 3.2
        run: /bin/bash --version | head -1 | grep 'version 3\.2'
      - name: Verify real pinned Wrangler command surface
        run: |
          npx --yes wrangler@4.111.0 versions list --help > "$RUNNER_TEMP/versions-help.txt"
          grep -q -- '--name' "$RUNNER_TEMP/versions-help.txt"
          grep -q -- '--config' "$RUNNER_TEMP/versions-help.txt"
          grep -q -- '--json' "$RUNNER_TEMP/versions-help.txt"
      - name: Exercise both official not-found codes with Bash 3.2
        run: |
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT
          printf '{}\n' > "$temp_dir/wrangler.local.jsonc"
          for code in 10007 10090; do
            cat > "$temp_dir/wrangler-shim" <<SH
          #!/bin/sh
          printf 'Cloudflare API error [code: $code]\n' >&2
          exit 1
          SH
            chmod 700 "$temp_dir/wrangler-shim"
            REPO="$PWD" TEST_DIR="$temp_dir" PYTHON_BIN="$(command -v python)" \
              /bin/bash --noprofile --norc -c '
                source "$REPO/scripts/m23_7_r3_8_worker_absence_probe.sh"
                M23_R3_8_WRANGLER_CMD=("$TEST_DIR/wrangler-shim")
                M23_R3_8_PYTHON_BIN="$PYTHON_BIN"
                result="$(m23_r3_8_probe_worker_absence \
                  "knowledge-engine-m23-7-r3-8-latency" \
                  "$TEST_DIR/wrangler.local.jsonc")" || exit $?
                test "$result" = "absent"
              '
          done
