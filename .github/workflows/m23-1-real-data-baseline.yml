name: M23.1 Real Data Baseline

on:
  pull_request:
    paths:
      - "pilot/m23/m23-1-corpus-manifest.json"
      - "pilot/m23/m23-1-golden-queries.json"
      - "src/knowledge_engine/m23_real_data_baseline.py"
      - "tests/test_m23_1_real_data_baseline.py"
      - "docs/architecture/m23/m23-1-real-data-baseline.md"
      - ".github/workflows/m23-1-real-data-baseline.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-head:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Verify exact head
        if: github.event_name == 'pull_request'
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q tests/test_m23_1_real_data_baseline.py
      - run: python -m ruff check src/knowledge_engine/m23_real_data_baseline.py tests/test_m23_1_real_data_baseline.py
      - run: python -m compileall -q src/knowledge_engine/m23_real_data_baseline.py
