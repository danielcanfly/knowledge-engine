name: M23.7 Repair R3.8.11 Deletion CLI Compatibility

on:
  pull_request:
    paths:
      - "scripts/m23_7_r3_8_remote_delete.py"
      - "tests/test_m23_7_r3_8_remote_delete.py"
      - ".github/workflows/m23-7-r3-8-remote-delete.yml"
      - ".github/workflows/m23-7-r3-8-7-remote-operator-ci.yml"
      - ".github/workflows/m23-7-r3-8-11-deletion-cli-compatibility.yml"
      - "pilot/m23/m23-7-r3-8-11-deletion-cli-compatibility-contract.json"
      - "docs/architecture/m23-7-r3-8-11-deletion-cli-compatibility.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deletion-cli-compatibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head and entry ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 5b026ba5ab6b069a80767a4571fd2e1ee97e811e HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Ruff and compile repaired deletion scope
        shell: bash
        run: |
          set -euo pipefail
          ruff check \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py
          python -m py_compile scripts/m23_7_r3_8_remote_delete.py
      - name: Deletion CLI adversarial tests
        run: pytest -q tests/test_m23_7_r3_8_remote_delete.py
      - name: Verify exact pinned Wrangler positional deletion surface
        shell: bash
        run: |
          set -euo pipefail
          test "$(npx --yes wrangler@4.111.0 --version | tr -d '\r')" = "4.111.0"
          npx --yes wrangler@4.111.0 delete --help > wrangler-delete-help.txt
          grep -Eq 'wrangler delete[[:space:]]+\[name\]' wrangler-delete-help.txt
          grep -q -- '--force' wrangler-delete-help.txt
          ! grep -q -- '--name' wrangler-delete-help.txt
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import build_delete_command

          worker = "knowledge-engine-r3-8-29506217284"
          command = build_delete_command(worker, Path("wrangler.delete.test.jsonc"))
          assert command == [
              "npx",
              "--yes",
              "wrangler@4.111.0",
              "delete",
              worker,
              "--config",
              "wrangler.delete.test.jsonc",
              "--force",
          ]
          assert "--name" not in command
          PY
      - name: Verify deterministic repair contract
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(
              "pilot/m23/m23-7-r3-8-11-deletion-cli-compatibility-contract.json"
          )
          stored = json.loads(path.read_text(encoding="utf-8"))
          digest = stored.pop("contract_sha256")
          encoded = json.dumps(
              stored,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "7fc40f41779cea8890920ae422246df082053d653788de884d5ec744e6a0120a"
          assert stored["wrangler"]["delete_name_form"] == "positional"
          assert stored["wrangler"]["forbidden_delete_options"] == ["--name"]
          assert stored["authority"]["workflow_dispatch_authorized"] is False
          assert stored["preservation"]["production_retrieval"] == "lexical"
          assert stored["preservation"]["retrieval_quality_blocker"] == "active"
          assert stored["preservation"]["latency_blocker"] == "active"
          PY
      - name: Preserve accepted observation and authorization identities
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code 5b026ba5ab6b069a80767a4571fd2e1ee97e811e HEAD -- \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_entrypoint.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29506217284.json
      - name: Verify mutation and closure boundaries
        shell: bash
        run: |
          set -euo pipefail
          ! grep -R "blocked_pending_retrieval_quality.*cleared" \
            scripts/m23_7_r3_8_remote_delete.py \
            docs/architecture/m23-7-r3-8-11-deletion-cli-compatibility.md
          ! grep -R "blocked_pending_latency.*cleared" \
            scripts/m23_7_r3_8_remote_delete.py \
            docs/architecture/m23-7-r3-8-11-deletion-cli-compatibility.md
