name: M23.7 R3.8.19 Worker-Present Seal Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-19/worker-present-seal-reconciliation-29549300979.json"
      - "docs/architecture/m23-7-r3-8-19-worker-present-seal-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-19-worker-present-seal-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and worker-present seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 04a45dd5a6e75de9606ab5b82c9a4e0a4f16ecbb HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-19/worker-present-seal-reconciliation-29549300979.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(
              value,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "d103787ab87fbd08c42691c7d3684a0456fc794f3098048057787a407c990448"
          assert value["issue"] == 652
          assert value["seal"] == {
              "accepted_head": "775d95c528deb5fe174b701ea524b5e0e04979f6",
              "exact_head_runs": {
                  "architecture_canon": 29549551987,
                  "ci": 29549552001,
                  "graph_v2": 29549551999,
                  "seal": 29549552071,
              },
              "issue": 650,
              "merge_sha": "04a45dd5a6e75de9606ab5b82c9a4e0a4f16ecbb",
              "pr": 651,
              "seal_sha256": "7e85dd22facfe3051589181e4eacece578f2075af3b4421196bcff60f051a59f",
          }
          assert value["artifact"] == {
              "artifact_id": 8395150980,
              "receipt_file_sha256": "3ce3711887327bfec91322130d1477a22dca8ef12d8dc46bd29fd0fe13059f7e",
              "receipt_self_digest": "caa9e4c1700add6553a43b1a90f1e4021bfef24b3820a9770458e14fab4856af",
              "run_id": "29549300979",
              "zip_sha256": "d31498108313dec4cb974e7689943c21d3abd377dcc341fff303b071a6d35866",
          }
          assert value["worker"]["name"] == "knowledge-engine-r3-8-29548837457"
          assert value["worker"]["state"] == "worker_present"
          assert len(set(value["worker"]["version_identities"])) == 4
          assert len(set(value["worker"]["deployment_identities"])) == 4
          assert value["authority"]["deletion_authorization_record_may_be_created"] is True
          assert value["authority"]["worker_deletion_executed"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["blocker_clearance_authorized"] is False
          assert value["authority"]["parent_closure_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          assert value["authority"]["production_retrieval"] == "lexical"
          for field, observed in value["strict_zero"].items():
              assert observed is False, field
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-19/worker-present-seal-reconciliation-29549300979.json",
              "docs/architecture/m23-7-r3-8-19-worker-present-seal-reconciliation.md",
              ".github/workflows/m23-7-r3-8-19-worker-present-seal-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "04a45dd5a6e75de9606ab5b82c9a4e0a4f16ecbb", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 04a45dd5a6e75de9606ab5b82c9a4e0a4f16ecbb HEAD -- \
            .github/evidence/m23-7-r3-8-19/worker-present-recovery-seal-29549300979.json \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
