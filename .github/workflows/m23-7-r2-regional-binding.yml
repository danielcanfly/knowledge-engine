name: M23.7 Repair R2.1 Regional Binding

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r2_regional_binding.py"
      - "scripts/m23_7_r2_regional_binding.py"
      - "scripts/m23_7_r2_worker_config.py"
      - "tests/test_m23_7_r2_regional_binding.py"
      - "workers/m23-7-r2-regional-binding/**"
      - "pilot/m23/m23-7-r2-regional-binding-contract.json"
      - "pilot/m23/m23-7-r2-regional-binding-fixture-report.json"
      - "pilot/m23/m23-7-r2-regional-binding-live-acceptance.json"
      - "pilot/m23/m23-7-r2-regional-binding-reconciliation.json"
      - "docs/architecture/m23-7-r2-regional-binding.md"
      - "docs/architecture/m23-7-r2-regional-binding-live-acceptance.md"
      - "docs/architecture/m23-7-r2-regional-binding-reconciliation.md"
      - ".github/workflows/m23-7-r2-regional-binding.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regional-binding:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Python quality and adversarial tests
        run: |
          ruff check \
            src/knowledge_engine/m23_7_r2_regional_binding.py \
            scripts/m23_7_r2_regional_binding.py \
            scripts/m23_7_r2_worker_config.py \
            tests/test_m23_7_r2_regional_binding.py
          pytest -q \
            tests/test_m23_7_r1_semantic_alignment.py \
            tests/test_m23_7_r2_latency_path.py \
            tests/test_m23_7_r2_regional_binding.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Worker unit tests
        working-directory: workers/m23-7-r2-regional-binding
        run: node --test worker.test.mjs
      - name: Deterministic contract and fixture replay
        run: |
          mkdir -p .artifacts/m23
          python - <<'PY'
          import json
          from pathlib import Path
          from knowledge_engine.m23_7_r2_regional_binding import canonical_contract

          Path('.artifacts/m23/r2-1-contract.json').write_text(
              json.dumps(
                  canonical_contract(),
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(',', ':'),
              ) + '\n',
              encoding='utf-8',
          )
          PY
          cmp \
            .artifacts/m23/r2-1-contract.json \
            pilot/m23/m23-7-r2-regional-binding-contract.json
          python scripts/m23_7_r2_regional_binding.py \
            --mode fixture \
            --output .artifacts/m23/r2-1-report-a.json
          python scripts/m23_7_r2_regional_binding.py \
            --mode fixture \
            --output .artifacts/m23/r2-1-report-b.json
          cmp .artifacts/m23/r2-1-report-a.json .artifacts/m23/r2-1-report-b.json
          cmp \
            .artifacts/m23/r2-1-report-a.json \
            pilot/m23/m23-7-r2-regional-binding-fixture-report.json
      - name: Generated placement config stays untracked
        run: |
          export QDRANT_URL="https://fixture-qdrant.example"
          python scripts/m23_7_r2_worker_config.py \
            --output workers/m23-7-r2-regional-binding/wrangler.local.jsonc
          test -f workers/m23-7-r2-regional-binding/wrangler.local.jsonc
          test -z "$(git status --porcelain)"
      - name: Privacy authority budget and reconciliation scan
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          report = json.loads(
              Path('pilot/m23/m23-7-r2-regional-binding-fixture-report.json').read_text()
          )
          assert report['acceptance']['canonical_max_shadow_p95_ms'] == 1200
          assert report['acceptance']['canonical_budget_changed'] is False
          assert report['acceptance']['budget_inflation_used'] is False
          assert report['comparison']['ranked_results_equivalent'] is True
          assert report['paths']['candidate']['data_plane_requests'] == 2
          assert report['exit']['retrieval_quality_blocker_cleared'] is False
          assert report['exit']['promotion_eligibility_granted'] is False
          assert report['authority']['production_retrieval'] == 'lexical'
          assert report['authority']['protected_mutations_dispatched'] is False
          assert report['external_calls']['qdrant_write'] == 0
          encoded = json.dumps(report, sort_keys=True)
          for forbidden in ('What does', 'What is', 'How does', 'Which source'):
              assert forbidden not in encoded

          acceptance = json.loads(
              Path('pilot/m23/m23-7-r2-regional-binding-live-acceptance.json').read_text()
          )
          stored = acceptance.pop('acceptance_record_sha256')
          canonical = json.dumps(
              acceptance,
              ensure_ascii=False,
              sort_keys=True,
              separators=(',', ':'),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(canonical).hexdigest() == stored
          assert stored == 'bcffb10590a4118c4c77a23d1c35bf618d8f0f87bf6ac27987fe862fea3c9da2'
          assert acceptance['receipt']['sha256'] == 'aa56655d19cb617177bd8e4708c02e1cd6ce02189fcfee32a5b397ef0eba67db'
          assert acceptance['status'] == 'pass_regional_path_qualified'
          assert acceptance['paths']['candidate']['shadow_ms'] == 781
          assert acceptance['acceptance']['canonical_max_shadow_p95_ms'] == 1200
          assert acceptance['acceptance']['canonical_budget_changed'] is False
          assert acceptance['acceptance']['budget_inflation_used'] is False
          assert acceptance['comparison']['ranked_results_equivalent'] is True
          assert acceptance['comparison']['direct_and_worker_collection_identity_equivalent'] is True
          assert acceptance['exit']['latency_blocker_cleared'] is True
          assert acceptance['exit']['retrieval_quality_blocker_cleared'] is False
          assert acceptance['exit']['promotion_eligibility_granted'] is False
          assert acceptance['remaining_blockers'] == ['blocked_pending_retrieval_quality']
          assert acceptance['authority']['production_retrieval'] == 'lexical'
          assert acceptance['authority']['protected_mutations_dispatched'] is False
          assert acceptance['diagnostic_worker']['deletion_completed'] is False

          reconciliation = json.loads(
              Path('pilot/m23/m23-7-r2-regional-binding-reconciliation.json').read_text()
          )
          reconciliation_stored = reconciliation.pop('reconciliation_record_sha256')
          reconciliation_canonical = json.dumps(
              reconciliation,
              ensure_ascii=False,
              sort_keys=True,
              separators=(',', ':'),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(reconciliation_canonical).hexdigest() == reconciliation_stored
          assert reconciliation_stored == '409ac1ea1e79bb43735f15795fc529b8b24190e397b78ac011a280ebcbecac34'
          assert reconciliation['status'] == 'reconciled_pending_worker_deletion'
          assert reconciliation['acceptance']['pr'] == 471
          assert reconciliation['acceptance']['head_sha'] == 'afb64ab41d778866760f50db843c3d7157e8312c'
          assert reconciliation['acceptance']['merge_sha'] == '1174be8d67415cd9f2280f89dfdb6305adfd24f9'
          assert reconciliation['acceptance']['receipt_sha256'] == 'aa56655d19cb617177bd8e4708c02e1cd6ce02189fcfee32a5b397ef0eba67db'
          assert len(reconciliation['exact_head_workflows']) == 4
          assert all(item['conclusion'] == 'success' for item in reconciliation['exact_head_workflows'])
          assert reconciliation['measurement']['candidate_shadow_ms'] == 781
          assert reconciliation['measurement']['margin_ms'] == 419
          assert reconciliation['blockers']['cleared'] == ['blocked_pending_latency']
          assert reconciliation['blockers']['remaining'] == ['blocked_pending_retrieval_quality']
          assert reconciliation['authority']['production_retrieval'] == 'lexical'
          assert reconciliation['authority']['promotion_eligibility_granted'] is False
          assert reconciliation['diagnostic_worker']['deletion_completed'] is False
          assert reconciliation['diagnostic_worker']['issues_close_only_after_deletion'] is True

          worker = Path('workers/m23-7-r2-regional-binding/worker.mjs').read_text()
          assert 'env.AI.run' in worker
          assert 'api.cloudflare.com' not in worker
          assert 'console.log' not in worker
          PY
      - name: Compile accepted Python scope
        run: python -m compileall -q src tests scripts
