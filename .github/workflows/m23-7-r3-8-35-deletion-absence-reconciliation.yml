name: M23.7 R3.8.35 Deletion/Absence Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-35/deletion-absence-reconciliation-29558165649.json"
      - "docs/architecture/m23-7-r3-8-35-deletion-absence-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-35-deletion-absence-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor a9fac386ae22bfb4e5a1a7ec2ac22bb9304f8671 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic deletion/absence reconciliation
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          path = Path(".github/evidence/m23-7-r3-8-35/deletion-absence-reconciliation-29558165649.json")
          value = json.loads(path.read_text())
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "e9c2c6347f73cafea05f27c734dd1ea9ed63878b14412b9538474a708242a45e"
          assert value["issue"] == 704
          assert value["seal_issue"] == 702
          assert value["seal_pr"] == 703
          assert value["seal_merge_sha"] == "a9fac386ae22bfb4e5a1a7ec2ac22bb9304f8671"
          assert value["result"]["worker_lifecycle_clean"] is True
          assert value["result"]["retained_worker_cleanup_complete"] is True
          assert value["result"]["worker_state"] == "worker_absent"
          assert value["result"]["next_gate"] == "latency_root_cause_repair_iteration"
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-35/deletion-absence-reconciliation-29558165649.json",
              "docs/architecture/m23-7-r3-8-35-deletion-absence-reconciliation.md",
              ".github/workflows/m23-7-r3-8-35-deletion-absence-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "a9fac386ae22bfb4e5a1a7ec2ac22bb9304f8671", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code a9fac386ae22bfb4e5a1a7ec2ac22bb9304f8671 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
