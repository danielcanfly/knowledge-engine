name: M23.7 Repair R3.8.2 Bash 3.2 Bootstrap

on:
  pull_request:
    paths:
      - "scripts/m23_7_r3_8_wrangler_bootstrap.sh"
      - "tests/test_m23_7_r3_8_wrangler_bootstrap.py"
      - "pilot/m23/m23-7-r3-8-2-bash32-bootstrap-contract.json"
      - "docs/architecture/m23-7-r3-8-2-bash32-bootstrap.md"
      - ".github/workflows/m23-7-r3-8-1-wrangler-bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wrangler-bootstrap-linux:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/m23-7-r3-8-2-bash32-bootstrap'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Verify R3.8.1 ancestry
        run: git merge-base --is-ancestor 042e648cad8373026e76fd92f7c2314408019427 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Ruff bootstrap tests
        run: ruff check tests/test_m23_7_r3_8_wrangler_bootstrap.py
      - name: Parse bootstrap shell
        run: bash -n scripts/m23_7_r3_8_wrangler_bootstrap.sh
      - name: Wrangler bootstrap adversarial tests
        run: pytest -q tests/test_m23_7_r3_8_wrangler_bootstrap.py
      - name: Preserve accepted R3.8 regressions
        run: |
          pytest -q tests/test_m23_7_r3_8_latency_repair.py
          node --test workers/m23-7-r3-8-latency-repair/worker.test.mjs
      - name: Verify deterministic compatibility contract
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path("pilot/m23/m23-7-r3-8-2-bash32-bootstrap-contract.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          digest = payload.pop("contract_sha256")
          encoded = json.dumps(
              payload,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "2cb83d916e2fed4fe8add4e89d8712ebf925479de880725226fd8b238a992e74"
          assert payload["entry"]["engine_sha"] == "042e648cad8373026e76fd92f7c2314408019427"
          assert payload["tooling"]["minimum_bash_version"] == "3.2"
          assert payload["tooling"]["pinned_wrangler_version"] == "4.111.0"
          assert payload["tooling"]["command_representation"] == "bash_indexed_array"
          assert payload["tooling"]["eval_used"] is False
          assert payload["tooling"]["macos_runner_regression_required"] is True
          assert payload["preservation"]["latency_threshold_changed"] is False
          assert payload["authority"]["worker_deployment_authorized"] is False
          PY
      - name: Verify hotfix scope and accepted file preservation
        run: |
          python - <<'PY'
          import subprocess

          allowed = {
              "scripts/m23_7_r3_8_wrangler_bootstrap.sh",
              "tests/test_m23_7_r3_8_wrangler_bootstrap.py",
              "pilot/m23/m23-7-r3-8-2-bash32-bootstrap-contract.json",
              "docs/architecture/m23-7-r3-8-2-bash32-bootstrap.md",
              ".github/workflows/m23-7-r3-8-1-wrangler-bootstrap.yml",
          }
          changed = set(
              subprocess.check_output(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      "042e648cad8373026e76fd92f7c2314408019427",
                      "HEAD",
                  ],
                  text=True,
              ).splitlines()
          )
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 042e648cad8373026e76fd92f7c2314408019427 HEAD -- \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            scripts/m23_7_r3_8_latency_repair_operator.py \
            scripts/m23_7_r3_8_worker_config.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs \
            pilot/m23/m23-7-r3-8-latency-repair-contract.json \
            pilot/m23/m23-7-r3-8-1-wrangler-bootstrap-contract.json
      - name: Bash 3.2 compatibility and safety scan
        run: |
          python - <<'PY'
          from pathlib import Path

          shell = Path("scripts/m23_7_r3_8_wrangler_bootstrap.sh").read_text(
              encoding="utf-8"
          )
          assert "declare -a M23_R3_8_WRANGLER_CMD=()" in shell
          for forbidden in (
              "declare -g",
              "declare -A",
              "local -n",
              "mapfile",
              "readarray",
              "eval ",
          ):
              assert forbidden not in shell
          assert '"${M23_R3_8_WRANGLER_CMD[@]}" --version' in shell
          assert "wrangler@${M23_R3_8_WRANGLER_VERSION}" in shell
          assert "4.111.0" in shell
          assert "^[A-Za-z0-9_./-]+$" in shell

          contract = Path(
              "pilot/m23/m23-7-r3-8-2-bash32-bootstrap-contract.json"
          ).read_text(encoding="utf-8")
          docs = Path(
              "docs/architecture/m23-7-r3-8-2-bash32-bootstrap.md"
          ).read_text(encoding="utf-8")
          for text in (contract, docs):
              assert "https://" not in text
              assert "api-key" not in text.lower()
          PY
      - name: Compile accepted Python scope
        run: python -m py_compile tests/test_m23_7_r3_8_wrangler_bootstrap.py

  wrangler-bootstrap-macos-bash32:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/m23-7-r3-8-2-bash32-bootstrap'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Verify macOS system Bash 3.2
        run: |
          actual="$(/bin/bash --noprofile --norc -c 'printf "%s.%s" "${BASH_VERSINFO[0]}" "${BASH_VERSINFO[1]}"')"
          test "$actual" = "3.2"
      - name: Parse resolver with macOS Bash 3.2
        run: /bin/bash --noprofile --norc -n scripts/m23_7_r3_8_wrangler_bootstrap.sh
      - name: Exercise pinned npx fallback with macOS Bash 3.2
        run: |
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT
          cat > "$temp_dir/npx" <<'SH'
          #!/bin/sh
          if [ "$1" != "--yes" ] || [ "$2" != "wrangler@4.111.0" ] || [ "$3" != "--version" ]; then
            exit 77
          fi
          printf 'wrangler 4.111.0\n'
          SH
          chmod 700 "$temp_dir/npx"
          REPO="$PWD" PATH="$temp_dir:/usr/bin:/bin" \
            /bin/bash --noprofile --norc -c '
              source "$REPO/scripts/m23_7_r3_8_wrangler_bootstrap.sh"
              m23_r3_8_resolve_wrangler || exit $?
              test "$M23_R3_8_WRANGLER_SOURCE" = "npx-pinned"
              test "${#M23_R3_8_WRANGLER_CMD[@]}" -eq 3
              test "${M23_R3_8_WRANGLER_CMD[1]}" = "--yes"
              test "${M23_R3_8_WRANGLER_CMD[2]}" = "wrangler@4.111.0"
            '
