name: Oracle Tamper LKG Proof

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/oracle-tamper-lkg-proof.yml'
      - 'scripts/oracle_tamper_lkg_proof.py'

permissions:
  contents: read

jobs:
  tamper-lkg-proof:
    runs-on: ubuntu-latest
    environment: production
    env:
      ORACLE_VM_HOST: ${{ vars.ORACLE_VM_HOST || secrets.ORACLE_VM_HOST }}
      ORACLE_VM_USER: ${{ vars.ORACLE_VM_USER || secrets.ORACLE_VM_USER }}
      ORACLE_VM_DEPLOY_PATH: ${{ vars.ORACLE_VM_DEPLOY_PATH || secrets.ORACLE_VM_DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 8b521b2ff23b5750a4ddf91772600700176883c0

      - name: Require proof configuration
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          for name in SSH_PRIVATE_KEY ORACLE_VM_HOST ORACLE_VM_USER ORACLE_VM_DEPLOY_PATH; do
            test -n "${!name:-}" || { echo "Missing $name"; exit 2; }
          done

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$ORACLE_VM_HOST" >> ~/.ssh/known_hosts

      - name: Execute isolated integrity fallback proof on Oracle VM
        env:
          TAMPER_CHANNEL: oracle-tamper-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          scp scripts/oracle_tamper_lkg_proof.py \
            "$ORACLE_VM_USER@$ORACLE_VM_HOST:/tmp/oracle-tamper-proof.py"
          ssh "$ORACLE_VM_USER@$ORACLE_VM_HOST" \
            "chmod 644 /tmp/oracle-tamper-proof.py && cd '$ORACLE_VM_DEPLOY_PATH' && docker compose run --rm --no-deps -e TAMPER_CHANNEL='$TAMPER_CHANNEL' -v '$ORACLE_VM_DEPLOY_PATH/examples/okf-bundle:/fixtures:ro' -v '/tmp/oracle-tamper-proof.py:/proof/oracle-tamper-proof.py:ro' knowledge-engine python /proof/oracle-tamper-proof.py </dev/null" \
            2>&1 | tee /tmp/oracle-tamper-lkg-proof.log
          ssh "$ORACLE_VM_USER@$ORACLE_VM_HOST" \
            "rm -f /tmp/oracle-tamper-proof.py"

      - name: Assert proof markers
        run: |
          set -euo pipefail
          grep -F 'ORACLE_TAMPER_DETECTED=IntegrityError:' /tmp/oracle-tamper-lkg-proof.log
          grep -F 'ORACLE_LKG_PRESERVED=' /tmp/oracle-tamper-lkg-proof.log
          grep -F 'ORACLE_TAMPER_RECOVERY_PASSED=' /tmp/oracle-tamper-lkg-proof.log
          grep -F 'ORACLE_PRODUCTION_POINTER_UNCHANGED' /tmp/oracle-tamper-lkg-proof.log
          grep -F 'ORACLE_TAMPER_CLEANUP_PASSED' /tmp/oracle-tamper-lkg-proof.log

      - name: Upload integrity proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-tamper-lkg-proof
          path: /tmp/oracle-tamper-lkg-proof.log
          if-no-files-found: error
          retention-days: 30
