name: M23.7 R3.8 Generic Recovery Probe

on:
  workflow_dispatch:
    inputs:
      authorization_path:
        description: Reviewed run authorization manifest path
        required: true
        default: pilot/m23/r3-8/authorizations/29696136508.json
        type: string
      confirmation:
        description: Enter PROBE_R3_8_AUTHORIZED_MANIFEST
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: m23-7-r3-8-generic-recovery-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-24.04
    environment: m23-r3-diagnostic
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      EVIDENCE_DIR: r3-8-generic-recovery-evidence
    steps:
      - name: Reject rerun attempts and unreviewed paths
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$GITHUB_REF" = "refs/heads/main"
          test "${{ inputs.confirmation }}" = "PROBE_R3_8_AUTHORIZED_MANIFEST"
          case "${{ inputs.authorization_path }}" in
            pilot/m23/r3-8/authorizations/*.json) ;;
            *) echo "authorization_path_not_manifest"; exit 23 ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact dispatch head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install exact Engine
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify generic recovery modules compile
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/m23_7_r3_8_run_authorization.py \
            scripts/m23_7_r3_8_manifest_recovery_probe.py

      - name: Read official Cloudflare control-plane collections only
        id: recovery
        shell: bash
        run: |
          set +e
          python -m scripts.m23_7_r3_8_manifest_recovery_probe \
            --authorization-path "${{ inputs.authorization_path }}" \
            --confirmation "${{ inputs.confirmation }}" \
            --output-dir "$EVIDENCE_DIR"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload privacy-safe generic recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m23-7-r3-8-generic-recovery-${{ github.run_id }}
          path: r3-8-generic-recovery-evidence/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30
          compression-level: 9

      - name: Return governed recovery result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          code="${{ steps.recovery.outputs.exit_code }}"
          case "$code" in
            0|30) exit "$code" ;;
            23) exit 23 ;;
            *) exit 23 ;;
          esac
