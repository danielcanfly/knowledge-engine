name: M9 Production Promotion Approval

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "governed_batches/evidence/m9-001-production-promotion-approval.json"
      - "governed_batches/evidence/m9-001-production-promotion-observation.json"
      - "governed_batches/evidence/m9-001-idempotent-replay-observation.json"
      - "governed_batches/evidence/m9-001-lifecycle-history.json"
      - "governed_batches/m9-001-agent-planning-strategies.json"
      - "production_promotions/m9-001-agent-planning-strategies.json"
      - "src/knowledge_engine/promotion_approval_history.py"
      - "scripts/validate_historical_production_promotion_approval.py"
      - "tests/test_production_promotion_approval.py"
      - "tests/test_m9_request_spec.py"
      - "tests/test_m9_planned_batch.py"
      - ".github/workflows/m9-production-promotion-approval.yml"

permissions:
  contents: read

jobs:
  validate-approval-history:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      EVIDENCE_DIR: evidence/m9-production-approval
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install exact Engine
        run: python -m pip install -e '.[dev]'
      - name: Validate production approval historically
        run: |
          python scripts/validate_historical_production_promotion_approval.py \
            --approval-path governed_batches/evidence/m9-001-production-promotion-approval.json \
            --spec-path governed_batches/m9-001-agent-planning-strategies.json \
            --request-path production_promotions/m9-001-agent-planning-strategies.json \
            --output "$EVIDENCE_DIR/approval-validation.json"
      - name: Verify live target read-only
        run: |
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          from knowledge_engine.config import Settings
          from knowledge_engine.storage import create_object_store

          replay = json.loads(Path('governed_batches/evidence/m9-001-idempotent-replay-observation.json').read_text())
          raw = create_object_store(Settings.from_env()).get('channels/production.json')
          pointer = json.loads(raw)
          digest = hashlib.sha256(raw).hexdigest()
          assert pointer['release_id'] == replay['production_target']['release_id']
          assert pointer['manifest_sha256'] == replay['production_target']['manifest_sha256']
          assert digest == replay['production_target']['pointer_sha256_after']
          root = Path(os.environ['EVIDENCE_DIR'])
          root.mkdir(parents=True, exist_ok=True)
          (root / 'live-production-pointer.json').write_bytes(raw)
          (root / 'live-production-observation.json').write_text(json.dumps({
              'status': 'passed', 'pointer_sha256': digest,
              'read_only': True, 'mutations_performed': []
          }, indent=2, sort_keys=True) + '\n')
          PY
      - name: Run approval and closure tests
        run: |
          python -m pytest -q \
            tests/test_production_promotion_approval.py \
            tests/test_m9_request_spec.py \
            tests/test_m9_planned_batch.py
      - name: Write approval-history summary
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          root = Path(os.environ['EVIDENCE_DIR'])
          validation = json.loads((root / 'approval-validation.json').read_text())
          promotion = json.loads(Path('governed_batches/evidence/m9-001-production-promotion-observation.json').read_text())
          replay = json.loads(Path('governed_batches/evidence/m9-001-idempotent-replay-observation.json').read_text())
          live = json.loads((root / 'live-production-observation.json').read_text())
          assert validation['status'] == 'approved'
          assert validation['lifecycle_state_at_approval'] == 'request_spec_committed'
          assert validation['current_lifecycle_state'] == 'closed'
          assert validation['approval_consumed'] is True
          assert promotion['promotion']['status'] == 'promoted'
          assert replay['replay']['status'] == 'already_promoted'
          assert replay['replay']['idempotent'] is True
          summary = {
              'schema_version': 'm9-production-promotion-approval-history/v2',
              'status': 'passed',
              'approval_sha256': validation['approval_sha256'],
              'current_lifecycle_state': 'closed',
              'approval_consumed': True,
              'production_promotion_observed': True,
              'idempotent_replay_observed': True,
              'live_production_pointer_sha256': live['pointer_sha256'],
              'replay_mutated_production': False,
              'rollback_observed': False,
              'next_legal_action': 'start_next_batch',
          }
          (root / 'summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True) + '\n')
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY
      - name: Upload approval history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m9-production-approval-history-${{ github.sha }}
          path: evidence/m9-production-approval/
          if-no-files-found: error
          retention-days: 90
