name: M9 Production Promotion Approval

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "governed_batches/evidence/m9-001-production-promotion-approval.json"
      - "governed_batches/evidence/m9-001-request-spec-authorization.json"
      - "governed_batches/evidence/m9-001-runtime-acceptance-observation.json"
      - "governed_batches/evidence/m9-001-lifecycle-history.json"
      - "governed_batches/m9-001-agent-planning-strategies.json"
      - "production_promotions/m9-001-agent-planning-strategies.json"
      - "src/knowledge_engine/promotion_approval.py"
      - "scripts/validate_production_promotion_approval.py"
      - "tests/test_production_promotion_approval.py"
      - "docs/batches/m9-001-production-promotion-review.md"
      - ".github/workflows/m9-production-promotion-approval.yml"

permissions:
  contents: read

jobs:
  validate-approval:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      APPROVAL_PATH: governed_batches/evidence/m9-001-production-promotion-approval.json
      SPEC_PATH: governed_batches/m9-001-agent-planning-strategies.json
      REQUEST_PATH: production_promotions/m9-001-agent-planning-strategies.json
      REGISTRY_PATH: governed_batches/registry-v2.json
      EVIDENCE_DIR: evidence/m9-production-approval
    steps:
      - name: Check out exact Engine revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install exact Engine
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Verify read-only R2 configuration
        run: |
          set -euo pipefail
          test -n "$R2_ACCESS_KEY_ID"
          test -n "$R2_SECRET_ACCESS_KEY"
          test -n "$R2_BUCKET"
          test -n "$R2_ENDPOINT_URL"

      - name: Capture live production pointer read-only
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          from knowledge_engine.config import Settings
          from knowledge_engine.storage import create_object_store

          store = create_object_store(Settings.from_env())
          pointer_bytes = store.get("channels/production.json")
          pointer = json.loads(pointer_bytes)
          pointer_sha256 = hashlib.sha256(pointer_bytes).hexdigest()

          assert pointer["release_id"] == "20260707T111252Z-aebf06593f89"
          assert pointer["manifest_sha256"] == (
              "1a2f2014073e9e97f9e1fdd5df4e43b"
              "f19cb2b2679532b6e52ea38480ec4d2ec"
          )
          assert pointer_sha256 == (
              "2de63a9ff5963ea3f72f0051b25a084d"
              "da9e5e609fe79615e55e3f95a1351914"
          )

          Path("/tmp/m9-approval-live-production-pointer.json").write_bytes(
              pointer_bytes
          )
          Path("/tmp/m9-approval-live-production-observation.json").write_text(
              json.dumps(
                  {
                      "status": "passed",
                      "key": "channels/production.json",
                      "release_id": pointer["release_id"],
                      "manifest_sha256": pointer["manifest_sha256"],
                      "pointer_sha256": pointer_sha256,
                      "read_only": True,
                      "production_mutated": False,
                      "mutations_performed": [],
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          print("M9_APPROVAL_LIVE_PRODUCTION_BASELINE_PASSED")
          PY

      - name: Run clean-checkout operator preflight
        run: |
          set -euo pipefail
          python -m knowledge_engine.batch_cli preflight \
            --spec-path "$SPEC_PATH" \
            --registry-path "$REGISTRY_PATH" \
            --production-pointer-path /tmp/m9-approval-live-production-pointer.json \
            --output "$EVIDENCE_DIR/operator-preflight.json"
          cp /tmp/m9-approval-live-production-pointer.json \
            "$EVIDENCE_DIR/live-production-pointer.json"
          cp /tmp/m9-approval-live-production-observation.json \
            "$EVIDENCE_DIR/live-production-observation.json"

      - name: Validate immutable approval contract
        run: |
          set -euo pipefail
          python scripts/validate_production_promotion_approval.py \
            --approval-path "$APPROVAL_PATH" \
            --spec-path "$SPEC_PATH" \
            --request-path "$REQUEST_PATH" \
            --output "$EVIDENCE_DIR/approval-validation.json"

      - name: Run approval regression tests
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_production_promotion_approval.py \
            tests/test_m9_request_spec.py \
            tests/test_m9_planned_batch.py

      - name: Write approval readiness summary
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          def load(path):
              return json.loads(Path(path).read_text(encoding="utf-8"))

          validation = load(
              "evidence/m9-production-approval/approval-validation.json"
          )
          live = load(
              "evidence/m9-production-approval/live-production-observation.json"
          )
          preflight = load(
              "evidence/m9-production-approval/operator-preflight.json"
          )
          request_authorization = load(
              "governed_batches/evidence/m9-001-request-spec-authorization.json"
          )
          lifecycle = load(
              "governed_batches/evidence/m9-001-lifecycle-history.json"
          )

          assert validation["status"] == "approved"
          assert validation["approval_sha256"] == (
              "7eadff0fcda73c968982d6fc58bdaf4f"
              "c82a852f027ff4192730075f8c88b877"
          )
          assert validation["production_dispatch_authorized"] is True
          assert validation["production_mutated"] is False
          assert validation["mutations_performed"] == []
          assert validation["next_action"] == "dispatch_production_promotion"

          assert live["status"] == "passed"
          assert live["read_only"] is True
          assert live["production_mutated"] is False
          assert live["mutations_performed"] == []

          assert preflight["status"] == "ready"
          assert preflight["lifecycle_state"] == "request_spec_committed"
          assert preflight["production_workflow_inputs"] == ["request_path"]
          assert preflight["mutations_performed"] == []

          assert request_authorization["production_promotion_authorized"] is False
          assert lifecycle["final_state"] == "request_spec_committed"
          assert lifecycle["production_mutated"] is False

          summary = {
              "schema_version": "m9-production-promotion-approval-readiness/v1",
              "status": "approved_and_ready_for_dispatch",
              "batch_id": validation["batch_id"],
              "approval_issue": validation["approval_issue"],
              "approval_sha256": validation["approval_sha256"],
              "authorized_by": validation["authorized_by"],
              "authorized_at": validation["authorized_at"],
              "operation_id": validation["operation_id"],
              "request_path": validation["request_path"],
              "request_sha256": validation["request_sha256"],
              "target_release_id": validation["target_release_id"],
              "target_manifest_sha256": validation[
                  "target_manifest_sha256"
              ],
              "expected_previous_release_id": validation[
                  "expected_previous_release_id"
              ],
              "expected_previous_manifest_sha256": validation[
                  "expected_previous_manifest_sha256"
              ],
              "expected_previous_pointer_sha256": validation[
                  "expected_previous_pointer_sha256"
              ],
              "live_production_pointer_sha256": live["pointer_sha256"],
              "lifecycle_state": lifecycle["final_state"],
              "production_workflow_inputs": preflight[
                  "production_workflow_inputs"
              ],
              "production_dispatch_authorized": True,
              "production_dispatched": False,
              "production_mutated": False,
              "permanent_ledger_appended": False,
              "rollback_authorized": False,
              "idempotent_replay_authorized": False,
              "mutations_performed": [],
              "next_action": "dispatch_production_promotion",
          }
          output = Path("evidence/m9-production-approval/summary.json")
          output.write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(summary, indent=2, sort_keys=True))
          print("M9_PRODUCTION_PROMOTION_APPROVAL_PASSED")
          PY

      - name: Upload approval evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m9-production-approval-${{ github.sha }}
          path: evidence/m9-production-approval/
          if-no-files-found: error
          retention-days: 90
