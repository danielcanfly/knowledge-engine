name: M22.6 Offline Controlled Variant Evaluation

on:
  pull_request:
    paths:
      - '.github/workflows/m22-6-offline-evaluation.yml'
      - 'docs/architecture/m22/m22-6-offline-evaluation.md'
      - 'src/knowledge_engine/m22_offline_evaluation.py'
      - 'tests/test_m22_6_offline_evaluation.py'

permissions:
  contents: read

jobs:
  offline-evaluation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -q -e '.[dev]'
      - name: Lint M22.6 scope
        run: >-
          python -m ruff check --output-format concise
          src/knowledge_engine/m22_offline_evaluation.py
          tests/test_m22_6_offline_evaluation.py
      - name: Test M22.1 through M22.6 contracts
        run: >-
          python -m pytest -q
          tests/test_m22_1_reasoning_modes.py
          tests/test_m22_2_activation_decision.py
          tests/test_m22_3_bounded_plan.py
          tests/test_m22_4_execution_trace.py
          tests/test_m22_5_grounded_answer.py
          tests/test_m22_6_offline_evaluation.py
      - name: Prove recommendation and non-rollout boundary
        run: |
          python - <<'PY'
          from knowledge_engine.m22_offline_evaluation import RECOMMENDATIONS

          assert RECOMMENDATIONS == ('promote_candidate', 'hold', 'reject')
          PY
      - name: Scan semantic-judge, rollout, provider, and secret boundary
        run: |
          if grep -nE 'requests|httpx|aiohttp|urllib.request|subprocess|boto3|openai|anthropic|sentence_transformers|raw_query|answer_text|semantic_judge|api_key|token=' \
            src/knowledge_engine/m22_offline_evaluation.py; then
            exit 1
          fi
          test -z "$(find . -type f \( -name '*rollout-decision.json' -o -name '*traffic-allocation.json' \) -print -quit)"
      - name: Compile M22.6 scope
        run: >-
          python -m compileall -q
          src/knowledge_engine/m22_offline_evaluation.py
          tests/test_m22_6_offline_evaluation.py
