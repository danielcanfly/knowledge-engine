name: M25.9A Controlled Pilot Control Plane

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/m25-9-controlled-pilot.yml'
      - 'docs/architecture/m25/m25-9-controlled-pilot-control-plane.md'
      - 'pilot/m25/m25-9*.json'
      - 'schemas/m25-pilot-*.schema.json'
      - 'src/knowledge_engine/m25_controlled_pilot*.py'
      - 'tests/test_m25_9_controlled_pilot.py'

permissions:
  contents: read

jobs:
  controlled-pilot-control-plane:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and accepted M25.8 engineering predecessor
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor b456c0c33efb84df94aa4e4668bdbce22e2d955b HEAD
          python - <<'PY'
          import json
          from pathlib import Path
          gate = json.loads(Path('pilot/m25/m25-8-readiness-gate.json').read_text())
          assert gate['schema_version'] == 'knowledge-engine-m25-8-readiness-gate/v1'
          assert gate['status'] == 'blocked_awaiting_real_approved_source_pr'
          assert gate['source_pr_merge_permitted'] is False
          assert gate['candidate_release_build_permitted'] is False
          assert gate['production_pointer_mutation_permitted'] is False
          assert gate['production_release_mutation_permitted'] is False
          PY
      - name: Install exact dependencies
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'
      - name: Capture M25.9A lint findings
        run: |
          mkdir -p /tmp/m25-9
          python -m ruff check --quiet --output-format=concise \
            src/knowledge_engine/m25_controlled_pilot.py \
            src/knowledge_engine/m25_controlled_pilot_common.py \
            src/knowledge_engine/m25_controlled_pilot_inventory.py \
            src/knowledge_engine/m25_controlled_pilot_run.py \
            src/knowledge_engine/m25_controlled_pilot_cli.py \
            tests/test_m25_9_controlled_pilot.py \
            >/tmp/m25-9/ruff-findings.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: m25-9a-ruff-findings
          path: /tmp/m25-9/ruff-findings.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce clean M25.9A lint
        run: |
          if test -s /tmp/m25-9/ruff-findings.txt; then
            cat /tmp/m25-9/ruff-findings.txt
            exit 1
          fi
      - name: Validate schemas and synthetic fixtures
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import jsonschema
          root = Path('.')
          schemas = {}
          for path in sorted(Path('schemas').glob('m25-pilot-*.schema.json')):
              value = json.loads(path.read_text())
              jsonschema.Draft202012Validator.check_schema(value)
              schemas[path.name] = value
          pairs = [
              ('m25-pilot-inventory-v1.schema.json', 'm25-9-pilot-inventory.synthetic.json'),
              ('m25-pilot-inventory-authority-v1.schema.json', 'm25-9-inventory-authority.synthetic.json'),
              ('m25-pilot-run-evidence-v1.schema.json', 'm25-9a-run-evidence.synthetic.json'),
              ('m25-pilot-run-receipt-v1.schema.json', 'm25-9a-run-receipt.synthetic.json'),
              ('m25-pilot-readiness-gate-v1.schema.json', 'm25-9-readiness-gate.json'),
          ]
          for schema_name, fixture_name in pairs:
              jsonschema.validate(
                  json.loads((root / 'pilot' / 'm25' / fixture_name).read_text()),
                  schemas[schema_name],
              )
          PY
      - name: Test full-population accounting and inherited boundaries
        run: |
          python -m pytest -q \
            tests/test_m25_9_controlled_pilot.py \
            tests/test_m25_8_adoption_release.py \
            tests/test_m25_7_benchmark_closure.py \
            tests/test_m25_7_source_pr_executor.py \
            tests/test_m25_7_source_pr_executor_contracts.py
      - name: Rebuild deterministic gate, inventory and run receipt
        run: |
          mkdir -p /tmp/m25-9
          python -m knowledge_engine.m25_controlled_pilot_cli evaluate-gate \
            --predecessor pilot/m25/m25-8-readiness-gate.json \
            --output /tmp/m25-9/readiness-gate.json \
            >/tmp/m25-9/gate-output.json
          cmp /tmp/m25-9/readiness-gate.json pilot/m25/m25-9-readiness-gate.json
          python -m knowledge_engine.m25_controlled_pilot_cli validate-inventory \
            --inventory pilot/m25/m25-9-pilot-inventory.synthetic.json \
            --output /tmp/m25-9/inventory.json \
            >/tmp/m25-9/inventory-output.json
          python - <<'PY'
          import json
          from pathlib import Path
          assert json.loads(Path('/tmp/m25-9/inventory.json').read_text()) == json.loads(
              Path('pilot/m25/m25-9-pilot-inventory.synthetic.json').read_text()
          )
          PY
          python -m knowledge_engine.m25_controlled_pilot_cli validate-run \
            --evidence pilot/m25/m25-9a-run-evidence.synthetic.json \
            --inventory pilot/m25/m25-9-pilot-inventory.synthetic.json \
            --output /tmp/m25-9/run-receipt.json \
            >/tmp/m25-9/run-output.json
          cmp /tmp/m25-9/run-receipt.json pilot/m25/m25-9a-run-receipt.synthetic.json
      - name: Enforce exact changed-file and protected-mutation boundaries
        run: |
          git fetch --quiet --no-tags origin main
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m25-9-controlled-pilot.yml' \
            'docs/architecture/m25/m25-9-controlled-pilot-control-plane.md' \
            'pilot/m25/m25-9-inventory-authority.synthetic.json' \
            'pilot/m25/m25-9-pilot-inventory.synthetic.json' \
            'pilot/m25/m25-9-readiness-gate.json' \
            'pilot/m25/m25-9a-run-evidence.synthetic.json' \
            'pilot/m25/m25-9a-run-receipt.synthetic.json' \
            'schemas/m25-pilot-inventory-authority-v1.schema.json' \
            'schemas/m25-pilot-inventory-v1.schema.json' \
            'schemas/m25-pilot-readiness-gate-v1.schema.json' \
            'schemas/m25-pilot-run-evidence-v1.schema.json' \
            'schemas/m25-pilot-run-receipt-v1.schema.json' \
            'src/knowledge_engine/m25_controlled_pilot.py' \
            'src/knowledge_engine/m25_controlled_pilot_common.py' \
            'src/knowledge_engine/m25_controlled_pilot_inventory.py' \
            'src/knowledge_engine/m25_controlled_pilot_run.py' \
            'src/knowledge_engine/m25_controlled_pilot_cli.py' \
            'tests/test_m25_9_controlled_pilot.py' | sort)"
          test "$changed" = "$expected"
          ! printf '%s\n' "$changed" | grep -Eq '^(bundle/|provenance/|registry/|reviews/|foundation/|release/|r2/|qdrant/|production/|workers/|channels/)'
      - name: Assemble exact-head evidence
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          paths = [
              Path('pilot/m25/m25-9-readiness-gate.json'),
              Path('pilot/m25/m25-9-pilot-inventory.synthetic.json'),
              Path('pilot/m25/m25-9a-run-evidence.synthetic.json'),
              Path('pilot/m25/m25-9a-run-receipt.synthetic.json'),
          ]
          gate = json.loads(paths[0].read_text())
          receipt = json.loads(paths[3].read_text())
          evidence = {
              'schema_version': 'knowledge-engine-m25-9a-exact-head-evidence/v1',
              'head_sha': os.environ['HEAD_SHA'],
              'workflow_run_id': int(os.environ['GITHUB_RUN_ID']),
              'artifacts': {
                  str(path): hashlib.sha256(path.read_bytes()).hexdigest()
                  for path in paths
              },
              'live_status': gate['status'],
              'synthetic_status': receipt['status'],
              'synthetic_source_count': receipt['source_count'],
              'synthetic_candidate_count': receipt['candidate_count'],
              'full_population_accounted': receipt['full_population_accounted'],
              'hidden_exclusions': receipt['hidden_exclusions'],
              'pilot_execution_permitted': False,
              'source_mutation_permitted': False,
              'production_mutation_permitted': False,
              'm25_9b_authorized': False,
              'm25_9c_authorized': False,
              'm25_10_authorized': False,
          }
          Path('/tmp/m25-9/exact-head-evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n'
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: m25-9a-controlled-pilot-evidence
          path: /tmp/m25-9
          if-no-files-found: error
          retention-days: 30
      - name: Compile M25.9A
        run: |
          python -m compileall -q \
            src/knowledge_engine/m25_controlled_pilot.py \
            src/knowledge_engine/m25_controlled_pilot_common.py \
            src/knowledge_engine/m25_controlled_pilot_inventory.py \
            src/knowledge_engine/m25_controlled_pilot_run.py \
            src/knowledge_engine/m25_controlled_pilot_cli.py \
            tests/test_m25_9_controlled_pilot.py
