name: M26.4 Reconciliation

on:
  pull_request:
    paths:
      - '.github/workflows/m26-4-reconciliation.yml'
      - 'pilot/m26/m26-4-acceptance.json'
      - 'docs/architecture/m26/m26-4-reconciliation.md'
      - 'tests/test_m26_4_reconciliation.py'

permissions:
  contents: read

jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and implementation ancestry
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor ddc5ea7ad2e3a8bb1742a0ebc00ac8e320bf7870 HEAD
          python - <<'PY'
          import json
          from pathlib import Path
          acceptance = json.loads(Path('pilot/m26/m26-4-acceptance.json').read_text())
          assert acceptance['status'] == 'm26_4_provider_mock_replay_privacy_accepted'
          assert acceptance['implementation']['merge_sha'] == 'ddc5ea7ad2e3a8bb1742a0ebc00ac8e320bf7870'
          assert acceptance['implementation']['final_head_sha'] == 'e4155ec6597a1e4d1585ea5a8dd303ff96a40a39'
          assert acceptance['evidence_artifact']['artifact_id'] == 8560942446
          assert acceptance['evidence_artifact']['digest'] == 'sha256:e247b94f9a452c0ea066dc646d3d9c1ce76ed569ac45fc5a919d0951d772782e'
          assert acceptance['issue']['state'] == 'closed'
          assert acceptance['next_stage']['stage_id'] == 'M26.5'
          assert acceptance['next_stage']['live_provider_calls_permitted'] is False
          assert acceptance['next_stage']['production_answer_serving_permitted'] is False
          PY
      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Validate reconciliation contract
        run: |
          python -m ruff check tests/test_m26_4_reconciliation.py
          python -m pytest -q tests/test_m26_4_reconciliation.py tests/test_m26_4_provider_mock.py
      - name: Reject protected mutations
        run: |
          set -euo pipefail
          git diff --name-only origin/main...HEAD | sort > /tmp/changed.txt
          cat /tmp/changed.txt
          cat > /tmp/expected.txt <<'EOF'
          .github/workflows/m26-4-reconciliation.yml
          docs/architecture/m26/m26-4-reconciliation.md
          pilot/m26/m26-4-acceptance.json
          tests/test_m26_4_reconciliation.py
          EOF
          sed -i 's/^          //' /tmp/expected.txt
          diff -u /tmp/expected.txt /tmp/changed.txt
