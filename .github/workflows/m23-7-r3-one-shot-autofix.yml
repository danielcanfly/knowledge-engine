name: M23.7 R3 One-shot Ruff Autofix

on:
  pull_request:
    paths:
      - ".github/workflows/m23-7-r3-one-shot-autofix.yml"

permissions:
  contents: write

jobs:
  autofix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install 'ruff>=0.9,<1'
      - name: Apply bounded Ruff fix and remove temporary workflows
        run: |
          ruff check --fix \
            src/knowledge_engine/m23_7_r3_bounded_live_reobservation.py \
            scripts/m23_7_r3_bounded_live_reobservation.py \
            scripts/m23_7_r3_worker_config.py \
            tests/test_m23_7_r3_bounded_live_reobservation.py
          rm .github/workflows/m23-7-r3-ruff-diagnostic.yml
          rm .github/workflows/m23-7-r3-one-shot-autofix.yml
          git diff --check
      - name: Commit exact autofix to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/knowledge_engine/m23_7_r3_bounded_live_reobservation.py \
            scripts/m23_7_r3_bounded_live_reobservation.py \
            scripts/m23_7_r3_worker_config.py \
            tests/test_m23_7_r3_bounded_live_reobservation.py \
            .github/workflows/m23-7-r3-ruff-diagnostic.yml \
            .github/workflows/m23-7-r3-one-shot-autofix.yml
          git commit -m "fix: apply bounded R3 Ruff cleanup"
          git push origin HEAD:${{ github.head_ref }}
