name: M23.6.2 Qdrant Ingestion Manifest

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_qdrant_pilot_ingestion.py"
      - "src/knowledge_engine/m23_qdrant_pilot_ingestion_cli.py"
      - "tests/test_m23_6_2_qdrant_ingestion_manifest.py"
      - "scripts/m23_6_2_ingestion_acceptance.py"
      - "pilot/m23/m23-6-2-ingestion-contract.json"
      - "schemas/m23-qdrant-ingestion-manifest-v1.schema.json"
      - "docs/architecture/m23-6-2-qdrant-ingestion-manifest.md"
      - "pyproject.toml"
      - ".github/workflows/m23-6-2-qdrant-ingestion-manifest.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingestion-manifest:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Ruff
        run: >-
          ruff check
          src/knowledge_engine/m23_qdrant_pilot_ingestion.py
          src/knowledge_engine/m23_qdrant_pilot_ingestion_cli.py
          tests/test_m23_6_2_qdrant_ingestion_manifest.py
          scripts/m23_6_2_ingestion_acceptance.py
      - name: Targeted 107-row and adversarial tests
        run: pytest -q tests/test_m23_6_2_qdrant_ingestion_manifest.py
      - name: Deterministic contract acceptance
        run: |
          python scripts/m23_6_2_ingestion_acceptance.py \
            --output .artifacts/m23/acceptance-a.json
          python scripts/m23_6_2_ingestion_acceptance.py \
            --output .artifacts/m23/acceptance-b.json
          cmp .artifacts/m23/acceptance-a.json .artifacts/m23/acceptance-b.json
      - name: No-network and no-write surface guard
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path("src/knowledge_engine/m23_qdrant_pilot_ingestion.py"),
              Path("src/knowledge_engine/m23_qdrant_pilot_ingestion_cli.py"),
          ]
          source = "\n".join(path.read_text(encoding="utf-8") for path in paths)
          forbidden = [
              "httpx",
              "requests",
              "urllib.request",
              "socket.",
              "QDRANT_URL",
              "QDRANT_API_KEY",
              "CLOUDFLARE_API_TOKEN",
              "allow-qdrant-write",
          ]
          found = [token for token in forbidden if token in source]
          if found:
              raise SystemExit(f"forbidden network/write surfaces: {found}")
          PY
      - name: Contract authority guard
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          contract = json.loads(
              Path("pilot/m23/m23-6-2-ingestion-contract.json").read_text()
          )
          assert contract["qdrant"]["write_authorized"] is False
          assert contract["qdrant"]["point_count"] == 107
          assert contract["qdrant"]["vector_name"] == "default"
          assert contract["source_membership"]["membership"] == (
              "evaluation-only-pending-proposal"
          )
          assert all(value is False for value in contract["authority"].values())
          assert contract["real_evidence_boundary"][
              "real_dry_run_required_before_m23_6_3"
          ] is True
          PY
