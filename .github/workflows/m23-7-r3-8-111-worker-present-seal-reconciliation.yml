name: M23.7 R3.8.111 Worker-Present Seal Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-111/worker-present-seal-reconciliation-29587564980.json"
      - "docs/architecture/m23-7-r3-8-111-worker-present-seal-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-111-worker-present-seal-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor cd631603c87e77c7761584f222bc1bf353853e07 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib,json
          from pathlib import Path
          p=Path(".github/evidence/m23-7-r3-8-111/worker-present-seal-reconciliation-29587564980.json")
          v=json.loads(p.read_text(encoding="utf-8")); digest=v.pop("reconciliation_sha256")
          assert hashlib.sha256(json.dumps(v,ensure_ascii=False,sort_keys=True,separators=(",",":"),allow_nan=False).encode()).hexdigest()==digest
          assert digest == "0694d6bcf83051ccd7b0aa7e95c09d73426977a249188e0807d272014e2e52ef"
          assert v["seal_pr"] == 810
          assert v["seal_sha256s"] == {"29587564980":"5a3e9b01940acb8b453f4cd3ebfd8622897a1dab9a1f897f1e67103a2480555f"}
          result=v["result"]
          assert result["worker_present_evidence_reconciled"] is True
          assert result["worker_lifecycle_clean"] is False
          assert result["deletion_authorization_next_gate"] is True
          w=v["workers"][0]
          assert w["name"] == "knowledge-engine-r3-8-29587264678"
          assert w["versions"]["identity_count"] == 4
          assert w["deployments"]["identity_count"] == 4
          assert v["authority"]["worker_deletion_authorized"] is False
          assert v["authority"]["fresh_observation_authorized"] is False
          assert v["authority"]["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed={".github/evidence/m23-7-r3-8-111/worker-present-seal-reconciliation-29587564980.json","docs/architecture/m23-7-r3-8-111-worker-present-seal-reconciliation.md",".github/workflows/m23-7-r3-8-111-worker-present-seal-reconciliation.yml"}
          changed=set(subprocess.check_output(["git","diff","--name-only","cd631603c87e77c7761584f222bc1bf353853e07","HEAD"],text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code cd631603c87e77c7761584f222bc1bf353853e07 HEAD --             scripts/m23_7_r3_8_remote_recovery_probe.py             .github/workflows/m23-7-r3-8-9-recovery-probe.yml             scripts/m23_7_r3_8_remote_operator.py             scripts/m23_7_r3_8_remote_delete.py             src/knowledge_engine/m23_7_r3_8_latency_repair.py             workers/m23-7-r3-8-latency-repair/worker.mjs
