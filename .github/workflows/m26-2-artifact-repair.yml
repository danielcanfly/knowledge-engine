name: M26.2 Artifact Identity Repair
on:
  pull_request:
    paths:
      - '.github/workflows/m26-2-artifact-repair.yml'
      - 'scripts/m26_2_repair_artifacts.py'
permissions:
  contents: write
jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Repair exact artifact identities
        env:
          EXPECTED_HEAD: 3cf7c6cc3ab927d0c7e95b4971f48fb0f6651dde
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          python scripts/m26_2_repair_artifacts.py
          git diff --check
          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            'docs/architecture/m26/m26-2-retrieval-envelope.md' \
            'pilot/m26/m26-2-benchmark-cases.json' \
            'pilot/m26/m26-2-contract-registry.json' \
            'pilot/m26/m26-2-entry-contract.json' \
            'pilot/m26/m26-2-retrieval-policy.json' \
            'pilot/m26/m26-2-synthetic-corpus.json' | sort)"
          test "$changed" = "$expected"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add $changed
          git commit -m 'Repair M26.2 artifact identities'
          git push origin "HEAD:$HEAD_BRANCH"
