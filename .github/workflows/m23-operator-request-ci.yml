name: M23 Operator Request Validation

on:
  pull_request:
    paths:
      - "operator_requests/m23/**"

permissions:
  contents: read

jobs:
  validate-request:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact request PR head and base ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          git merge-base --is-ancestor \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

      - name: Validate single immutable request and authorization
        id: request
        shell: bash
        run: |
          set -euo pipefail
          python -m scripts.m23_operator_request_bus \
            --repo-root . \
            --before "${{ github.event.pull_request.base.sha }}" \
            --after "${{ github.event.pull_request.head.sha }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Verify request-only PR scope against exact base SHA
        shell: bash
        env:
          REQUEST_PATH: ${{ steps.request.outputs.request_path }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          import subprocess

          hex40 = re.compile(r"^[0-9a-f]{40}$")
          base = os.environ["BASE_SHA"]
          head = os.environ["HEAD_SHA"]
          request_path = os.environ["REQUEST_PATH"]
          assert hex40.fullmatch(base), base
          assert hex40.fullmatch(head), head
          assert base != head
          actual = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          assert actual == head, (actual, head)
          subprocess.run(
              ["git", "merge-base", "--is-ancestor", base, head],
              check=True,
          )
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", base, head],
              text=True,
          ).splitlines()
          assert changed == [request_path], changed
          PY

      - name: Verify request grants no new authority
        shell: bash
        env:
          AUTHORIZATION_PATH: ${{ steps.request.outputs.authorization_path }}
          COMMAND_TYPE: ${{ steps.request.outputs.command_type }}
        run: |
          set -euo pipefail
          test "$COMMAND_TYPE" = "r3_8_post_delete_recovery"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          value = json.loads(
              Path(os.environ["AUTHORIZATION_PATH"]).read_text(encoding="utf-8")
          )
          authority = value["authority"]
          assert authority["control_plane_read_authorized"] is True
          for key, enabled in authority.items():
              if key != "control_plane_read_authorized":
                  assert enabled is False, (key, enabled)
          PY
