name: M23 Operator Request And Permit Validation

on:
  pull_request:
    paths:
      - "operator_requests/m23/**"
      - "operator_permits/m23/**"

permissions:
  contents: read

jobs:
  validate-request-permit:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'huaihsuanbusiness'
    runs-on: ubuntu-24.04
    outputs:
      stage: ${{ steps.operator.outputs.stage }}
      request_path: ${{ steps.operator.outputs.request_path }}
      request_sha256: ${{ steps.operator.outputs.request_sha256 }}
      permit_path: ${{ steps.operator.outputs.permit_path }}
      permit_sha256: ${{ steps.operator.outputs.permit_sha256 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact same-repository request head and base ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          test "${{ github.event.pull_request.head.repo.full_name }}" = "$GITHUB_REPOSITORY"
          test "${{ github.event.pull_request.user.login }}" = "huaihsuanbusiness"
          git merge-base --is-ancestor \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

      - name: Validate immutable request and optional execution permit
        id: operator
        shell: bash
        run: |
          set -euo pipefail
          python -m scripts.m23_operator_pr_permit \
            --repo-root . \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Verify validated stage grants no unbound authority
        shell: bash
        env:
          STAGE: ${{ steps.operator.outputs.stage }}
          REQUEST_PATH: ${{ steps.operator.outputs.request_path }}
          PERMIT_PATH: ${{ steps.operator.outputs.permit_path }}
          AUTHORIZATION_PATH: ${{ steps.operator.outputs.authorization_path }}
          COMMAND_TYPE: ${{ steps.operator.outputs.command_type }}
        run: |
          set -euo pipefail
          case "$COMMAND_TYPE" in
            r3_8_post_delete_recovery|r3_live_reobservation) ;;
            *) exit 23 ;;
          esac
          case "$STAGE" in
            request_validated)
              test -n "$REQUEST_PATH"
              test -z "$PERMIT_PATH"
              ;;
            execution_permitted)
              test -n "$REQUEST_PATH"
              test -n "$PERMIT_PATH"
              ;;
            *) exit 23 ;;
          esac
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          value = json.loads(
              Path(os.environ["AUTHORIZATION_PATH"]).read_text(encoding="utf-8")
          )
          authority = value["authority"]
          if value["command_type"] == "r3_8_post_delete_recovery":
              assert authority["control_plane_read_authorized"] is True
              for key, enabled in authority.items():
                  if key != "control_plane_read_authorized":
                      assert enabled is False, (key, enabled)
          else:
              assert value["command_type"] == "r3_live_reobservation"
              assert authority["control_plane_read_authorized"] is True
              assert authority["worker_deploy_authorized"] is True
              assert authority["worker_secret_mutation_authorized"] is True
              assert authority["worker_route_invocation_authorized"] is True
              assert authority["worker_delete_authorized"] is True
              assert authority["qdrant_read_authorized"] is True
              for key in (
                  "qdrant_mutation_authorized",
                  "r2_read_authorized",
                  "r2_mutation_authorized",
                  "pointer_mutation_authorized",
                  "source_mutation_authorized",
                  "blocker_clearance_authorized",
                  "parent_closure_authorized",
                  "m23_7_closure_authorized",
              ):
                  assert authority[key] is False, (key, authority[key])
          PY
