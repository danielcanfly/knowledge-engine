name: M23.7 R3.8 Remote Worker Deletion

on:
  workflow_dispatch:
    inputs:
      expected_head:
        description: Exact main SHA containing the committed deletion authorization
        required: true
        type: string
      authorization_path:
        description: Committed deletion authorization JSON path
        required: true
        type: string
      confirmation:
        description: Enter DELETE_RECONCILED_R3_8_WORKER
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: m23-7-r3-8-remote-deletion
  cancel-in-progress: false

jobs:
  delete:
    runs-on: ubuntu-24.04
    environment: m23-r3-diagnostic
    timeout-minutes: 15
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      EVIDENCE_DIR: r3-8-deletion-evidence
    steps:
      - name: Reject rerun attempts and unconfirmed deletion
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$GITHUB_REF" = "refs/heads/main"
          test "${{ inputs.confirmation }}" = "DELETE_RECONCILED_R3_8_WORKER"
          case "${{ inputs.authorization_path }}" in
            deletion_authorizations/m23-7/r3-8/*.json) ;;
            *) echo "invalid_authorization_path"; exit 23 ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_head }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact accepted main head and authorization file
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ inputs.expected_head }}"
          test "$GITHUB_SHA" = "${{ inputs.expected_head }}"
          test -f "${{ inputs.authorization_path }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install exact Engine and validate Wrangler deletion surface
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .
          test "$(npx --yes wrangler@4.111.0 --version | tr -d '\r')" = "4.111.0"
          npx --yes wrangler@4.111.0 delete --help > wrangler-delete-help.txt
          grep -Eq 'wrangler delete[[:space:]]+\[name\]' wrangler-delete-help.txt
          grep -q -- '--force' wrangler-delete-help.txt
          ! grep -q -- '--name' wrangler-delete-help.txt
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import build_delete_command

          worker = "knowledge-engine-r3-8-29506217284"
          command = build_delete_command(worker, Path("wrangler.delete.test.jsonc"))
          assert command[3:5] == ["delete", worker]
          assert "--name" not in command
          assert command[-1] == "--force"
          PY

      - name: Delete only the independently reconciled diagnostic Worker
        id: deletion
        shell: bash
        run: |
          set +e
          python -m scripts.m23_7_r3_8_remote_delete \
            --authorization-path "${{ inputs.authorization_path }}" \
            --expected-head "${{ inputs.expected_head }}" \
            --confirmation "${{ inputs.confirmation }}" \
            --output-dir "$EVIDENCE_DIR"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload deletion evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m23-7-r3-8-deletion-${{ github.run_id }}
          path: r3-8-deletion-evidence/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30
          compression-level: 9

      - name: Return deletion result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          code="${{ steps.deletion.outputs.exit_code }}"
          case "$code" in
            0) exit 0 ;;
            *) exit 23 ;;
          esac
