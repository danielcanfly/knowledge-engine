name: M9 Candidate Evidence Audit

on:
  pull_request:
    paths:
      - ".github/workflows/m9-candidate-evidence-audit.yml"

permissions:
  contents: read
  issues: read
  actions: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Collect exact M9 candidate evidence
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: 2126db2ed4d372d3d61464fe31a86fc0243a1f24
          SOURCE_REPOSITORY: danielcanfly/knowledge-source
          ENGINE_REPOSITORY: danielcanfly/knowledge-engine
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/extracted
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import traceback
          import urllib.request
          import zipfile
          from pathlib import Path

          evidence = Path("evidence")
          token = os.environ["GH_TOKEN"]
          source_sha = os.environ["SOURCE_SHA"]
          source_repository = os.environ["SOURCE_REPOSITORY"]
          engine_repository = os.environ["ENGINE_REPOSITORY"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "m9-candidate-evidence-audit",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def get_json(url: str):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=60) as response:
                  return json.load(response)

          def download(url: str, path: Path) -> None:
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=120) as response:
                  path.write_bytes(response.read())

          try:
              comments = get_json(
                  f"https://api.github.com/repos/{engine_repository}/issues/13/comments?per_page=100"
              )
              matches = [
                  item
                  for item in comments
                  if source_sha in item.get("body", "")
                  and "Source candidate dispatch:" in item.get("body", "")
              ]
              if len(matches) != 1:
                  raise RuntimeError(
                      f"expected one M9 candidate comment, found {len(matches)}"
                  )
              comment = matches[0]
              body = comment["body"]
              evidence.joinpath("evidence-comment.md").write_text(body + "\n")
              evidence.joinpath("evidence-comment.json").write_text(
                  json.dumps(comment, indent=2, sort_keys=True) + "\n"
              )

              fields = dict(
                  re.findall(r"^- ([^:]+): `([^`]*)`$", body, flags=re.MULTILINE)
              )
              run_match = re.search(
                  r"^- Actions run: .*/actions/runs/(\d+)$",
                  body,
                  re.MULTILINE,
              )
              if run_match is None:
                  raise RuntimeError("candidate evidence comment has no Actions run ID")
              candidate_run_id = int(run_match.group(1))
              validation_run_id = int(fields["Source validation run ID"])

              validation_run = get_json(
                  f"https://api.github.com/repos/{source_repository}/actions/runs/{validation_run_id}"
              )
              candidate_run = get_json(
                  f"https://api.github.com/repos/{engine_repository}/actions/runs/{candidate_run_id}"
              )
              jobs_payload = get_json(
                  f"https://api.github.com/repos/{engine_repository}/actions/runs/{candidate_run_id}/jobs?per_page=100"
              )
              artifacts_payload = get_json(
                  f"https://api.github.com/repos/{engine_repository}/actions/runs/{candidate_run_id}/artifacts?per_page=100"
              )

              evidence.joinpath("source-validation-run-api.json").write_text(
                  json.dumps(validation_run, indent=2, sort_keys=True) + "\n"
              )
              evidence.joinpath("candidate-run-api.json").write_text(
                  json.dumps(candidate_run, indent=2, sort_keys=True) + "\n"
              )
              evidence.joinpath("candidate-jobs-api.json").write_text(
                  json.dumps(jobs_payload, indent=2, sort_keys=True) + "\n"
              )
              evidence.joinpath("candidate-artifacts-api.json").write_text(
                  json.dumps(artifacts_payload, indent=2, sort_keys=True) + "\n"
              )

              artifact_name = f"source-candidate-{source_sha}"
              candidates = [
                  item
                  for item in artifacts_payload.get("artifacts", [])
                  if item.get("name") == artifact_name
              ]
              if len(candidates) != 1:
                  raise RuntimeError(
                      f"expected one candidate artifact, found {len(candidates)}"
                  )
              artifact = candidates[0]
              zip_path = evidence / "candidate-artifact.zip"
              download(
                  f"https://api.github.com/repos/{engine_repository}/actions/artifacts/{artifact['id']}/zip",
                  zip_path,
              )
              zip_sha256 = hashlib.sha256(zip_path.read_bytes()).hexdigest()
              with zipfile.ZipFile(zip_path) as archive:
                  archive.extractall(evidence / "extracted")
                  names = sorted(archive.namelist())

              discovery = {
                  "schema_version": "m9-candidate-evidence-discovery/v1",
                  "status": "collected",
                  "source_sha": source_sha,
                  "comment_id": comment["id"],
                  "comment_fields": fields,
                  "source_validation_run_id": validation_run_id,
                  "candidate_run_id": candidate_run_id,
                  "candidate_artifact_id": artifact["id"],
                  "candidate_artifact_name": artifact["name"],
                  "candidate_artifact_digest": artifact.get("digest"),
                  "candidate_artifact_zip_sha256": zip_sha256,
                  "candidate_artifact_files": names,
              }
              evidence.joinpath("discovery.json").write_text(
                  json.dumps(discovery, indent=2, sort_keys=True) + "\n"
              )
              print(json.dumps(discovery, indent=2, sort_keys=True))
              print("M9_CANDIDATE_EVIDENCE_COLLECTED")
          except Exception:
              evidence.joinpath("audit-error.txt").write_text(traceback.format_exc())
              raise
          PY

      - name: Upload M9 candidate audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m9-candidate-evidence-audit-${{ github.sha }}
          path: evidence/
          if-no-files-found: error
          retention-days: 90
