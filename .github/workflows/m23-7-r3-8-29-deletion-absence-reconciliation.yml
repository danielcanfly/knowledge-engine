name: M23.7 R3.8.29 Deletion/Absence Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-29/deletion-absence-reconciliation-29606750152.json"
      - ".github/evidence/m23-7-r3-8-29/deletion-absence-reconciliation-29609464264.json"
      - ".github/evidence/m23-7-r3-8-29/deletion-absence-reconciliation-29612149139.json"
      - "docs/architecture/m23-7-r3-8-29-deletion-absence-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-29-deletion-absence-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 8256251b9177bb98e91fa45acb6e5af922f9a405 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic deletion/absence reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-29/deletion-absence-reconciliation-29612149139.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "49e3a143407f4edcd1e45008c52e5d815b97530e1a21ed5656d372202a2507cf"
          assert value["issue"] is None
          assert value["seal_issue"] is None
          assert value["seal_pr"] == 883
          assert value["seal_accepted_head"] == "664492dbf9fc45af92ff64b95d2600ba21d17c6c"
          assert value["seal_merge_sha"] == "8256251b9177bb98e91fa45acb6e5af922f9a405"
          assert value["seal_sha256"] == "62b91ac51b0fd12ab24f7ac1ed8e5b68cdb4357790619f60d9ee2412029d332f"
          assert value["seal_exact_head_runs"] == {
              "architecture_canon": 29612343548,
              "ci": 29612343598,
              "graph_v2": 29612343583,
              "seal": 29612343580,
          }
          result = value["result"]
          assert result["worker_lifecycle_clean"] is True
          assert result["retained_worker_cleanup_complete"] is True
          assert result["worker_state"] == "worker_absent"
          assert result["deletion_dispatch_reconciled"] is True
          assert result["post_delete_absence_reconciled"] is True
          assert result["next_gate"] == "latency_root_cause_repair_and_fresh_observation"
          assert result["blocker_clearance_eligible"] is False
          assert result["production_retrieval"] == "lexical"
          evidence = value["sealed_evidence"]
          assert evidence["deletion"]["run_id"] == "29612072321"
          assert evidence["deletion"]["worker_delete_dispatched"] is True
          assert evidence["deletion"]["failure_code"] == "delete_absence_not_proven"
          assert evidence["deletion"]["failure_self_digest"] == "ab89c76649db466d6e0b306734dfe806ae93adf01bf7229fa9ed5bded19c893e"
          assert evidence["post_delete_probe"]["run_id"] == "29612149139"
          assert evidence["post_delete_probe"]["worker_state"] == "worker_absent"
          assert evidence["post_delete_probe"]["receipt_self_digest"] == "f1242b29bb7b0c2d61df2b238e34240292d7e20a50c370b5ae359ffb64f57a6b"
          authority = value["authority"]
          assert authority["evidence_reconciliation_only"] is True
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          assert authority["worker_deletion_replay_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-29/deletion-absence-reconciliation-29612149139.json",
              "docs/architecture/m23-7-r3-8-29-deletion-absence-reconciliation.md",
              ".github/workflows/m23-7-r3-8-29-deletion-absence-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "8256251b9177bb98e91fa45acb6e5af922f9a405", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 8256251b9177bb98e91fa45acb6e5af922f9a405 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
