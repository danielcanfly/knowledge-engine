name: M23.7 R3.8.9 Recovery Schema Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-9/recovery-schema-reconciliation.json"
      - "docs/architecture/m23-7-r3-8-9-recovery-schema-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-9-recovery-schema-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and schema implementation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 500d61c3b05385d7fd05ec976fa6bf54043bdf77 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          path = Path(".github/evidence/m23-7-r3-8-9/recovery-schema-reconciliation.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "6c1d07a5fa213fd04baa35adbeefddc14b2008a61ae2e1c9346aa3543f90a04d"
          assert value["implementation"]["accepted_head"] == "e4b7a7e9d17b0945284c90ec11ef21981cadc485"
          assert value["implementation"]["merge_sha"] == "500d61c3b05385d7fd05ec976fa6bf54043bdf77"
          assert len(value["implementation"]["changed_files"]) == 7
          assert value["schema"]["versions_collection"] == "result.items"
          assert value["schema"]["deployments_collection"] == "result.deployments"
          assert value["schema"]["successful_empty"] == "absent"
          assert value["schema"]["successful_valid_nonempty"] == "present"
          assert value["execution"]["live_probe_executed"] is False
          assert value["execution"]["one_probe_authorized_after_reconciliation"] is True
          assert value["authority"]["production_retrieval"] == "lexical"
          assert value["authority"]["maximum_worker_internal_shadow_ms"] == 1200
          assert value["authority"]["blockers_cleared"] is False
          assert all(flag is False for flag in value["strict_zero"].values())
          PY
      - name: Verify reconciliation scope and schema preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-9/recovery-schema-reconciliation.json",
              "docs/architecture/m23-7-r3-8-9-recovery-schema-reconciliation.md",
              ".github/workflows/m23-7-r3-8-9-recovery-schema-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "500d61c3b05385d7fd05ec976fa6bf54043bdf77", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 500d61c3b05385d7fd05ec976fa6bf54043bdf77 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            tests/test_m23_7_r3_8_remote_recovery_probe.py \
            pilot/m23/m23-7-r3-8-9-recovery-schema-contract.json \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml
      - name: Verify next gate is exactly one read-only probe
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path(
              ".github/evidence/m23-7-r3-8-9/recovery-schema-reconciliation.json"
          ).read_text(encoding="utf-8"))
          assert value["execution"] == {
              "confirmation": "PROBE_R3_8_RUN_29506217284_SCHEMA_V2",
              "live_probe_executed": False,
              "one_probe_authorized_after_reconciliation": True,
              "worker_name": "knowledge-engine-r3-8-29506217284",
              "workflow": "M23.7 R3.8.9 Recovery Probe",
          }
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["worker_deletion_authorized"] is False
          PY
