name: M23.7 R3.8.17 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-17/worker-present-recovery-seal-29546964620.json"
      - "docs/architecture/m23-7-r3-8-17-worker-present-recovery-seal.md"
      - ".github/workflows/m23-7-r3-8-17-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 68451fca29213a836c6b90fa68580cd509ab0d05 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-17/worker-present-recovery-seal-29546964620.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(
              value,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "c7c98843d4016aa32c34b5793d7524b8f651c426d20dde104ea7d8795d6d7ca5"
          assert value["seal_issue"] == 634
          assert value["recovery_run_id"] == "29546964620"
          assert value["artifact"]["artifact_id"] == 8394336348
          assert value["artifact"]["zip_sha256"] == "9c08427eeb35bbf6ebc9838c100d30e0d664fb07adce6fd6d92f4ca5b607536f"
          assert value["artifact"]["receipt_file_sha256"] == "4527aeac77d458e30184a0fbf64f05af772f7c36006a02713690619fd7e59c7a"
          assert value["artifact"]["receipt_self_digest"] == "2262aaf3dacf7d964b7dc07f408aa391b5ab28f977bb7d5a17911221a4b28c55"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_read_only_recovery_probe"
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29546336917"
          assert receipt["affected_run_id"] == "29546336917"
          assert receipt["affected_engine_sha"] == "b6c60752741b7079d93b25ddbe16a6582f9db966"
          assert receipt["probe_engine_sha"] == "68451fca29213a836c6b90fa68580cd509ab0d05"
          assert receipt["recovery_probe_sha256"] == "2262aaf3dacf7d964b7dc07f408aa391b5ab28f977bb7d5a17911221a4b28c55"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          assert len(set(receipt["versions"]["identities"])) == 4
          assert len(set(receipt["deployments"]["identities"])) == 4
          assert receipt["production_retrieval"] == "lexical"
          assert receipt["blockers_cleared"] is False
          for field in (
              "worker_delete_dispatched",
              "worker_deploy_dispatched",
              "worker_route_invoked",
              "worker_secret_mutation_dispatched",
              "qdrant_read_dispatched",
              "qdrant_mutation_dispatched",
              "r2_read_dispatched",
              "r2_mutation_dispatched",
              "protected_mutations_dispatched",
          ):
              assert receipt[field] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-17/worker-present-recovery-seal-29546964620.json",
              "docs/architecture/m23-7-r3-8-17-worker-present-recovery-seal.md",
              ".github/workflows/m23-7-r3-8-17-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "68451fca29213a836c6b90fa68580cd509ab0d05", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 68451fca29213a836c6b90fa68580cd509ab0d05 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
      - name: Verify authority remains sealed
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path(
              ".github/evidence/m23-7-r3-8-17/worker-present-recovery-seal-29546964620.json"
          ).read_text(encoding="utf-8"))
          authority = value["authority"]
          assert authority["evidence_seal_only"] is True
          for field in (
              "fresh_observation_authorized",
              "worker_deletion_authorized",
              "worker_deploy_authorized",
              "worker_secret_mutation_authorized",
              "qdrant_mutation_authorized",
              "r2_mutation_authorized",
              "source_mutation_authorized",
              "blocker_clearance_authorized",
              "parent_closure_authorized",
              "m23_7_closure_authorized",
          ):
              assert authority[field] is False
          PY
