name: M21.1 Blog Inventory

on:
  pull_request:
    paths:
      - '.github/workflows/m21-1-blog-inventory.yml'
      - 'docs/architecture/m21/m21-1-blog-inventory.md'
      - 'src/knowledge_engine/m21_blog_inventory.py'
      - 'tests/test_m21_1_blog_inventory.py'

permissions:
  contents: read

jobs:
  blog-inventory:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint M21.1 scope
        run: python -m ruff check src/knowledge_engine/m21_blog_inventory.py tests/test_m21_1_blog_inventory.py
      - name: Test M20 and M21.1 contracts
        run: >-
          python -m pytest -q
          tests/test_m20_1_embedding_contract.py
          tests/test_m20_2_semantic_artifacts.py
          tests/test_m20_3_runtime_semantic.py
          tests/test_m20_4_retrieval_modes.py
          tests/test_m20_5_hybrid_fusion.py
          tests/test_m20_6_lexical_enrichment.py
          tests/test_m20_7_phase_c_acceptance.py
          tests/test_m21_1_blog_inventory.py
      - name: Prove deterministic evidence-only inventory
        run: |
          python - <<'PY'
          from knowledge_engine.m21_blog_inventory import build_inventory_snapshot
          identity = {
              'engine_sha': 'e' * 40,
              'source_sha': 's' * 40,
              'foundation_sha': 'f' * 40,
              'captured_at': '2026-07-13T16:00:00Z',
          }
          item = {
              'canonical_url': 'https://www.danielcanfly.com/blog/example',
              'language': 'en',
              'slug': 'example',
              'series': None,
              'part': None,
              'published_at': None,
              'modified_at': None,
              'content_sha256': 'a' * 64,
              'source_kind': 'repository_markdown',
              'locator': 'content/en/example.md',
              'redirects': [],
              'translated_counterpart': None,
              'access_status': 'available',
              'intake_status': 'captured',
              'ownership_basis': 'first-party',
              'audience': 'public',
          }
          allowed = {'www.danielcanfly.com'}
          first = build_inventory_snapshot(identity, [item], allowed_hosts=allowed)
          second = build_inventory_snapshot(identity, [item], allowed_hosts=allowed)
          assert first == second
          assert first['authority'] == 'evidence_only'
          assert first['production_authority'] is False
          PY
      - name: Scan authority and dependency boundary
        run: |
          ! grep -R -nE 'requests|httpx|aiohttp|urllib.request|subprocess|boto3|r2|production_pointer' \
            src/knowledge_engine/m21_blog_inventory.py
          ! find . -name '*.f32' -o -name '*inventory.json'
      - name: Compile M21.1 scope
        run: python -m compileall -q src/knowledge_engine/m21_blog_inventory.py tests/test_m21_1_blog_inventory.py
