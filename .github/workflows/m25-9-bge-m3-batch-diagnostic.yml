name: M25.9 BGE-M3 Batch Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-bge-m3-batch-diagnostic.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-bge-m3-batch-diagnostic.yml'

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 20
          show-progress: false
      - name: Verify one-file inference-only boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-bge-m3-batch-diagnostic.yml
          grep -q "BATCH_SIZE = 25" .github/workflows/m25-9-bge-m3-batch-diagnostic.yml
          grep -q "external_storage_mutations': 0" \
            .github/workflows/m25-9-bge-m3-batch-diagnostic.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-bge-m3-batch-diagnostic.yml'
          fi

  diagnose:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: m23-r3-diagnostic
    env:
      GH_TOKEN: ${{ github.token }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DIAGNOSTIC_DIR: /tmp/m25-9-bge-m3-batch-diagnostic
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify fresh exact-SHA attempt-1 authority
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_AI_TOKEN"
          git merge-base --is-ancestor 9f21f687ea513ed17be01a51beac1e89b12d7bfc HEAD
          mkdir -p "$DIAGNOSTIC_DIR"
      - name: Install runtime dependencies
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'
      - name: Scan full BGE-M3 population in inference-only batches
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.parse
          from pathlib import Path

          import httpx

          from knowledge_engine import m25_blog_live_candidate as candidate

          BATCH_SIZE = 25
          output_dir = Path(os.environ['DIAGNOSTIC_DIR'])
          pack_root = output_dir / 'source-pack'
          work_root = output_dir / 'candidate-preview'
          candidate.materialize_pack(pack_root, os.environ.get('GITHUB_TOKEN'))
          _, context = candidate.build_candidate_release(
              pack_root,
              work_root,
              os.environ['GITHUB_SHA'],
          )
          rows = context['semantic_inputs']
          if not isinstance(rows, list) or len(rows) != 4197:
              raise SystemExit('semantic population drift')
          texts = [str(row['text']) for row in rows]

          account = urllib.parse.quote(os.environ['CLOUDFLARE_ACCOUNT_ID'], safe='')
          model = '@cf/baai/bge-m3'
          url = f'https://api.cloudflare.com/client/v4/accounts/{account}/ai/run/{model}'
          headers = {
              'Authorization': f"Bearer {os.environ['CLOUDFLARE_AI_TOKEN']}",
              'Accept': 'application/json',
              'Content-Type': 'application/json',
              'User-Agent': 'knowledge-engine-m25.9-bge-m3-population-scan/1',
          }

          def sanitized_message(value):
              if not isinstance(value, str):
                  return None
              value = re.sub(r'https?://\S+', '<redacted-url>', value)
              value = re.sub(r'\b[0-9a-fA-F]{32,64}\b', '<redacted-hex>', value)
              return value[:500]

          def probe(client, label, indexes):
              selected = [texts[index] for index in indexes]
              encoded = json.dumps(
                  {'text': selected},
                  ensure_ascii=False,
                  separators=(',', ':'),
              ).encode()
              try:
                  response = client.post(url, headers=headers, content=encoded)
                  status = response.status_code
                  raw = response.content
                  network_error = None
              except Exception as exc:
                  return {
                      'label': label,
                      'start_index': indexes[0],
                      'stop_index_exclusive': indexes[-1] + 1,
                      'text_count': len(selected),
                      'request_bytes': len(encoded),
                      'total_characters': sum(len(text) for text in selected),
                      'maximum_characters': max(map(len, selected)),
                      'http_status': None,
                      'cloudflare_success': False,
                      'network_error_category': type(exc).__name__,
                      'network_error_message': sanitized_message(str(exc)),
                      'raw_response_recorded': False,
                  }
              try:
                  payload = json.loads(raw.decode('utf-8'))
              except Exception:
                  payload = None
              success = payload.get('success') if isinstance(payload, dict) else None
              errors = payload.get('errors') if isinstance(payload, dict) else None
              first_error = errors[0] if isinstance(errors, list) and errors else None
              result = payload.get('result') if isinstance(payload, dict) else None
              data = result.get('data') if isinstance(result, dict) else None
              shape = result.get('shape') if isinstance(result, dict) else None
              passed = (
                  status == 200
                  and success is True
                  and isinstance(data, list)
                  and len(data) == len(selected)
                  and shape == [len(selected), 1024]
              )
              return {
                  'label': label,
                  'start_index': indexes[0],
                  'stop_index_exclusive': indexes[-1] + 1,
                  'text_count': len(selected),
                  'request_bytes': len(encoded),
                  'total_characters': sum(len(text) for text in selected),
                  'maximum_characters': max(map(len, selected)),
                  'maximum_utf8_bytes': max(len(text.encode('utf-8')) for text in selected),
                  'http_status': status,
                  'cloudflare_success': success,
                  'cloudflare_error_code': (
                      first_error.get('code') if isinstance(first_error, dict) else None
                  ),
                  'cloudflare_error_message': sanitized_message(
                      first_error.get('message') if isinstance(first_error, dict) else None
                  ),
                  'embedding_rows': len(data) if isinstance(data, list) else None,
                  'reported_shape': shape if isinstance(shape, list) else None,
                  'network_error_category': network_error,
                  'response_bytes': len(raw),
                  'response_sha256': hashlib.sha256(raw).hexdigest(),
                  'passed': passed,
                  'raw_response_recorded': False,
              }

          lengths = [len(text) for text in texts]
          ordered = sorted(range(len(texts)), key=lambda index: lengths[index])
          representative_indexes = {
              'shortest': ordered[0],
              'median': ordered[len(ordered) // 2],
              'longest': ordered[-1],
          }
          batch_records = []
          failing_batch = None
          individual_records = []

          with httpx.Client(timeout=180.0) as client:
              representative_records = [
                  probe(client, f'single_{label}', [index])
                  for label, index in representative_indexes.items()
              ]
              for start in range(0, len(texts), BATCH_SIZE):
                  stop = min(start + BATCH_SIZE, len(texts))
                  indexes = list(range(start, stop))
                  record = probe(client, f'batch_{start}_{stop - 1}', indexes)
                  batch_records.append(record)
                  print(json.dumps({
                      'label': record['label'],
                      'http_status': record.get('http_status'),
                      'passed': record.get('passed'),
                      'error_code': record.get('cloudflare_error_code'),
                  }, sort_keys=True), flush=True)
                  if record.get('passed') is not True:
                      failing_batch = record
                      for index in indexes:
                          individual_records.append(
                              probe(client, f'individual_{index}', [index])
                          )
                      break

          failed_representatives = [
              record for record in representative_records
              if record.get('passed') is not True
          ]
          failed_individuals = [
              record for record in individual_records
              if record.get('passed') is not True
          ]
          scanned_documents = sum(record['text_count'] for record in batch_records)

          if failed_representatives:
              classification = 'representative_single_input_failure'
          elif failing_batch is None and scanned_documents == len(texts):
              classification = 'all_4197_inputs_pass_at_batch_25'
          elif failed_individuals:
              classification = 'specific_input_failure'
          elif failing_batch is not None:
              classification = 'aggregate_batch_failure_at_25'
          else:
              classification = 'population_scan_incomplete'

          evidence = {
              'schema_version': 'knowledge-engine-m25-9-bge-m3-population-scan/v1',
              'engine_sha': os.environ['GITHUB_SHA'],
              'workflow_run_id': os.environ['GITHUB_RUN_ID'],
              'workflow_run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'source_sha': candidate.SOURCE_SHA,
              'model': model,
              'batch_size': BATCH_SIZE,
              'semantic_document_count': len(texts),
              'scanned_document_count': scanned_documents,
              'batch_request_count': len(batch_records),
              'individual_request_count': len(individual_records),
              'representative_indexes': representative_indexes,
              'text_character_distribution': {
                  'minimum': min(lengths),
                  'median': sorted(lengths)[len(lengths) // 2],
                  'maximum': max(lengths),
                  'total': sum(lengths),
              },
              'classification': classification,
              'representative_records': representative_records,
              'failing_batch': failing_batch,
              'failed_individuals': failed_individuals,
              'batch_records': batch_records,
              'inference_requests_only': True,
              'external_storage_mutations': 0,
              'qdrant_requests': 0,
              'r2_requests': 0,
              'worker_mutations': 0,
              'pages_mutations': 0,
              'production_pointer_mutations': 0,
              'public_traffic_mutations': 0,
              'secret_values_recorded': False,
              'authorization_headers_recorded': False,
              'raw_response_bodies_recorded': False,
          }
          evidence['evidence_sha256'] = hashlib.sha256(
              json.dumps(evidence, sort_keys=True, separators=(',', ':')).encode()
          ).hexdigest()
          path = output_dir / 'bge-m3-population-scan.json'
          path.write_text(json.dumps(evidence, indent=2, sort_keys=True) + '\n')
          print(json.dumps({
              'classification': classification,
              'scanned_document_count': scanned_documents,
              'batch_request_count': len(batch_records),
              'failed_individual_indexes': [
                  record['start_index'] for record in failed_individuals
              ],
              'external_storage_mutations': 0,
          }, sort_keys=True))
          PY
      - name: Upload sanitized diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-bge-m3-population-scan-${{ github.sha }}
          path: /tmp/m25-9-bge-m3-batch-diagnostic/bge-m3-population-scan.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish diagnostic result
        if: always()
        run: |
          set -euo pipefail
          evidence="$DIAGNOSTIC_DIR/bge-m3-population-scan.json"
          classification='evidence_unavailable'
          scanned='0'
          if test -s "$evidence"; then
            classification="$(jq -r '.classification' "$evidence")"
            scanned="$(jq -r '.scanned_document_count' "$evidence")"
          fi
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-bge-m3-population-scan' \
            -f description="run $GITHUB_RUN_ID a$GITHUB_RUN_ATTEMPT $classification" \
            -f target_url="$run_url" >/dev/null
          gh issue comment 1092 \
            --repo "$GITHUB_REPOSITORY" \
            --body "M25.9 BGE-M3 full-population inference-only scan completed at exact SHA \`$GITHUB_SHA\`, run \`$GITHUB_RUN_ID\`, attempt \`$GITHUB_RUN_ATTEMPT\`: \`$classification\`; scanned \`$scanned/4197\`. Qdrant, R2, deployment, production-pointer and public-traffic mutations: \`0\`."
