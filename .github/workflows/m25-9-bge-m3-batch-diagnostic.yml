name: M25.9 BGE-M3 Batch Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-bge-m3-batch-diagnostic.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-bge-m3-batch-diagnostic.yml'

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 20
          show-progress: false
      - name: Verify one-file diagnostic boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-bge-m3-batch-diagnostic.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-bge-m3-batch-diagnostic.yml'
          fi

  diagnose:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: m23-r3-diagnostic
    env:
      GH_TOKEN: ${{ github.token }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DIAGNOSTIC_DIR: /tmp/m25-9-bge-m3-batch-diagnostic
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify fresh exact-SHA attempt-1 authority
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_AI_TOKEN"
          git merge-base --is-ancestor 9f21f687ea513ed17be01a51beac1e89b12d7bfc HEAD
          mkdir -p "$DIAGNOSTIC_DIR"
      - name: Install runtime dependencies
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'
      - name: Probe BGE-M3 with bounded real-input batches
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.parse
          from pathlib import Path

          import httpx

          from knowledge_engine import m25_blog_live_candidate as candidate

          output_dir = Path(os.environ['DIAGNOSTIC_DIR'])
          pack_root = output_dir / 'source-pack'
          work_root = output_dir / 'candidate-preview'
          candidate.materialize_pack(pack_root, os.environ.get('GITHUB_TOKEN'))
          _, context = candidate.build_candidate_release(
              pack_root,
              work_root,
              os.environ['GITHUB_SHA'],
          )
          rows = context['semantic_inputs']
          if not isinstance(rows, list) or len(rows) != 4197:
              raise SystemExit('semantic population drift')
          texts = [str(row['text']) for row in rows]

          account = urllib.parse.quote(os.environ['CLOUDFLARE_ACCOUNT_ID'], safe='')
          model = '@cf/baai/bge-m3'
          url = f'https://api.cloudflare.com/client/v4/accounts/{account}/ai/run/{model}'
          headers = {
              'Authorization': f"Bearer {os.environ['CLOUDFLARE_AI_TOKEN']}",
              'Accept': 'application/json',
              'User-Agent': 'knowledge-engine-m25.9-bge-m3-batch-diagnostic/1',
          }

          def sanitized_message(value):
              if not isinstance(value, str):
                  return None
              value = re.sub(r'https?://\S+', '<redacted-url>', value)
              value = re.sub(r'\b[0-9a-fA-F]{32,64}\b', '<redacted-hex>', value)
              return value[:500]

          def probe(label, selected):
              body = {'text': selected}
              encoded = json.dumps(body, ensure_ascii=False, separators=(',', ':')).encode()
              try:
                  response = client.post(url, headers=headers, content=encoded)
                  status = response.status_code
                  raw = response.content[:524288]
                  network_error = None
              except Exception as exc:
                  return {
                      'label': label,
                      'text_count': len(selected),
                      'request_bytes': len(encoded),
                      'total_characters': sum(len(text) for text in selected),
                      'maximum_characters': max((len(text) for text in selected), default=0),
                      'maximum_utf8_bytes': max(
                          (len(text.encode('utf-8')) for text in selected), default=0
                      ),
                      'http_status': None,
                      'cloudflare_success': False,
                      'network_error_category': type(exc).__name__,
                      'response_bytes': 0,
                      'response_sha256': hashlib.sha256(b'').hexdigest(),
                      'raw_response_recorded': False,
                  }
              try:
                  payload = json.loads(raw.decode('utf-8'))
              except Exception:
                  payload = None
              success = payload.get('success') if isinstance(payload, dict) else None
              errors = payload.get('errors') if isinstance(payload, dict) else None
              first_error = errors[0] if isinstance(errors, list) and errors else None
              result = payload.get('result') if isinstance(payload, dict) else None
              data = result.get('data') if isinstance(result, dict) else None
              shape = result.get('shape') if isinstance(result, dict) else None
              return {
                  'label': label,
                  'text_count': len(selected),
                  'request_bytes': len(encoded),
                  'total_characters': sum(len(text) for text in selected),
                  'maximum_characters': max((len(text) for text in selected), default=0),
                  'maximum_utf8_bytes': max(
                      (len(text.encode('utf-8')) for text in selected), default=0
                  ),
                  'http_status': status,
                  'cloudflare_success': success,
                  'cloudflare_error_code': (
                      first_error.get('code') if isinstance(first_error, dict) else None
                  ),
                  'cloudflare_error_message': sanitized_message(
                      first_error.get('message') if isinstance(first_error, dict) else None
                  ),
                  'result_shape': type(result).__name__ if result is not None else None,
                  'embedding_rows': len(data) if isinstance(data, list) else None,
                  'reported_shape': shape if isinstance(shape, list) else None,
                  'network_error_category': network_error,
                  'response_bytes': len(raw),
                  'response_sha256': hashlib.sha256(raw).hexdigest(),
                  'raw_response_recorded': False,
              }

          probes = []
          with httpx.Client(timeout=180.0) as client:
              probes.append(probe('synthetic_1', ['diagnostic sentence']))
              for size in (1, 3, 10, 25, 50, 75, 100):
                  probes.append(probe(f'real_first_{size}', texts[:size]))

          passing_real_sizes = [
              item['text_count']
              for item in probes
              if item['label'].startswith('real_first_')
              and item.get('http_status') == 200
              and item.get('cloudflare_success') is True
          ]
          failing_real = [
              item
              for item in probes
              if item['label'].startswith('real_first_')
              and not (
                  item.get('http_status') == 200
                  and item.get('cloudflare_success') is True
              )
          ]
          evidence = {
              'schema_version': 'knowledge-engine-m25-9-bge-m3-batch-diagnostic/v1',
              'engine_sha': os.environ['GITHUB_SHA'],
              'source_sha': candidate.SOURCE_SHA,
              'model': model,
              'semantic_document_count': len(texts),
              'inference_requests': len(probes),
              'external_storage_mutations': 0,
              'qdrant_requests': 0,
              'r2_requests': 0,
              'secret_values_recorded': False,
              'authorization_headers_recorded': False,
              'raw_response_bodies_recorded': False,
              'largest_passing_real_batch': max(passing_real_sizes, default=0),
              'first_failing_real_batch': (
                  failing_real[0]['text_count'] if failing_real else None
              ),
              'probes': probes,
          }
          evidence['evidence_sha256'] = hashlib.sha256(
              json.dumps(evidence, sort_keys=True, separators=(',', ':')).encode()
          ).hexdigest()
          path = output_dir / 'bge-m3-batch-diagnostic.json'
          path.write_text(json.dumps(evidence, indent=2, sort_keys=True) + '\n')
          print(json.dumps({
              'largest_passing_real_batch': evidence['largest_passing_real_batch'],
              'first_failing_real_batch': evidence['first_failing_real_batch'],
              'statuses': [
                  {
                      'label': item['label'],
                      'http_status': item.get('http_status'),
                      'error_code': item.get('cloudflare_error_code'),
                      'error_message': item.get('cloudflare_error_message'),
                  }
                  for item in probes
              ],
              'external_storage_mutations': 0,
          }, sort_keys=True))
          PY
      - name: Upload sanitized diagnostic evidence
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-bge-m3-batch-diagnostic-${{ github.sha }}
          path: /tmp/m25-9-bge-m3-batch-diagnostic/bge-m3-batch-diagnostic.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish diagnostic result
        run: |
          set -euo pipefail
          evidence="$DIAGNOSTIC_DIR/bge-m3-batch-diagnostic.json"
          largest="$(jq -r '.largest_passing_real_batch' "$evidence")"
          first_failure="$(jq -r '.first_failing_real_batch // "none"' "$evidence")"
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-bge-m3-batch-diagnostic' \
            -f description="run $GITHUB_RUN_ID pass=$largest fail=$first_failure" \
            -f target_url="$run_url" >/dev/null
          gh issue comment 1092 \
            --repo "$GITHUB_REPOSITORY" \
            --body "M25.9 BGE-M3 bounded batch diagnostic completed at exact SHA \`$GITHUB_SHA\`, run \`$GITHUB_RUN_ID\`: largest passing real batch \`$largest\`, first failing real batch \`$first_failure\`. Qdrant requests: \`0\`; R2 requests: \`0\`; external storage mutations: \`0\`."
