name: M15 Governance Health Acceptance

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m15_governance_health.py"
      - "tests/test_m15_governance_health.py"
      - "docs/architecture/m15/**"
      - ".github/workflows/m15-governance-health.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance-health-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run M15.4 adversarial tests
        run: pytest -q tests/test_m15_governance_health.py
      - name: Compile governance health modules
        run: python -m compileall -q src/knowledge_engine/m15_governance_health.py tests/test_m15_governance_health.py
      - name: Assert read-only governance surface
        shell: bash
        run: |
          ! grep -R --line-number -E 'put_object|delete_object|update_ref|merge_pull_request|automatic_retry_allowed: bool = True|automatic_close_allowed: bool = True' \
            src/knowledge_engine/m15_governance_health.py \
            tests/test_m15_governance_health.py
