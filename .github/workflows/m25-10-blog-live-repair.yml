name: M25.10 Live Runner Repair

on:
  pull_request:
    paths:
      - '.github/workflows/m25-10-blog-live-repair.yml'
      - 'src/knowledge_engine/m25_blog_live_candidate.py'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -q --disable-pip-version-check -e '.[dev]'
      - name: Apply and push exact repair
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python -m ruff check --fix \
            src/knowledge_engine/m25_blog_live_candidate.py \
            tests/test_m25_10_blog_live_candidate.py || true
          python - <<'PY'
          from pathlib import Path
          path = Path('src/knowledge_engine/m25_blog_live_candidate.py')
          lines = path.read_text().splitlines()
          target = 'const EXPECTED_MANIFEST = "ef5ee828069731e3e7106e1b12fb82e3a578c377930568410bc78421d1600877";'
          output = []
          replaced = 0
          for line in lines:
              if target in line:
                  indent = line[: len(line) - len(line.lstrip())]
                  output.append(indent + "'const EXPECTED_MANIFEST = '")
                  output.append(indent + "'\"ef5ee828069731e3e7106e1b12fb82e3a578c377930568410bc78421d1600877\";',")
                  replaced += 1
              else:
                  output.append(line)
          assert replaced == 1, replaced
          path.write_text('\n'.join(output) + '\n')
          PY
          python -m ruff check --output-format=concise \
            src/knowledge_engine/m25_blog_live_candidate.py \
            tests/test_m25_10_blog_live_candidate.py
          python -m pytest -q tests/test_m25_10_blog_live_candidate.py
          git diff --check
          git diff -- src/knowledge_engine/m25_blog_live_candidate.py
          test -n "$(git status --porcelain src/knowledge_engine/m25_blog_live_candidate.py)"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/knowledge_engine/m25_blog_live_candidate.py
          git commit -m 'Fix M25.10 live runner formatting'
          git push origin "HEAD:${HEAD_BRANCH}"
          exit 1
