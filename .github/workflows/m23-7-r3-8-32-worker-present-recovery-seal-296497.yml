name: M23.7 R3.8.32 Worker-Present Recovery Seal 296497

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-32/worker-present-recovery-seal-29649737557.json"
      - "docs/architecture/m23-7-r3-8-32-worker-present-recovery-seal-29649737557.md"
      - ".github/workflows/m23-7-r3-8-32-worker-present-recovery-seal-296497.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 8e341bc076e6b800f43323952d2dc409ef1da76b HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present seal
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          path = Path('.github/evidence/m23-7-r3-8-32/worker-present-recovery-seal-29649737557.json')
          value = json.loads(path.read_text(encoding='utf-8'))
          digest = value.pop('seal_sha256')
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(',', ':'), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == '4d3f47c70e907c3b2ac32ea69e8a6f9c37be2e18bfc274b69431add1fce01202'
          assert value['seal_issue'] == 925
          assert value['recovery_authorization_pr'] == 924
          assert value['recovery_authorization_merge_sha'] == '8e341bc076e6b800f43323952d2dc409ef1da76b'
          assert value['recovery_run_id'] == '29649737557'
          assert value['artifact']['artifact_id'] == 8431100289
          assert value['artifact']['zip_sha256'] == '45cb3d874feced81bcb12e70318f938dab55f5bddae837b158304b5fc811bae7'
          assert value['artifact']['receipt_file_sha256'] == '302bb62f8607d874bbecb7943184a4e16933d87f7a845adbe32d1e819a0d7d85'
          assert value['artifact']['receipt_self_digest'] == '58162b70bd2bf6a97e57aba6b33c7620334f9be556a511a671dac06eeea69800'
          receipt = value['receipt']
          assert receipt['status'] == 'completed_read_only_recovery_probe'
          assert receipt['worker_state'] == 'worker_present'
          assert receipt['worker_name'] == 'knowledge-engine-r3-8-29646853002'
          assert receipt['affected_run_id'] == '29646853002'
          assert receipt['affected_engine_sha'] == 'a5fca48683567b48a196e67657bd7dc4a4b9c554'
          assert receipt['probe_engine_sha'] == '8e341bc076e6b800f43323952d2dc409ef1da76b'
          assert receipt['versions']['identities'] == [
              '25bed085-df91-4442-aa0f-f4e396bf0428',
              '2f634b53-c76f-40eb-be27-1ff528d4c5fe',
              'd12b9b33-c4a6-4a7e-ae69-fcf7f48b79b0',
              'deb508b4-033e-4a8a-9ce2-3a150e263de1',
          ]
          assert receipt['deployments']['identities'] == [
              '3686ffea-920e-4a92-8517-df74a8f78800',
              '63ff8a06-e86c-4c02-8c1f-c74e7415d000',
              '7d93535f-3521-4846-8f16-c8a0b2c3076e',
              'eade21c1-2500-49af-84aa-8fdcae35112c',
          ]
          assert receipt['production_retrieval'] == 'lexical'
          assert receipt['blockers_cleared'] is False
          for field in (
              'worker_delete_dispatched', 'worker_deploy_dispatched',
              'worker_route_invoked', 'worker_secret_mutation_dispatched',
              'qdrant_read_dispatched', 'qdrant_mutation_dispatched',
              'r2_read_dispatched', 'r2_mutation_dispatched',
              'protected_mutations_dispatched',
          ):
              assert receipt[field] is False
          assert value['authority']['evidence_seal_only'] is True
          assert value['authority']['worker_deletion_authorized'] is False
          assert value['authority']['blocker_clearance_authorized'] is False
          assert value['authority']['m23_7_closure_authorized'] is False
          PY
      - name: Verify exact three-file scope and runtime preservation
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              '.github/evidence/m23-7-r3-8-32/worker-present-recovery-seal-29649737557.json',
              'docs/architecture/m23-7-r3-8-32-worker-present-recovery-seal-29649737557.md',
              '.github/workflows/m23-7-r3-8-32-worker-present-recovery-seal-296497.yml',
          }
          changed = set(subprocess.check_output(
              ['git', 'diff', '--name-only', '8e341bc076e6b800f43323952d2dc409ef1da76b', 'HEAD'], text=True
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 8e341bc076e6b800f43323952d2dc409ef1da76b HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
