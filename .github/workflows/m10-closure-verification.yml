name: M10 Closure Verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/architecture/m10/**'
      - 'scripts/m10_verify_production_baseline.py'
      - 'tests/test_m10_closure.py'
      - '.github/workflows/m10-closure-verification.yml'

permissions:
  contents: read

jobs:
  production-baseline-read-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - name: Normalize authentication configuration
        env:
          RAW_AUTH_MODE: ${{ vars.AUTH_MODE || secrets.AUTH_MODE }}
          RAW_JWT_ISSUER: ${{ vars.JWT_ISSUER || secrets.JWT_ISSUER }}
          RAW_JWT_JWKS_URL: ${{ vars.JWT_JWKS_URL || secrets.JWT_JWKS_URL }}
          RAW_JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE || secrets.JWT_AUDIENCE }}
        shell: bash
        run: |
          set -euo pipefail
          normalize() {
            local name="$1"
            local value="$2"
            value="${value//$'\r'/}"
            value="${value//$'\n'/}"
            value="${value#${value%%[![:space:]]*}}"
            value="${value%${value##*[![:space:]]}}"
            if [[ "$value" == "$name="* ]]; then
              value="${value#*=}"
            fi
            if [[ ${#value} -ge 2 ]]; then
              if [[ "${value:0:1}" == '"' && "${value: -1}" == '"' ]]; then
                value="${value:1:${#value}-2}"
              elif [[ "${value:0:1}" == "'" && "${value: -1}" == "'" ]]; then
                value="${value:1:${#value}-2}"
              fi
            fi
            printf '%s' "$value"
          }
          {
            echo "AUTH_MODE=$(normalize AUTH_MODE "${RAW_AUTH_MODE:-}")"
            echo "JWT_ISSUER=$(normalize JWT_ISSUER "${RAW_JWT_ISSUER:-}")"
            echo "JWT_JWKS_URL=$(normalize JWT_JWKS_URL "${RAW_JWT_JWKS_URL:-}")"
            echo "JWT_AUDIENCE=$(normalize JWT_AUDIENCE "${RAW_JWT_AUDIENCE:-}")"
          } >> "$GITHUB_ENV"
      - name: Validate required read-only configuration
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
        shell: bash
        run: |
          set -euo pipefail
          for name in R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET R2_ENDPOINT_URL; do
            test -n "${!name:-}" || { echo "Missing $name"; exit 2; }
          done
      - name: Verify production pointer and manifest byte-for-byte
        env:
          APP_ENV: production
          OBJECT_STORE_BACKEND: r2
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
          R2_REGION: auto
        shell: bash
        run: |
          set -o pipefail
          python scripts/m10_verify_production_baseline.py \
            --confirm-read-only \
            > /tmp/m10-closure-verification.log 2>&1 || {
              cat /tmp/m10-closure-verification.log
              exit 1
            }
          cat /tmp/m10-closure-verification.log
      - name: Upload verification failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: m10-closure-verification-log
          path: /tmp/m10-closure-verification.log
          if-no-files-found: ignore
          retention-days: 14
