name: M25.1 Admission Architecture Freeze

on:
  pull_request:
    paths:
      - '.github/workflows/m25-1-admission-architecture.yml'
      - 'docs/architecture/m25/README.md'
      - 'docs/architecture/m25/adapter-boundaries.md'
      - 'docs/architecture/m25/authority-matrix.md'
      - 'docs/architecture/m25/m25-1-admission-architecture-freeze.md'
      - 'docs/architecture/m25/reuse-map.md'
      - 'docs/architecture/m25/schema-version-plan.md'
      - 'docs/architecture/m25/state-machine.md'
      - 'docs/architecture/m25/examples/m25-2-adapter-envelope.example.json'
      - 'docs/architecture/m25/examples/m25-2-admission-plan.example.json'
      - 'docs/architecture/m25/examples/m25-2-authority-envelope.example.json'
      - 'pilot/m25/m25-1-*.json'
      - 'schemas/m25-adapter-envelope-v1.schema.json'
      - 'schemas/m25-admission-plan-v1.schema.json'
      - 'schemas/m25-admission-state-v1.schema.json'
      - 'schemas/m25-authority-envelope-v1.schema.json'
      - 'tests/test_m25_1_architecture.py'

permissions:
  contents: read

jobs:
  architecture-freeze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint M25.1 scope
        run: python -m ruff check tests/test_m25_1_architecture.py
      - name: Test M25.1 architecture contracts
        run: python -m pytest -q tests/test_m25_1_architecture.py
      - name: Prove architecture-only scope
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          freeze = json.loads(Path('pilot/m25/m25-1-architecture-freeze.json').read_text())
          assert freeze['stage_authority']['architecture_only'] is True
          assert freeze['stage_authority']['live_extraction_permitted'] is False
          assert freeze['stage_authority']['source_mutation_permitted'] is False
          assert freeze['stage_authority']['release_mutation_permitted'] is False
          assert freeze['stage_authority']['pilot_execution_permitted'] is False
          PY
      - name: Protect frozen M25.1 artifacts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          changed = set(
              subprocess.check_output(
                  ['git', 'diff', '--name-only', os.environ['BASE_SHA'], 'HEAD'],
                  text=True,
              ).splitlines()
          )
          frozen_prefixes = (
              'pilot/m25/m25-1-',
              'docs/architecture/m25/m25-1-',
          )
          frozen_exact = {
              'docs/architecture/m25/README.md',
              'docs/architecture/m25/adapter-boundaries.md',
              'docs/architecture/m25/authority-matrix.md',
              'docs/architecture/m25/reuse-map.md',
              'docs/architecture/m25/schema-version-plan.md',
              'docs/architecture/m25/state-machine.md',
              'docs/architecture/m25/examples/m25-2-adapter-envelope.example.json',
              'docs/architecture/m25/examples/m25-2-admission-plan.example.json',
              'docs/architecture/m25/examples/m25-2-authority-envelope.example.json',
              'schemas/m25-adapter-envelope-v1.schema.json',
              'schemas/m25-admission-plan-v1.schema.json',
              'schemas/m25-admission-state-v1.schema.json',
              'schemas/m25-authority-envelope-v1.schema.json',
              'tests/test_m25_1_architecture.py',
          }
          frozen_changed = {
              path
              for path in changed
              if path in frozen_exact or path.startswith(frozen_prefixes)
          }
          if frozen_changed:
              forbidden_prefixes = ('src/knowledge_engine/', 'workers/', 'packages/', 'pilot/m24/')
              assert not [path for path in changed if path.startswith(forbidden_prefixes)]
          for path in Path('pilot/m25').glob('m25-1-*.json'):
              value = json.loads(path.read_text(encoding='utf-8'))
              serialized = json.dumps(value, sort_keys=True)
              assert '"semantic_or_hybrid_enable_permitted": true' not in serialized
              assert '"production_answer_serving_permitted": true' not in serialized
          PY
      - name: Compile M25.1 test scope
        run: python -m compileall -q tests/test_m25_1_architecture.py
