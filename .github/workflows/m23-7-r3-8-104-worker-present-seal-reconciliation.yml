name: M23.7 R3.8.104 Worker-Present Seal Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-104/worker-present-seal-reconciliation-29585094990.json"
      - "docs/architecture/m23-7-r3-8-104-worker-present-seal-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-104-worker-present-seal-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor eca2a670bc0947b83309525d687ecb90c33141cb HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-104/worker-present-seal-reconciliation-29585094990.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "27ac1d722dfbbec558d15911ffc187afe3987fdb0b5e1f728d33226693857fa7"
          assert value["seal_pr"] == 803
          assert value["seal_merge_sha"] == "eca2a670bc0947b83309525d687ecb90c33141cb"
          assert value["seal_sha256s"] == {
              "29585094990": "d27d145db5c5d3bac6f14ec9b5726acfbdf7b66fad07c15fff5256c281052e0d",
          }
          result = value["result"]
          assert result["worker_present_evidence_reconciled"] is True
          assert result["worker_state"] == "worker_present"
          assert result["worker_lifecycle_clean"] is False
          assert result["deletion_authorization_next_gate"] is True
          assert result["blocker_clearance_eligible"] is False
          assert len(value["workers"]) == 1
          worker = value["workers"][0]
          assert worker["name"] == "knowledge-engine-r3-8-29584764087"
          assert worker["observation_run_id"] == "29584764087"
          assert worker["recovery_run_id"] == "29585094990"
          assert worker["versions"]["identity_count"] == 4
          assert worker["deployments"]["identity_count"] == 4
          assert value["authority"]["evidence_reconciliation_only"] is True
          assert value["authority"]["worker_deletion_authorized"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-104/worker-present-seal-reconciliation-29585094990.json",
              "docs/architecture/m23-7-r3-8-104-worker-present-seal-reconciliation.md",
              ".github/workflows/m23-7-r3-8-104-worker-present-seal-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "eca2a670bc0947b83309525d687ecb90c33141cb", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code eca2a670bc0947b83309525d687ecb90c33141cb HEAD --             scripts/m23_7_r3_8_remote_recovery_probe.py             .github/workflows/m23-7-r3-8-9-recovery-probe.yml             scripts/m23_7_r3_8_remote_operator.py             scripts/m23_7_r3_8_remote_delete.py             src/knowledge_engine/m23_7_r3_8_latency_repair.py             workers/m23-7-r3-8-latency-repair/worker.mjs
