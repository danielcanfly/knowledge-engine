name: M26.6 Reconciliation

on:
  pull_request:
    paths:
      - '.github/workflows/m26-6-reconciliation.yml'
      - 'docs/architecture/m26/m26-6-reconciliation.md'
      - 'pilot/m26/m26-6-acceptance.json'
      - 'tests/test_m26_6_reconciliation.py'

permissions:
  contents: read

jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and implementation ancestry
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor dd65419933a135349b3d54b6a1813fd46c70e569 HEAD
          python - <<'PY'
          import json
          from pathlib import Path
          acceptance = json.loads(Path('pilot/m26/m26-6-acceptance.json').read_text())
          assert acceptance['status'] == 'm26_6_answer_evaluation_refusal_gate_accepted'
          assert acceptance['implementation']['merge_sha'] == 'dd65419933a135349b3d54b6a1813fd46c70e569'
          assert acceptance['implementation']['final_head_sha'] == 'ecd596e2e4346d03f5463c0696127b98bdef8c95'
          assert acceptance['evidence_artifact']['artifact_id'] == 8565255191
          assert acceptance['benchmark']['case_count'] == 12
          assert acceptance['benchmark']['passed_count'] == 12
          assert acceptance['benchmark']['verified_final_answer_count'] == 0
          PY
      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Validate reconciliation contract
        run: python -m pytest -q tests/test_m26_6_reconciliation.py
      - name: Reject protected mutations
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          printf '%s\n' "$changed"
          test "$changed" = ".github/workflows/m26-6-reconciliation.yml
          docs/architecture/m26/m26-6-reconciliation.md
          pilot/m26/m26-6-acceptance.json
          tests/test_m26_6_reconciliation.py"
          python -m compileall -q tests/test_m26_6_reconciliation.py
