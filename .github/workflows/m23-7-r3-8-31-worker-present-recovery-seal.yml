name: M23.7 R3.8.31 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-31/worker-present-recovery-seal-29557534438.json"
      - "docs/architecture/m23-7-r3-8-31-worker-present-recovery-seal.md"
      - ".github/workflows/m23-7-r3-8-31-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 443e6b0cdf2fb11c9186d8be92a82b058fab8504 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-31/worker-present-recovery-seal-29557534438.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "6c7fc5a09d1661e1cf7e412ebdc33dde7934237586e4d2335bd8847f782a51f0"
          assert value["seal_issue"] == 696
          assert value["recovery_authorization_issue"] == 694
          assert value["recovery_authorization_pr"] == 695
          assert value["recovery_authorization_merge_sha"] == "443e6b0cdf2fb11c9186d8be92a82b058fab8504"
          assert value["recovery_run_id"] == "29557534438"
          assert value["artifact"]["artifact_id"] == 8397996006
          assert value["artifact"]["zip_sha256"] == "e53a71c0d7d087b64dd87bc1c8c026b0884ff2fedb7f72b76ee8f222724616f3"
          assert value["artifact"]["receipt_file_sha256"] == "ef217b8ccdb762441b7632e3eaa715325c8e5ad131b3120982fad99263c13d78"
          assert value["artifact"]["receipt_self_digest"] == "ca6ab820ad1aeefc9e4e28c3b628130dcdf521fec1298f2bb40a500f81af807c"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_read_only_recovery_probe"
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29557251118"
          assert receipt["affected_run_id"] == "29557251118"
          assert receipt["affected_engine_sha"] == "4729ee2264fdd3650770a9be227606e995973725"
          assert receipt["probe_engine_sha"] == "443e6b0cdf2fb11c9186d8be92a82b058fab8504"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          assert receipt["production_retrieval"] == "lexical"
          assert receipt["blockers_cleared"] is False
          for field in (
              "worker_delete_dispatched",
              "worker_deploy_dispatched",
              "worker_route_invoked",
              "worker_secret_mutation_dispatched",
              "qdrant_read_dispatched",
              "qdrant_mutation_dispatched",
              "r2_read_dispatched",
              "r2_mutation_dispatched",
              "protected_mutations_dispatched",
          ):
              assert receipt[field] is False
          authority = value["authority"]
          assert authority["evidence_seal_only"] is True
          assert authority["worker_deletion_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-31/worker-present-recovery-seal-29557534438.json",
              "docs/architecture/m23-7-r3-8-31-worker-present-recovery-seal.md",
              ".github/workflows/m23-7-r3-8-31-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "443e6b0cdf2fb11c9186d8be92a82b058fab8504", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 443e6b0cdf2fb11c9186d8be92a82b058fab8504 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
