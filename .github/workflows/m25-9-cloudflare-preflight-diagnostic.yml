name: M25.9 Cloudflare Preflight Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-cloudflare-preflight-diagnostic.yml'
      - 'docs/architecture/m25/m25-9-cloudflare-preflight-diagnostic.md'
      - 'scripts/m25_9_cloudflare_preflight_probe.py'
      - 'tests/test_m25_9_cloudflare_preflight_probe.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-cloudflare-preflight-diagnostic.yml'
      - 'docs/architecture/m25/m25-9-cloudflare-preflight-diagnostic.md'
      - 'scripts/m25_9_cloudflare_preflight_probe.py'
      - 'tests/test_m25_9_cloudflare_preflight_probe.py'

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and M25 live implementation ancestry
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          git merge-base --is-ancestor 421f70c5696910d51ce8d93e4940109ecf06c5e7 HEAD
      - name: Install focused test dependencies
        run: python -m pip install -q --disable-pip-version-check pytest ruff
      - name: Validate diagnostic implementation
        run: |
          set +e
          mkdir -p /tmp/m25-9-static-validation
          python -m ruff check --output-format=concise \
            scripts/m25_9_cloudflare_preflight_probe.py \
            tests/test_m25_9_cloudflare_preflight_probe.py \
            > /tmp/m25-9-static-validation/ruff.log 2>&1
          ruff_status=$?
          python -m pytest -q tests/test_m25_9_cloudflare_preflight_probe.py \
            > /tmp/m25-9-static-validation/pytest.log 2>&1
          pytest_status=$?
          python -m compileall -q \
            scripts/m25_9_cloudflare_preflight_probe.py \
            tests/test_m25_9_cloudflare_preflight_probe.py \
            > /tmp/m25-9-static-validation/compileall.log 2>&1
          compile_status=$?
          printf 'ruff_status=%s\npytest_status=%s\ncompile_status=%s\n' \
            "$ruff_status" "$pytest_status" "$compile_status" \
            > /tmp/m25-9-static-validation/status.txt
          cat /tmp/m25-9-static-validation/ruff.log
          cat /tmp/m25-9-static-validation/pytest.log
          cat /tmp/m25-9-static-validation/compileall.log
          test "$ruff_status" = '0'
          test "$pytest_status" = '0'
          test "$compile_status" = '0'
      - name: Upload static validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-static-validation-${{ github.event.pull_request.head.sha || github.sha }}
          path: /tmp/m25-9-static-validation/
          if-no-files-found: error
          retention-days: 30
      - name: Enforce zero-mutation changed-file boundary
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --quiet --no-tags origin main
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m25-9-cloudflare-preflight-diagnostic.yml' \
            'docs/architecture/m25/m25-9-cloudflare-preflight-diagnostic.md' \
            'scripts/m25_9_cloudflare_preflight_probe.py' \
            'tests/test_m25_9_cloudflare_preflight_probe.py' | sort)"
          test "$changed" = "$expected"
          ! printf '%s\n' "$changed" | grep -Eq \
            '^(production/|release/production|r2/|credentials/|secrets/|packages/)'

  read-only-diagnostic:
    if: github.event_name == 'push'
    needs: static-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: m23-r3-diagnostic
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_ACCESS_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_ACCESS_TOKEN }}
      CLOUDFLARE_ACCESS_READ_TOKEN: ${{ secrets.CLOUDFLARE_ACCESS_READ_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PAGES_PROJECT: llm-wiki-m24-internal
      INTERNAL_HOSTNAME: m24-internal.danielcanfly.com
      EVIDENCE_DIR: /tmp/m25-9-cloudflare-preflight
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify one-attempt read-only authority
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git merge-base --is-ancestor 421f70c5696910d51ce8d93e4940109ecf06c5e7 HEAD
          mkdir -p "$EVIDENCE_DIR"
      - name: Probe effective credentials independently
        run: |
          set -euo pipefail
          python scripts/m25_9_cloudflare_preflight_probe.py \
            --output "$EVIDENCE_DIR/cloudflare-preflight-diagnostic.json"
      - name: Validate sanitized evidence contract
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          path = Path(os.environ['EVIDENCE_DIR']) / 'cloudflare-preflight-diagnostic.json'
          value = json.loads(path.read_text())
          claimed = value.pop('evidence_sha256')
          actual = hashlib.sha256(
              json.dumps(value, sort_keys=True, separators=(',', ':')).encode()
          ).hexdigest()
          assert claimed == actual
          assert value['schema_version'] == 'knowledge-engine-m25-9-cloudflare-preflight/v1'
          assert value['status'] == 'diagnostic_complete'
          assert value['mutations'] == 0
          assert value['http_methods_used'] == ['GET']
          assert value['raw_response_bodies_recorded'] is False
          assert value['authorization_headers_recorded'] is False
          assert value['secret_values_recorded'] is False
          assert value['root_cause_classification']
          PY
      - name: Upload sanitized diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-cloudflare-preflight-${{ github.sha }}
          path: /tmp/m25-9-cloudflare-preflight/
          if-no-files-found: error
          retention-days: 30
