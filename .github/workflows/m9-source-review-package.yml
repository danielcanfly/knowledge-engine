name: M9 Source Review Package

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "review_packages/m9-001/**"
      - "scripts/validate_source_review_package.py"
      - "tests/test_source_review_package.py"
      - "tests/test_m9_planned_batch.py"
      - ".github/workflows/m9-source-review-package.yml"
      - "governed_batches/m9-001-agent-planning-strategies.json"
      - "governed_batches/registry-v2.json"
      - "governed_batches/evidence/m9-001-approved-review-decision.json"
      - "governed_batches/evidence/m9-001-lifecycle-history.json"
      - "governed_batches/evidence/m9-001-production-baseline.json"

permissions:
  contents: read

jobs:
  validate-review-package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Engine
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install exact Engine
        run: python -m pip install -e '.[dev]'

      - name: Validate immutable Source review proposal
        run: |
          python scripts/validate_source_review_package.py \
            --package-root review_packages/m9-001 \
            --output evidence/m9-001/review-package-validation.json

      - name: Verify review-state and non-mutating boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          spec = json.loads(
              Path("governed_batches/m9-001-agent-planning-strategies.json")
              .read_text(encoding="utf-8")
          )
          baseline = json.loads(
              Path("governed_batches/evidence/m9-001-production-baseline.json")
              .read_text(encoding="utf-8")
          )
          validation = json.loads(
              Path("evidence/m9-001/review-package-validation.json")
              .read_text(encoding="utf-8")
          )

          state = spec["lifecycle_state"]
          assert state in {"planned", "source_reviewed"}
          assert spec["source"]["sha"] is None
          assert spec["candidate"] == {
              "channel": None,
              "release_id": None,
              "manifest_sha256": None,
          }
          assert spec["production_request"] == {
              "operation_id": None,
              "request_path": None,
          }
          assert baseline["mutations_performed"] == []
          assert baseline["source_mutated"] is False
          assert baseline["candidate_built"] is False
          assert baseline["r2_mutated"] is False
          assert baseline["production_pointer_mutated"] is False
          assert baseline["ledger_appended"] is False

          # The proposal remains an immutable pending snapshot even after a
          # separate approval record advances the governed batch lifecycle.
          assert validation["status"] == "passed"
          assert validation["review_status"] == "pending_human_review"
          assert validation["source_change_ready"] is False
          assert validation["canonical_write_authorized"] is False
          assert validation["mutations_performed"] == []

          if state == "source_reviewed":
              decision = json.loads(
                  Path(
                      "governed_batches/evidence/"
                      "m9-001-approved-review-decision.json"
                  ).read_text(encoding="utf-8")
              )
              lifecycle = json.loads(
                  Path(
                      "governed_batches/evidence/m9-001-lifecycle-history.json"
                  ).read_text(encoding="utf-8")
              )
              assert decision["status"] == "approved"
              assert decision["decision"] == "approve"
              assert decision["canonical_write_authorized"] is True
              assert decision["candidate_build_authorized"] is False
              assert decision["production_mutation_authorized"] is False
              assert lifecycle["initial_state"] == "planned"
              assert lifecycle["final_state"] == "source_reviewed"
              assert lifecycle["transitions"][0]["from"] == "planned"
              assert lifecycle["transitions"][0]["to"] == "source_reviewed"
              assert lifecycle["production_mutated"] is False

          print("M9_SOURCE_REVIEW_BOUNDARY_PASSED")
          PY

      - name: Run Source review package tests
        run: |
          python -m pytest -q \
            tests/test_source_review_package.py \
            tests/test_m9_planned_batch.py

      - name: Upload review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m9-source-review-package-${{ github.sha }}
          path: evidence/m9-001
          if-no-files-found: error
          retention-days: 90
