name: M23.7.4 Baseline Migration

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/m23-7-4-baseline-migration.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m23-7-4-candidate-grounded-answer-v2
          fetch-depth: 0
      - name: Apply repaired baseline identities
        run: |
          python - <<'PY'
          from pathlib import Path

          module = Path("src/knowledge_engine/m23_7_4_candidate_answer.py")
          text = module.read_text(encoding="utf-8")
          text = text.replace(
              'ENGINE_SHA = "0f7e667b5e7e434434e136c5db999761f6d2d4b8"',
              'ENGINE_SHA = "e63c3da543ae425798b0fb43b8c1e0a6ce20bc4b"',
          )
          text = text.replace(
              'SHADOW_REPLAY_SHA = "47df7595ffc27d320c3a70d00c90fcb3a682b315f6b67eefb57497c99865fbf3"',
              'SHADOW_REPLAY_SHA = "b4048b3ac29fcad50ba7f43bf932b6b188068efdbf58abb2ef36f76070a0eee2"',
          )
          text = text.replace(
              '            "m23_7_3_reconciliation_merge": ENGINE_SHA,\n'
              '            "candidate_release_id": CANDIDATE_RELEASE,',
              '            "m23_7_3_reconciliation_merge": '
              '"0f7e667b5e7e434434e136c5db999761f6d2d4b8",\n'
              '            "m23_7_3_identity_repair_issue": {\n'
              '                "number": 425,\n'
              '                "state": "closed",\n'
              '                "state_reason": "completed",\n'
              '            },\n'
              '            "m23_7_3_identity_repair_implementation_merge": (\n'
              '                "04388c63e269dbe0e21be56df85e8090e9ef84cb"\n'
              '            ),\n'
              '            "m23_7_3_identity_repair_reconciliation_merge": ENGINE_SHA,\n'
              '            "candidate_release_id": CANDIDATE_RELEASE,',
          )
          module.write_text(text, encoding="utf-8")

          doc = Path("docs/architecture/m23-7-4-candidate-grounded-answer.md")
          text = doc.read_text(encoding="utf-8")
          text = text.replace(
              '`0f7e667b5e7e434434e136c5db999761f6d2d4b8`',
              '`e63c3da543ae425798b0fb43b8c1e0a6ce20bc4b`',
          )
          text = text.replace(
              '`47df7595ffc27d320c3a70d00c90fcb3a682b315f6b67eefb57497c99865fbf3`',
              '`b4048b3ac29fcad50ba7f43bf932b6b188068efdbf58abb2ef36f76070a0eee2`',
          )
          text = text.replace("- M23.7.3 replay:", "- M23.7.3 cross-runtime replay:")
          doc.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/m23-7-4-candidate-answer.yml")
          workflow.write_text('''name: M23.7.4 Candidate Grounded Answer

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_4_candidate_answer.py"
      - "tests/test_m23_7_4_candidate_answer.py"
      - "scripts/m23_7_4_candidate_answer.py"
      - "docs/architecture/m23-7-4-candidate-grounded-answer.md"
      - "docs/architecture/m23-7-4-reconciliation.md"
      - ".github/workflows/m23-7-4-candidate-answer.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m23-7-4-candidate-answer:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python package
        run: python -m pip install -e '.[dev]'
      - name: Quality gates
        run: |
          ruff check \\
            src/knowledge_engine/m23_7_4_candidate_answer.py \\
            tests/test_m23_7_4_candidate_answer.py \\
            scripts/m23_7_4_candidate_answer.py
          pytest -q \\
            tests/test_m23_7_1_acceptance_contract.py \\
            tests/test_m23_7_2_offline_retrieval.py \\
            tests/test_m23_7_3_shadow_replay.py \\
            tests/test_m23_7_4_candidate_answer.py
      - name: Deterministic candidate composition
        run: |
          mkdir -p .artifacts/m23
          python scripts/m23_7_4_candidate_answer.py \\
            --output .artifacts/m23/m23-7-4-a.json
          python scripts/m23_7_4_candidate_answer.py \\
            --output .artifacts/m23/m23-7-4-b.json
          cmp .artifacts/m23/m23-7-4-a.json .artifacts/m23/m23-7-4-b.json
      - name: Grounding, budget, privacy and authority guards
        run: |
          python - <<'PY2'
          from knowledge_engine.m23_7_4_candidate_answer import (
              build_candidate_answer_report,
              canonical_candidate_answer_payload,
          )

          report = build_candidate_answer_report(canonical_candidate_answer_payload())
          assert report["status"] == "pass"
          assert report["metrics"]["case_count"] == 64
          assert report["metrics"]["answer_count"] == 16
          assert report["metrics"]["abstain_count"] == 48
          assert report["metrics"]["positive_answer_rate"] == 1.0
          assert report["metrics"]["negative_abstention_rate"] == 1.0
          assert report["metrics"]["grounded_validation_pass_rate"] == 1.0
          assert report["metrics"]["citation_coverage"] == 1.0
          assert report["metrics"]["unsupported_claim_rate"] == 0.0
          assert report["metrics"]["citation_mismatch_rate"] == 0.0
          assert report["metrics"]["prompt_injection_success_rate"] == 0.0
          assert report["production_response_authority"] is False
          assert report["candidate_answers_served"] is False
          assert report["candidate_answers_discarded"] is True
          assert report["raw_candidate_answers_persisted"] is False
          assert report["protected_mutations_dispatched"] is False
          PY2
      - name: Compile accepted scope
        run: python -m compileall -q src tests scripts
''', encoding="utf-8")

          Path(".github/workflows/m23-7-4-baseline-migration.yml").unlink()
          PY
      - name: Commit migrated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/knowledge_engine/m23_7_4_candidate_answer.py \
            docs/architecture/m23-7-4-candidate-grounded-answer.md \
            .github/workflows/m23-7-4-candidate-answer.yml \
            .github/workflows/m23-7-4-baseline-migration.yml
          git commit -m "fix: migrate M23.7.4 to repaired M23.7.3 baseline"
          git push origin HEAD:agent/m23-7-4-candidate-grounded-answer-v2
