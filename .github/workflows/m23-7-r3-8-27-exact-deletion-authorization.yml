name: M23.7 R3.8.27 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29604923286.json"
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29607698618.json"
      - "docs/architecture/m23-7-r3-8-27-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-27-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 593168236eae43f488e64b31b2d2600803b5db30 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization

          path = Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29607698618.json")
          value = validate_authorization(path)
          assert value["authorization_sha256"] == "1d3c6196f52f67021e7efd3a1e8a54620cea1e6252608848586a6dd31c3480df"
          assert value["worker_name"] == "knowledge-engine-r3-8-29607698618"
          assert value["observation_run_id"] == "29607698618"
          assert value["recovery_run_id"] == "29608526669"
          assert value["receipt_sha256"] == "62432f713ec0de751505697ff5002b75431839195e61eba6e16d5c34a1a11f09"
          assert value["evidence_seal_sha256"] == "fea02c64c22ff1682c91c207e432c922b562625c17c36015b5bb957b3b92cbe1"
          assert value["independent_reconciliation_sha256"] == "acf9f1f230226c50e2d741b03670bc9c1a63448e45fa7a254888f87988d9b0f5"
          assert value["worker_version_ids"] == [
              "423166e8-19b8-4dfb-aa65-5b5d6a9d5495",
              "8022cda9-d2bf-4018-9031-d5b67db1478e",
              "93930eb3-1a8b-4c4d-8688-67105d94e2ed",
              "f39035e3-9629-4377-949b-d0fd4b93d0db",
          ]
          assert value["worker_deployment_ids"] == [
              "5764fe7a-1513-4bed-9169-8e0d5c8ed3d4",
              "89c3ccc1-f647-4899-86fb-21d6a7150e8c",
              "a99588fb-9af7-4fde-a4ca-1e51a04bb245",
              "e308a1da-0b2e-413f-abfd-516c8bacbad3",
          ]
          PY
      - name: Verify authority boundary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path(
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29607698618.json"
          ).read_text(encoding="utf-8"))
          assert value["authority"] == {
              "diagnostic_worker_deletion_authorized": True,
              "production_mutation_authorized": False,
              "qdrant_mutation_authorized": False,
              "r2_mutation_authorized": False,
              "pointer_mutation_authorized": False,
              "source_mutation_authorized": False,
          }
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29607698618.json",
              "docs/architecture/m23-7-r3-8-27-exact-deletion-authorization.md",
              ".github/workflows/m23-7-r3-8-27-exact-deletion-authorization.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "593168236eae43f488e64b31b2d2600803b5db30", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 593168236eae43f488e64b31b2d2600803b5db30 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
