name: M23.7 R3.8.27 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29604923286.json"
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29607698618.json"
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29610393567.json"
      - "docs/architecture/m23-7-r3-8-27-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-27-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 78c81cd06adf12cf3b3bdad0fdbc81908b616602 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization

          path = Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29610393567.json")
          value = validate_authorization(path)
          assert value["authorization_sha256"] == "9c397501ef57dc7e925c5a8a125fe6881c3ef47657df5d5846d47b6f004e5f16"
          assert value["worker_name"] == "knowledge-engine-r3-8-29610393567"
          assert value["observation_run_id"] == "29610393567"
          assert value["recovery_run_id"] == "29611245813"
          assert value["receipt_sha256"] == "679f8e2fbdaf0a139cdb5e360d4104523ea9257e2a9d3011573b49fbe02ca429"
          assert value["evidence_seal_sha256"] == "3d8fc558375e7b27a6930cfa2490e045885b66f1b2e2ce80c0f45acbe68942a1"
          assert value["independent_reconciliation_sha256"] == "b7a844c9ba2b401305b0ff46a970df28f3b8e8cac564be6168f2f5aee94c8b92"
          assert value["worker_version_ids"] == [
              "2b977efa-a837-4fd9-b52d-acb4792afab9",
              "82247513-1864-46bc-b475-77e287d1c750",
              "c3c4576d-efae-40fa-97e7-12f19f41422e",
              "c60127ef-f347-4dac-a5a4-b862ae54d388",
          ]
          assert value["worker_deployment_ids"] == [
              "51db0f94-53e8-455d-93a5-b1f6841045bb",
              "84cd49a9-a1eb-483b-9d82-5b0ae735801a",
              "c9480253-5c2d-4743-b474-7dd19c00ddba",
              "dfe02f99-af58-4af8-8532-9d1d471be7b5",
          ]
          PY
      - name: Verify authority boundary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path(
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29610393567.json"
          ).read_text(encoding="utf-8"))
          assert value["authority"] == {
              "diagnostic_worker_deletion_authorized": True,
              "production_mutation_authorized": False,
              "qdrant_mutation_authorized": False,
              "r2_mutation_authorized": False,
              "pointer_mutation_authorized": False,
              "source_mutation_authorized": False,
          }
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29610393567.json",
              "docs/architecture/m23-7-r3-8-27-exact-deletion-authorization.md",
              ".github/workflows/m23-7-r3-8-27-exact-deletion-authorization.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "78c81cd06adf12cf3b3bdad0fdbc81908b616602", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 78c81cd06adf12cf3b3bdad0fdbc81908b616602 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
