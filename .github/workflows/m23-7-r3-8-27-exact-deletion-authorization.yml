name: M23.7 R3.8.27 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29604923286.json"
      - "docs/architecture/m23-7-r3-8-27-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-27-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor a3368f502ea09578d663d38ceda0eb0952462bd7 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization

          path = Path("deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29604923286.json")
          value = validate_authorization(path)
          assert value["authorization_sha256"] == "d097309f1b6dc3cea071b28ebc02eb0cbbf5dd235e2811172e7f38329b7b3e27"
          assert value["worker_name"] == "knowledge-engine-r3-8-29604923286"
          assert value["observation_run_id"] == "29604923286"
          assert value["recovery_run_id"] == "29605835592"
          assert value["receipt_sha256"] == "6a778e51cf82b2d50789d784adce66686bf2fe8e307a36a9377d5aeb0b35230f"
          assert value["evidence_seal_sha256"] == "f14513676f6fdf10df67b81fc2086f9c96b94d838cd0e81e960ec81403894fa0"
          assert value["independent_reconciliation_sha256"] == "7e0a805a69cc299e77e8c3eaf9f0dfd1e42c5d16a37501e4fe61edf20b29dad2"
          assert value["worker_version_ids"] == [
              "594fcf19-0645-41f3-93e7-807eaec8beee",
              "6f4e850b-1fb4-4464-9126-2a99b5b8a17e",
              "b7d93221-a3ed-4f32-ac52-b05c24fbca1f",
              "fc533e8e-b6eb-40a2-b33d-53d6973f1c1d",
          ]
          assert value["worker_deployment_ids"] == [
              "18c1fbdd-4d19-4460-8c8f-911569e32599",
              "1d0dda0a-aa3c-40c4-93f3-d121a04dfbc1",
              "53c71fff-6ff8-44e5-8a66-a7d3881a5c39",
              "a0152c85-5705-487e-8299-1c9b4d961f79",
          ]
          PY
      - name: Verify authority boundary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path(
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29604923286.json"
          ).read_text(encoding="utf-8"))
          assert value["authority"] == {
              "diagnostic_worker_deletion_authorized": True,
              "production_mutation_authorized": False,
              "qdrant_mutation_authorized": False,
              "r2_mutation_authorized": False,
              "pointer_mutation_authorized": False,
              "source_mutation_authorized": False,
          }
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29604923286.json",
              "docs/architecture/m23-7-r3-8-27-exact-deletion-authorization.md",
              ".github/workflows/m23-7-r3-8-27-exact-deletion-authorization.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "a3368f502ea09578d663d38ceda0eb0952462bd7", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code a3368f502ea09578d663d38ceda0eb0952462bd7 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
