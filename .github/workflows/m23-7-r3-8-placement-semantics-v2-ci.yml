name: M23.7 Repair R3.8 Placement Semantics v2

on:
  pull_request:
    paths:
      - "scripts/m23_7_r3_8_remote_operator_placement_v2.py"
      - "scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py"
      - "scripts/m23_7_r3_8_remote_operator_region_v3.py"
      - "scripts/m23_7_r3_8_remote_entrypoint_region_v3.py"
      - "tests/test_m23_7_r3_8_placement_semantics_v2.py"
      - "tests/test_m23_7_r3_8_region_placement_v3.py"
      - "pilot/m23/m23-7-r3-8-placement-semantics-v2-contract.json"
      - "pilot/m23/m23-7-r3-8-region-placement-v3-contract.json"
      - ".github/workflows/m23-7-r3-8-placement-semantics-v2-ci.yml"
      - ".github/workflows/m23-7-r3-8-remote-observe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  placement-semantics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and v2 ancestry
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor d0459fee41f747fb79cd32feaa673ef6fcf9e58a HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate v2 core and v3 adapter
        run: |
          python -m pip install -e '.[dev]'
          ruff check \
            scripts/m23_7_r3_8_remote_operator_placement_v2.py \
            scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py \
            scripts/m23_7_r3_8_remote_operator_region_v3.py \
            scripts/m23_7_r3_8_remote_entrypoint_region_v3.py \
            tests/test_m23_7_r3_8_placement_semantics_v2.py \
            tests/test_m23_7_r3_8_region_placement_v3.py
          pytest -q \
            tests/test_m23_7_r3_8_placement_semantics_v2.py \
            tests/test_m23_7_r3_8_region_placement_v3.py \
            tests/test_m23_7_r3_8_remote_operator.py \
            tests/test_m23_7_r3_8_remote_entrypoint.py \
            tests/test_m23_7_r3_8_latency_repair.py
          node --test workers/m23-7-r3-8-latency-repair/worker.test.mjs
      - name: Preserve deterministic v2 contract
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          path = Path("pilot/m23/m23-7-r3-8-placement-semantics-v2-contract.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("contract_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "0d4a42fe8505862a17026410dd86d2bc964407a9d0d82bd1ef9fd81f953a8f8e"
          assert value["placement"]["accepted_sanitized_classes"] == ["local", "remote"]
          assert value["preservation"]["maximum_worker_internal_shadow_ms"] == 1200
          assert value["preservation"]["blocker_clearance_authorized"] is False
          PY
      - name: Preserve v2 files and validate v3 dispatch
        run: |
          git diff --exit-code d0459fee41f747fb79cd32feaa673ef6fcf9e58a HEAD -- \
            scripts/m23_7_r3_8_remote_operator_placement_v2.py \
            scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py \
            tests/test_m23_7_r3_8_placement_semantics_v2.py \
            pilot/m23/m23-7-r3-8-placement-semantics-v2-contract.json \
            docs/architecture/m23-7-r3-8-placement-semantics-v2.md
          python - <<'PY'
          from pathlib import Path
          text = Path(".github/workflows/m23-7-r3-8-remote-observe.yml").read_text(encoding="utf-8")
          assert "m23_7_r3_8_remote_entrypoint_region_v3" in text
          assert "GITHUB_RUN_ATTEMPT" in text
          assert "RUN_R3_8_REMOTE_ONCE" in text
          assert "1200" not in text
          PY
