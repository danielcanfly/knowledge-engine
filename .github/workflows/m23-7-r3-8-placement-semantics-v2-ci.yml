name: M23.7 Repair R3.8 Placement Semantics v2

on:
  pull_request:
    paths:
      - "scripts/m23_7_r3_8_remote_operator_placement_v2.py"
      - "scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py"
      - "tests/test_m23_7_r3_8_placement_semantics_v2.py"
      - "pilot/m23/m23-7-r3-8-placement-semantics-v2-contract.json"
      - "docs/architecture/m23-7-r3-8-placement-semantics-v2.md"
      - ".github/workflows/m23-7-r3-8-placement-semantics-v2-ci.yml"
      - ".github/workflows/m23-7-r3-8-remote-observe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  placement-semantics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and cleanup reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 9c71b34fdad1d6341418c389570b8a88634ecae8 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and lint bounded scope
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e '.[dev]'
          set +e
          ruff check \
            scripts/m23_7_r3_8_remote_operator_placement_v2.py \
            scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py \
            tests/test_m23_7_r3_8_placement_semantics_v2.py \
            > ruff-placement-v2.log 2>&1
          code=$?
          set -e
          cat ruff-placement-v2.log
          if [ "$code" -ne 0 ]; then
            exit "$code"
          fi
          python -m py_compile \
            scripts/m23_7_r3_8_remote_operator_placement_v2.py \
            scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py
      - name: Upload bounded lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m23-7-r3-8-placement-v2-lint-${{ github.run_id }}
          path: ruff-placement-v2.log
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 7
          compression-level: 9
      - name: Run placement and preserved regression tests
        run: |
          pytest -q \
            tests/test_m23_7_r3_8_placement_semantics_v2.py \
            tests/test_m23_7_r3_8_remote_operator.py \
            tests/test_m23_7_r3_8_remote_entrypoint.py \
            tests/test_m23_7_r3_8_latency_repair.py
          node --test workers/m23-7-r3-8-latency-repair/worker.test.mjs
      - name: Verify deterministic placement contract
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path("pilot/m23/m23-7-r3-8-placement-semantics-v2-contract.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("contract_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "0d4a42fe8505862a17026410dd86d2bc964407a9d0d82bd1ef9fd81f953a8f8e"
          assert value["issue"] == 935
          assert value["baseline_merge_sha"] == "9c71b34fdad1d6341418c389570b8a88634ecae8"
          assert value["placement"]["accepted_sanitized_classes"] == ["local", "remote"]
          assert value["placement"]["rejected_sanitized_classes"] == ["absent"]
          assert value["placement"]["airport_code_persisted"] is False
          assert value["placement"]["header_required_for_readiness"] is True
          assert value["placement"]["header_required_for_formal_observation"] is True
          preservation = value["preservation"]
          assert preservation["worker_request_contract_sha256"] == "d081ab57a85b4ea813aeb813090b597340b8c3842ff78d7022d38501e6c282ba"
          assert preservation["maximum_worker_internal_shadow_ms"] == 1200
          assert preservation["blocker_clearance_authorized"] is False
          assert preservation["m23_7_closure_authorized"] is False
          PY
      - name: Verify dispatch and exact repair scope
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          workflow = Path(".github/workflows/m23-7-r3-8-remote-observe.yml").read_text(encoding="utf-8")
          assert "m23_7_r3_8_remote_entrypoint_placement_v2" in workflow
          assert "GITHUB_RUN_ATTEMPT" in workflow
          assert "inputs.confirmation" in workflow
          assert "--confirmation" in workflow
          assert "RUN_R3_8_REMOTE_ONCE" in workflow
          assert "1200" not in workflow

          allowed = {
              "scripts/m23_7_r3_8_remote_operator_placement_v2.py",
              "scripts/m23_7_r3_8_remote_entrypoint_placement_v2.py",
              "tests/test_m23_7_r3_8_placement_semantics_v2.py",
              "pilot/m23/m23-7-r3-8-placement-semantics-v2-contract.json",
              "docs/architecture/m23-7-r3-8-placement-semantics-v2.md",
              ".github/workflows/m23-7-r3-8-placement-semantics-v2-ci.yml",
              ".github/workflows/m23-7-r3-8-remote-observe.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "9c71b34fdad1d6341418c389570b8a88634ecae8", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 9c71b34fdad1d6341418c389570b8a88634ecae8 HEAD -- \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_entrypoint.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs \
            pilot/m23/m23-7-r3-8-latency-repair-contract.json
