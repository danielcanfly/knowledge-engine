name: M23.7.4 Candidate Grounded Answer

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_4_candidate_answer.py"
      - "tests/test_m23_7_4_candidate_answer.py"
      - "scripts/m23_7_4_candidate_answer.py"
      - "docs/architecture/m23-7-4-candidate-grounded-answer.md"
      - "docs/architecture/m23-7-4-reconciliation.md"
      - ".github/workflows/m23-7-4-candidate-answer.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m23-7-4-candidate-answer:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python package
        run: python -m pip install -e '.[dev]'
      - name: Print executable M23.7.3 replay identity
        run: |
          python - <<'PY'
          from knowledge_engine.m23_7_3_shadow_replay import (
              build_shadow_replay_report,
              canonical_shadow_replay_payload,
          )

          report = build_shadow_replay_report(canonical_shadow_replay_payload())
          print("EXECUTABLE_M23_7_3_SHA=" + report["shadow_replay_sha256"])
          PY
      - name: Quality gates
        run: |
          ruff check \
            src/knowledge_engine/m23_7_4_candidate_answer.py \
            tests/test_m23_7_4_candidate_answer.py \
            scripts/m23_7_4_candidate_answer.py
          pytest -q \
            tests/test_m23_7_1_acceptance_contract.py \
            tests/test_m23_7_2_offline_retrieval.py \
            tests/test_m23_7_3_shadow_replay.py \
            tests/test_m23_7_4_candidate_answer.py
      - name: Deterministic candidate composition
        run: |
          mkdir -p .artifacts/m23
          python scripts/m23_7_4_candidate_answer.py \
            --output .artifacts/m23/m23-7-4-a.json
          python scripts/m23_7_4_candidate_answer.py \
            --output .artifacts/m23/m23-7-4-b.json
          cmp .artifacts/m23/m23-7-4-a.json .artifacts/m23/m23-7-4-b.json
      - name: Grounding, budget, privacy and authority guards
        run: |
          python - <<'PY'
          from knowledge_engine.m23_7_4_candidate_answer import (
              build_candidate_answer_report,
              canonical_candidate_answer_payload,
          )

          report = build_candidate_answer_report(canonical_candidate_answer_payload())
          assert report["status"] == "pass"
          assert report["metrics"]["case_count"] == 64
          assert report["metrics"]["answer_count"] == 16
          assert report["metrics"]["abstain_count"] == 48
          assert report["metrics"]["positive_answer_rate"] == 1.0
          assert report["metrics"]["negative_abstention_rate"] == 1.0
          assert report["metrics"]["grounded_validation_pass_rate"] == 1.0
          assert report["metrics"]["citation_coverage"] == 1.0
          assert report["metrics"]["unsupported_claim_rate"] == 0.0
          assert report["metrics"]["citation_mismatch_rate"] == 0.0
          assert report["metrics"]["prompt_injection_success_rate"] == 0.0
          assert report["production_response_authority"] is False
          assert report["candidate_answers_served"] is False
          assert report["candidate_answers_discarded"] is True
          assert report["raw_candidate_answers_persisted"] is False
          assert report["protected_mutations_dispatched"] is False
          PY
      - name: Compile accepted scope
        run: python -m compileall -q src tests scripts
