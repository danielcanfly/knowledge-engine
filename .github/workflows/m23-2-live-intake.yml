name: M23.2 Live Intake

on:
  pull_request:
    paths:
      - ".github/workflows/m23-2-live-intake.yml"
      - "docs/architecture/m23/m23-2-live-intake.md"
      - "pilot/m23/m23-2-live-intake-receipt.json"
      - "pyproject.toml"
      - "src/knowledge_engine/m23_live_intake.py"
      - "src/knowledge_engine/m23_live_intake_cli.py"
      - "tests/test_m23_2_live_intake.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-head:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Verify exact head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q tests/test_m23_2_live_intake.py
      - run: >-
          python -m ruff check
          src/knowledge_engine/m23_live_intake.py
          src/knowledge_engine/m23_live_intake_cli.py
          tests/test_m23_2_live_intake.py
      - run: >-
          python -m compileall -q
          src/knowledge_engine/m23_live_intake.py
          src/knowledge_engine/m23_live_intake_cli.py
