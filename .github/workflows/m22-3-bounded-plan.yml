name: M22.3 Bounded Plan Compiler

on:
  pull_request:
    paths:
      - '.github/workflows/m22-3-bounded-plan.yml'
      - 'docs/architecture/m22/m22-3-bounded-plan.md'
      - 'src/knowledge_engine/m22_bounded_plan.py'
      - 'tests/test_m22_3_bounded_plan.py'

permissions:
  contents: read

jobs:
  bounded-plan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint M22.3 scope
        run: >-
          python -m ruff check
          src/knowledge_engine/m22_bounded_plan.py
          tests/test_m22_3_bounded_plan.py
      - name: Test M22.1 through M22.3 contracts
        run: >-
          python -m pytest -q
          tests/test_m22_1_reasoning_modes.py
          tests/test_m22_2_activation_decision.py
          tests/test_m22_3_bounded_plan.py
      - name: Prove bounded non-executing plan contract
        run: |
          python - <<'PY'
          from knowledge_engine.m22_bounded_plan import (
              PLAN_OPERATIONS,
              STEP_TYPES,
          )

          assert PLAN_OPERATIONS == (
              'compare',
              'causal_chain',
              'synthesize',
              'temporal_sequence',
              'disambiguate',
          )
          assert STEP_TYPES[-1] == 'verify_acl_provenance_citations'
          PY
      - name: Scan executor, provider, and secret boundary
        run: |
          if grep -nE 'requests|httpx|aiohttp|urllib.request|subprocess|boto3|openai|anthropic|sentence_transformers|raw_query|api_key|token=' \
            src/knowledge_engine/m22_bounded_plan.py; then
            exit 1
          fi
          test -z "$(find . -type f \( -name '*reasoning-execution.json' -o -name '*planner-runtime.json' \) -print -quit)"
      - name: Compile M22.3 scope
        run: >-
          python -m compileall -q
          src/knowledge_engine/m22_bounded_plan.py
          tests/test_m22_3_bounded_plan.py
