name: Verify Oracle VM

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/verify-oracle.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: production
    env:
      ORACLE_VM_HOST: ${{ vars.ORACLE_VM_HOST || secrets.ORACLE_VM_HOST }}
      ORACLE_VM_USER: ${{ vars.ORACLE_VM_USER || secrets.ORACLE_VM_USER }}
      ORACLE_VM_DEPLOY_PATH: ${{ vars.ORACLE_VM_DEPLOY_PATH || secrets.ORACLE_VM_DEPLOY_PATH }}
    steps:
      - name: Require verification configuration
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          for name in SSH_PRIVATE_KEY ORACLE_VM_HOST ORACLE_VM_USER ORACLE_VM_DEPLOY_PATH; do
            test -n "${!name:-}" || { echo "Missing $name"; exit 2; }
          done
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$ORACLE_VM_HOST" >> ~/.ssh/known_hosts
      - name: Verify deployed revision and runtime health
        run: |
          set -euo pipefail
          ssh "$ORACLE_VM_USER@$ORACLE_VM_HOST" \
            "DEPLOY_PATH='$ORACLE_VM_DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          DEPLOYED_SHA="$(git rev-parse HEAD)"
          echo "DEPLOYED_SHA=$DEPLOYED_SHA"
          test "$DEPLOYED_SHA" = "a4cc2f170e9075c9fb7ca6384caf5c77d9368a05"

          docker compose ps

          HEALTH_JSON="$(curl --fail --silent http://127.0.0.1:8080/v1/health)"
          echo "HEALTH_JSON=$HEALTH_JSON"

          python3 - "$HEALTH_JSON" <<'PY'
          import json
          import sys

          payload = json.loads(sys.argv[1])
          print("HEALTH_STATUS=" + str(payload.get("status")))
          print("HEALTH_RELEASE_ID=" + str(payload.get("release_id")))
          print("HEALTH_CHANNEL=" + str(payload.get("channel")))
          if payload.get("status") != "healthy" or not payload.get("release_id"):
              raise SystemExit(3)
          if payload.get("channel") != "production":
              raise SystemExit(4)
          PY
          REMOTE
