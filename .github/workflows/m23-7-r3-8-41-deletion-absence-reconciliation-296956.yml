name: M23.7 R3.8.41 Deletion/Absence Reconciliation 296956

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-41/deletion-absence-reconciliation-29695654053.json"
      - "docs/architecture/m23-7-r3-8-41-deletion-absence-reconciliation-296956.md"
      - ".github/workflows/m23-7-r3-8-41-deletion-absence-reconciliation-296956.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor aaf4b5f195679be20c174dbdd40b4b91d6039442 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic independent cleanup reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-41/deletion-absence-reconciliation-29695654053.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "40b36aad5304a0282354d733a5bc378e7b7e04f2e5bb68e4fe82d86e73cc1704"
          assert value["issue"] == 949
          assert value["seal_issue"] == 947
          assert value["seal_pr"] == 948
          assert value["seal_accepted_head"] == "391a3ca59a3659bea7928f3b2514a61d72f91931"
          assert value["seal_merge_sha"] == "aaf4b5f195679be20c174dbdd40b4b91d6039442"
          assert value["seal_sha256"] == "e8f7717c60ed1a97627af238cd04e4abf9d744228332372d92882adcff512b9c"
          assert value["seal_exact_head_runs"] == {
              "architecture_canon": 29695811329,
              "ci": 29695811330,
              "graph_v2": 29695811334,
              "seal": 29695811365,
          }
          sealed = value["sealed_evidence"]
          assert sealed["deletion"]["run_id"] == "29694753814"
          assert sealed["deletion"]["artifact_id"] == 8444646168
          assert sealed["deletion"]["worker_delete_dispatched"] is True
          assert sealed["post_delete_probe"]["run_id"] == "29695654053"
          assert sealed["post_delete_probe"]["artifact_id"] == 8444910746
          assert sealed["post_delete_probe"]["worker_state"] == "worker_absent"
          result = value["result"]
          assert result["deletion_dispatch_reconciled"] is True
          assert result["post_delete_absence_reconciled"] is True
          assert result["retained_worker_cleanup_complete"] is True
          assert result["worker_lifecycle_clean"] is True
          assert result["worker_state"] == "worker_absent"
          assert result["next_gate"] == "fresh_region_v3_attempt_1_observation"
          assert result["blocker_clearance_eligible"] is False
          authority = value["authority"]
          assert authority["evidence_reconciliation_only"] is True
          assert authority["worker_deletion_replay_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-41/deletion-absence-reconciliation-29695654053.json",
              "docs/architecture/m23-7-r3-8-41-deletion-absence-reconciliation-296956.md",
              ".github/workflows/m23-7-r3-8-41-deletion-absence-reconciliation-296956.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "aaf4b5f195679be20c174dbdd40b4b91d6039442", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code aaf4b5f195679be20c174dbdd40b4b91d6039442 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_operator_region_v3.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
