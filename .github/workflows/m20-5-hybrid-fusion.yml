name: M20.5 Hybrid fusion

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m20_hybrid_fusion.py"
      - "src/knowledge_engine/m20_retrieval_modes.py"
      - "tests/test_m20_5_hybrid_fusion.py"
      - "tests/test_m20_4_retrieval_modes.py"
      - "docs/architecture/m20/m20-5-hybrid-fusion.md"
      - ".github/workflows/m20-5-hybrid-fusion.yml"
      - "src/knowledge_engine/m20_runtime_semantic.py"
      - "src/knowledge_engine/m20_semantic_artifacts.py"
      - "src/knowledge_engine/m20_embedding_contract.py"
      - "src/knowledge_engine/_m20_embedding_*.py"
      - "benchmarks/m20/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hybrid-fusion:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install exact project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Lint M20.5 scope
        run: |
          ruff check \
            src/knowledge_engine/m20_hybrid_fusion.py \
            tests/test_m20_5_hybrid_fusion.py
      - name: Test M20.1 through M20.5 contracts
        run: |
          pytest -q \
            tests/test_m20_1_embedding_contract.py \
            tests/test_m20_2_semantic_artifacts.py \
            tests/test_m20_3_runtime_semantic.py \
            tests/test_m20_4_retrieval_modes.py \
            tests/test_m20_5_hybrid_fusion.py \
            tests/test_runtime.py
      - name: Prove deterministic rank-only fusion
        run: |
          python - <<'PY'
          from pathlib import Path

          module = Path(
              'src/knowledge_engine/m20_hybrid_fusion.py'
          ).read_text(encoding='utf-8')
          api = Path('src/knowledge_engine/api.py').read_text(encoding='utf-8')
          runtime = Path('src/knowledge_engine/runtime.py').read_text(encoding='utf-8')
          assert 'RRF_K = 60' in module
          assert 'reciprocal_rank_fuse' in module
          assert 'fused_candidates' in module
          assert 'lexical_contribution' in module
          assert 'vector_contribution' in module
          assert 'weighted_fusion' not in module
          assert 'raw_score' not in module
          assert 'm20_hybrid_fusion' not in api
          assert 'm20_hybrid_fusion' not in runtime
          PY
      - name: Scan authority and dependency boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          scope = Path(
              'src/knowledge_engine/m20_hybrid_fusion.py'
          ).read_text(encoding='utf-8')
          forbidden = (
              'import numpy',
              'import torch',
              'sentence_transformers',
              'qdrant',
              'faiss',
              'chromadb',
              'requests.',
              'httpx.',
              'boto3.',
              'put_object',
              'production pointer',
              'alias_boost',
              'tag_boost',
              'relation_boost',
              'reranker',
          )
          findings = [token for token in forbidden if token in scope]
          assert not findings, findings
          assert Path('pyproject.toml').read_text(encoding='utf-8').count('numpy') == 0
          PY
      - name: Compile M20.5 scope
        run: |
          python -m compileall -q \
            src/knowledge_engine/m20_hybrid_fusion.py \
            tests/test_m20_5_hybrid_fusion.py
