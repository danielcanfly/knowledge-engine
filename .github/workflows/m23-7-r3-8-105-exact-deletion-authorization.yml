name: M23.7 R3.8.105 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29584764087.json"
      - "docs/architecture/m23-7-r3-8-105-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-105-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor c36372335b23a1a6749f6a0469d1486afd73552c HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization

          path = "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29584764087.json"
          value = validate_authorization(Path(path))
          assert value["authorization_sha256"] == "f4e3276976db3df3c02d6c1f2cc1d7c2afd9dac563c5a404c1e96665c6b98ef7"
          assert value["worker_name"] == "knowledge-engine-r3-8-29584764087"
          assert value["observation_run_id"] == "29584764087"
          assert value["recovery_run_id"] == "29585094990"
          assert value["receipt_sha256"] == "3ed02050d849e0deb32f7a32373cd0ee3ae12bb1fc317a76625187762209a568"
          assert value["evidence_seal_sha256"] == "d27d145db5c5d3bac6f14ec9b5726acfbdf7b66fad07c15fff5256c281052e0d"
          assert value["independent_reconciliation_sha256"] == "27ac1d722dfbbec558d15911ffc187afe3987fdb0b5e1f728d33226693857fa7"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29584764087.json",
              "docs/architecture/m23-7-r3-8-105-exact-deletion-authorization.md",
              ".github/workflows/m23-7-r3-8-105-exact-deletion-authorization.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "c36372335b23a1a6749f6a0469d1486afd73552c", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code c36372335b23a1a6749f6a0469d1486afd73552c HEAD --             scripts/m23_7_r3_8_remote_delete.py             tests/test_m23_7_r3_8_remote_delete.py             .github/workflows/m23-7-r3-8-remote-delete.yml             scripts/m23_7_r3_8_remote_operator.py             src/knowledge_engine/m23_7_r3_8_latency_repair.py
