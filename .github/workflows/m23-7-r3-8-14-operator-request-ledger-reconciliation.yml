name: M23.7 R3.8.14 Operator Request Ledger Reconciliation

on:
  pull_request:
    paths:
      - "pilot/m23/m23-7-r3-8-14-operator-request-ledger-reconciliation.json"
      - "docs/architecture/m23-7-r3-8-14-operator-request-ledger-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-14-operator-request-ledger-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact head and implementation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 7af93ece0078aab08b43c2709709825a22ad6d2d HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Re-run request, telemetry and recovery tests
        run: |
          ruff check scripts/m23_operator_request_bus.py tests/test_m23_operator_request_bus.py
          python -m py_compile scripts/m23_operator_request_bus.py
          pytest -q tests/test_m23_operator_request_bus.py tests/test_m23_operator_status_comment.py tests/test_m23_7_r3_8_post_delete_recovery.py

      - name: Verify reconciliation digest and accepted identities
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(
              "pilot/m23/"
              "m23-7-r3-8-14-operator-request-ledger-reconciliation.json"
          )
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(
              value,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "5c93e393d841a80911e6ed808252d294c8a1f757a6bb7701ab285988b1a4e929"
          implementation = value["implementation"]
          assert implementation["accepted_head"] == "4da6a81f5a7f70939eacfe9d195d795e0e580678"
          assert implementation["merge_sha"] == "7af93ece0078aab08b43c2709709825a22ad6d2d"
          assert implementation["authorization_sha256"] == "ccafc925c4db5f6398d3ac1fa45d63831e6eaa047cc3d09e725ceef8833a56ff"
          assert implementation["contract_sha256"] == "039eee1a7a3731bb5942b5c556fe3db038a68d7c816b505de905c2683161fb29"
          assert len(implementation["changed_files"]) == 10
          assert all(
              item["conclusion"] == "success"
              for item in value["exact_head_workflows"].values()
          )
          findings = value["findings"]
          assert findings["execution_trigger"] == "push_main_request_path"
          assert findings["issue_comment_execution_active"] is False
          assert findings["single_added_request_required"] is True
          assert findings["request_modification_allowed"] is False
          assert findings["request_pr_validation_present"] is True
          assert findings["static_routes"] == ["r3_8_post_delete_recovery"]
          authority = value["authority"]
          assert authority["production_retrieval"] == "lexical"
          assert authority["retrieval_quality_blocker"] == "active"
          assert authority["latency_blocker"] == "active"
          assert authority["blocker_clearance_authorized"] is False
          PY

      - name: Verify exact implementation file set
        shell: bash
        run: |
          python - <<'PY'
          import subprocess

          expected = {
              ".github/workflows/m23-7-r3-8-12-operator-command-bus-ci.yml",
              ".github/workflows/m23-7-r3-8-13-operator-telemetry-ci.yml",
              ".github/workflows/m23-7-r3-8-14-operator-request-ledger-ci.yml",
              ".github/workflows/m23-operator-command-bus.yml",
              ".github/workflows/m23-operator-request-ci.yml",
              "docs/architecture/m23-7-r3-8-14-operator-request-ledger.md",
              "operator_authorizations/m23/r3-8/post-delete-recovery-29521901629-v3.json",
              "pilot/m23/m23-7-r3-8-14-operator-request-ledger-contract.json",
              "scripts/m23_operator_request_bus.py",
              "tests/test_m23_operator_request_bus.py",
          }
          changed = set(
              subprocess.check_output(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      "9d346573057e9fe3b5960a938784451d7c84bd5f",
                      "7af93ece0078aab08b43c2709709825a22ad6d2d",
                  ],
                  text=True,
              ).splitlines()
          )
          assert changed == expected, (changed, expected)
          PY

      - name: Verify push-only request execution and request PR gate
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          execute_path = Path(".github/workflows/m23-operator-command-bus.yml")
          execute = yaml.safe_load(execute_path.read_text(encoding="utf-8"))
          assert "push" in execute[True]
          assert "issue_comment" not in execute[True]
          assert "workflow_dispatch" not in execute[True]
          push = execute[True]["push"]
          assert push["branches"] == ["main"]
          assert push["paths"] == ["operator_requests/m23/**"]
          execute_text = execute_path.read_text(encoding="utf-8")
          assert "python -m scripts.m23_operator_request_bus" in execute_text
          assert "github.event.before" in execute_text
          assert "github.event.after" in execute_text
          assert "Report accepted request identity" in execute_text
          assert "Report final governed route result" in execute_text

          request_path = Path(".github/workflows/m23-operator-request-ci.yml")
          request = yaml.safe_load(request_path.read_text(encoding="utf-8"))
          assert request[True]["pull_request"]["paths"] == ["operator_requests/m23/**"]
          request_text = request_path.read_text(encoding="utf-8")
          assert "Validate single immutable request and authorization" in request_text
          assert "Verify request-only PR scope" in request_text
          assert "Verify request grants no new authority" in request_text
          PY

      - name: Verify telemetry issue remains locked
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          url = (
              "https://api.github.com/repos/"
              f"{os.environ['GITHUB_REPOSITORY']}/issues/565"
          )
          request = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              issue = json.load(response)
          assert issue["number"] == 565
          assert issue["state"] == "open"
          assert issue["locked"] is True
          PY

      - name: Verify reconciliation-only change scope
        run: |
          python - <<'PY'
          import subprocess

          expected = {
              ".github/workflows/m23-7-r3-8-14-operator-request-ledger-reconciliation.yml",
              "docs/architecture/m23-7-r3-8-14-operator-request-ledger-reconciliation.md",
              "pilot/m23/m23-7-r3-8-14-operator-request-ledger-reconciliation.json",
          }
          changed = set(
              subprocess.check_output(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      "7af93ece0078aab08b43c2709709825a22ad6d2d",
                      "HEAD",
                  ],
                  text=True,
              ).splitlines()
          )
          assert changed == expected, (changed, expected)
          PY
          git diff --exit-code 7af93ece0078aab08b43c2709709825a22ad6d2d HEAD -- .github/workflows/m23-operator-command-bus.yml .github/workflows/m23-operator-request-ci.yml scripts/m23_operator_request_bus.py tests/test_m23_operator_request_bus.py operator_authorizations/m23/r3-8/post-delete-recovery-29521901629-v3.json pilot/m23/m23-7-r3-8-14-operator-request-ledger-contract.json
