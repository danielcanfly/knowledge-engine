name: M14 Public Product Acceptance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/knowledge_engine/m14_*.py'
      - 'scripts/m14_public_product_acceptance.py'
      - 'tests/test_m14_acceptance.py'
      - 'tests/test_m14_*.py'
      - 'docs/architecture/m14/**'
      - '.github/workflows/m14-public-product-acceptance.yml'
      - '.github/workflows/r2-canary.yml'
      - '.github/workflows/r2-release-integration.yml'
      - '.github/workflows/m13-three-batch-acceptance.yml'
  push:
    branches: [main]
    paths:
      - 'src/knowledge_engine/m14_*.py'
      - 'scripts/m14_public_product_acceptance.py'
      - 'tests/test_m14_acceptance.py'
      - 'docs/architecture/m14/**'
      - '.github/workflows/m14-public-product-acceptance.yml'

permissions:
  contents: read

jobs:
  public-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Run M14 unit acceptance tests
        run: pytest tests/test_m14_acceptance.py tests/test_m14_public_query.py tests/test_m14_retrieval.py tests/test_m14_source_cards.py tests/test_m14_interfaces.py tests/test_m14_security.py tests/test_m14_feedback.py -q
      - name: Build deterministic M14 public product acceptance artifact
        env:
          APP_ENV: test
          AUTH_MODE: disabled
          OBJECT_STORE_BACKEND: filesystem
          FILESYSTEM_STORE_ROOT: .artifacts/m14-public-product-store
          CHANNEL: production
          CACHE_DIR: .artifacts/m14-public-product-cache
          ENGINE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          python scripts/m14_public_product_acceptance.py \
            --engine-sha "$ENGINE_SHA" \
            --canonical-source-sha '2126db2ed4d372d3d61464fe31a86fc0243a1f24' \
            --production-release-id '20260708T040116Z-69a9f445699a' \
            --production-manifest-sha256 '2b2630cfe3e8a6e25a8f210d68c70f3b9a31b3b26f33c6e3e41b8cc1676fc0bb' \
            --production-pointer-sha256 '38e12c8686ee4ccf2beae0f073dead41b78e8f4548fdf7a4b0d0e273353906b5' \
            --ledger-comments 13 \
            --output /tmp/m14-public-product-acceptance.json
          python -m json.tool /tmp/m14-public-product-acceptance.json > /tmp/m14-public-product-acceptance.pretty.json
          grep -F 'knowledge-engine-m14-public-product-acceptance/v1' /tmp/m14-public-product-acceptance.pretty.json
      - name: Upload M14 acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m14-public-product-acceptance-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/m14-public-product-acceptance.json
            /tmp/m14-public-product-acceptance.pretty.json
          if-no-files-found: ignore
          retention-days: 30
