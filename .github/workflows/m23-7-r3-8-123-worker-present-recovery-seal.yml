name: M23.7 R3.8.123 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-123/worker-present-recovery-seal-29598351528.json"
      - "docs/architecture/m23-7-r3-8-123-worker-present-recovery-seal-29598351528.md"
      - ".github/workflows/m23-7-r3-8-123-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor e2c4275f7e483e7e52d4888b8f00ce1a8d510803 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          path = Path(".github/evidence/m23-7-r3-8-123/worker-present-recovery-seal-29598351528.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "748bd78dd7f524a6200239aa50f9984c82e50c0396e49dee5361bc12fd77bd23"
          assert value["recovery_authorization_prs"] == [838]
          assert value["recovery_authorization_merge_sha"] == "e2c4275f7e483e7e52d4888b8f00ce1a8d510803"
          assert value["recovery_run_id"] == "29598351528"
          assert value["artifact"]["artifact_id"] == 8413963543
          assert value["artifact"]["zip_sha256"] == "8f3451d905df13febaa8991938b07e75e2448b084b9dd2ea2dc34a8f574d6e98"
          assert value["artifact"]["receipt_file_sha256"] == "ecc8ddd806151394576329e007cfc03b290f6c2062f11b7cf96500ae31fd742b"
          assert value["artifact"]["receipt_self_digest"] == "a2a47edbce9423b2e4da976478f3efff339dcb499f3272bd642b6126b8f63cb2"
          receipt = value["receipt"]
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29597922646"
          assert receipt["affected_run_id"] == "29597922646"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          for field in ("worker_delete_dispatched","worker_deploy_dispatched","worker_route_invoked","worker_secret_mutation_dispatched","qdrant_read_dispatched","qdrant_mutation_dispatched","r2_read_dispatched","r2_mutation_dispatched","protected_mutations_dispatched"):
              assert receipt[field] is False
          assert value["authority"]["worker_deletion_authorized"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-123/worker-present-recovery-seal-29598351528.json",
              "docs/architecture/m23-7-r3-8-123-worker-present-recovery-seal-29598351528.md",
              ".github/workflows/m23-7-r3-8-123-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(["git", "diff", "--name-only", "e2c4275f7e483e7e52d4888b8f00ce1a8d510803", "HEAD"], text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code e2c4275f7e483e7e52d4888b8f00ce1a8d510803 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
