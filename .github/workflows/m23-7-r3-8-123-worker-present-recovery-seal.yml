name: M23.7 R3.8.123 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-123/worker-present-recovery-seal-29603119791.json"
      - "docs/architecture/m23-7-r3-8-123-worker-present-recovery-seal-29603119791.md"
      - ".github/workflows/m23-7-r3-8-123-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 26fddfef03769c3498402515cd204ee0656a53d5 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          path = Path(".github/evidence/m23-7-r3-8-123/worker-present-recovery-seal-29603119791.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "3ae42e3ddf43645b8302b6f96cce02aba7be7975443ccc4ce76b96914694ecd2"
          assert value["recovery_authorization_prs"] == [852]
          assert value["recovery_authorization_merge_sha"] == "26fddfef03769c3498402515cd204ee0656a53d5"
          assert value["recovery_run_id"] == "29603119791"
          assert value["artifact"]["artifact_id"] == 8415783881
          assert value["artifact"]["zip_sha256"] == "785f3a587a2504b52465c12bdc64af390d7a9d5d6c6a21e8318eabcbf7be5300"
          assert value["artifact"]["receipt_file_sha256"] == "a813af34cdcc0834664c67c3879e0ecbd2f7553168200afc537b3b00f5e39db4"
          assert value["artifact"]["receipt_self_digest"] == "f767d7ba906f487da970d1a27577c8521e8ff73308b1cb4565423be33982b792"
          receipt = value["receipt"]
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29602737093"
          assert receipt["affected_run_id"] == "29602737093"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          for field in ("worker_delete_dispatched","worker_deploy_dispatched","worker_route_invoked","worker_secret_mutation_dispatched","qdrant_read_dispatched","qdrant_mutation_dispatched","r2_read_dispatched","r2_mutation_dispatched","protected_mutations_dispatched"):
              assert receipt[field] is False
          assert value["authority"]["worker_deletion_authorized"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-123/worker-present-recovery-seal-29603119791.json",
              "docs/architecture/m23-7-r3-8-123-worker-present-recovery-seal-29603119791.md",
              ".github/workflows/m23-7-r3-8-123-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(["git", "diff", "--name-only", "26fddfef03769c3498402515cd204ee0656a53d5", "HEAD"], text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 26fddfef03769c3498402515cd204ee0656a53d5 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
