name: M23.7 R3.8.123 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-123/worker-present-recovery-seal-29600907404.json"
      - "docs/architecture/m23-7-r3-8-123-worker-present-recovery-seal-29600907404.md"
      - ".github/workflows/m23-7-r3-8-123-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 5d61d378f0965b2803e8bd73d7fb75fb7d067fe9 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          path = Path(".github/evidence/m23-7-r3-8-123/worker-present-recovery-seal-29600907404.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "fc5efeb8eded1e94b71dc8ae82e815010da0df7cb9d32244667dff67109c4d14"
          assert value["recovery_authorization_prs"] == [845]
          assert value["recovery_authorization_merge_sha"] == "5d61d378f0965b2803e8bd73d7fb75fb7d067fe9"
          assert value["recovery_run_id"] == "29600907404"
          assert value["artifact"]["artifact_id"] == 8414955839
          assert value["artifact"]["zip_sha256"] == "b1ae363611c642e31fde8d07b6e8b48529bfb921e60925f7d2f1d6a32fab065e"
          assert value["artifact"]["receipt_file_sha256"] == "b61d3cba0fa9a3e3091361a9ff374c806e36f36776331cd743c6530c596a18a9"
          assert value["artifact"]["receipt_self_digest"] == "df2ab8d6d854ea55a64943d4ed6849a5a5358455603526683ce66ff70fc8baeb"
          receipt = value["receipt"]
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29600412694"
          assert receipt["affected_run_id"] == "29600412694"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          for field in ("worker_delete_dispatched","worker_deploy_dispatched","worker_route_invoked","worker_secret_mutation_dispatched","qdrant_read_dispatched","qdrant_mutation_dispatched","r2_read_dispatched","r2_mutation_dispatched","protected_mutations_dispatched"):
              assert receipt[field] is False
          assert value["authority"]["worker_deletion_authorized"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-123/worker-present-recovery-seal-29600907404.json",
              "docs/architecture/m23-7-r3-8-123-worker-present-recovery-seal-29600907404.md",
              ".github/workflows/m23-7-r3-8-123-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(["git", "diff", "--name-only", "5d61d378f0965b2803e8bd73d7fb75fb7d067fe9", "HEAD"], text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 5d61d378f0965b2803e8bd73d7fb75fb7d067fe9 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
