name: M9 Targeted Runtime Acceptance

on:
  pull_request:
    paths:
      - ".github/workflows/m9-targeted-runtime-acceptance.yml"
      - "scripts/governed_runtime_acceptance.py"
      - "tests/test_governed_runtime_acceptance.py"
      - "governed_batches/evidence/m9-001-runtime-acceptance-contract.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-acceptance:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      CONTRACT: governed_batches/evidence/m9-001-runtime-acceptance-contract.json
      OUT_DIR: evidence/m9-targeted-runtime-acceptance
    steps:
      - name: Check out exact Engine revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install exact Engine
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Verify read-only runtime configuration
        run: |
          set -euo pipefail
          test -n "$R2_ACCESS_KEY_ID"
          test -n "$R2_SECRET_ACCESS_KEY"
          test -n "$R2_BUCKET"
          test -n "$R2_ENDPOINT_URL"
          python - <<'PY'
          import json
          from pathlib import Path

          contract = json.loads(Path(
              "governed_batches/evidence/m9-001-runtime-acceptance-contract.json"
          ).read_text(encoding="utf-8"))
          assert contract["batch_id"] == "m9-001-agent-planning-strategies"
          assert contract["candidate"]["channel"] == (
              "candidate-source-2126db2ed4d372d3d61464fe31a86fc0243a1f24"
          )
          assert contract["candidate"]["release_id"] == (
              "20260708T040116Z-69a9f445699a"
          )
          assert contract["candidate"]["manifest_sha256"] == (
              "2b2630cfe3e8a6e25a8f210d68c70f3"
              "b9a31b3b26f33c6e3e41b8cc1676fc0bb"
          )
          assert contract["requirements"]["production_mutation_authorized"] is False
          assert contract["requirements"]["raw_fallback_allowed"] is False
          print("M9_RUNTIME_ACCEPTANCE_CONTRACT_PINNED")
          PY

      - name: Run generic acceptance unit tests
        run: python -m pytest -q tests/test_governed_runtime_acceptance.py

      - name: Run targeted M9 candidate acceptance
        run: |
          set -euo pipefail
          python scripts/governed_runtime_acceptance.py \
            --contract "$CONTRACT" \
            --out-dir "$OUT_DIR"

      - name: Verify no production authorization exists
        if: always()
        run: |
          set -euo pipefail
          test ! -e production_promotions/m9-001-agent-planning-strategies.json
          python - <<'PY'
          import json
          from pathlib import Path

          spec = json.loads(Path(
              "governed_batches/m9-001-agent-planning-strategies.json"
          ).read_text(encoding="utf-8"))
          assert spec["lifecycle_state"] == "candidate_built"
          assert spec["production_request"] == {
              "operation_id": None,
              "request_path": None,
          }
          print("M9_PRODUCTION_BOUNDARY_PRESERVED")
          PY

      - name: Upload targeted runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m9-targeted-runtime-acceptance-${{ github.sha }}
          path: evidence/m9-targeted-runtime-acceptance/
          if-no-files-found: error
          retention-days: 90
