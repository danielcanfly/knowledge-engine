name: M25.5 Reconciliation
on:
  pull_request:
    paths:
      - '.github/workflows/m25-5-reconciliation.yml'
      - 'docs/architecture/m25/m25-5-reconciliation.md'
      - 'pilot/m25/m25-5-acceptance.json'
      - 'tests/test_m25_5-reconciliation.py'
permissions:
  contents: read
  actions: read
  issues: read
  pull-requests: read
jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify remote identity and evidence
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor 8ae3e77b8f9ffbd3df5ec820cca04b0b47413e02 HEAD
          python - <<'PY'
          import json,os,urllib.request
          base='https://api.github.com/repos/danielcanfly/knowledge-engine'
          token=os.environ['GH_TOKEN']
          def get(path):
              r=urllib.request.Request(base+path,headers={'Authorization':f'Bearer {token}','Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'})
              return json.load(urllib.request.urlopen(r))
          pr=get('/pulls/1050'); issue=get('/issues/1049')
          assert pr['merged_at'] and pr['head']['sha']=='525830b33af3baeb8bebe24fb696b3e32f19c502'
          assert pr['merge_commit_sha']=='8ae3e77b8f9ffbd3df5ec820cca04b0b47413e02'
          assert issue['state']=='closed'
          runs=[29981875995,29981876073,29981876036,29981875994,29981875977,29981875914,29981875982,29981875922,29981875912]
          for run_id in runs:
              run=get(f'/actions/runs/{run_id}')
              assert run['head_sha']=='525830b33af3baeb8bebe24fb696b3e32f19c502' and run['conclusion']=='success'
          artifact=get('/actions/artifacts/8553489444')
          assert artifact['name']=='m25-5-identity-governance-evidence'
          assert artifact['digest']=='sha256:e78247796916a75e4cf0356f78de5a79112a02cd242ea318675e47e31c8dd2bb'
          open('/tmp/resolved.json','w').write(json.dumps({'head_sha':os.environ['HEAD_SHA'],'implementation_merge':'8ae3e77b8f9ffbd3df5ec820cca04b0b47413e02','verified_runs':runs,'artifact_digest':artifact['digest']},indent=2)+'\n')
          PY
      - name: Validate reconciliation contract
        run: |
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m ruff check tests/test_m25_5_reconciliation.py
          python -m pytest -q tests/test_m25_5_reconciliation.py tests/test_m25_5_identity_governance.py tests/test_m25_5_identity_governance_contracts.py
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          expected="$(printf '%s\n' '.github/workflows/m25-5-reconciliation.yml' 'docs/architecture/m25/m25-5-reconciliation.md' 'pilot/m25/m25-5-acceptance.json' 'tests/test_m25_5_reconciliation.py' | sort)"
          test "$changed" = "$expected"
          python -m compileall -q tests/test_m25_5_reconciliation.py
      - uses: actions/upload-artifact@v4
        with:
          name: m25-5-resolved-identity
          path: /tmp/resolved.json
          if-no-files-found: error
          retention-days: 30
