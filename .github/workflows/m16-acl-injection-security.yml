name: M16 ACL and Injection Security Acceptance

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m16_acl_injection_security.py"
      - "tests/test_m16_acl_injection_security.py"
      - "docs/architecture/m16/**"
      - ".github/workflows/m16-acl-injection-security.yml"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acl-injection-security:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run M16.2 ACL and injection security acceptance
        run: python -m pytest -q tests/test_m16_acl_injection_security.py
