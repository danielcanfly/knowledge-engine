name: M25.4 Resolver Discovery

on:
  pull_request:
    paths:
      - '.github/workflows/m25-4-discovery.yml'

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - name: Collect resolver and benchmark surfaces
        run: |
          set -euo pipefail
          mkdir -p /tmp/m25-4-discovery/files
          find src tests docs pilot schemas scripts -type f 2>/dev/null \
            | sort \
            | while read -r path; do
                if grep -Eqi 'm21|identity|resolver|resolution|benchmark|gold.?set|alias|duplicate|supersession|contradiction|polysemy' "$path"; then
                  mkdir -p "/tmp/m25-4-discovery/files/$(dirname "$path")"
                  cp "$path" "/tmp/m25-4-discovery/files/$path"
                  printf '%s\n' "$path"
                fi
              done > /tmp/m25-4-discovery/matched-files.txt
          find src/knowledge_engine tests -maxdepth 1 -type f \
            \( -iname '*m21*' -o -iname '*resol*' -o -iname '*identity*' -o -iname '*benchmark*' \) \
            -print | sort > /tmp/m25-4-discovery/name-matches.txt
          python - <<'PY'
          import ast
          import json
          from pathlib import Path

          records = []
          for raw in Path('/tmp/m25-4-discovery/matched-files.txt').read_text().splitlines():
              path = Path(raw)
              if path.suffix != '.py':
                  continue
              try:
                  tree = ast.parse(path.read_text(encoding='utf-8'))
              except (SyntaxError, UnicodeDecodeError):
                  continue
              records.append({
                  'path': raw,
                  'functions': sorted(
                      node.name for node in ast.walk(tree)
                      if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef))
                  ),
                  'classes': sorted(
                      node.name for node in ast.walk(tree)
                      if isinstance(node, ast.ClassDef)
                  ),
              })
          Path('/tmp/m25-4-discovery/python-symbols.json').write_text(
              json.dumps(records, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
          tar -C /tmp/m25-4-discovery -czf /tmp/m25-4-discovery.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: m25-4-resolver-discovery
          path: /tmp/m25-4-discovery.tar.gz
          if-no-files-found: error
          retention-days: 7
