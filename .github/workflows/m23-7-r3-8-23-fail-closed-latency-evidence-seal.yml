name: M23.7 R3.8.23 Fail-Closed Latency Evidence Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29607698618.json"
      - ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29610393567.json"
      - ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29613277172.json"
      - ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29636761264.json"
      - "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29607698618.md"
      - "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29610393567.md"
      - "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29613277172.md"
      - "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29636761264.md"
      - ".github/workflows/m23-7-r3-8-23-fail-closed-latency-evidence-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and observation ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor fc1dca7186fa66db153489a90a7b369ca053db61 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic fail-closed latency seal
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29636761264.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "054686bb456797a6fa3017a96a0496075d2f0efa7f96b2b85664c30ff76b88d4"
          assert value["issue"] == 897
          assert value["source"]["observation_run_id"] == "29636761264"
          assert value["source"]["engine_sha"] == "fc1dca7186fa66db153489a90a7b369ca053db61"
          assert value["artifact"]["id"] == 8427348020
          assert value["artifact"]["zip_sha256"] == "21fb4a9421e1e3cd73608d0b8a5c234a5f1776b39f6938dc851197c42e247c3c"
          assert value["artifact"]["remote_entry_file_sha256"] == "48112153928c62e60bb15286db592a220fba9eb3c6e08908d24a570a3269588a"
          assert value["artifact"]["remote_entry_self_digest"] == "63a62c27ab4781a79bac96745d3e1c0400895270d9efee865c3d53fc10647862"
          assert value["artifact"]["receipt_file_sha256"] == "1f9a88e07ab69b3afa347f83de40e7003e52c351f7b489772ed77515605d87fd"
          assert value["artifact"]["receipt_self_digest"] == "71a1ddf50c497e9c59dd4d16895d4e8123f92c3e947b4b4ea1cca2a122bfb5d3"
          assert value["artifact"]["remote_lifecycle_file_sha256"] == "8023d86bc7f1d233adf625a07fab012b717dd394803d17125dd01464fafeb3e2"
          assert value["artifact"]["remote_lifecycle_self_digest"] == "fe5209667c0e98221180c5c1cb169d4953786a5f3ab8520605da84470aa108fa"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_fail_closed_latency_repair"
          assert receipt["contract_sha256"] == "d081ab57a85b4ea813aeb813090b597340b8c3842ff78d7022d38501e6c282ba"
          assert receipt["metrics"] == receipt["accepted_metrics"]
          assert receipt["target_ranks"] == receipt["accepted_target_ranks"]
          assert receipt["query_count"] == 24
          assert receipt["query_identity_count"] == 24
          assert receipt["probe_count"] == 8
          assert receipt["maximum_top10_hub_frequency"] == 3
          false_gates = [key for key, enabled in receipt["gates"].items() if enabled is not True]
          assert false_gates == ["worker_internal_shadow"], false_gates
          latency = value["latency"]
          assert latency["shadow_ms"] == 1890
          assert latency["maximum_shadow_ms"] == 1200
          assert latency["provider_ms"] == 991
          assert latency["qdrant_ms"] == 899
          assert latency["failed_gate"] == "worker_internal_shadow"
          worker = value["worker"]
          assert worker["name"] == "knowledge-engine-r3-8-29636761264"
          assert worker["version_id"] == "03522a60-0bcc-42c0-b315-e845891538b2"
          assert worker["retained"] is True
          assert worker["deletion_authorization_required"] is True
          assert worker["external_calls"]["qdrant_query_batch"] == 1
          assert worker["external_calls"]["qdrant_single_query"] == 0
          assert worker["external_calls"]["workers_ai_binding"] == 1
          assert value["result"]["latency_repair_result_complete"] is True
          assert value["result"]["latency_repair_passed"] is False
          assert value["result"]["blocker_clearance_eligible_after_reconciliation"] is False
          assert value["result"]["remote_lifecycle_says_worker_retained"] is True
          assert value["authority"]["production_retrieval"] == "lexical"
          assert value["authority"]["worker_deletion_authorized_by_this_seal"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["retrieval_quality_blocker_cleared"] is False
          assert value["authority"]["latency_blocker_cleared"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          PY
      - name: Verify privacy and exact seal scope
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          allowed = {
              ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29636761264.json",
              "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29636761264.md",
              ".github/workflows/m23-7-r3-8-23-fail-closed-latency-evidence-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "fc1dca7186fa66db153489a90a7b369ca053db61", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)

          privacy_checked = {
              ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29636761264.json",
              "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29636761264.md",
          }
          text = "\n".join(Path(path).read_text(encoding="utf-8") for path in privacy_checked)
          for forbidden in (
              "CLOUDFLARE_API_TOKEN",
              "QDRANT_API_KEY",
              "QDRANT_URL",
              "raw_query",
              "document_text",
          ):
              assert forbidden not in text
          PY
