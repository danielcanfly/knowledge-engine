name: M23.7 R3.8.23 Fail-Closed Latency Evidence Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29607698618.json"
      - ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29610393567.json"
      - "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29607698618.md"
      - "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29610393567.md"
      - ".github/workflows/m23-7-r3-8-23-fail-closed-latency-evidence-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and observation ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor fd00b915c8a9e906ec96fe3f55c859ee3565afd2 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic fail-closed latency seal
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29610393567.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "df97373c519c138c254965a6f91bed8c76af238b85ce7cbcc3dd51867c8669d6"
          assert value["issue"] is None
          assert value["source"]["observation_run_id"] == "29610393567"
          assert value["source"]["engine_sha"] == "fd00b915c8a9e906ec96fe3f55c859ee3565afd2"
          assert value["artifact"]["id"] == 8418494326
          assert value["artifact"]["zip_sha256"] == "c82dcf8c8763879c9fc1d0ff9f2b39fc1d6ad597ae5ac792f0975cafd6c6bb05"
          assert value["artifact"]["remote_entry_file_sha256"] == "c2a879766d015a62271093ca29858a2caffdf2ff5b621e223e588d4671c76ca4"
          assert value["artifact"]["remote_entry_self_digest"] == "b85362f7f6146c30336a4f3c8737d5ece15859f61ed62913aae620d08cae126a"
          assert value["artifact"]["receipt_file_sha256"] == "4d4d61cc5b770f3b50c08e9ac8f4b5dd7a0ec7605b0360eecefa9a37b321a743"
          assert value["artifact"]["receipt_self_digest"] == "7bf003232f9d275d1e90eabb276bfceb8e40f76b36fa7d08ec9e95bb8c0ff130"
          assert value["artifact"]["remote_lifecycle_file_sha256"] == "24eb964866cc9d25d1e662af08fa940324ae995092a914df81925d4385439040"
          assert value["artifact"]["remote_lifecycle_self_digest"] == "6284cfe9e78247754c44d2c02aeffcda4a5c558e5e4449bd7694f02cfa89be1a"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_fail_closed_latency_repair"
          assert receipt["metrics"] != receipt["accepted_metrics"]
          assert receipt["target_ranks"] != receipt["accepted_target_ranks"]
          assert receipt["query_count"] == 24
          assert receipt["query_identity_count"] == 24
          assert receipt["probe_count"] == 8
          assert receipt["maximum_top10_hub_frequency"] == 6
          false_gates = [key for key, enabled in receipt["gates"].items() if enabled is not True]
          assert false_gates == [
              "accepted_metric_parity",
              "exact_target_rank_parity",
              "worker_internal_shadow",
          ], false_gates
          latency = value["latency"]
          assert latency["shadow_ms"] == 3012
          assert latency["maximum_shadow_ms"] == 1200
          assert latency["provider_ms"] == 589
          assert latency["qdrant_ms"] == 2423
          assert latency["failed_gate"] == "quality_parity_and_worker_internal_shadow"
          worker = value["worker"]
          assert worker["name"] == "knowledge-engine-r3-8-29610393567"
          assert worker["version_id"] == "82247513-1864-46bc-b475-77e287d1c750"
          assert worker["retained"] is True
          assert worker["deletion_authorization_required"] is True
          assert worker["external_calls"]["qdrant_query_batch"] == 1
          assert worker["external_calls"]["qdrant_single_query"] == 0
          assert worker["external_calls"]["workers_ai_binding"] == 1
          assert value["result"]["latency_repair_result_complete"] is True
          assert value["result"]["latency_repair_passed"] is False
          assert value["result"]["blocker_clearance_eligible_after_reconciliation"] is False
          assert value["result"]["remote_lifecycle_says_worker_retained"] is True
          assert value["authority"]["production_retrieval"] == "lexical"
          assert value["authority"]["worker_deletion_authorized_by_this_seal"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["retrieval_quality_blocker_cleared"] is False
          assert value["authority"]["latency_blocker_cleared"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          PY
      - name: Verify privacy and exact seal scope
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          allowed = {
              ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29610393567.json",
              "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29610393567.md",
              ".github/workflows/m23-7-r3-8-23-fail-closed-latency-evidence-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "fd00b915c8a9e906ec96fe3f55c859ee3565afd2", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)

          privacy_checked = {
              ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29610393567.json",
              "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29610393567.md",
          }
          text = "\n".join(Path(path).read_text(encoding="utf-8") for path in privacy_checked)
          for forbidden in (
              "CLOUDFLARE_API_TOKEN",
              "QDRANT_API_KEY",
              "QDRANT_URL",
              "raw_query",
              "document_text",
          ):
              assert forbidden not in text
          PY
