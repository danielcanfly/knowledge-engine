name: M23.7 R3.8.23 Fail-Closed Latency Evidence Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29607698618.json"
      - "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29607698618.md"
      - ".github/workflows/m23-7-r3-8-23-fail-closed-latency-evidence-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and observation ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 63184eb576dc756d9bfff6701a3f6907be0cab00 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic fail-closed latency seal
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29607698618.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "eb6c0ccadef07d0fae019a08dd1e5b67842f5895bb61cae5bd82b2a75c0f8112"
          assert value["issue"] is None
          assert value["source"]["observation_run_id"] == "29607698618"
          assert value["source"]["engine_sha"] == "63184eb576dc756d9bfff6701a3f6907be0cab00"
          assert value["artifact"]["id"] == 8417524799
          assert value["artifact"]["zip_sha256"] == "30a7f02ab7798e234aa9ea62e4f00cdf071604e091b80f61226e05070f6ed430"
          assert value["artifact"]["remote_entry_file_sha256"] == "64a430632dd6ef4b074a1b55254973a073d8782956f280c9277723c70a30eef0"
          assert value["artifact"]["remote_entry_self_digest"] == "e14a9ebf657407da4c063a4a8a8440068994c6ccee22db411b4008b656807378"
          assert value["artifact"]["receipt_file_sha256"] == "bff07431ed90ab16afd97398335869c59db84da509d6f8e617b23bc1bdbe1c81"
          assert value["artifact"]["receipt_self_digest"] == "39b1d49a338d5bd203ac39006df2f14c27197720f5d6c12dbb1cfc843ad5c029"
          assert value["artifact"]["remote_lifecycle_file_sha256"] == "3789f471cdcdf99d660593dd38bc602e1043d105d10b53d313fd90f120771d80"
          assert value["artifact"]["remote_lifecycle_self_digest"] == "ab386d281bdd8ecf72ce5ce14131510b7bb145b3bf104b0ee7932d036f296b89"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_fail_closed_latency_repair"
          assert receipt["metrics"] == receipt["accepted_metrics"]
          assert receipt["target_ranks"] == receipt["accepted_target_ranks"]
          assert receipt["query_count"] == 24
          assert receipt["query_identity_count"] == 24
          assert receipt["probe_count"] == 8
          assert receipt["maximum_top10_hub_frequency"] == 3
          false_gates = [key for key, enabled in receipt["gates"].items() if enabled is not True]
          assert false_gates == ["worker_internal_shadow"], false_gates
          latency = value["latency"]
          assert latency["shadow_ms"] == 2078
          assert latency["maximum_shadow_ms"] == 1200
          assert latency["provider_ms"] == 547
          assert latency["qdrant_ms"] == 1531
          assert latency["failed_gate"] == "worker_internal_shadow"
          worker = value["worker"]
          assert worker["name"] == "knowledge-engine-r3-8-29607698618"
          assert worker["version_id"] == "f39035e3-9629-4377-949b-d0fd4b93d0db"
          assert worker["retained"] is True
          assert worker["deletion_authorization_required"] is True
          assert worker["external_calls"]["qdrant_query_batch"] == 1
          assert worker["external_calls"]["qdrant_single_query"] == 0
          assert worker["external_calls"]["workers_ai_binding"] == 1
          assert value["result"]["latency_repair_result_complete"] is True
          assert value["result"]["latency_repair_passed"] is False
          assert value["result"]["blocker_clearance_eligible_after_reconciliation"] is False
          assert value["result"]["remote_lifecycle_says_worker_retained"] is True
          assert value["authority"]["production_retrieval"] == "lexical"
          assert value["authority"]["worker_deletion_authorized_by_this_seal"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["retrieval_quality_blocker_cleared"] is False
          assert value["authority"]["latency_blocker_cleared"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          PY
      - name: Verify privacy and exact seal scope
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          allowed = {
              ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29607698618.json",
              "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29607698618.md",
              ".github/workflows/m23-7-r3-8-23-fail-closed-latency-evidence-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "63184eb576dc756d9bfff6701a3f6907be0cab00", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)

          privacy_checked = {
              ".github/evidence/m23-7-r3-8-23/fail-closed-latency-evidence-seal-29607698618.json",
              "docs/architecture/m23-7-r3-8-23-fail-closed-latency-evidence-seal-29607698618.md",
          }
          text = "\n".join(Path(path).read_text(encoding="utf-8") for path in privacy_checked)
          for forbidden in (
              "CLOUDFLARE_API_TOKEN",
              "QDRANT_API_KEY",
              "QDRANT_URL",
              "raw_query",
              "document_text",
          ):
              assert forbidden not in text
          PY
