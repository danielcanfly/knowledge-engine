name: M16 R2 Object Restoration Acceptance

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m16_r2_object_restoration.py"
      - "tests/test_m16_r2_object_restoration.py"
      - "docs/architecture/m16/**"
      - ".github/workflows/m16-r2-object-restoration.yml"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  r2-object-restoration:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run M16.4 R2 restoration acceptance
        run: python -m pytest -q tests/test_m16_r2_object_restoration.py
      - name: Verify evidence-only restoration surface
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("src/knowledge_engine/m16_r2_object_restoration.py").read_text()
          forbidden = (
              "def put_object",
              "def copy_object",
              "def delete_object",
              "def repair_pointer",
              "def purge_cache",
              "def execute_restore",
          )
          found = [item for item in forbidden if item in source]
          if found:
              raise SystemExit(f"forbidden restoration executor surface: {found}")
          PY
