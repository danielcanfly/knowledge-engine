name: M26.2 Retrieval Envelope
on:
  pull_request:
    paths:
      - '.github/workflows/m26-2-retrieval-envelope.yml'
      - 'docs/architecture/m26/m26-2-*.md'
      - 'pilot/m26/m26-2-*.json'
      - 'schemas/m26-retrieval-*.schema.json'
      - 'schemas/m26-synthetic-corpus-v1.schema.json'
      - 'src/knowledge_engine/m26_retrieval_envelope*.py'
      - 'tests/test_m26_2_retrieval_envelope*.py'
permissions:
  contents: read
jobs:
  retrieval-envelope:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and accepted predecessor
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor d3cf8cc72d951174f10c0a8328f848143c24e004 HEAD
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python - <<'PY'
          import json
          from pathlib import Path
          acceptance=json.loads(Path('pilot/m26/m26-1-acceptance.json').read_text())
          policy=json.loads(Path('pilot/m26/m26-2-retrieval-policy.json').read_text())
          corpus=json.loads(Path('pilot/m26/m26-2-synthetic-corpus.json').read_text())
          assert acceptance['status']=='m26_1_architecture_authority_accepted'
          assert acceptance['next_stage']['stage_id']=='M26.2'
          assert acceptance['next_stage']['authorized'] is True
          assert acceptance['next_stage']['provider_calls_permitted'] is False
          assert acceptance['next_stage']['real_corpus_binding_permitted'] is False
          assert policy['entry_main_sha']=='d3cf8cc72d951174f10c0a8328f848143c24e004'
          assert policy['authority']['synthetic_only'] is True
          assert policy['authority']['authoritative_retrieval_lane']=='lexical'
          assert not policy['authority']['semantic_retrieval']
          assert not policy['authority']['hybrid_retrieval']
          assert not policy['authority']['provider_calls']
          assert corpus['synthetic'] is True and corpus['real_corpus'] is False
          PY
      - name: Lint and test M26.2
        run: |
          set +e
          mkdir -p /tmp/m26-2-diagnostics
          python -m ruff check \
            src/knowledge_engine/m26_retrieval_envelope.py \
            src/knowledge_engine/m26_retrieval_envelope_cli.py \
            tests/test_m26_2_retrieval_envelope.py \
            tests/test_m26_2_retrieval_envelope_contracts.py \
            > /tmp/m26-2-diagnostics/lint-test.log 2>&1
          ruff_status=$?
          pytest_status=0
          if [ "$ruff_status" -eq 0 ]; then
            python -m pytest -q \
              tests/test_m26_2_retrieval_envelope.py \
              tests/test_m26_2_retrieval_envelope_contracts.py \
              tests/test_m26_1_architecture_authority.py \
              tests/test_m26_1_reconciliation.py \
              tests/test_m14_retrieval.py \
              tests/test_m14_citation_evidence.py \
              >> /tmp/m26-2-diagnostics/lint-test.log 2>&1
            pytest_status=$?
          fi
          cat /tmp/m26-2-diagnostics/lint-test.log
          printf '{"ruff_status":%s,"pytest_status":%s}\n' \
            "$ruff_status" "$pytest_status" \
            > /tmp/m26-2-diagnostics/status.json
          test "$ruff_status" -eq 0
          test "$pytest_status" -eq 0
      - name: Upload lint and test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m26-2-lint-test-diagnostics
          path: /tmp/m26-2-diagnostics
          if-no-files-found: error
          retention-days: 7
      - name: Rebuild deterministic benchmark
        run: |
          mkdir -p /tmp/m26-2-a /tmp/m26-2-b /tmp/m26-2-evidence
          python -m knowledge_engine.m26_retrieval_envelope_cli \
            --policy pilot/m26/m26-2-retrieval-policy.json \
            --corpus pilot/m26/m26-2-synthetic-corpus.json \
            --cases pilot/m26/m26-2-benchmark-cases.json \
            --output /tmp/m26-2-a/report.json
          python -m knowledge_engine.m26_retrieval_envelope_cli \
            --policy pilot/m26/m26-2-retrieval-policy.json \
            --corpus pilot/m26/m26-2-synthetic-corpus.json \
            --cases pilot/m26/m26-2-benchmark-cases.json \
            --output /tmp/m26-2-b/report.json
          cmp /tmp/m26-2-a/report.json /tmp/m26-2-b/report.json
          python - <<'PY'
          import json
          from pathlib import Path
          report=json.loads(Path('/tmp/m26-2-a/report.json').read_text())
          assert report['status']=='m26_2_retrieval_envelope_ready'
          assert report['case_count']==9
          assert report['passed_count']==9 and report['failed_count']==0
          assert report['metrics']['case_pass_rate']==1.0
          assert report['metrics']['acl_leakage_count']==0
          assert report['metrics']['semantic_or_hybrid_use_count']==0
          assert report['metrics']['provider_call_count']==0
          assert report['metrics']['real_corpus_binding_count']==0
          assert report['authority']['m26_3_authorized'] is False
          PY
      - name: Measure bounded synthetic latency
        run: |
          python - <<'PY'
          import json,statistics,time
          from pathlib import Path
          from knowledge_engine.m26_retrieval_envelope import run_benchmark
          policy=json.loads(Path('pilot/m26/m26-2-retrieval-policy.json').read_text())
          corpus=json.loads(Path('pilot/m26/m26-2-synthetic-corpus.json').read_text())
          cases=json.loads(Path('pilot/m26/m26-2-benchmark-cases.json').read_text())
          samples=[]
          for _ in range(100):
              started=time.perf_counter()
              report=run_benchmark(cases,corpus=corpus,policy=policy)
              assert report['status']=='m26_2_retrieval_envelope_ready'
              samples.append((time.perf_counter()-started)*1000)
          ordered=sorted(samples)
          p95=ordered[max(0,int(len(ordered)*0.95)-1)]
          summary={'iterations':len(samples),'p50_ms':statistics.median(samples),'p95_ms':p95,'max_ms':max(samples)}
          Path('/tmp/m26-2-evidence/latency.json').write_text(json.dumps(summary,indent=2,sort_keys=True)+'\n')
          assert p95 < 250.0
          assert max(samples) < 1000.0
          PY
      - name: Reject protected mutations and unsafe scope
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD)"
          ! printf '%s\n' "$changed" | grep -Eq '^(workers/|channels/|foundation/|release/|r2/|qdrant/|production/|pilot/m25/|src/knowledge_engine/runtime.py$|src/knowledge_engine/m14_|src/knowledge_engine/m24_|pyproject.toml$)'
          unexpected="$(printf '%s\n' "$changed" | grep -Ev '^(\.github/workflows/m26-2-(retrieval-envelope|reconciliation)\.yml|docs/architecture/m26/m26-2-[^/]+\.md|pilot/m26/m26-2-[^/]+\.json|schemas/m26-(retrieval-[^/]+|synthetic-corpus-v1)\.schema\.json|src/knowledge_engine/m26_retrieval_envelope(_cli)?\.py|tests/test_m26_2_(retrieval_envelope(_contracts)?|reconciliation)\.py)$' || true)"
          test -z "$unexpected"
          ! grep -RniE 'BEGIN [A-Z ]*PRIVATE KEY|api[_-]?key[[:space:]]*[:=][[:space:]]*[A-Za-z0-9]|bearer[[:space:]]+[A-Za-z0-9._~+/=-]{12,}' \
            docs/architecture/m26/m26-2-retrieval-envelope.md \
            pilot/m26/m26-2-*.json \
            src/knowledge_engine/m26_retrieval_envelope*.py \
            tests/test_m26_2_retrieval_envelope*.py
          python -m compileall -q \
            src/knowledge_engine/m26_retrieval_envelope.py \
            src/knowledge_engine/m26_retrieval_envelope_cli.py \
            tests/test_m26_2_retrieval_envelope.py \
            tests/test_m26_2_retrieval_envelope_contracts.py
      - name: Build exact-head evidence
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import hashlib,json,os
          from pathlib import Path
          paths=[
            'pilot/m26/m26-2-retrieval-policy.json',
            'pilot/m26/m26-2-synthetic-corpus.json',
            'pilot/m26/m26-2-benchmark-cases.json',
            'pilot/m26/m26-2-contract-registry.json',
            'pilot/m26/m26-2-entry-contract.json',
            '/tmp/m26-2-a/report.json',
            '/tmp/m26-2-evidence/latency.json',
          ]
          evidence={
            'schema_version':'knowledge-engine-m26-2-exact-head-evidence/v1',
            'head_sha':os.environ['HEAD_SHA'],
            'workflow_run_id':int(os.environ['GITHUB_RUN_ID']),
            'artifacts':{path:hashlib.sha256(Path(path).read_bytes()).hexdigest() for path in paths},
            'status':'m26_2_retrieval_envelope_ready',
            'synthetic_only':True,
            'real_corpus_bound':False,
            'authoritative_retrieval_lane':'lexical',
            'semantic_or_hybrid_used':False,
            'provider_called':False,
            'production_answer_serving':False,
            'm26_3_authorized':False,
          }
          Path('/tmp/m26-2-evidence/evidence.json').write_text(json.dumps(evidence,indent=2,sort_keys=True)+'\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: m26-2-retrieval-envelope-evidence
          path: /tmp/m26-2-evidence
          if-no-files-found: error
          retention-days: 30
