name: M16 Security Contract Acceptance

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m16_security_contracts.py"
      - "tests/test_m16_security_contracts.py"
      - "docs/architecture/m16/**"
      - ".github/workflows/m16-security-contracts.yml"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-contracts:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run M16.1 security contract acceptance
        run: python -m pytest -q tests/test_m16_security_contracts.py
