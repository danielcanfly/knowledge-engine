name: M23.7.2 Offline Retrieval Evaluation

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_2_offline_retrieval.py"
      - "tests/test_m23_7_2_offline_retrieval.py"
      - "scripts/m23_7_2_offline_retrieval.py"
      - "docs/architecture/m23-7-2-offline-retrieval-evaluation.md"
      - "docs/architecture/m23-7-2-reconciliation.md"
      - ".github/workflows/m23-7-2-offline-retrieval.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  m23-7-2-offline:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python package
        run: python -m pip install -e '.[dev]'
      - name: Quality gates
        run: |
          ruff check \
            src/knowledge_engine/m23_7_2_offline_retrieval.py \
            tests/test_m23_7_2_offline_retrieval.py \
            scripts/m23_7_2_offline_retrieval.py
          pytest -q \
            tests/test_m23_7_1_acceptance_contract.py \
            tests/test_m23_7_2_offline_retrieval.py
      - name: Deterministic offline evaluation replay
        run: |
          mkdir -p .artifacts/m23
          python scripts/m23_7_2_offline_retrieval.py \
            --output .artifacts/m23/m23-7-2-a.json
          python scripts/m23_7_2_offline_retrieval.py \
            --output .artifacts/m23/m23-7-2-b.json
          cmp .artifacts/m23/m23-7-2-a.json .artifacts/m23/m23-7-2-b.json
      - name: Threshold and no-mutation guard
        run: |
          python - <<'PY'
          from knowledge_engine.m23_7_2_offline_retrieval import (
              build_offline_retrieval_report,
              canonical_evaluation_payload,
          )

          report = build_offline_retrieval_report(canonical_evaluation_payload())
          assert report["status"] == "pass"
          assert report["case_count"] == 64
          assert report["metrics"]["recall_at_5"] >= 0.82
          assert report["metrics"]["mrr_at_10"] >= 0.68
          assert report["metrics"]["ndcg_at_10"] >= 0.72
          assert report["metrics"]["citation_coverage"] == 1.0
          assert report["metrics"]["acl_violation_rate"] == 0.0
          assert report["m23_7_3_blocked_until_reconciliation"] is True
          assert report["production_authority"] is False
          assert report["protected_mutations_dispatched"] is False
          PY
      - name: Compile accepted scope
        run: python -m compileall -q src tests scripts
