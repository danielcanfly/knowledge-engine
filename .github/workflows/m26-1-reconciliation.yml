name: M26.1 Reconciliation
on:
  pull_request:
    paths:
      - '.github/workflows/m26-1-reconciliation.yml'
      - 'docs/architecture/m26/m26-1-reconciliation.md'
      - 'pilot/m26/m26-1-acceptance.json'
      - 'tests/test_m26_1_reconciliation.py'
permissions:
  contents: read
  actions: read
  issues: read
  pull-requests: read
jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact remote identity and evidence
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor 882d66fdb2bd17a1a1c6b7eb98c7a9242340a532 HEAD
          python - <<'PY'
          import json
          import os
          import urllib.request

          base = 'https://api.github.com/repos/danielcanfly/knowledge-engine'
          token = os.environ['GH_TOKEN']

          def get(path: str) -> object:
              request = urllib.request.Request(
                  base + path,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
              )
              return json.load(urllib.request.urlopen(request))

          pull = get('/pulls/1054')
          issue = get('/issues/1052')
          assert pull['merged_at']
          assert pull['head']['sha'] == '7e23e50412a77dd2fabd80cd120a824919d68bb8'
          assert pull['merge_commit_sha'] == '882d66fdb2bd17a1a1c6b7eb98c7a9242340a532'
          assert issue['state'] == 'closed'
          assert issue['state_reason'] == 'completed'

          runs = [29987616013, 29987616046, 29987616052, 29987615986]
          for run_id in runs:
              run = get(f'/actions/runs/{run_id}')
              assert run['head_sha'] == '7e23e50412a77dd2fabd80cd120a824919d68bb8'
              assert run['conclusion'] == 'success'

          artifact = get('/actions/artifacts/8555671225')
          assert artifact['name'] == 'm26-1-architecture-authority-evidence'
          assert artifact['digest'] == (
              'sha256:c10816ec357b12e49048b8f96b55679a'
              'be68aa4e501e05dbcf7413ccbe3fb08b'
          )
          with open('/tmp/m26-1-resolved.json', 'w', encoding='utf-8') as handle:
              json.dump(
                  {
                      'schema_version': 'knowledge-engine-m26-1-resolved-identity/v1',
                      'reconciliation_head': os.environ['HEAD_SHA'],
                      'implementation_head': '7e23e50412a77dd2fabd80cd120a824919d68bb8',
                      'implementation_merge': '882d66fdb2bd17a1a1c6b7eb98c7a9242340a532',
                      'verified_runs': runs,
                      'artifact_id': artifact['id'],
                      'artifact_digest': artifact['digest'],
                  },
                  handle,
                  indent=2,
                  sort_keys=True,
              )
              handle.write('\n')
          PY
      - name: Validate reconciliation and exact scope
        run: |
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m ruff check tests/test_m26_1_reconciliation.py
          python -m pytest -q \
            tests/test_m26_1_reconciliation.py \
            tests/test_m26_1_architecture_authority.py
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m26-1-reconciliation.yml' \
            'docs/architecture/m26/m26-1-reconciliation.md' \
            'pilot/m26/m26-1-acceptance.json' \
            'tests/test_m26_1_reconciliation.py' | sort)"
          test "$changed" = "$expected"
          python -m compileall -q tests/test_m26_1_reconciliation.py
      - uses: actions/upload-artifact@v4
        with:
          name: m26-1-resolved-identity
          path: /tmp/m26-1-resolved.json
          if-no-files-found: error
          retention-days: 30
