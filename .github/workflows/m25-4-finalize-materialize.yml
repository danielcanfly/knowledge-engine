name: M25.4 Materialize Daniel Approval

on:
  pull_request:
    paths:
      - '.github/workflows/m25-4-finalize-materialize.yml'
      - '.m25-4-finalization-payload/**'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true
      - name: Verify exact head and approved candidate ancestry
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          git merge-base --is-ancestor cf56bad3b9128020214c3a30100ec741d6842e56 HEAD
      - name: Capture approval payload chunk diagnostics
        id: chunks
        continue-on-error: true
        run: |
          set +e
          {
            wc -c .m25-4-finalization-payload/chunk-*.b64
            sha256sum .m25-4-finalization-payload/chunk-*.b64
            test "$(wc -c < .m25-4-finalization-payload/chunk-01.b64)" = '12000'
            echo "chunk_01_size=$?"
            test "$(wc -c < .m25-4-finalization-payload/chunk-02.b64)" = '12000'
            echo "chunk_02_size=$?"
            test "$(wc -c < .m25-4-finalization-payload/chunk-03.b64)" = '6992'
            echo "chunk_03_size=$?"
            echo 'b97ec560d2448e808d1b7bf558abe4a00a7c0f6de1bf172be6ec9a27771f589b  .m25-4-finalization-payload/chunk-01.b64' | sha256sum --check -
            echo "chunk_01_sha=$?"
            echo '9dbd5126744d8dc5f10cad46af04e2d38c8dca2d1ed137719c00d22ba9e0dacf  .m25-4-finalization-payload/chunk-02.b64' | sha256sum --check -
            echo "chunk_02_sha=$?"
            echo '2fd9fd41bcfd1d20b5c3b2136bc384c55f85d9b427d710c9eba58adf0bc7796c  .m25-4-finalization-payload/chunk-03.b64' | sha256sum --check -
            echo "chunk_03_sha=$?"
          } > /tmp/m25-4-finalization-chunks.txt 2>&1
          grep -q 'chunk_01_size=0' /tmp/m25-4-finalization-chunks.txt
          grep -q 'chunk_02_size=0' /tmp/m25-4-finalization-chunks.txt
          grep -q 'chunk_03_size=0' /tmp/m25-4-finalization-chunks.txt
          grep -q 'chunk_01_sha=0' /tmp/m25-4-finalization-chunks.txt
          grep -q 'chunk_02_sha=0' /tmp/m25-4-finalization-chunks.txt
          grep -q 'chunk_03_sha=0' /tmp/m25-4-finalization-chunks.txt
      - name: Upload approval payload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m25-4-finalization-chunk-diagnostics
          path: /tmp/m25-4-finalization-chunks.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce approval payload chunks
        if: always()
        env:
          CHUNK_OUTCOME: ${{ steps.chunks.outcome }}
        run: |
          cat /tmp/m25-4-finalization-chunks.txt
          test "$CHUNK_OUTCOME" = success
      - name: Reassemble and verify approval payload
        run: |
          set -euo pipefail
          cat .m25-4-finalization-payload/chunk-*.b64 > /tmp/m25-4-finalization.b64
          base64 --decode /tmp/m25-4-finalization.b64 > /tmp/m25-4-finalization.tar.gz
          echo 'dac32efba7eddff8fdeb58f28742a893ad06cc442880d8496b0c6c60580e3e9f  /tmp/m25-4-finalization.tar.gz' | sha256sum --check -
          tar -tzf /tmp/m25-4-finalization.tar.gz | tee /tmp/m25-4-finalization-files.txt
          test "$(wc -l < /tmp/m25-4-finalization-files.txt)" = '8'
          ! grep -Eq '(^/|\.\.|^src/|^workers/|^packages/|^channels/|^\.github/workflows/)' /tmp/m25-4-finalization-files.txt
      - name: Extract approval finalization
        run: |
          tar -xzf /tmp/m25-4-finalization.tar.gz -C .
          rm -rf .m25-4-finalization-payload
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint approval test
        run: python -m ruff check tests/test_m25_4_daniel_approval.py
      - name: Test approved artifacts
        run: >-
          python -m pytest -q
          tests/test_m25_4_identity_benchmark.py
          tests/test_m25_4_identity_benchmark_contracts.py
          tests/test_m25_4_daniel_approval.py
      - name: Reject approved candidate drift
        run: |
          git diff --exit-code cf56bad3b9128020214c3a30100ec741d6842e56 HEAD -- \
            pilot/m25/m25-4-annotation-policy.json \
            pilot/m25/m25-4-gold-suite.provisional.json \
            pilot/m25/m25-4-baseline-report.provisional.json \
            pilot/m25/m25-4-daniel-annotation-gate.json \
            src/knowledge_engine/m25_identity_benchmark.py \
            src/knowledge_engine/m25_identity_benchmark_cli.py
      - name: Compile approval test
        run: python -m compileall -q tests/test_m25_4_daniel_approval.py
      - name: Commit verified approval finalization
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs pilot schemas tests
          git add -u .m25-4-finalization-payload
          git diff --cached --stat
          git commit -m 'Record Daniel M25.4 annotation approval'
          git push origin "HEAD:$BRANCH"
