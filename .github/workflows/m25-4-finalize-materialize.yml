name: M25.4 Materialize Daniel Approval

on:
  pull_request:
    paths:
      - '.github/workflows/m25-4-finalize-materialize.yml'
      - '.m25-4-finalization-payload/**'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true
      - name: Verify exact head and approved candidate ancestry
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          git merge-base --is-ancestor cf56bad3b9128020214c3a30100ec741d6842e56 HEAD
      - name: Verify bounded approval payload and archive
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import io
          import tarfile
          from pathlib import Path, PurePosixPath

          expected_parts = [
              (4000, '883c8505dc2d814a06badcfb1969207db0b01156b41c4a0b1d13e95303c5582a'),
              (4000, '617c879c443864e0b449fe33c0bb57ea2fb1aeb7ee6021e7ddf22f0448c5d224'),
              (4000, '6d47b8bec77e8c14c7ac02daa18d933d52b52c4f8d83c23512e8cab9af2187a6'),
              (4000, 'e19035b074941165bdbef6b833907c39ebaaaeb8f43cd831b36f0db6c8af73bf'),
              (4000, '09933d17c190985bddcc41d3f76081b98345a611af2e003b509c7370bf10c025'),
              (4000, '0f960cea7d5a8883960c4e910509899ca203489946c74acc8e5b97333d015b3b'),
              (4000, '3bb8075f02f5c9e78fd4529358dceeb0947778ee75023f6b8431c72a6522f468'),
              (2992, '23d082c7142a24c4ca85412ff18196930b1b8771a37483da1b878acb8bdb458a'),
          ]
          encoded_parts = []
          for index, (expected_size, expected_sha) in enumerate(expected_parts, start=1):
              path = Path(f'.m25-4-finalization-payload/part-{index:02d}.b64')
              raw = path.read_bytes()
              assert len(raw) == expected_size, (path, len(raw), expected_size)
              assert hashlib.sha256(raw).hexdigest() == expected_sha, path
              encoded_parts.append(raw)

          archive = base64.b64decode(b''.join(encoded_parts), validate=True)
          assert hashlib.sha256(archive).hexdigest() == (
              'dac32efba7eddff8fdeb58f28742a893ad06cc442880d8496b0c6c60580e3e9f'
          )
          expected_names = {
              'docs/architecture/m25/m25-4-daniel-approval.md',
              'pilot/m25/m25-4-adjudication-ledger.approved.json',
              'pilot/m25/m25-4-baseline-report.json',
              'pilot/m25/m25-4-daniel-approval.json',
              'pilot/m25/m25-4-gold-suite.json',
              'pilot/m25/m25-4-split-manifest.accepted.json',
              'schemas/m25-4-daniel-approval-v1.schema.json',
              'tests/test_m25_4_daniel_approval.py',
          }
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as handle:
              members = handle.getmembers()
              assert {member.name for member in members} == expected_names
              for member in members:
                  path = PurePosixPath(member.name)
                  assert not path.is_absolute()
                  assert '..' not in path.parts
                  assert member.isfile()
          Path('/tmp/m25-4-finalization.tar.gz').write_bytes(archive)
          PY
      - name: Extract approval finalization
        run: |
          tar -xzf /tmp/m25-4-finalization.tar.gz -C .
          rm -rf .m25-4-finalization-payload
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint approval test
        run: python -m ruff check tests/test_m25_4_daniel_approval.py
      - name: Test approved artifacts
        run: >-
          python -m pytest -q
          tests/test_m25_4_identity_benchmark.py
          tests/test_m25_4_identity_benchmark_contracts.py
          tests/test_m25_4_daniel_approval.py
      - name: Reject approved candidate drift
        run: |
          git diff --exit-code cf56bad3b9128020214c3a30100ec741d6842e56 HEAD -- \
            pilot/m25/m25-4-annotation-policy.json \
            pilot/m25/m25-4-gold-suite.provisional.json \
            pilot/m25/m25-4-baseline-report.provisional.json \
            pilot/m25/m25-4-daniel-annotation-gate.json \
            src/knowledge_engine/m25_identity_benchmark.py \
            src/knowledge_engine/m25_identity_benchmark_cli.py
      - name: Compile approval test
        run: python -m compileall -q tests/test_m25_4_daniel_approval.py
      - name: Commit verified approval finalization
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs pilot schemas tests
          git add -u .m25-4-finalization-payload
          git diff --cached --stat
          git commit -m 'Record Daniel M25.4 annotation approval'
          git push origin "HEAD:$BRANCH"
