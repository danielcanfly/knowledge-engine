name: M23.7 R3.8.24 Fail-Closed Latency Evidence Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-24/fail-closed-latency-evidence-reconciliation-29607698618.json"
      - ".github/evidence/m23-7-r3-8-24/fail-closed-latency-evidence-reconciliation-29610393567.json"
      - ".github/evidence/m23-7-r3-8-24/fail-closed-latency-evidence-reconciliation-29613277172.json"
      - ".github/evidence/m23-7-r3-8-24/fail-closed-latency-evidence-reconciliation-29636761264.json"
      - "docs/architecture/m23-7-r3-8-24-fail-closed-latency-evidence-reconciliation.md"
      - "docs/architecture/m23-7-r3-8-24-fail-closed-latency-evidence-reconciliation-29636761264.md"
      - ".github/workflows/m23-7-r3-8-24-fail-closed-latency-evidence-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and seal ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 5236e23e10fc58a7ffff83adabe80e58cf18081e HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic reconciliation
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-24/fail-closed-latency-evidence-reconciliation-29636761264.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "70325edd680242225a48b4331718ce0f68cc7401b87bc89cd55b22fa79868949"
          assert value["issue"] == 899
          assert value["seal_issue"] == 897
          assert value["seal_pr"] == 898
          assert value["seal_accepted_head"] == "17c55a1b2bed93be29dd4b587977cc37e7e0d6ab"
          assert value["seal_merge_sha"] == "5236e23e10fc58a7ffff83adabe80e58cf18081e"
          assert value["seal_sha256"] == "054686bb456797a6fa3017a96a0496075d2f0efa7f96b2b85664c30ff76b88d4"
          assert value["seal_exact_head_runs"] == {
              "architecture_canon": 29636992370,
              "ci": 29636992328,
              "graph_v2": 29636992332,
              "seal": 29636992347,
          }
          assert value["observation"]["run_id"] == "29636761264"
          assert value["observation"]["artifact_id"] == 8427348020
          assert value["observation"]["artifact_zip_sha256"] == "21fb4a9421e1e3cd73608d0b8a5c234a5f1776b39f6938dc851197c42e247c3c"
          result = value["result"]
          assert result["latency_evidence_complete"] is True
          assert result["latency_repair_passed"] is False
          assert result["failed_gate"] == "worker_internal_shadow"
          assert result["shadow_ms"] == 1890
          assert result["maximum_shadow_ms"] == 1200
          assert result["quality_metrics_accepted"] is True
          assert result["strict_zero_mutation_gates_accepted"] is True
          assert result["blocker_clearance_eligible"] is False
          assert result["worker_lifecycle_clean"] is False
          assert result["retained_worker_cleanup_required"] is True
          assert result["next_gate"] == "separately_governed_retained_worker_cleanup"
          assert result["provider_ms"] == 991
          assert result["qdrant_ms"] == 899
          worker = value["worker"]
          assert worker["name"] == "knowledge-engine-r3-8-29636761264"
          assert worker["version_id"] == "03522a60-0bcc-42c0-b315-e845891538b2"
          assert worker["retained"] is True
          assert worker["deletion_authorization_required"] is True
          authority = value["authority"]
          assert authority["production_retrieval"] == "lexical"
          assert authority["blockers_cleared"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["worker_deletion_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          assert value["strict_zero_verified"] is True
          PY
      - name: Verify exact reconciliation scope
        run: |
          python - <<'PY'
          import subprocess

          allowed = {
              ".github/evidence/m23-7-r3-8-24/fail-closed-latency-evidence-reconciliation-29636761264.json",
              "docs/architecture/m23-7-r3-8-24-fail-closed-latency-evidence-reconciliation-29636761264.md",
              ".github/workflows/m23-7-r3-8-24-fail-closed-latency-evidence-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "5236e23e10fc58a7ffff83adabe80e58cf18081e", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
