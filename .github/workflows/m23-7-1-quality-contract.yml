name: M23.7.1 Quality Acceptance Contract

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_quality_contract.py"
      - "tests/test_m23_7_1_quality_contract.py"
      - "scripts/m23_7_1_quality_contract_acceptance.py"
      - "docs/architecture/m23-7-1-operational-content-quality-contract.md"
      - ".github/workflows/m23-7-1-quality-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Verify exact head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - name: Quality and adversarial tests
        run: |
          ruff check src/knowledge_engine/m23_7_quality_contract.py tests/test_m23_7_1_quality_contract.py scripts/m23_7_1_quality_contract_acceptance.py
          pytest -q tests/test_m23_7_1_quality_contract.py
      - name: Deterministic replay
        run: |
          mkdir -p .artifacts/m23
          python scripts/m23_7_1_quality_contract_acceptance.py --contract-output .artifacts/m23/contract-a.json --report-output .artifacts/m23/report-a.json
          python scripts/m23_7_1_quality_contract_acceptance.py --contract-output .artifacts/m23/contract-b.json --report-output .artifacts/m23/report-b.json
          cmp .artifacts/m23/contract-a.json .artifacts/m23/contract-b.json
          cmp .artifacts/m23/report-a.json .artifacts/m23/report-b.json
      - name: No mutation guard
        run: |
          python - <<'PY'
          from knowledge_engine.m23_7_quality_contract import build_acceptance_report, canonical_contract
          report = build_acceptance_report(canonical_contract())
          assert report["production_retrieval_mode"] == "lexical"
          assert report["candidate_activation_authorized"] is False
          assert report["protected_mutations_dispatched"] is False
          PY
      - run: python -m compileall -q src tests scripts
