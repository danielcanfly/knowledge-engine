name: M25.9 Context Builder Log Evidence

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-context-builder-log-evidence.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-context-builder-log-evidence.yml'

permissions:
  contents: read
  actions: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 20
          show-progress: false
      - name: Verify one-file read-only evidence boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-context-builder-log-evidence.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-context-builder-log-evidence.yml'
          fi

  extract:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_RUN_ID: '30067307767'
      TARGET_JOB_ID: '89400715761'
      EVIDENCE_DIR: /tmp/m25-9-context-builder-log-evidence
    steps:
      - name: Verify exact completed source run
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          run="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$TARGET_RUN_ID")"
          test "$(jq -r '.status' <<<"$run")" = 'completed'
          test "$(jq -r '.conclusion' <<<"$run")" = 'failure'
          test "$(jq -r '.run_attempt' <<<"$run")" = '1'
          mkdir -p "$EVIDENCE_DIR"
      - name: Download and sanitize construct failure evidence
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$TARGET_JOB_ID/logs" \
            > "$EVIDENCE_DIR/full-job.log"
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          root = Path(os.environ['EVIDENCE_DIR'])
          raw = root.joinpath('full-job.log').read_text(errors='replace').splitlines()
          patterns = (
              'Construct deterministic four-path repair',
              'Traceback',
              'RuntimeError',
              'expected one exact replacement',
              'workflow line not found',
              'Error:',
              'Process completed with exit code',
          )
          selected_indexes = set(range(max(0, len(raw) - 80), len(raw)))
          for index, line in enumerate(raw):
              if any(pattern in line for pattern in patterns):
                  selected_indexes.update(
                      range(max(0, index - 8), min(len(raw), index + 12))
                  )

          def sanitize(line: str) -> str:
              line = re.sub(r'https?://\S+', '<redacted-url>', line)
              line = re.sub(r'\b[0-9a-fA-F]{40}\b', '<redacted-commit-sha>', line)
              line = re.sub(r'\b[0-9a-fA-F]{32,64}\b', '<redacted-hex>', line)
              line = re.sub(r'Authorization:\s*\S+\s+\S+', 'Authorization: <redacted>', line)
              return line[:1000]

          selected = [
              {'line_number': index + 1, 'text': sanitize(raw[index])}
              for index in sorted(selected_indexes)
          ]
          evidence = {
              'schema_version': 'knowledge-engine-m25-9-context-builder-log-evidence/v1',
              'source_run_id': int(os.environ['TARGET_RUN_ID']),
              'source_job_id': int(os.environ['TARGET_JOB_ID']),
              'source_run_attempt': 1,
              'source_run_conclusion': 'failure',
              'full_log_line_count': len(raw),
              'full_log_sha256': hashlib.sha256(
                  '\n'.join(raw).encode(errors='replace')
              ).hexdigest(),
              'selected_lines': selected,
              'raw_full_log_retained_in_artifact': False,
              'external_service_mutations': 0,
              'source_run_rerun': False,
          }
          evidence['evidence_sha256'] = hashlib.sha256(
              json.dumps(evidence, sort_keys=True, separators=(',', ':')).encode()
          ).hexdigest()
          root.joinpath('context-builder-failure-evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n'
          )
          root.joinpath('full-job.log').unlink()
          print(json.dumps({
              'selected_line_count': len(selected),
              'external_service_mutations': 0,
              'source_run_rerun': False,
          }, sort_keys=True))
          PY
      - name: Upload sanitized failure evidence
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-context-builder-log-evidence-${{ github.sha }}
          path: /tmp/m25-9-context-builder-log-evidence/context-builder-failure-evidence.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish evidence run
        run: |
          set -euo pipefail
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-context-builder-log-evidence' \
            -f description="source run $TARGET_RUN_ID job $TARGET_JOB_ID sanitized" \
            -f target_url="$run_url" >/dev/null
