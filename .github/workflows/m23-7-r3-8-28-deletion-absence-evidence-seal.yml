name: M23.7 R3.8.28 Deletion/Absence Evidence Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-28/deletion-absence-evidence-seal-29606750152.json"
      - "docs/architecture/m23-7-r3-8-28-deletion-absence-evidence-seal.md"
      - ".github/workflows/m23-7-r3-8-28-deletion-absence-evidence-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and deletion authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 6ef597b601694c0f6b50756f29341ee357083540 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic deletion/absence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-28/deletion-absence-evidence-seal-29606750152.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "cc77e5b9db928e91e334e198fd629741eba3ec2fc71c26da20b73831104b3f9b"
          assert value["issue"] is None
          auth = value["deletion_authorization"]
          assert auth["authorization_issue"] is None
          assert auth["authorization_pr"] == 864
          assert auth["authorization_merge_sha"] == "6ef597b601694c0f6b50756f29341ee357083540"
          assert auth["authorization_sha256"] == "d097309f1b6dc3cea071b28ebc02eb0cbbf5dd235e2811172e7f38329b7b3e27"
          deletion = value["deletion_run"]
          assert deletion["run_id"] == "29606674323"
          assert deletion["artifact_id"] == 8417128032
          assert deletion["artifact_zip_sha256"] == "7eed2dbeb409dac079c6b3e2fa97d803c349a60e3e4096e6388f00e6e6109860"
          assert deletion["failure_file_sha256"] == "d8a27d45e055b871db97accf4f80adaefeaf349eeeed898078698fbd895f0f43"
          assert deletion["failure_self_digest"] == "cd7399d4707a611c5ec8471fb830c7183f60e6146284c4821a540f6ed464f6b8"
          assert deletion["conclusion"] == "failure"
          assert deletion["exit_code"] == 23
          assert deletion["failure_stage"] == "absence_probe"
          assert deletion["failure_code"] == "delete_absence_not_proven"
          assert deletion["worker_delete_dispatched"] is True
          probe = value["post_delete_probe"]
          assert probe["run_id"] == "29606750152"
          assert probe["artifact_id"] == 8417150407
          assert probe["artifact_zip_sha256"] == "4e35d515ab59fc259ee7e2c30d128ad3a092efca162f3dc4749079f83ef1fb42"
          assert probe["receipt_file_sha256"] == "64cdd3b8a5a9cbdf81e5d04b153966523c394b21812e3780e1ceee810c27563b"
          assert probe["receipt_self_digest"] == "6a7cfb146c5378bef527b1e3e8f9df2ae781a61a42bfdff34e119e6bf00f758e"
          assert probe["worker_state"] == "worker_absent"
          for collection in ("versions", "deployments"):
              assert probe[collection]["state"] == "absent"
              assert probe[collection]["http_status"] == 404
              assert probe[collection]["error_codes"] == [10007]
              assert probe[collection]["identity_count"] == 0
          result = value["result"]
          assert result["deletion_dispatch_confirmed"] is True
          assert result["post_delete_absence_observed"] is True
          assert result["worker_lifecycle_clean_pending_reconciliation"] is True
          assert result["blocker_clearance_eligible"] is False
          assert result["production_retrieval"] == "lexical"
          authority = value["authority"]
          assert authority["evidence_seal_only"] is True
          assert authority["worker_deletion_replay_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          assert value["retained_blockers"] == [
              "blocked_pending_retrieval_quality",
              "blocked_pending_latency",
          ]
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-28/deletion-absence-evidence-seal-29606750152.json",
              "docs/architecture/m23-7-r3-8-28-deletion-absence-evidence-seal.md",
              ".github/workflows/m23-7-r3-8-28-deletion-absence-evidence-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "6ef597b601694c0f6b50756f29341ee357083540", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 6ef597b601694c0f6b50756f29341ee357083540 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
