name: M23.7 R3.8.25 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-25/worker-present-recovery-seal-29555974732.json"
      - "docs/architecture/m23-7-r3-8-25-worker-present-recovery-seal.md"
      - ".github/workflows/m23-7-r3-8-25-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 91fdefe2ee82d3113a11dd59c510befc877d5084 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-25/worker-present-recovery-seal-29555974732.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "9a5e154c9129ec76077bf87553bfa95246a6f302db025382087e00623174ecae"
          assert value["seal_issue"] == 682
          assert value["recovery_authorization_issue"] == 680
          assert value["recovery_authorization_pr"] == 681
          assert value["recovery_authorization_merge_sha"] == "91fdefe2ee82d3113a11dd59c510befc877d5084"
          assert value["recovery_run_id"] == "29555974732"
          assert value["artifact"]["artifact_id"] == 8397421144
          assert value["artifact"]["zip_sha256"] == "bbb6768cc0a74ee4c6487629bbd86fc085d5a76d23ae1f302d16ef8baaed3412"
          assert value["artifact"]["receipt_file_sha256"] == "2b499f45f808080acc34dce03b2ed6dd50ffd3900a8944cedd54a251b6364187"
          assert value["artifact"]["receipt_self_digest"] == "09d2bc430b4343bcd5ce03e89a718339336dcd40f8fcabc8022f444c36440ff1"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_read_only_recovery_probe"
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29553221650"
          assert receipt["affected_run_id"] == "29553221650"
          assert receipt["affected_engine_sha"] == "b7ff3c05e8eb2e2c7fcc56c206dd2da678256674"
          assert receipt["probe_engine_sha"] == "91fdefe2ee82d3113a11dd59c510befc877d5084"
          assert receipt["recovery_probe_sha256"] == "09d2bc430b4343bcd5ce03e89a718339336dcd40f8fcabc8022f444c36440ff1"
          assert receipt["versions"]["identities"] == [
              "3fa873ae-325b-4365-8080-e34d4f9763d4",
              "6bebabdc-b4f1-42fa-bf8d-6eebf0d0d8fd",
              "95e078cc-6410-4c60-a4c4-e154917f6743",
              "c9ce8c28-f4a3-4528-aabd-1e9b6716aaca",
          ]
          assert receipt["deployments"]["identities"] == [
              "10637331-edbe-4c80-aca6-1aa9c2066939",
              "24ea5cd9-7629-47f8-a509-6d73d2c04877",
              "7d5448e6-437d-482a-931f-1e91f4388249",
              "da77e82c-1fc5-4d0a-ae26-780f9b23ea95",
          ]
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          assert receipt["production_retrieval"] == "lexical"
          assert receipt["blockers_cleared"] is False
          for field in (
              "worker_delete_dispatched",
              "worker_deploy_dispatched",
              "worker_route_invoked",
              "worker_secret_mutation_dispatched",
              "qdrant_read_dispatched",
              "qdrant_mutation_dispatched",
              "r2_read_dispatched",
              "r2_mutation_dispatched",
              "protected_mutations_dispatched",
          ):
              assert receipt[field] is False
          authority = value["authority"]
          assert authority["evidence_seal_only"] is True
          assert authority["worker_deletion_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-25/worker-present-recovery-seal-29555974732.json",
              "docs/architecture/m23-7-r3-8-25-worker-present-recovery-seal.md",
              ".github/workflows/m23-7-r3-8-25-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "91fdefe2ee82d3113a11dd59c510befc877d5084", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 91fdefe2ee82d3113a11dd59c510befc877d5084 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
