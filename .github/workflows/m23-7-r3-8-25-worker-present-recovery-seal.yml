name: M23.7 R3.8.25 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-25/worker-present-recovery-seal-29605835592.json"
      - ".github/evidence/m23-7-r3-8-25/worker-present-recovery-seal-29608526669.json"
      - ".github/evidence/m23-7-r3-8-25/worker-present-recovery-seal-29611245813.json"
      - "docs/architecture/m23-7-r3-8-25-worker-present-recovery-seal.md"
      - ".github/workflows/m23-7-r3-8-25-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 7e596421f5c156a066b60d8983c7f675ed331420 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-25/worker-present-recovery-seal-29611245813.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "3d8fc558375e7b27a6930cfa2490e045885b66f1b2e2ce80c0f45acbe68942a1"
          assert value["seal_issue"] is None
          assert value["recovery_authorization_issue"] is None
          assert value["recovery_authorization_pr"] == 879
          assert value["recovery_authorization_merge_sha"] == "7e596421f5c156a066b60d8983c7f675ed331420"
          assert value["recovery_run_id"] == "29611245813"
          assert value["artifact"]["artifact_id"] == 8418795524
          assert value["artifact"]["zip_sha256"] == "0622e7296ac3f7b59e3cd46074c7abd31e4096cddfc679b29242da0cea0c1dad"
          assert value["artifact"]["receipt_file_sha256"] == "c7c4ac0e2352d62a9e4c5ff577d3501db8b7f4c316c85e404630aed010e51aa7"
          assert value["artifact"]["receipt_self_digest"] == "679f8e2fbdaf0a139cdb5e360d4104523ea9257e2a9d3011573b49fbe02ca429"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_read_only_recovery_probe"
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29610393567"
          assert receipt["affected_run_id"] == "29610393567"
          assert receipt["affected_engine_sha"] == "fd00b915c8a9e906ec96fe3f55c859ee3565afd2"
          assert receipt["probe_engine_sha"] == "7e596421f5c156a066b60d8983c7f675ed331420"
          assert receipt["recovery_probe_sha256"] == "679f8e2fbdaf0a139cdb5e360d4104523ea9257e2a9d3011573b49fbe02ca429"
          assert receipt["versions"]["identities"] == [
              "2b977efa-a837-4fd9-b52d-acb4792afab9",
              "82247513-1864-46bc-b475-77e287d1c750",
              "c3c4576d-efae-40fa-97e7-12f19f41422e",
              "c60127ef-f347-4dac-a5a4-b862ae54d388",
          ]
          assert receipt["deployments"]["identities"] == [
              "51db0f94-53e8-455d-93a5-b1f6841045bb",
              "84cd49a9-a1eb-483b-9d82-5b0ae735801a",
              "c9480253-5c2d-4743-b474-7dd19c00ddba",
              "dfe02f99-af58-4af8-8532-9d1d471be7b5",
          ]
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          assert receipt["production_retrieval"] == "lexical"
          assert receipt["blockers_cleared"] is False
          for field in (
              "worker_delete_dispatched",
              "worker_deploy_dispatched",
              "worker_route_invoked",
              "worker_secret_mutation_dispatched",
              "qdrant_read_dispatched",
              "qdrant_mutation_dispatched",
              "r2_read_dispatched",
              "r2_mutation_dispatched",
              "protected_mutations_dispatched",
          ):
              assert receipt[field] is False
          authority = value["authority"]
          assert authority["evidence_seal_only"] is True
          assert authority["worker_deletion_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-25/worker-present-recovery-seal-29611245813.json",
              "docs/architecture/m23-7-r3-8-25-worker-present-recovery-seal.md",
              ".github/workflows/m23-7-r3-8-25-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "7e596421f5c156a066b60d8983c7f675ed331420", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 7e596421f5c156a066b60d8983c7f675ed331420 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
