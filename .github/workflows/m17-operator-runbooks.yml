name: M17 Operator Runbook Acceptance

on:
  pull_request:
    paths:
      - "docs/operations/**"
      - "src/knowledge_engine/m17_operator_runbooks.py"
      - "scripts/m17_operator_runbook_acceptance.py"
      - "tests/test_m17_operator_runbooks.py"
      - ".github/workflows/m17-operator-runbooks.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  operator-runbooks:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Emit deterministic acceptance evidence
        run: |
          mkdir -p .artifacts/m17
          python scripts/m17_operator_runbook_acceptance.py \
            --root . \
            --registry docs/operations/m17/runbook-registry.json \
            --output .artifacts/m17/operator-runbook-acceptance.json
      - name: Run M17.2 runbook tests
        run: |
          python -m pytest -q tests/test_m17_operator_runbooks.py \
            --junitxml=.artifacts/m17/operator-runbook-pytest.xml
      - name: Verify documentation-only authority surface
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("src/knowledge_engine/m17_operator_runbooks.py").read_text()
          forbidden = (
              "def write_source",
              "def create_source_pr",
              "def publish_candidate",
              "def promote_release",
              "def execute_rollback",
              "def repair_pointer",
              "def purge_cache",
              "def put_object",
              "def copy_object",
              "def delete_object",
              "def rotate_credentials",
              "def append_ledger",
              "def close_batch",
          )
          found = [item for item in forbidden if item in source]
          if found:
              raise SystemExit(f"forbidden operator-runbook executor surface: {found}")
          PY
      - name: Upload acceptance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m17-operator-runbook-acceptance
          path: .artifacts/m17/
          if-no-files-found: warn
          retention-days: 30
