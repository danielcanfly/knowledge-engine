name: M23.7 Repair R3 Bounded Live Re-observation

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r3_bounded_live_reobservation.py"
      - "scripts/m23_7_r3_bounded_live_reobservation.py"
      - "scripts/m23_7_r3_worker_config.py"
      - "tests/test_m23_7_r3_bounded_live_reobservation.py"
      - "workers/m23-7-r3-observation/**"
      - "pilot/m23/m23-7-r3-bounded-live-reobservation-contract.json"
      - "pilot/m23/m23-7-r3-bounded-live-reobservation-fixture-report.json"
      - "pilot/m23/m23-7-r3-live-rejection.json"
      - "pilot/m23/m23-7-r3-live-rejection-reconciliation.json"
      - "docs/architecture/m23-7-r3-bounded-live-reobservation.md"
      - "docs/architecture/m23-7-r3-live-rejection.md"
      - "docs/architecture/m23-7-r3-live-rejection-reconciliation.md"
      - ".github/workflows/m23-7-r3-bounded-live-reobservation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bounded-live-reobservation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Ruff accepted scope
        run: |
          ruff check \
            src/knowledge_engine/m23_7_r3_bounded_live_reobservation.py \
            scripts/m23_7_r3_bounded_live_reobservation.py \
            scripts/m23_7_r3_worker_config.py \
            tests/test_m23_7_r3_bounded_live_reobservation.py
      - name: Python adversarial tests
        run: |
          pytest -q \
            tests/test_m23_7_r1_semantic_alignment.py \
            tests/test_m23_7_r2_latency_path.py \
            tests/test_m23_7_r2_regional_binding.py \
            tests/test_m23_7_r3_bounded_live_reobservation.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Worker unit tests
        working-directory: workers/m23-7-r3-observation
        run: node --test worker.test.mjs
      - name: Deterministic contract and fixture replay
        run: |
          mkdir -p .artifacts/m23
          python - <<'PY'
          from pathlib import Path
          from knowledge_engine.m23_7_r3_bounded_live_reobservation import (
              canonical_contract,
              canonical_json,
          )

          Path('.artifacts/m23/r3-contract.json').write_text(
              canonical_json(canonical_contract()) + '\n',
              encoding='utf-8',
          )
          PY
          cmp \
            .artifacts/m23/r3-contract.json \
            pilot/m23/m23-7-r3-bounded-live-reobservation-contract.json
          python scripts/m23_7_r3_bounded_live_reobservation.py \
            --mode fixture \
            --output .artifacts/m23/r3-report-a.json
          python scripts/m23_7_r3_bounded_live_reobservation.py \
            --mode fixture \
            --output .artifacts/m23/r3-report-b.json
          cmp .artifacts/m23/r3-report-a.json .artifacts/m23/r3-report-b.json
          cmp \
            .artifacts/m23/r3-report-a.json \
            pilot/m23/m23-7-r3-bounded-live-reobservation-fixture-report.json
      - name: Generated placement config stays untracked
        run: |
          export QDRANT_URL="https://fixture-qdrant.example"
          python scripts/m23_7_r3_worker_config.py \
            --output workers/m23-7-r3-observation/wrangler.local.jsonc
          test -f workers/m23-7-r3-observation/wrangler.local.jsonc
          test -z "$(git status --porcelain)"
      - name: Privacy authority threshold identity rejection and reconciliation scan
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          contract = json.loads(
              Path(
                  'pilot/m23/m23-7-r3-bounded-live-reobservation-contract.json'
              ).read_text(encoding='utf-8')
          )
          report = json.loads(
              Path(
                  'pilot/m23/m23-7-r3-bounded-live-reobservation-fixture-report.json'
              ).read_text(encoding='utf-8')
          )
          rejection = json.loads(
              Path('pilot/m23/m23-7-r3-live-rejection.json').read_text(
                  encoding='utf-8'
              )
          )
          reconciliation = json.loads(
              Path(
                  'pilot/m23/m23-7-r3-live-rejection-reconciliation.json'
              ).read_text(encoding='utf-8')
          )

          assert contract['contract_sha256'] == '44177964da873958f1d433aab719725ff622f050bd7e96ec086cc8e06aa0f412'
          assert report['report_sha256'] == '1bc3641b16bc5e8552739d5046e9dd4335d91afe6a3f24bf846464f7e8d3af84'
          assert contract['entry']['engine_sha'] == '5870e4dd3d10076ef7d35a1eb485b358179d9305'
          assert contract['entry']['r1_manifest_sha256'] == 'ebff335d572461f4438ed06c4cc35288b0d0def8bbfc2b51e80bb262db12c576'
          assert contract['entry']['r2_1_live_receipt_sha256'] == 'aa56655d19cb617177bd8e4708c02e1cd6ce02189fcfee32a5b397ef0eba67db'
          assert contract['thresholds'] == {
              'min_recall_at_5': 0.82,
              'min_mrr_at_10': 0.68,
              'min_ndcg_at_10': 0.72,
              'max_worker_internal_shadow_ms': 1200,
              'max_error_rate': 0.0,
              'max_acl_violation_rate': 0.0,
              'max_output_influence_rate': 0.0,
              'budget_changed': False,
              'budget_inflation_allowed': False,
          }
          assert report['status'] == 'pass_bounded_live_reobservation'
          assert report['metrics']['recall_at_5'] == 1.0
          assert report['metrics']['mrr_at_10'] == 0.8125
          assert report['metrics']['ndcg_at_10'] > 0.86
          assert report['metrics']['worker_internal_shadow_ms'] == 780
          assert all(report['gates'].values())
          assert len(report['cases']) == 8
          assert all(len(case['ranked_section_ids']) == 10 for case in report['cases'])
          assert all(case['raw_query_persisted'] is False for case in report['cases'])
          assert report['external_calls'] == {
              'workers_ai_binding': 1,
              'qdrant_collection_reads': 2,
              'qdrant_query_batch': 1,
              'qdrant_write': 0,
          }
          assert report['authority']['production_retrieval'] == 'lexical'
          assert report['authority']['protected_mutations_dispatched'] is False
          assert report['exit']['promotion_eligibility_granted'] is False

          stored = rejection.pop('record_sha256')
          canonical = json.dumps(
              rejection,
              ensure_ascii=False,
              sort_keys=True,
              separators=(',', ':'),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(canonical).hexdigest() == stored
          assert stored == '79f27ecf68aa32e855f458e4e30a62932e0a2ea8bc1de522fa5869ed0d4a5ee5'
          assert rejection['receipt']['sha256'] == '43496be4ff84589c74075124e9f70fc7a2b89f2a400c287ebeb35053b1c6e7fe'
          assert rejection['status'] == 'rejected_bounded_live_reobservation'
          assert rejection['metrics']['recall_at_5'] == 0.125
          assert rejection['metrics']['mrr_at_10'] == 0.049107142857
          assert rejection['metrics']['ndcg_at_10'] == 0.095501236426
          assert rejection['metrics']['worker_internal_shadow_ms'] == 1774
          assert rejection['metrics']['provider_ms'] == 1177
          assert rejection['metrics']['qdrant_ms'] == 597
          assert rejection['gates']['recall_at_5'] is False
          assert rejection['gates']['mrr_at_10'] is False
          assert rejection['gates']['ndcg_at_10'] is False
          assert rejection['gates']['worker_internal_shadow'] is False
          assert rejection['gates']['error_rate'] is True
          assert rejection['gates']['acl_violation_rate'] is True
          assert rejection['gates']['output_influence_rate'] is True
          assert rejection['remaining_blockers'] == [
              'blocked_pending_retrieval_quality'
          ]
          assert rejection['exit']['r3_complete'] is False
          assert rejection['exit']['retrieval_quality_blocker_cleared'] is False
          assert rejection['exit']['promotion_eligibility_granted'] is False
          assert rejection['authority']['production_retrieval'] == 'lexical'
          assert rejection['authority']['protected_mutations_dispatched'] is False
          assert rejection['diagnostic_worker']['deletion_completed'] is False
          assert rejection['path']['external_calls']['qdrant_write'] == 0

          reconciliation_stored = reconciliation.pop(
              'reconciliation_record_sha256'
          )
          reconciliation_canonical = json.dumps(
              reconciliation,
              ensure_ascii=False,
              sort_keys=True,
              separators=(',', ':'),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(reconciliation_canonical).hexdigest() == reconciliation_stored
          assert reconciliation_stored == '60533be4677af81614ded0b872cca64d4844c8fd8ab74a944a19001d6ac65b1c'
          assert reconciliation['status'] == 'reconciled_rejection_pending_worker_deletion'
          assert reconciliation['acceptance']['pr'] == 476
          assert reconciliation['acceptance']['head_sha'] == '86695fb07f190b4fc7cdd02d9d0091bd7df7e257'
          assert reconciliation['acceptance']['merge_sha'] == '8045d67492bb412e5c0531844723bb227c1b228a'
          assert reconciliation['acceptance']['receipt_sha256'] == '43496be4ff84589c74075124e9f70fc7a2b89f2a400c287ebeb35053b1c6e7fe'
          assert len(reconciliation['exact_head_workflows']) == 4
          assert all(
              item['conclusion'] == 'success'
              for item in reconciliation['exact_head_workflows']
          )
          assert reconciliation['gates']['failed'] == [
              'recall_at_5',
              'mrr_at_10',
              'ndcg_at_10',
              'worker_internal_shadow',
          ]
          assert reconciliation['gates']['passed'] == [
              'error_rate',
              'acl_violation_rate',
              'output_influence_rate',
          ]
          assert reconciliation['blockers']['cleared'] == []
          assert reconciliation['blockers']['remaining'] == [
              'blocked_pending_retrieval_quality'
          ]
          assert reconciliation['authority']['production_retrieval'] == 'lexical'
          assert reconciliation['authority']['promotion_eligibility_granted'] is False
          assert reconciliation['diagnostic_worker']['deletion_completed'] is False
          assert reconciliation['diagnostic_worker']['issue_remains_open_after_deletion'] is True
          assert reconciliation['next_legal_workstream'] == 'M23.7-R3.1 retrieval-quality root-cause repair'

          encoded = json.dumps(report, sort_keys=True)
          for forbidden in (
              'What does',
              'What is',
              'How does',
              'Which source',
              'QDRANT_API_KEY',
              'M23_R3_OPERATOR_TOKEN',
              'https://',
          ):
              assert forbidden not in encoded
          worker = Path('workers/m23-7-r3-observation/worker.mjs').read_text(
              encoding='utf-8'
          )
          assert 'limit: TOP_K' in worker
          assert 'const TOP_K = 10' in worker
          assert 'env.AI.run' in worker
          assert 'console.log' not in worker
          assert 'api.cloudflare.com' not in worker
          PY
      - name: Compile accepted Python scope
        run: python -m compileall -q src tests scripts
