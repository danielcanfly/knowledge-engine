name: M23.7 R3.8 Placement Proof Bootstrap

on:
  pull_request:
    paths:
      - "scripts/bootstrap_m23_7_r3_8_placement_proof.py"
      - ".github/workflows/m23-7-r3-8-placement-proof-bootstrap.yml"
      - ".github/placement-proof-trigger.txt"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply non-workflow placement proof repair
        id: apply
        shell: bash
        run: |
          set +e
          log="$RUNNER_TEMP/bootstrap-output.txt"
          temp_script="/tmp/placement-proof-patch.py"
          : > "$log"
          python - <<'PY' >> "$log" 2>&1
          from pathlib import Path

          source = Path("scripts/bootstrap_m23_7_r3_8_placement_proof.py").read_text(
              encoding="utf-8"
          )
          start = source.index("# Dedicated CI:")
          end = source.index("append_once(", start)
          source = source[:start] + source[end:]
          cleanup = '''
# Bootstrap files must not survive the patch commit.
Path("scripts/bootstrap_m23_7_r3_8_placement_proof.py").unlink()
Path(".github/workflows/m23-7-r3-8-placement-proof-bootstrap.yml").unlink()
'''
          if cleanup not in source:
              raise RuntimeError("bootstrap cleanup anchor missing")
          source = source.replace(cleanup, "\n")
          Path("/tmp/placement-proof-patch.py").write_text(source, encoding="utf-8")
          PY
          code=$?
          if [ "$code" -eq 0 ]; then
            python "$temp_script" >> "$log" 2>&1
            code=$?
          fi
          if [ "$code" -eq 0 ]; then
            git diff --check >> "$log" 2>&1
            code=$?
          fi
          if [ "$code" -eq 0 ]; then
            git config user.name "github-actions[bot]" >> "$log" 2>&1
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com" >> "$log" 2>&1
            git add \
              docs/architecture/m23-7-r3-8-7-remote-operator.md \
              pilot/m23/m23-7-r3-8-7-remote-operator-contract.json \
              scripts/m23_7_r3_8_remote_operator.py \
              src/knowledge_engine/m23_7_r3_8_latency_repair.py \
              tests/test_m23_7_r3_8_latency_repair.py \
              tests/test_m23_7_r3_8_remote_operator.py \
              workers/m23-7-r3-8-latency-repair/worker.mjs \
              workers/m23-7-r3-8-latency-repair/worker.test.mjs \
              >> "$log" 2>&1
            git commit -m "Require remote placement proof for R3.8 observation" >> "$log" 2>&1
            code=$?
          fi
          if [ "$code" -eq 0 ]; then
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}" >> "$log" 2>&1
            code=$?
          fi
          cat "$log"
          if [ "$code" -ne 0 ]; then
            cp "$log" bootstrap-output.txt
            exit "$code"
          fi
      - name: Upload bootstrap diagnostic
        if: failure() && steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: m23-7-r3-8-placement-bootstrap-${{ github.run_id }}
          path: bootstrap-output.txt
          if-no-files-found: error
          retention-days: 7
