name: M26.7 Reconciliation

on:
  pull_request:
    paths:
      - '.github/workflows/m26-7-reconciliation.yml'
      - 'docs/architecture/m26/m26-7-reconciliation.md'
      - 'pilot/m26/m26-7-acceptance.json'
      - 'tests/test_m26_7_reconciliation.py'

permissions:
  contents: read

jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and implementation ancestry
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor 6ec47ffa368980c67596a9859eaa9bb3a0e4a9aa HEAD
          python - <<'PY'
          import json
          from pathlib import Path
          acceptance = json.loads(Path('pilot/m26/m26-7-acceptance.json').read_text())
          assert acceptance['status'] == 'm26_7_answer_presentation_non_serving_preview_accepted'
          assert acceptance['implementation']['merge_sha'] == '6ec47ffa368980c67596a9859eaa9bb3a0e4a9aa'
          assert acceptance['implementation']['final_head_sha'] == '6b08dd445c0372865afeae2025e0ca50199c55a1'
          assert acceptance['evidence_artifact']['artifact_id'] == 8574930488
          assert acceptance['benchmark']['case_count'] == 12
          assert acceptance['benchmark']['passed_count'] == 12
          assert acceptance['benchmark']['production_answer_serving_count'] == 0
          assert acceptance['benchmark']['production_pointer_mutation_count'] == 0
          assert acceptance['benchmark']['verified_final_answer_count'] == 0
          PY
      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Validate reconciliation contract
        run: python -m pytest -q tests/test_m26_7_reconciliation.py
      - name: Reject protected mutations
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          printf '%s\n' "$changed"
          test "$changed" = ".github/workflows/m26-7-reconciliation.yml
          docs/architecture/m26/m26-7-reconciliation.md
          pilot/m26/m26-7-acceptance.json
          tests/test_m26_7_reconciliation.py"
          python -m compileall -q tests/test_m26_7_reconciliation.py
