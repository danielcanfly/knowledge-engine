name: M17 Operator Qualification Acceptance

on:
  pull_request:
    paths:
      - "docs/operations/README.md"
      - "docs/operations/m17/operator-training.md"
      - "docs/operations/m17/training-registry.json"
      - "src/knowledge_engine/m17_operator_qualification.py"
      - "src/knowledge_engine/m17_operator_qualification_cli.py"
      - "scripts/m17_operator_qualification_acceptance.py"
      - "tests/test_m17_operator_qualification.py"
      - "pyproject.toml"
      - ".github/workflows/m17-operator-qualification.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  operator-qualification:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run M17.5 qualification tests
        run: |
          pytest -q tests/test_m17_operator_qualification.py \
            --junitxml=.artifacts/m17/operator-qualification-junit.xml

      - name: Emit deterministic curriculum acceptance
        if: always()
        run: |
          python scripts/m17_operator_qualification_acceptance.py \
            --root . \
            --registry docs/operations/m17/training-registry.json \
            --output .artifacts/m17/operator-qualification-acceptance.json

      - name: Smoke test installed CLI
        run: |
          knowledge-qualify plan > .artifacts/m17/qualification-plan.json
          python - <<'PY'
          import json
          from pathlib import Path

          registry = json.loads(Path("docs/operations/m17/training-registry.json").read_text())
          results = []
          for exercise in registry["exercises"]:
              evidence = [
                  {"name": f"evidence-{index}", "sha256": f"{index + 1:064x}"}
                  for index in range(exercise["minimum_evidence_items"])
              ]
              results.append({
                  "exercise_id": exercise["id"],
                  "status": "passed",
                  "score": exercise["weight"],
                  "evidence": evidence,
              })
          submission = {
              "operator_id": "operator-17",
              "evaluator_id": "evaluator-04",
              "attempt": 1,
              "results": results,
          }
          Path(".artifacts/m17/submission.json").write_text(json.dumps(submission))
          PY
          knowledge-qualify assess \
            --submission .artifacts/m17/submission.json \
            > .artifacts/m17/qualification-result.json
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path(".artifacts/m17/qualification-result.json").read_text())
          if result["status"] != "qualified" or result["total_score"] != 100:
              raise SystemExit("qualification CLI smoke test failed")
          PY

      - name: Verify no mutation calls
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          forbidden = {
              "put", "delete", "promote_release", "rollback_release",
              "publish_release", "update_ref", "append_comment", "close_batch",
          }
          found = []
          for path in (
              Path("src/knowledge_engine/m17_operator_qualification.py"),
              Path("src/knowledge_engine/m17_operator_qualification_cli.py"),
          ):
              tree = ast.parse(path.read_text(encoding="utf-8"))
              for node in ast.walk(tree):
                  if not isinstance(node, ast.Call):
                      continue
                  if isinstance(node.func, ast.Name):
                      name = node.func.id
                  elif isinstance(node.func, ast.Attribute):
                      name = node.func.attr
                  else:
                      name = None
                  if name in forbidden:
                      found.append(f"{path}:{name}:{node.lineno}")
          if found:
              raise SystemExit("forbidden mutation calls: " + ", ".join(sorted(found)))
          PY

      - name: Upload acceptance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m17-operator-qualification-acceptance
          path: .artifacts/m17/
          if-no-files-found: warn
