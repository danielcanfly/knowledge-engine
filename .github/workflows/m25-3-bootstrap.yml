name: M25.3 Materialize Implementation

on:
  pull_request:
    paths:
      - '.github/workflows/m25-3-bootstrap.yml'
      - 'scripts/m25_3_materialize.py'
      - 'scripts/m25_3_prepare_push.py'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/m25-3-extraction-worker
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Materialize exact M25.3 implementation
        run: python scripts/m25_3_materialize.py
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Capture M25.3 lint diagnostics
        run: |
          set +e
          python -m ruff check --output-format json \
            src/knowledge_engine/m25_extraction_*.py \
            tests/test_m25_3_extraction_*.py \
            > /tmp/m25-3-ruff.json
          status=$?
          echo "$status" > /tmp/m25-3-ruff.exit
          exit 0
      - name: Upload M25.3 lint diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m25-3-ruff-diagnostics
          path: |
            /tmp/m25-3-ruff.json
            /tmp/m25-3-ruff.exit
          if-no-files-found: error
          retention-days: 7
      - name: Enforce M25.3 lint result
        run: test "$(cat /tmp/m25-3-ruff.exit)" = "0"
      - name: Capture generated implementation test diagnostics
        run: |
          set +e
          PYTHONPATH=tests python -m pytest -q \
            --junitxml=/tmp/m25-3-pytest.xml \
            tests/test_m21_3_extraction_candidates.py \
            tests/test_m25_2_intake_orchestrator.py \
            tests/test_m25_2_intake_orchestrator_contracts.py \
            tests/test_m25_2_reconciliation.py \
            tests/test_m25_3_extraction_worker.py \
            tests/test_m25_3_extraction_contracts.py \
            tests/test_m25_3_extraction_integration.py \
            > /tmp/m25-3-pytest.log 2>&1
          status=$?
          echo "$status" > /tmp/m25-3-pytest.exit
          exit 0
      - name: Upload M25.3 test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m25-3-pytest-diagnostics
          path: |
            /tmp/m25-3-pytest.log
            /tmp/m25-3-pytest.xml
            /tmp/m25-3-pytest.exit
          if-no-files-found: error
          retention-days: 7
      - name: Enforce M25.3 test result
        run: test "$(cat /tmp/m25-3-pytest.exit)" = "0"
      - name: Compile generated implementation
        run: >-
          python -m compileall -q
          src/knowledge_engine/m25_extraction_*.py
          tests/test_m25_3_extraction_*.py
      - name: Restore workflow scaffold before app push
        run: python scripts/m25_3_prepare_push.py
      - name: Capture commit and push diagnostics
        run: |
          set +e
          git config user.name 'ChatGPT M25 Subagent'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git status --short > /tmp/m25-3-git-status.log
          git commit -m 'Implement M25.3 evidence-bound extraction worker' \
            > /tmp/m25-3-git-commit.log 2>&1
          commit_status=$?
          echo "$commit_status" > /tmp/m25-3-git-commit.exit
          if [ "$commit_status" = "0" ]; then
            git push origin HEAD:chatgpt/m25-3-extraction-worker \
              > /tmp/m25-3-git-push.log 2>&1
            push_status=$?
          else
            echo 'push skipped because commit failed' > /tmp/m25-3-git-push.log
            push_status=99
          fi
          echo "$push_status" > /tmp/m25-3-git-push.exit
          exit 0
      - name: Upload commit and push diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m25-3-git-diagnostics
          path: |
            /tmp/m25-3-git-status.log
            /tmp/m25-3-git-commit.log
            /tmp/m25-3-git-commit.exit
            /tmp/m25-3-git-push.log
            /tmp/m25-3-git-push.exit
          if-no-files-found: error
          retention-days: 7
      - name: Enforce generated commit and push
        run: |
          test "$(cat /tmp/m25-3-git-commit.exit)" = "0"
          test "$(cat /tmp/m25-3-git-push.exit)" = "0"
