name: M23.7.6 Failure Rebuild Rollback

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_6_failure_rebuild_rollback.py"
      - "scripts/m23_7_6_failure_rebuild_rollback.py"
      - "tests/test_m23_7_6_failure_rebuild_rollback.py"
      - "pilot/m23/m23-7-6-failure-rebuild-rollback-evidence.json"
      - "docs/architecture/m23-7-6-failure-rebuild-rollback.md"
      - ".github/workflows/m23-7-6-failure-rebuild-rollback.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reliability-proof:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Quality gates
        run: |
          ruff check \
            src/knowledge_engine/m23_7_6_failure_rebuild_rollback.py \
            scripts/m23_7_6_failure_rebuild_rollback.py \
            tests/test_m23_7_6_failure_rebuild_rollback.py
          pytest -q \
            tests/test_m23_7_1_acceptance_contract.py \
            tests/test_m23_7_3_shadow_replay.py \
            tests/test_m23_7_5_live_shadow.py \
            tests/test_m23_7_6_failure_rebuild_rollback.py
      - name: Deterministic receipt replay
        run: |
          mkdir -p .artifacts/m23
          python scripts/m23_7_6_failure_rebuild_rollback.py \
            --output .artifacts/m23/m23-7-6-a.json
          python scripts/m23_7_6_failure_rebuild_rollback.py \
            --output .artifacts/m23/m23-7-6-b.json
          cmp .artifacts/m23/m23-7-6-a.json .artifacts/m23/m23-7-6-b.json
          cmp \
            .artifacts/m23/m23-7-6-a.json \
            pilot/m23/m23-7-6-failure-rebuild-rollback-evidence.json
      - name: Privacy authority and mutation scan
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(".artifacts/m23/m23-7-6-a.json")
          report = json.loads(path.read_text())
          assert report["status"] == "pass"
          assert report["fault_scenario_count"] == 10
          assert report["rebuild_byte_identical"] is True
          assert report["lexical_rollback_passed"] is True
          assert report["candidate_dependency_required_for_rollback"] is False
          assert report["carry_forward_blockers"] == [
              "blocked_pending_latency",
              "blocked_pending_retrieval_quality",
          ]
          assert report["promotion_eligibility_granted"] is False
          assert report["production_authority"] is False
          assert report["protected_mutations_dispatched"] is False
          encoded = path.read_text()
          for forbidden in (
              "query_text",
              "answer_text",
              "api_key",
              "Authorization",
              "https://",
              "qdrant_write_used\":true",
              "production_authority\":true",
          ):
              assert forbidden not in encoded
          PY
      - name: Compile accepted scope
        run: python -m compileall -q src tests scripts
