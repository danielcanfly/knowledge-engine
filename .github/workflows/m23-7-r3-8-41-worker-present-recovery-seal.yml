name: M23.7 R3.8.41 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-41/worker-present-recovery-seal-29561818934.json"
      - "docs/architecture/m23-7-r3-8-41-worker-present-recovery-seal.md"
      - ".github/workflows/m23-7-r3-8-41-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 8c74bd32234c4346aaf0b4f3ea16f3dccf56831b HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-41/worker-present-recovery-seal-29561818934.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "035404b5d316a1a6c8e484ecaccf3c81fa4aa317418fdb0eaf8fb98342660730"
          assert value["seal_issue"] == 724
          assert value["recovery_authorization_issue"] == 722
          assert value["recovery_authorization_pr"] == 723
          assert value["recovery_authorization_merge_sha"] == "8c74bd32234c4346aaf0b4f3ea16f3dccf56831b"
          assert value["recovery_run_id"] == "29561818934"
          assert value["artifact"]["artifact_id"] == 8399558688
          assert value["artifact"]["zip_sha256"] == "f2bca79e7cfd317fcb5efd92dceba1686ba8ce51575b1ce1c0453f969c59ed88"
          assert value["artifact"]["receipt_file_sha256"] == "3d5205068c24a3af5bf394329d3e52af1942742529fcad7f36dd252b1321d1cf"
          assert value["artifact"]["receipt_self_digest"] == "58987b1b6884eaa5eedf7f7678860bfa1ca08de384ef40e19c1f8d84b98f2af1"
          receipt = value["receipt"]
          assert receipt["status"] == "completed_read_only_recovery_probe"
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29561411876"
          assert receipt["affected_run_id"] == "29561411876"
          assert receipt["affected_engine_sha"] == "cb7ecefa8f5a4ac31bdfb71d891b60f3aa51555d"
          assert receipt["probe_engine_sha"] == "8c74bd32234c4346aaf0b4f3ea16f3dccf56831b"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          assert receipt["production_retrieval"] == "lexical"
          assert receipt["blockers_cleared"] is False
          for field in (
              "worker_delete_dispatched",
              "worker_deploy_dispatched",
              "worker_route_invoked",
              "worker_secret_mutation_dispatched",
              "qdrant_read_dispatched",
              "qdrant_mutation_dispatched",
              "r2_read_dispatched",
              "r2_mutation_dispatched",
              "protected_mutations_dispatched",
          ):
              assert receipt[field] is False
          authority = value["authority"]
          assert authority["evidence_seal_only"] is True
          assert authority["worker_deletion_authorized"] is False
          assert authority["fresh_observation_authorized"] is False
          assert authority["blocker_clearance_authorized"] is False
          assert authority["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-41/worker-present-recovery-seal-29561818934.json",
              "docs/architecture/m23-7-r3-8-41-worker-present-recovery-seal.md",
              ".github/workflows/m23-7-r3-8-41-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "8c74bd32234c4346aaf0b4f3ea16f3dccf56831b", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 8c74bd32234c4346aaf0b4f3ea16f3dccf56831b HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
