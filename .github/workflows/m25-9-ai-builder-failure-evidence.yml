name: M25.9 AI Builder Failure Evidence

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-ai-builder-failure-evidence.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-ai-builder-failure-evidence.yml'

permissions:
  contents: read
  actions: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 20
          show-progress: false
      - name: Verify one-file read-only boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-ai-builder-failure-evidence.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-ai-builder-failure-evidence.yml'
          fi

  extract-existing-step:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_RUN_ID: '30063234927'
      TARGET_JOB_ID: '89388951970'
      TARGET_SHA: 9cb8f10eda1c2cb92b827734901b60794acb9e1a
      TARGET_STEP: Build and validate unreachable repair commit object
      OUTPUT_DIR: /tmp/m25-9-ai-builder-failure
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 20
          show-progress: false
      - name: Download existing builder job log
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          mkdir -p "$OUTPUT_DIR"
          gh run view "$TARGET_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --job "$TARGET_JOB_ID" \
            --log > "$OUTPUT_DIR/builder-job.log"
      - name: Extract sanitized exact-step tail
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          root = Path(os.environ['OUTPUT_DIR'])
          target = os.environ['TARGET_STEP']

          def sanitize(value: str) -> str:
              value = value.replace('\x1b', '')
              value = re.sub(r'\[[0-9;]*m', '', value)
              value = re.sub(r'https?://\S+', '<redacted-url>', value)
              value = re.sub(
                  r'(?i)(bearer|token|secret|password|authorization)\s*[:=]?\s*\S+',
                  r'\1=<redacted>',
                  value,
              )
              value = re.sub(r'\b[0-9a-fA-F]{32,64}\b', '<redacted-hex>', value)
              return value[:1200]

          lines = []
          for raw in (root / 'builder-job.log').read_text(errors='replace').splitlines():
              parts = raw.split('\t', 2)
              if len(parts) == 3 and parts[1] == target:
                  line = sanitize(parts[2])
                  if line and (not lines or lines[-1] != line):
                      lines.append(line)

          error_lines = [
              line for line in lines
              if any(word in line.lower() for word in (
                  'error', 'traceback', 'exception', 'failed', 'expected one',
                  'assertion', 'systemexit', 'http error', 'exit code',
              ))
          ]
          summary = {
              'schema_version': 'knowledge-engine-m25-9-ai-builder-failure/v1',
              'source_run_id': int(os.environ['TARGET_RUN_ID']),
              'source_job_id': int(os.environ['TARGET_JOB_ID']),
              'source_run_reexecuted': False,
              'external_service_mutations': 0,
              'selected_line_count': len(lines),
              'error_lines': error_lines[-80:],
              'step_tail': lines[-180:],
              'secret_values_recorded': False,
              'raw_log_recorded': False,
          }
          summary['evidence_sha256'] = hashlib.sha256(
              json.dumps(summary, sort_keys=True, separators=(',', ':')).encode()
          ).hexdigest()
          (root / 'ai-builder-failure-summary.json').write_text(
              json.dumps(summary, indent=2, sort_keys=True) + '\n'
          )
          print(json.dumps({
              'selected_line_count': len(lines),
              'error_line_count': len(error_lines),
              'external_service_mutations': 0,
          }, sort_keys=True))
          PY
      - name: Upload sanitized builder failure evidence
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-ai-builder-failure-${{ github.sha }}
          path: /tmp/m25-9-ai-builder-failure/ai-builder-failure-summary.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish extractor status
        run: |
          set -euo pipefail
          summary="$OUTPUT_DIR/ai-builder-failure-summary.json"
          lines="$(jq -r '.selected_line_count' "$summary")"
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$TARGET_SHA" \
            -f state='success' \
            -f context='m25-9-ai-builder-failure-evidence' \
            -f description="run $GITHUB_RUN_ID extracted $lines exact-step lines" \
            -f target_url="$run_url" >/dev/null
