name: M23 Governed Operator Command Bus

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

concurrency:
  group: m23-operator-command-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  validate:
    if: >-
      github.event.issue.number == 565 &&
      github.event.comment.user.login == 'huaihsuanbusiness' &&
      github.event.comment.author_association == 'OWNER' &&
      startsWith(github.event.comment.body, 'M23_OPERATOR_COMMAND ')
    runs-on: ubuntu-24.04
    outputs:
      authorization_path: ${{ steps.command.outputs.authorization_path }}
      expected_head: ${{ steps.command.outputs.expected_head }}
      nonce: ${{ steps.command.outputs.nonce }}
      command_type: ${{ steps.command.outputs.command_type }}
      authorization_sha256: ${{ steps.command.outputs.authorization_sha256 }}
    steps:
      - name: Reject rerun attempts and wrong event surface
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$GITHUB_EVENT_NAME" = "issue_comment"
          test "${{ github.event.action }}" = "created"
          test "${{ github.event.issue.number }}" = "565"
          test "${{ github.event.comment.user.login }}" = "huaihsuanbusiness"
          test "${{ github.event.comment.author_association }}" = "OWNER"

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Validate canonical command, authorization and exact main head
        id: command
        shell: bash
        run: |
          set -euo pipefail
          python -m scripts.m23_operator_command_bus \
            --event-path "$GITHUB_EVENT_PATH" \
            --repo-root . \
            --actual-head "$(git rev-parse HEAD)" \
            --github-output "$GITHUB_OUTPUT"

      - name: Prove exact command body is single-use
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMAND_BODY: ${{ github.event.comment.body }}
          CURRENT_COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          issue = 565
          body = os.environ["COMMAND_BODY"]
          current = int(os.environ["CURRENT_COMMENT_ID"])
          token = os.environ["GH_TOKEN"]
          page = 1
          matches = []
          while True:
              query = urllib.parse.urlencode({"per_page": 100, "page": page})
              url = (
                  f"https://api.github.com/repos/{repository}/issues/"
                  f"{issue}/comments?{query}"
              )
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  values = json.load(response)
              if not isinstance(values, list):
                  raise SystemExit("comment_collection_invalid")
              for value in values:
                  if isinstance(value, dict) and value.get("body") == body:
                      matches.append(value.get("id"))
              if len(values) < 100:
                  break
              page += 1
              if page > 100:
                  raise SystemExit("comment_pagination_oversized")
          if matches != [current]:
              raise SystemExit("command_body_not_single_use")
          PY

      - name: Report accepted command identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python -m scripts.m23_operator_status_comment \
            --phase accepted \
            --command-type "${{ steps.command.outputs.command_type }}" \
            --expected-head "${{ steps.command.outputs.expected_head }}" \
            --authorization-sha256 "${{ steps.command.outputs.authorization_sha256 }}"

  r3-8-post-delete-recovery:
    needs: validate
    if: needs.validate.outputs.command_type == 'r3_8_post_delete_recovery'
    runs-on: ubuntu-24.04
    environment: m23-r3-diagnostic
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      EVIDENCE_DIR: r3-8-13-post-delete-recovery-evidence
      ARTIFACT_NAME: m23-7-r3-8-13-post-delete-recovery-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.expected_head }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact routed head and immutable command identity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$(git rev-parse HEAD)" = "${{ needs.validate.outputs.expected_head }}"
          test "$GITHUB_SHA" = "${{ needs.validate.outputs.expected_head }}"
          test "${{ needs.validate.outputs.command_type }}" = "r3_8_post_delete_recovery"
          test -f "${{ needs.validate.outputs.authorization_path }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install exact Engine
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Recover post-delete state through official read-only collections
        id: recovery
        shell: bash
        run: |
          set +e
          rm -rf "$EVIDENCE_DIR"
          python -m scripts.m23_7_r3_8_post_delete_recovery \
            --authorization-path "${{ needs.validate.outputs.authorization_path }}" \
            --expected-head "${{ needs.validate.outputs.expected_head }}" \
            --nonce "${{ needs.validate.outputs.nonce }}" \
            --repo-root . \
            --output-dir "$EVIDENCE_DIR"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload governed post-delete recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: r3-8-13-post-delete-recovery-evidence/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30
          compression-level: 9

      - name: Report final governed route result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python -m scripts.m23_operator_status_comment \
            --phase final \
            --command-type "${{ needs.validate.outputs.command_type }}" \
            --expected-head "${{ needs.validate.outputs.expected_head }}" \
            --authorization-sha256 "${{ needs.validate.outputs.authorization_sha256 }}" \
            --exit-code "${{ steps.recovery.outputs.exit_code }}" \
            --artifact-name "$ARTIFACT_NAME"

      - name: Return governed recovery result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          code="${{ steps.recovery.outputs.exit_code }}"
          case "$code" in
            0) exit 0 ;;
            30) exit 30 ;;
            *) exit 23 ;;
          esac
