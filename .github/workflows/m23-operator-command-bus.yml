name: M23 PR Permit Read-Only Recovery

on:
  pull_request:
    types: [synchronize]
    paths:
      - "operator_permits/m23/**"

permissions:
  contents: read

concurrency:
  group: m23-pr-permit-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  validate-permit:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'huaihsuanbusiness'
    runs-on: ubuntu-24.04
    outputs:
      stage: ${{ steps.operator.outputs.stage }}
      request_path: ${{ steps.operator.outputs.request_path }}
      request_sha256: ${{ steps.operator.outputs.request_sha256 }}
      permit_path: ${{ steps.operator.outputs.permit_path }}
      permit_sha256: ${{ steps.operator.outputs.permit_sha256 }}
      authorization_path: ${{ steps.operator.outputs.authorization_path }}
      authorization_sha256: ${{ steps.operator.outputs.authorization_sha256 }}
      nonce: ${{ steps.operator.outputs.nonce }}
      command_type: ${{ steps.operator.outputs.command_type }}
      expected_head: ${{ steps.operator.outputs.expected_head }}
    steps:
      - name: Reject rerun and untrusted pull-request surfaces
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$GITHUB_EVENT_NAME" = "pull_request"
          test "${{ github.event.action }}" = "synchronize"
          test "${{ github.event.pull_request.head.repo.full_name }}" = "$GITHUB_REPOSITORY"
          test "${{ github.event.pull_request.user.login }}" = "huaihsuanbusiness"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate exact two-stage request and permit
        id: operator
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          python -m scripts.m23_operator_pr_permit \
            --repo-root . \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --github-output "$GITHUB_OUTPUT"
          test "$(cat "$GITHUB_OUTPUT" | sed -n 's/^stage=//p' | tail -n 1)" = "execution_permitted"

  r3-8-post-delete-recovery:
    needs: validate-permit
    if: >-
      needs.validate-permit.outputs.stage == 'execution_permitted' &&
      needs.validate-permit.outputs.command_type == 'r3_8_post_delete_recovery'
    runs-on: ubuntu-24.04
    environment: m23-r3-diagnostic
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      EVIDENCE_DIR: r3-8-16-pr-permit-recovery-evidence
      ARTIFACT_NAME: m23-7-r3-8-16-pr-permit-recovery-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-permit.outputs.expected_head }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact execution head and immutable permit identities
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$(git rev-parse HEAD)" = "${{ needs.validate-permit.outputs.expected_head }}"
          test "${{ needs.validate-permit.outputs.stage }}" = "execution_permitted"
          test -f "${{ needs.validate-permit.outputs.request_path }}"
          test -f "${{ needs.validate-permit.outputs.permit_path }}"
          test -f "${{ needs.validate-permit.outputs.authorization_path }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install exact Engine
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Recover post-delete state through official read-only collections
        id: recovery
        shell: bash
        run: |
          set +e
          rm -rf "$EVIDENCE_DIR"
          python -m scripts.m23_7_r3_8_post_delete_recovery \
            --authorization-path "${{ needs.validate-permit.outputs.authorization_path }}" \
            --expected-head "${{ needs.validate-permit.outputs.expected_head }}" \
            --nonce "${{ needs.validate-permit.outputs.nonce }}" \
            --repo-root . \
            --output-dir "$EVIDENCE_DIR"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload governed PR-permit recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: r3-8-16-pr-permit-recovery-evidence/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30
          compression-level: 9

      - name: Return governed recovery result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          code="${{ steps.recovery.outputs.exit_code }}"
          test -n "$code" || code=23
          case "$code" in
            0) exit 0 ;;
            30) exit 30 ;;
            *) exit 23 ;;
          esac

  r3-live-reobservation:
    needs: validate-permit
    if: >-
      needs.validate-permit.outputs.stage == 'execution_permitted' &&
      needs.validate-permit.outputs.command_type == 'r3_live_reobservation'
    runs-on: ubuntu-24.04
    environment: m23-r3-diagnostic
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      EVIDENCE_DIR: r3-live-observation-evidence
      ARTIFACT_NAME: m23-7-r3-live-observation-${{ github.run_id }}
      M23_R3_TRANSIENT_WORKER_NAME: knowledge-engine-m23-7-r3-live-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-permit.outputs.expected_head }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact execution head and live permit identities
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$(git rev-parse HEAD)" = "${{ needs.validate-permit.outputs.expected_head }}"
          test "${{ needs.validate-permit.outputs.stage }}" = "execution_permitted"
          test "${{ needs.validate-permit.outputs.command_type }}" = "r3_live_reobservation"
          test -f "${{ needs.validate-permit.outputs.request_path }}"
          test -f "${{ needs.validate-permit.outputs.permit_path }}"
          test -f "${{ needs.validate-permit.outputs.authorization_path }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install exact Engine
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Generate untracked transient Worker config
        shell: bash
        run: |
          set -euo pipefail
          python scripts/m23_7_r3_worker_config.py \
            --worker-name "$M23_R3_TRANSIENT_WORKER_NAME" \
            --output workers/m23-7-r3-observation/wrangler.local.jsonc
          test -f workers/m23-7-r3-observation/wrangler.local.jsonc

      - name: Deploy transient R3 observation Worker
        id: deploy
        working-directory: workers/m23-7-r3-observation
        shell: bash
        run: |
          set -euo pipefail
          npx --yes wrangler@latest deploy \
            --config wrangler.local.jsonc \
            --name "$M23_R3_TRANSIENT_WORKER_NAME" \
            --keep-vars 2>&1 | tee "$RUNNER_TEMP/r3-live-deploy.log"
          url="$(grep -Eo 'https://[^ ]+workers.dev[^ ]*' "$RUNNER_TEMP/r3-live-deploy.log" | tail -n 1)"
          test -n "$url"
          endpoint="${url%/}/v1/m23-7-r3/observe"
          echo "::add-mask::$url"
          echo "::add-mask::$endpoint"
          echo "worker_url=$url" >> "$GITHUB_OUTPUT"
          echo "worker_endpoint=$endpoint" >> "$GITHUB_OUTPUT"

      - name: Install transient Worker secrets
        working-directory: workers/m23-7-r3-observation
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf "%s" "$QDRANT_URL" > "$RUNNER_TEMP/qdrant_url"
          printf "%s" "$QDRANT_API_KEY" > "$RUNNER_TEMP/qdrant_api_key"
          python - <<'PY' > "$RUNNER_TEMP/operator_token"
          import secrets
          print(secrets.token_hex(32), end="")
          PY
          echo "::add-mask::$(cat "$RUNNER_TEMP/operator_token")"
          npx --yes wrangler@latest secret put QDRANT_URL \
            --config wrangler.local.jsonc \
            --name "$M23_R3_TRANSIENT_WORKER_NAME" < "$RUNNER_TEMP/qdrant_url"
          npx --yes wrangler@latest secret put QDRANT_API_KEY \
            --config wrangler.local.jsonc \
            --name "$M23_R3_TRANSIENT_WORKER_NAME" < "$RUNNER_TEMP/qdrant_api_key"
          npx --yes wrangler@latest secret put M23_R3_OPERATOR_TOKEN \
            --config wrangler.local.jsonc \
            --name "$M23_R3_TRANSIENT_WORKER_NAME" < "$RUNNER_TEMP/operator_token"
          endpoint="${{ steps.deploy.outputs.worker_endpoint }}"
          for attempt in $(seq 1 12); do
            status="$(
              curl -sS \
                -o "$RUNNER_TEMP/r3-secret-readiness.json" \
                -w "%{http_code}" \
                -X POST \
                -H "Content-Type: application/json" \
                --data '{}' \
                "$endpoint"
            )"
            code="$(
              node -e 'const fs = require("fs"); try { const payload = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + "/r3-secret-readiness.json", "utf8")); console.log(payload.code || "missing"); } catch { console.log("unreadable"); }'
            )"
            if [ "$status" = "401" ] && [ "$code" = "unauthorized" ]; then
              break
            fi
            if [ "$status" = "500" ] && [ "$code" = "operator-secret-missing" ]; then
              sleep 5
              continue
            fi
            exit 23
          done
          test "$status:$code" = "401:unauthorized"
          {
            echo "M23_R3_WORKER_URL=${{ steps.deploy.outputs.worker_endpoint }}"
            echo -n "M23_R3_OPERATOR_TOKEN="
            cat "$RUNNER_TEMP/operator_token"
            echo
          } >> "$GITHUB_ENV"
          rm -f "$RUNNER_TEMP/qdrant_url" "$RUNNER_TEMP/qdrant_api_key" "$RUNNER_TEMP/operator_token"

      - name: Run governed R3 live observation
        id: observation
        shell: bash
        run: |
          set +e
          rm -rf "$EVIDENCE_DIR"
          mkdir -p "$EVIDENCE_DIR"
          python scripts/m23_7_r3_bounded_live_reobservation.py \
            --mode live \
            --wrangler-config workers/m23-7-r3-observation/wrangler.local.jsonc \
            --worker-origin r3-live-worker \
            --output "$EVIDENCE_DIR/live-observation-report.json"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Delete transient R3 observation Worker
        id: delete_worker
        if: always()
        working-directory: workers/m23-7-r3-observation
        shell: bash
        run: |
          set +e
          npx --yes wrangler@latest delete \
            --config wrangler.local.jsonc \
            --name "$M23_R3_TRANSIENT_WORKER_NAME" \
            --force
          code=$?
          if [ "$code" = "0" ]; then
            echo "completed=true" >> "$GITHUB_OUTPUT"
          else
            echo "completed=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Build privacy-safe live observation receipt
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p "$EVIDENCE_DIR"
          if [ ! -f "$EVIDENCE_DIR/live-observation-report.json" ]; then
            printf '{}\n' > "$EVIDENCE_DIR/live-observation-report.json"
          fi
          python -m scripts.m23_7_r3_live_observation_receipt \
            --authorization-path "${{ needs.validate-permit.outputs.authorization_path }}" \
            --expected-head "${{ needs.validate-permit.outputs.expected_head }}" \
            --nonce "${{ needs.validate-permit.outputs.nonce }}" \
            --repo-root . \
            --report-path "$EVIDENCE_DIR/live-observation-report.json" \
            --deletion-completed "${{ steps.delete_worker.outputs.completed || 'false' }}" \
            --output "$EVIDENCE_DIR/live-observation-receipt.json"
          exit 0

      - name: Upload governed R3 live observation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: r3-live-observation-evidence/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30
          compression-level: 9

      - name: Return governed R3 live observation result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          code="${{ steps.observation.outputs.exit_code }}"
          test -n "$code" || code=23
          case "$code" in
            0) exit 0 ;;
            2) exit 30 ;;
            *) exit 23 ;;
          esac
