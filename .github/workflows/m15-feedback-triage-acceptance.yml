name: M15 Feedback Triage Acceptance

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m15_feedback_triage.py"
      - "tests/test_m15_feedback_triage.py"
      - ".github/workflows/m15-feedback-triage-acceptance.yml"

permissions:
  contents: read

jobs:
  feedback-triage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -q tests/test_m15_feedback_triage.py
