name: M23.7 R3.8.22 Post-Delete Absence Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-22/post-delete-absence-seal-29552424982.json"
      - "docs/architecture/m23-7-r3-8-22-post-delete-absence-seal.md"
      - ".github/workflows/m23-7-r3-8-22-post-delete-absence-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and deletion authorization ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 5f2404964a344c01c6a21527528eefe8c6d5c74a HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic post-delete absence seal
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          path = Path(".github/evidence/m23-7-r3-8-22/post-delete-absence-seal-29552424982.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "3856b0a815ef4776b92e9ce34472d74985a47836671236e7add3c63a81e5d6a3"
          assert value["issue"] == 670
          assert value["worker_name"] == "knowledge-engine-r3-8-29550965495"
          assert value["deletion"]["run_id"] == "29552360089"
          assert value["deletion"]["artifact"]["id"] == 8396200573
          assert value["deletion"]["artifact"]["zip_sha256"] == "c8365bb826dc488a42b0b656c9a024e4f1ebb73d0852b5dacca4a85b4adf0bdd"
          assert value["deletion"]["artifact"]["receipt_file_sha256"] == "644547ee7692a2d1c2cde985c77105052ba6e4906e8a4b026b261de52a4c60e8"
          assert value["deletion"]["artifact"]["receipt_self_digest"] == "9d76a373e59ac71ec3efe13e27cb3ffca7c1ab06d627721c76b9e35991f28d76"
          assert value["deletion"]["receipt"]["worker_delete_dispatched"] is True
          assert value["deletion"]["receipt"]["absence_probe_dispatched"] is True
          assert value["deletion"]["receipt"]["failure_code"] == "delete_absence_not_proven"
          assert value["post_delete_recovery"]["run_id"] == "29552424982"
          assert value["post_delete_recovery"]["artifact"]["id"] == 8396222280
          assert value["post_delete_recovery"]["artifact"]["zip_sha256"] == "29488aff4b828566fe6a429d08668b52d22dbe24a6137c2aa86dcbc66c8e877f"
          recovery = value["post_delete_recovery"]["receipt"]
          assert recovery["worker_state"] == "worker_absent"
          assert recovery["versions"]["error_codes"] == [10007]
          assert recovery["deployments"]["error_codes"] == [10007]
          assert recovery["versions"]["http_status"] == 404
          assert recovery["deployments"]["http_status"] == 404
          assert value["result"]["control_plane_absence_proven"] is True
          assert value["result"]["post_delete_recovery_read_only"] is True
          assert value["authority"]["production_retrieval"] == "lexical"
          assert value["authority"]["worker_deletion_replay_authorized"] is False
          assert value["authority"]["blockers_cleared"] is False
          assert all(flag is False for flag in value["strict_zero"].values())
          PY
      - name: Verify exact seal scope
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-22/post-delete-absence-seal-29552424982.json",
              "docs/architecture/m23-7-r3-8-22-post-delete-absence-seal.md",
              ".github/workflows/m23-7-r3-8-22-post-delete-absence-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "5f2404964a344c01c6a21527528eefe8c6d5c74a", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
