name: Source Candidate Dispatch

on:
  repository_dispatch:
    types: [knowledge-source-candidate]

permissions:
  contents: read
  issues: write

concurrency:
  group: source-candidate-${{ github.event.client_payload.source_sha }}
  cancel-in-progress: false

jobs:
  validate-dispatch:
    runs-on: ubuntu-latest
    outputs:
      builder_ref: ${{ steps.payload.outputs.builder_ref }}
      source_repository: ${{ steps.payload.outputs.source_repository }}
      source_sha: ${{ steps.payload.outputs.source_sha }}
      validation_run_id: ${{ steps.payload.outputs.validation_run_id }}
      foundation_sha: ${{ steps.payload.outputs.foundation_sha }}
      candidate_channel: ${{ steps.payload.outputs.candidate_channel }}
      acceptance_query: ${{ steps.payload.outputs.acceptance_query }}
    steps:
      - name: Validate dispatch payload
        id: payload
        env:
          BUILDER_REF: ${{ github.event.client_payload.builder_ref }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
          VALIDATION_RUN_ID: ${{ github.event.client_payload.validation_run_id }}
          FOUNDATION_SHA: ${{ github.event.client_payload.foundation_sha }}
          CANDIDATE_CHANNEL: ${{ github.event.client_payload.candidate_channel }}
          ACCEPTANCE_QUERY: ${{ github.event.client_payload.acceptance_query }}
          ENGINE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$BUILDER_REF" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$VALIDATION_RUN_ID" =~ ^[0-9]+$ ]]
          [[ "$FOUNDATION_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$BUILDER_REF" = "$ENGINE_SHA"
          test "$SOURCE_REPOSITORY" = 'danielcanfly/knowledge-source'
          test "$FOUNDATION_SHA" = 'd12c7c416c950d743d4cd5e7964fd3c3bc0d9062'
          test "$CANDIDATE_CHANNEL" = "candidate-source-$SOURCE_SHA"
          test -n "$ACCEPTANCE_QUERY"
          {
            echo "builder_ref=$BUILDER_REF"
            echo "source_repository=$SOURCE_REPOSITORY"
            echo "source_sha=$SOURCE_SHA"
            echo "validation_run_id=$VALIDATION_RUN_ID"
            echo "foundation_sha=$FOUNDATION_SHA"
            echo "candidate_channel=$CANDIDATE_CHANNEL"
            echo "acceptance_query=$ACCEPTANCE_QUERY"
          } >> "$GITHUB_OUTPUT"

  publish-candidate:
    needs: validate-dispatch
    runs-on: ubuntu-latest
    environment: production
    outputs:
      release_id: ${{ steps.result.outputs.release_id }}
      manifest_sha256: ${{ steps.result.outputs.manifest_sha256 }}
      source_snapshot_sha256: ${{ steps.result.outputs.source_snapshot_sha256 }}
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      BUILDER_REF: ${{ needs.validate-dispatch.outputs.builder_ref }}
      SOURCE_REPOSITORY: ${{ needs.validate-dispatch.outputs.source_repository }}
      SOURCE_SHA: ${{ needs.validate-dispatch.outputs.source_sha }}
      VALIDATION_RUN_ID: ${{ needs.validate-dispatch.outputs.validation_run_id }}
      FOUNDATION_SHA: ${{ needs.validate-dispatch.outputs.foundation_sha }}
      CANDIDATE_CHANNEL: ${{ needs.validate-dispatch.outputs.candidate_channel }}
      ACCEPTANCE_QUERY: ${{ needs.validate-dispatch.outputs.acceptance_query }}
    steps:
      - name: Validate Engine production secret boundary
        env:
          SOURCE_READ_TOKEN: ${{ secrets.KNOWLEDGE_SOURCE_READ_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          printf '%s\n' 'candidate job started' > evidence/job-status.txt
          test -n "$SOURCE_READ_TOKEN"
          test -n "$R2_ACCESS_KEY_ID"
          test -n "$R2_SECRET_ACCESS_KEY"
          test -n "$R2_BUCKET"
          test -n "$R2_ENDPOINT_URL"

      - name: Check out pinned Knowledge Engine
        uses: actions/checkout@v4
        with:
          repository: danielcanfly/knowledge-engine
          ref: ${{ env.BUILDER_REF }}
          path: engine
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: engine/pyproject.toml

      - name: Install pinned Builder
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e engine
          test "$(git -C engine rev-parse HEAD)" = "$BUILDER_REF"

      - name: Verify successful Source validation run
        env:
          SOURCE_READ_TOKEN: ${{ secrets.KNOWLEDGE_SOURCE_READ_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $SOURCE_READ_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$SOURCE_REPOSITORY/actions/runs/$VALIDATION_RUN_ID" \
            > evidence/source-validation-run.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from knowledge_engine.delivery import verify_source_validation_run

          verify_source_validation_run(
              json.loads(Path('evidence/source-validation-run.json').read_text()),
              source_repository=os.environ['SOURCE_REPOSITORY'],
              source_sha=os.environ['SOURCE_SHA'],
              validation_run_id=os.environ['VALIDATION_RUN_ID'],
          )
          print('SOURCE_VALIDATION_RUN_VERIFIED')
          PY

      - name: Check out exact private Source revision
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_SHA }}
          path: source
          fetch-depth: 0
          token: ${{ secrets.KNOWLEDGE_SOURCE_READ_TOKEN }}
          persist-credentials: false

      - name: Verify Source checkout and delivery policy
        shell: bash
        run: |
          set -euo pipefail
          test "$(git -C source rev-parse HEAD)" = "$SOURCE_SHA"
          test -z "$(git -C source status --porcelain)"
          python - <<'PY'
          import os
          from pathlib import Path

          from knowledge_engine.delivery import verify_source_delivery_policy

          verify_source_delivery_policy(
              Path('source/policy/promotion-policy.json'),
              builder_ref=os.environ['BUILDER_REF'],
              foundation_ref=os.environ['FOUNDATION_SHA'],
              candidate_channel=os.environ['CANDIDATE_CHANNEL'],
              acceptance_query=os.environ['ACCEPTANCE_QUERY'],
          )
          print('SOURCE_DELIVERY_POLICY_VERIFIED')
          PY

      - name: Build, publish, and gate candidate
        id: result
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_EPOCH="$(git -C source show -s --format=%ct "$SOURCE_SHA")"
          RELEASE_TIME="$(date -u -d "@$SOURCE_EPOCH" +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p .artifacts/candidate-gate
          knowledge-engine gate-source-candidate \
            --source-url "file://$GITHUB_WORKSPACE/source" \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-sha "$SOURCE_SHA" \
            --foundation-sha "$FOUNDATION_SHA" \
            --channel "$CANDIDATE_CHANNEL" \
            --release-time "$RELEASE_TIME" \
            --query "$ACCEPTANCE_QUERY" \
            --work-dir .artifacts/candidate-gate \
            | tee evidence/source-candidate-gate.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(
              Path('evidence/source-candidate-gate.json').read_text()
          )
          required = {
              'reproducibility_passed': True,
              'production_pointer_unchanged': True,
              'internal_status': 'answered',
              'public_status': 'not_found',
              'public_result_count': 0,
          }
          for key, expected in required.items():
              if payload.get(key) != expected:
                  raise SystemExit(
                      f'{key}={payload.get(key)!r}, expected {expected!r}'
                  )
          if int(payload.get('internal_citation_count', 0)) < 1:
              raise SystemExit('candidate returned no citations')
          if int(payload.get('public_acl_filtered_count', 0)) < 1:
              raise SystemExit('candidate did not prove ACL filtering')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f"release_id={payload['release_id']}\n")
              handle.write(f"manifest_sha256={payload['manifest_sha256']}\n")
              handle.write(
                  f"source_snapshot_sha256={payload['source_snapshot_sha256']}\n"
              )
          Path('evidence/job-status.txt').write_text(
              'candidate gate passed\n',
              encoding='utf-8',
          )
          print('SOURCE_CANDIDATE_GATE_PASSED')
          PY

      - name: Collect candidate evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          manifest="$(find .artifacts/candidate-gate -name manifest.json -type f -print -quit 2>/dev/null || true)"
          snapshot="$(find .artifacts/candidate-gate -path '*/artifacts/source-snapshot.json' -type f -print -quit 2>/dev/null || true)"
          test -n "$manifest" && cp "$manifest" evidence/manifest.json
          test -n "$snapshot" && cp "$snapshot" evidence/source-snapshot.json
          find evidence -maxdepth 1 -type f -print -exec sha256sum {} \;

      - name: Upload candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-candidate-${{ env.SOURCE_SHA }}
          path: evidence/
          if-no-files-found: error
          retention-days: 30

  record-evidence:
    if: always()
    needs: [validate-dispatch, publish-candidate]
    runs-on: ubuntu-latest
    steps:
      - name: Append evidence to issue 13
        uses: actions/github-script@v7
        env:
          ENGINE_SHA: ${{ github.sha }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
          VALIDATION_RUN_ID: ${{ github.event.client_payload.validation_run_id }}
          CANDIDATE_CHANNEL: ${{ github.event.client_payload.candidate_channel }}
          VALIDATE_RESULT: ${{ needs.validate-dispatch.result }}
          CANDIDATE_RESULT: ${{ needs.publish-candidate.result }}
          RELEASE_ID: ${{ needs.publish-candidate.outputs.release_id }}
          MANIFEST_SHA256: ${{ needs.publish-candidate.outputs.manifest_sha256 }}
          SOURCE_SNAPSHOT_SHA256: ${{ needs.publish-candidate.outputs.source_snapshot_sha256 }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const passed = process.env.VALIDATE_RESULT === 'success' && process.env.CANDIDATE_RESULT === 'success';
            const body = [
              `## Source candidate dispatch: ${passed ? 'passed' : 'failed'}`,
              '',
              `- Engine SHA: \`${process.env.ENGINE_SHA}\``,
              `- Source repository: \`${process.env.SOURCE_REPOSITORY}\``,
              `- Source SHA: \`${process.env.SOURCE_SHA}\``,
              `- Source validation run ID: \`${process.env.VALIDATION_RUN_ID}\``,
              `- Candidate channel: \`${process.env.CANDIDATE_CHANNEL}\``,
              `- Dispatch validation: \`${process.env.VALIDATE_RESULT}\``,
              `- Candidate gate: \`${process.env.CANDIDATE_RESULT}\``,
              `- Release ID: \`${process.env.RELEASE_ID || 'n/a'}\``,
              `- Manifest SHA-256: \`${process.env.MANIFEST_SHA256 || 'n/a'}\``,
              `- Source snapshot SHA-256: \`${process.env.SOURCE_SNAPSHOT_SHA256 || 'n/a'}\``,
              `- Actions run: ${process.env.RUN_URL}`,
              '',
              'A successful candidate gate proves deterministic rebuild, immutable R2 publication, Runtime integrity loading, authorized internal retrieval with citations, public ACL denial, and an unchanged production pointer.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 13,
              body
            });
