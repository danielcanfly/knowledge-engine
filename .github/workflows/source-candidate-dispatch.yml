name: Source Candidate Dispatch

on:
  repository_dispatch:
    types: [knowledge-source-candidate]

permissions:
  contents: read
  issues: write

concurrency:
  group: source-candidate-${{ github.event.client_payload.source_sha }}
  cancel-in-progress: false

jobs:
  validate-dispatch:
    runs-on: ubuntu-latest
    outputs:
      builder_ref: ${{ steps.payload.outputs.builder_ref }}
      source_repository: ${{ steps.payload.outputs.source_repository }}
      source_sha: ${{ steps.payload.outputs.source_sha }}
      validation_run_id: ${{ steps.payload.outputs.validation_run_id }}
      foundation_sha: ${{ steps.payload.outputs.foundation_sha }}
      candidate_channel: ${{ steps.payload.outputs.candidate_channel }}
      acceptance_query: ${{ steps.payload.outputs.acceptance_query }}
    steps:
      - name: Validate dispatch payload
        id: payload
        env:
          BUILDER_REF: ${{ github.event.client_payload.builder_ref }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
          VALIDATION_RUN_ID: ${{ github.event.client_payload.validation_run_id }}
          FOUNDATION_SHA: ${{ github.event.client_payload.foundation_sha }}
          CANDIDATE_CHANNEL: ${{ github.event.client_payload.candidate_channel }}
          ACCEPTANCE_QUERY: ${{ github.event.client_payload.acceptance_query }}
          ENGINE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$BUILDER_REF" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$VALIDATION_RUN_ID" =~ ^[0-9]+$ ]]
          [[ "$FOUNDATION_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$BUILDER_REF" = "$ENGINE_SHA"
          test "$SOURCE_REPOSITORY" = 'danielcanfly/knowledge-source'
          test "$FOUNDATION_SHA" = 'd12c7c416c950d743d4cd5e7964fd3c3bc0d9062'
          test "$CANDIDATE_CHANNEL" = "candidate-source-$SOURCE_SHA"
          test -n "$ACCEPTANCE_QUERY"
          {
            echo "builder_ref=$BUILDER_REF"
            echo "source_repository=$SOURCE_REPOSITORY"
            echo "source_sha=$SOURCE_SHA"
            echo "validation_run_id=$VALIDATION_RUN_ID"
            echo "foundation_sha=$FOUNDATION_SHA"
            echo "candidate_channel=$CANDIDATE_CHANNEL"
            echo "acceptance_query=$ACCEPTANCE_QUERY"
          } >> "$GITHUB_OUTPUT"

  publish-candidate:
    needs: validate-dispatch
    uses: ./.github/workflows/source-candidate-gate.yml
    with:
      builder_ref: ${{ needs.validate-dispatch.outputs.builder_ref }}
      source_repository: ${{ needs.validate-dispatch.outputs.source_repository }}
      source_sha: ${{ needs.validate-dispatch.outputs.source_sha }}
      validation_run_id: ${{ needs.validate-dispatch.outputs.validation_run_id }}
      foundation_sha: ${{ needs.validate-dispatch.outputs.foundation_sha }}
      candidate_channel: ${{ needs.validate-dispatch.outputs.candidate_channel }}
      acceptance_query: ${{ needs.validate-dispatch.outputs.acceptance_query }}
    secrets:
      source_read_token: ${{ secrets.KNOWLEDGE_SOURCE_READ_TOKEN }}

  record-evidence:
    if: always()
    needs: [validate-dispatch, publish-candidate]
    runs-on: ubuntu-latest
    steps:
      - name: Append evidence to issue 13
        uses: actions/github-script@v7
        env:
          ENGINE_SHA: ${{ github.sha }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
          VALIDATION_RUN_ID: ${{ github.event.client_payload.validation_run_id }}
          CANDIDATE_CHANNEL: ${{ github.event.client_payload.candidate_channel }}
          VALIDATE_RESULT: ${{ needs.validate-dispatch.result }}
          CANDIDATE_RESULT: ${{ needs.publish-candidate.result }}
          RELEASE_ID: ${{ needs.publish-candidate.outputs.release_id }}
          MANIFEST_SHA256: ${{ needs.publish-candidate.outputs.manifest_sha256 }}
          SOURCE_SNAPSHOT_SHA256: ${{ needs.publish-candidate.outputs.source_snapshot_sha256 }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const passed = process.env.VALIDATE_RESULT === 'success' && process.env.CANDIDATE_RESULT === 'success';
            const body = [
              `## Source candidate dispatch: ${passed ? 'passed' : 'failed'}`,
              '',
              `- Engine SHA: \`${process.env.ENGINE_SHA}\``,
              `- Source repository: \`${process.env.SOURCE_REPOSITORY}\``,
              `- Source SHA: \`${process.env.SOURCE_SHA}\``,
              `- Source validation run ID: \`${process.env.VALIDATION_RUN_ID}\``,
              `- Candidate channel: \`${process.env.CANDIDATE_CHANNEL}\``,
              `- Dispatch validation: \`${process.env.VALIDATE_RESULT}\``,
              `- Candidate gate: \`${process.env.CANDIDATE_RESULT}\``,
              `- Release ID: \`${process.env.RELEASE_ID || 'n/a'}\``,
              `- Manifest SHA-256: \`${process.env.MANIFEST_SHA256 || 'n/a'}\``,
              `- Source snapshot SHA-256: \`${process.env.SOURCE_SNAPSHOT_SHA256 || 'n/a'}\``,
              `- Actions run: ${process.env.RUN_URL}`,
              '',
              'A successful candidate gate proves deterministic rebuild, immutable R2 publication, Runtime integrity loading, authorized internal retrieval with citations, public ACL denial, and an unchanged production pointer.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 13,
              body
            });
