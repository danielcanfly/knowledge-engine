name: M25.9 Preflight Repair Builder

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-preflight-repair-builder.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-preflight-repair-builder.yml'

permissions:
  contents: write
  issues: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 50
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify builder boundary and syntax
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-preflight-repair-builder.yml
          test -f .github/scripts/m25_9_apply_exact_project_repair.py
          python -m py_compile .github/scripts/m25_9_apply_exact_project_repair.py
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-preflight-repair-builder.yml'
          fi

  build-repair-artifact:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      ARTIFACT_DIR: /tmp/m25-9-pages-exact-project-repair
      REPAIR_BRANCH: chatgpt/m25-9-pages-exact-project-repair-v1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify fresh attempt-1 builder authority
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git merge-base --is-ancestor 421f70c5696910d51ce8d93e4940109ecf06c5e7 HEAD
      - name: Apply deterministic Pages exact-project repair
        run: |
          set -euo pipefail
          python .github/scripts/m25_9_apply_exact_project_repair.py
      - name: Validate repaired implementation
        run: |
          set -euo pipefail
          python -m pip install -q --disable-pip-version-check -e '.[dev]'
          python -m ruff check --output-format=concise \
            scripts/m25_9_cloudflare_live_preflight.py \
            tests/test_m25_9_cloudflare_live_preflight.py
          python -m pytest -q tests/test_m25_9_cloudflare_live_preflight.py
          python -m compileall -q scripts/m25_9_cloudflare_live_preflight.py
          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m25-9-blog-full-population-pilot.yml' \
            'scripts/m25_9_cloudflare_live_preflight.py' \
            'tests/test_m25_9_cloudflare_live_preflight.py' | sort)"
          test "$changed" = "$expected"
      - name: Stage exact repaired files
        run: |
          set -euo pipefail
          mkdir -p \
            "$ARTIFACT_DIR/.github/workflows" \
            "$ARTIFACT_DIR/scripts" \
            "$ARTIFACT_DIR/tests"
          cp .github/workflows/m25-9-blog-full-population-pilot.yml \
            "$ARTIFACT_DIR/.github/workflows/"
          cp scripts/m25_9_cloudflare_live_preflight.py \
            "$ARTIFACT_DIR/scripts/"
          cp tests/test_m25_9_cloudflare_live_preflight.py \
            "$ARTIFACT_DIR/tests/"
          find "$ARTIFACT_DIR" -type f -print | sort
      - name: Upload exact repaired files
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-pages-exact-project-repair-${{ github.sha }}
          path: /tmp/m25-9-pages-exact-project-repair/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
      - name: Publish script and test repair branch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -c "$REPAIR_BRANCH"
          git add \
            scripts/m25_9_cloudflare_live_preflight.py \
            tests/test_m25_9_cloudflare_live_preflight.py
          git commit -m 'Repair M25.9 Pages exact-project preflight'
          git push origin "HEAD:refs/heads/$REPAIR_BRANCH"
          echo "REPAIR_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "REPAIR_TREE=$(git rev-parse 'HEAD^{tree}')" >> "$GITHUB_ENV"
      - name: Publish repair evidence
        run: |
          set -euo pipefail
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-repair-branch-builder' \
            -f description="run $GITHUB_RUN_ID attempt $GITHUB_RUN_ATTEMPT branch ready" \
            -f target_url="$run_url" >/dev/null
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-repair-head' \
            -f description="$REPAIR_HEAD" \
            -f target_url="$run_url" >/dev/null
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-repair-tree' \
            -f description="$REPAIR_TREE" \
            -f target_url="$run_url" >/dev/null
          gh issue comment 1092 \
            --repo "$GITHUB_REPOSITORY" \
            --body "M25.9 script/test repair branch \`$REPAIR_BRANCH\` is ready at commit \`$REPAIR_HEAD\`, tree \`$REPAIR_TREE\` (run \`$GITHUB_RUN_ID\`, attempt \`$GITHUB_RUN_ATTEMPT\`). The exact-project implementation passed Ruff, focused tests and compileall. No external service mutation occurred."
