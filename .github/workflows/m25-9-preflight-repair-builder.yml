name: M25.9 Preflight Repair Builder

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-preflight-repair-builder.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-preflight-repair-builder.yml'

permissions:
  contents: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 50
          show-progress: false
      - name: Verify one-file builder boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-preflight-repair-builder.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-preflight-repair-builder.yml'
          fi

  build-repair-branch:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      REPAIR_BRANCH: chatgpt/m25-9-pages-exact-project-repair-v1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify fresh attempt-1 builder authority
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git merge-base --is-ancestor 421f70c5696910d51ce8d93e4940109ecf06c5e7 HEAD
      - name: Apply deterministic Pages exact-project repair
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one replacement, found {count}')
              file.write_text(text.replace(old, new, 1))

          script = 'scripts/m25_9_cloudflare_live_preflight.py'
          replace_once(
              script,
              '''        records, pages_projects_payload = request_json(
              label="pages_dedicated",
              endpoint="pages_projects",
              url=f"{API_ROOT}/accounts/{account_id}/pages/projects?per_page=100",
              token=pages_token,
              requester=requester,
              timeout=timeout,
              max_attempts=max_attempts,
          )
          evidence["probes"].extend(records)
          require_pass(records, "pages_projects")
          projects = result_list(pages_projects_payload, "pages_projects")
          project_found = any(item.get("name") == pages_project for item in projects)
          evidence["resource_checks"]["target_pages_project_found"] = project_found
          if not project_found:
              raise PreflightFailure("target_pages_project_not_found")
''',
              '''        encoded_project = urllib.parse.quote(pages_project, safe="")
          records, pages_project_payload = request_json(
              label="pages_dedicated",
              endpoint="pages_project",
              url=f"{API_ROOT}/accounts/{account_id}/pages/projects/{encoded_project}",
              token=pages_token,
              requester=requester,
              timeout=timeout,
              max_attempts=max_attempts,
          )
          evidence["probes"].extend(records)
          require_pass(records, "pages_project")
          project = result_object(pages_project_payload, "pages_project")
          project_found = project.get("name") == pages_project
          evidence["resource_checks"]["target_pages_project_found"] = project_found
          if not project_found:
              raise PreflightFailure("target_pages_project_not_found")
''',
          )
          replace_once(
              script,
              '''
          encoded_project = urllib.parse.quote(pages_project, safe="")
          records, deployments_payload = request_json(
''',
              '''
          records, deployments_payload = request_json(
''',
          )

          tests = 'tests/test_m25_9_cloudflare_live_preflight.py'
          replace_once(
              tests,
              '''    if "/pages/projects?" in url:
              return "pages_projects"
''',
              '''    if url.endswith(f"/pages/projects/{PROJECT}"):
              return "pages_project"
''',
          )
          replace_once(
              tests,
              '''    if endpoint == "pages_projects":
              return {"success": True, "result": [{"name": PROJECT}]}
''',
              '''    if endpoint == "pages_project":
              return {"success": True, "result": {"name": PROJECT}}
''',
          )
          replace_once(
              tests,
              '''    for endpoint in ("pages_projects", "pages_deployments"):
''',
              '''    for endpoint in ("pages_project", "pages_deployments"):
''',
          )
          replace_once(
              tests,
              '''    outcomes[("pages-token", "pages_projects")] = [
''',
              '''    outcomes[("pages-token", "pages_project")] = [
''',
          )
          replace_once(
              tests,
              '''if item["endpoint"] == "pages_projects"][-1]
''',
              '''if item["endpoint"] == "pages_project"][-1]
''',
          )

          workflow = '.github/workflows/m25-9-blog-full-population-pilot.yml'
          replace_once(
              workflow,
              '''          expected="$(printf '%s\\n' \\
              '.github/workflows/m25-9-blog-full-population-pilot.yml' \\
              'docs/architecture/m25/m25-9-live-preflight-repair.md' \\
              'scripts/m25_9_cloudflare_live_preflight.py' \\
              'tests/test_m25_9_cloudflare_live_preflight.py' | sort)"
''',
              '''          expected="$(printf '%s\\n' \\
              '.github/workflows/m25-9-blog-full-population-pilot.yml' \\
              'scripts/m25_9_cloudflare_live_preflight.py' \\
              'tests/test_m25_9_cloudflare_live_preflight.py' | sort)"
''',
          )
          PY
      - name: Validate repaired implementation
        run: |
          set -euo pipefail
          python -m pip install -q --disable-pip-version-check -e '.[dev]'
          python -m ruff check --output-format=concise \
            scripts/m25_9_cloudflare_live_preflight.py \
            tests/test_m25_9_cloudflare_live_preflight.py
          python -m pytest -q tests/test_m25_9_cloudflare_live_preflight.py
          python -m compileall -q scripts/m25_9_cloudflare_live_preflight.py
          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m25-9-blog-full-population-pilot.yml' \
            'scripts/m25_9_cloudflare_live_preflight.py' \
            'tests/test_m25_9_cloudflare_live_preflight.py' | sort)"
          test "$changed" = "$expected"
      - name: Commit and publish repair branch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -c "$REPAIR_BRANCH"
          git add \
            .github/workflows/m25-9-blog-full-population-pilot.yml \
            scripts/m25_9_cloudflare_live_preflight.py \
            tests/test_m25_9_cloudflare_live_preflight.py
          git commit -m 'Repair M25.9 Pages exact-project preflight'
          git push origin "HEAD:refs/heads/$REPAIR_BRANCH"
          echo "REPAIR_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Record repair branch evidence
        run: |
          set -euo pipefail
          gh issue comment 1092 \
            --repo "$GITHUB_REPOSITORY" \
            --body "M25.9 deterministic preflight repair branch published: \`$REPAIR_BRANCH\` at exact head \`$REPAIR_HEAD\`. The repair replaces the invalid Pages project-list pagination request with the verified exact-project GET and changes exactly three files. No external service mutation occurred."
