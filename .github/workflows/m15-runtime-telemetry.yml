name: M15 Runtime Telemetry Acceptance

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m15_runtime_telemetry.py"
      - "src/knowledge_engine/m15_observability_contracts.py"
      - "tests/test_m15_runtime_telemetry.py"
      - "docs/architecture/m15/**"
      - ".github/workflows/m15-runtime-telemetry.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-telemetry-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run M15.2 adversarial tests
        run: pytest -q tests/test_m15_runtime_telemetry.py
      - name: Compile telemetry modules
        run: python -m compileall -q src/knowledge_engine/m15_runtime_telemetry.py tests/test_m15_runtime_telemetry.py
      - name: Assert no mutation or network exporter surfaces
        shell: bash
        run: |
          ! grep -R --line-number -E 'put_object|delete_object|update_ref|merge_pull_request|requests\.|httpx\.|boto3|raw_query|raw_answer' \
            src/knowledge_engine/m15_runtime_telemetry.py
