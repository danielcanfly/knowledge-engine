name: M26.8 Reconciliation

on:
  pull_request:
    paths:
      - '.github/workflows/m26-8-reconciliation.yml'
      - 'docs/architecture/m26/m26-8-reconciliation.md'
      - 'pilot/m26/m26-8-acceptance.json'
      - 'tests/test_m26_8_reconciliation.py'

permissions:
  contents: read

jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and implementation ancestry
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor c65f427a85d58e15d6f6378f962ad5adfe42addf HEAD
      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Validate reconciliation contract
        run: python -m pytest -q tests/test_m26_8_reconciliation.py
      - name: Reject protected mutations
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          printf '%s\n' "$changed"
          expected='.github/workflows/m26-8-reconciliation.yml
          docs/architecture/m26/m26-8-reconciliation.md
          pilot/m26/m26-8-acceptance.json
          tests/test_m26_8_reconciliation.py'
          diff <(printf '%s\n' "$expected" | sed 's/^ *//' | sort) <(printf '%s\n' "$changed")
          python -m compileall -q tests/test_m26_8_reconciliation.py
