name: M23.7 R3.8.16 Post-Delete Recovery Absence Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-16/post-delete-recovery-29539090953-seal.json"
      - "docs/architecture/m23-7-r3-8-16-post-delete-recovery-29539090953-seal.md"
      - ".github/workflows/m23-7-r3-8-16-post-delete-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and post-delete recovery ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 39af84db19678e13820c73419df8b43d83968b1a HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic absence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-16/post-delete-recovery-29539090953-seal.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "7b654301285c8a0485c8b853eb84153fd2f1f6bad4e10e9454d04e2c91378eaf"
          assert value["artifact"]["zip_sha256"] == "95eea0d47014a7716b315885840791c5138d71fecb2936b8dc15803294fb3433"
          assert value["artifact"]["receipt_file_sha256"] == "ef262d9b67759849fada2904887d48456243ce4847601f39d7cf4eace3a5693a"
          assert value["artifact"]["receipt_self_digest"] == "5278d87873f60133c471f5991fd9e1597f40d3283ab62fd9581509650662d269"
          assert value["receipt"]["status"] == "diagnostic_worker_absence_recovered"
          assert value["receipt"]["worker_state"] == "worker_absent"
          assert value["receipt"]["control_plane_absence_proven"] is True
          assert value["receipt"]["versions"]["http_status"] == 404
          assert value["receipt"]["deployments"]["http_status"] == 404
          assert value["receipt"]["versions"]["error_codes"] == [10007]
          assert value["receipt"]["deployments"]["error_codes"] == [10007]
          assert value["schema_diagnosis"]["worker_absence_inferred"] is True
          assert value["schema_diagnosis"]["worker_presence_inferred"] is False
          assert value["authority"]["production_retrieval"] == "lexical"
          assert value["authority"]["blockers_cleared"] is False
          assert all(flag is False for flag in value["strict_zero"].values())
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-16/post-delete-recovery-29539090953-seal.json",
              "docs/architecture/m23-7-r3-8-16-post-delete-recovery-29539090953-seal.md",
              ".github/workflows/m23-7-r3-8-16-post-delete-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "39af84db19678e13820c73419df8b43d83968b1a", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 39af84db19678e13820c73419df8b43d83968b1a HEAD -- \
            scripts/m23_7_r3_8_post_delete_recovery.py \
            scripts/m23_operator_pr_permit.py \
            .github/workflows/m23-operator-command-bus.yml \
            .github/workflows/m23-operator-request-ci.yml \
            operator_authorizations/m23/r3-8/post-delete-recovery-29521901629-v5.json
      - name: Privacy and authority scan
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text = "\n".join(path.read_text(encoding="utf-8") for path in (
              Path(".github/evidence/m23-7-r3-8-16/post-delete-recovery-29539090953-seal.json"),
              Path("docs/architecture/m23-7-r3-8-16-post-delete-recovery-29539090953-seal.md"),
          ))
          for forbidden in ("CLOUDFLARE_API_TOKEN=", "QDRANT_API_KEY=", "R2_SECRET_ACCESS_KEY=", "r2.cloudflarestorage.com"):
              assert forbidden not in text
          PY
