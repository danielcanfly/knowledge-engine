name: M26.2 Query ACL Diagnostic Repair
on:
  pull_request:
    paths:
      - '.github/workflows/m26-2-query-acl-repair.yml'
      - 'scripts/m26_2_query_acl_repair.py'
permissions:
  contents: write
jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Repair query-specific ACL diagnostics
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          python scripts/m26_2_query_acl_repair.py
          git diff --check
          test "$(git diff --name-only)" = 'src/knowledge_engine/m26_retrieval_envelope.py'
          python -m compileall -q src/knowledge_engine/m26_retrieval_envelope.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/knowledge_engine/m26_retrieval_envelope.py
          git commit -m 'Make M26.2 ACL diagnostics query-specific'
          git push origin "HEAD:$HEAD_BRANCH"
