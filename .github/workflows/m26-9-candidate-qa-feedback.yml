name: M26.9 Candidate QA Feedback

on:
  pull_request:
    paths:
      - '.github/workflows/m26-9-candidate-qa-feedback.yml'
      - 'docs/architecture/m26/m26-9-candidate-qa-feedback-baseline-refresh.md'
      - 'pilot/m26/m26-9-*.json'
      - 'schemas/m26-candidate-qa-feedback-v1.schema.json'
      - 'schemas/m26-baseline-refresh-plan-v1.schema.json'
      - 'src/knowledge_engine/m26_candidate_qa_feedback.py'
      - 'tests/test_m26_9_candidate_qa_feedback.py'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  candidate-qa-feedback:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and accepted predecessor
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          python - <<'PY'
          import json
          from pathlib import Path
          acceptance = json.loads(Path('pilot/m26/m26-8-acceptance.json').read_text())
          assert acceptance['status'] == 'm26_8_preview_evidence_candidate_bundle_accepted'
          assert acceptance['implementation']['merge_sha'] == 'c65f427a85d58e15d6f6378f962ad5adfe42addf'
          PY
      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Lint M26.9
        run: |
          python -m ruff check \
            src/knowledge_engine/m26_candidate_qa_feedback.py \
            tests/test_m26_9_candidate_qa_feedback.py
      - name: Test M26.9 contracts and policy
        run: |
          python -m pytest -q \
            tests/test_m26_9_candidate_qa_feedback.py::test_m26_9_entry_contract_and_policy \
            tests/test_m26_9_candidate_qa_feedback.py::test_m26_9_registry_and_schema_files_exist
      - name: Test M26.9 benchmark
        run: python -m pytest -q tests/test_m26_9_candidate_qa_feedback.py::test_m26_9_qa_benchmark
      - name: Test M26.9 feedback and safety
        run: |
          python -m pytest -q \
            tests/test_m26_9_candidate_qa_feedback.py::test_m26_9_feedback_keeps_identity_without_answer_text \
            tests/test_m26_9_candidate_qa_feedback.py::test_m26_9_refusal_feedback_has_no_claims_or_bindings \
            tests/test_m26_9_candidate_qa_feedback.py::test_m26_9_conflict_and_prompt_warnings_are_identity_only \
            tests/test_m26_9_candidate_qa_feedback.py::test_m26_9_baseline_plan_is_planning_only \
            tests/test_m26_9_candidate_qa_feedback.py::test_m26_9_rejects_candidate_authority_escalation \
            tests/test_m26_9_candidate_qa_feedback.py::test_m26_9_validation_rejects_feedback_answer_text
      - name: Test M26 predecessors
        run: |
          python -m pytest -q \
            tests/test_m26_4_provider_mock.py::test_provider_benchmark_passes_all_synthetic_cases \
            tests/test_m26_5_draft_answer.py::test_draft_benchmark_passes_all_synthetic_cases \
            tests/test_m26_6_answer_evaluation.py::test_evaluation_benchmark_passes_all_synthetic_cases \
            tests/test_m26_7_answer_presentation.py::test_m26_7_presentation_benchmark \
            tests/test_m26_8_preview_candidate_bundle.py::test_m26_8_candidate_benchmark
      - name: Rebuild deterministic QA feedback evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from tests.test_m26_9_candidate_qa_feedback import m26_inputs
          from knowledge_engine.m26_candidate_qa_feedback import run_qa_benchmark
          report = run_qa_benchmark(**m26_inputs())
          Path('m26-9-candidate-qa-evidence.json').write_text(
              json.dumps(report, ensure_ascii=False, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )
          assert report['status'] == 'm26_9_candidate_qa_ready'
          assert report['metrics']['baseline_refresh_execution_count'] == 0
          assert report['metrics']['production_answer_serving_count'] == 0
          PY
      - name: Reject protected mutations
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          printf '%s\n' "$changed"
          forbidden='^(source/|foundation/|release/|r2/|qdrant/|production|pilot/m26/m26-[1-8]-|src/knowledge_engine/m26_(answer|preview|draft|provider|retrieval|context))'
          ! printf '%s\n' "$changed" | grep -E "$forbidden"
      - uses: actions/upload-artifact@v4
        with:
          name: m26-9-candidate-qa-evidence
          path: m26-9-candidate-qa-evidence.json
          if-no-files-found: error
