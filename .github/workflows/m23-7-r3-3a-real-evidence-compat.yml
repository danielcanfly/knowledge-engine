name: M23.7 Repair R3.3a Real Evidence Compatibility

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r3_3_offline_rebuild_evaluation_real.py"
      - "scripts/m23_7_r3_3_offline_rebuild_operator.py"
      - "tests/test_m23_7_r3_3a_real_evidence_compat.py"
      - ".github/workflows/m23-7-r3-3a-real-evidence-compat.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-evidence-compat:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Ruff hotfix scope
        run: |
          ruff check \
            src/knowledge_engine/m23_7_r3_3_offline_rebuild_evaluation_real.py \
            scripts/m23_7_r3_3_offline_rebuild_operator.py \
            tests/test_m23_7_r3_3a_real_evidence_compat.py
      - name: Hotfix and R3.3 regressions
        run: |
          pytest -q \
            tests/test_m23_6_2a_real_evidence_compat.py \
            tests/test_m23_7_r3_2_semantic_payload_repair.py \
            tests/test_m23_7_r3_3_offline_rebuild_evaluation.py \
            tests/test_m23_7_r3_3a_real_evidence_compat.py
      - name: Verify authority boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = (
              Path('src/knowledge_engine/m23_7_r3_3_offline_rebuild_evaluation_real.py'),
              Path('scripts/m23_7_r3_3_offline_rebuild_operator.py'),
              Path('tests/test_m23_7_r3_3a_real_evidence_compat.py'),
          )
          encoded = '\n'.join(path.read_text(encoding='utf-8') for path in paths)
          assert 'QDRANT_API_KEY' not in encoded
          assert 'qdrant_write' not in encoded.lower()
          assert 'production_retrieval": "semantic' not in encoded
          PY
      - name: Compile hotfix scope
        run: python -m compileall -q src tests scripts
