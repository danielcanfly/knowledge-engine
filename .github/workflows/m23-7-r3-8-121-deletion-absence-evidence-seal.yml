name: M23.7 R3.8.121 Deletion/Absence Evidence Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-121/deletion-absence-evidence-seal-29591288207.json"
      - "docs/architecture/m23-7-r3-8-121-deletion-absence-evidence-seal.md"
      - ".github/workflows/m23-7-r3-8-121-deletion-absence-evidence-seal.yml"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and deletion authorization ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor ea88e4ced48665db4f3f6d389d9740c236b2602f HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic deletion/absence seal
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          path=Path(".github/evidence/m23-7-r3-8-121/deletion-absence-evidence-seal-29591288207.json")
          value=json.loads(path.read_text(encoding="utf-8")); digest=value.pop("seal_sha256")
          encoded=json.dumps(value,ensure_ascii=False,sort_keys=True,separators=(",",":"),allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest()==digest
          assert digest=="9501d6b17e6329200b0ec6a0662be60c3c54f2ac18d7e990583ec4f132c9e7bc"
          item=value["workers"][0]
          assert item["worker"]["name"]=="knowledge-engine-r3-8-29589719171"
          assert item["deletion_run"]["worker_delete_dispatched"] is True
          assert item["deletion_run"]["failure_code"]=="delete_absence_not_proven"
          assert item["post_delete_probe"]["run_id"]=="29591288207"
          assert item["post_delete_probe"]["worker_state"]=="worker_absent"
          assert item["post_delete_probe"]["versions"]["error_codes"]==[10007]
          assert item["post_delete_probe"]["deployments"]["error_codes"]==[10007]
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        run: |
          python - <<'PY'
          import subprocess
          allowed={".github/evidence/m23-7-r3-8-121/deletion-absence-evidence-seal-29591288207.json","docs/architecture/m23-7-r3-8-121-deletion-absence-evidence-seal.md",".github/workflows/m23-7-r3-8-121-deletion-absence-evidence-seal.yml"}
          changed=set(subprocess.check_output(["git","diff","--name-only","ea88e4ced48665db4f3f6d389d9740c236b2602f","HEAD"],text=True).splitlines())
          assert changed==allowed,(changed,allowed)
          PY
          git diff --exit-code ea88e4ced48665db4f3f6d389d9740c236b2602f HEAD -- scripts/m23_7_r3_8_remote_delete.py scripts/m23_7_r3_8_remote_recovery_probe.py .github/workflows/m23-7-r3-8-remote-delete.yml .github/workflows/m23-7-r3-8-9-recovery-probe.yml scripts/m23_7_r3_8_remote_operator.py src/knowledge_engine/m23_7_r3_8_latency_repair.py
