name: R2 Debug

on:
  pull_request:
    paths:
      - '.github/workflows/r2-debug.yml'
      - 'scripts/r2_release_integration.py'
      - 'src/knowledge_engine/**'

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compare canary and lifecycle
        env:
          APP_ENV: test
          AUTH_MODE: disabled
          OBJECT_STORE_BACKEND: r2
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
          R2_REGION: auto
          HEAD_REF: ${{ github.head_ref }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          git clone -q --depth 1 --branch "$HEAD_REF" "https://github.com/$REPOSITORY.git" source
          cd source
          python -m pip install -q . >/tmp/pip.log 2>&1
          python scripts/r2_canary.py --run-id "debug-canary-$RUN_ID"
          python scripts/r2_release_integration.py --run-id "debug-lifecycle-$RUN_ID"
