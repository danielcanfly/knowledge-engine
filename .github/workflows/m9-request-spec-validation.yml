name: M9 Request Spec Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "production_promotions/m9-001-agent-planning-strategies.json"
      - "governed_batches/m9-001-agent-planning-strategies.json"
      - "governed_batches/registry-v2.json"
      - "governed_batches/evidence/m9-001-production-promotion-observation.json"
      - "governed_batches/evidence/m9-001-idempotent-replay-observation.json"
      - "governed_batches/evidence/m9-001-lifecycle-history.json"
      - "tests/test_m9_request_spec.py"
      - "tests/test_m9_planned_batch.py"
      - ".github/workflows/m9-request-spec-validation.yml"

permissions:
  contents: read

jobs:
  validate-request-history:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      EVIDENCE_DIR: evidence/m9-request-spec
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install exact Engine
        run: python -m pip install -e '.[dev]'
      - name: Validate immutable request
        run: |
          mkdir -p "$EVIDENCE_DIR"
          knowledge-engine validate-promotion-request \
            --request-path production_promotions/m9-001-agent-planning-strategies.json \
            --control-plane-sha "$GITHUB_SHA" \
            --evidence-dir "$EVIDENCE_DIR" \
            > "$EVIDENCE_DIR/request-validation-cli.json"
      - name: Verify live target read-only
        run: |
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          from knowledge_engine.config import Settings
          from knowledge_engine.storage import create_object_store

          replay = json.loads(Path('governed_batches/evidence/m9-001-idempotent-replay-observation.json').read_text())
          target = replay['production_target']
          raw = create_object_store(Settings.from_env()).get('channels/production.json')
          pointer = json.loads(raw)
          digest = hashlib.sha256(raw).hexdigest()
          assert pointer['release_id'] == target['release_id']
          assert pointer['manifest_sha256'] == target['manifest_sha256']
          assert digest == target['pointer_sha256_after']
          root = Path(os.environ['EVIDENCE_DIR'])
          (root / 'live-production-pointer.json').write_bytes(raw)
          (root / 'live-production-observation.json').write_text(json.dumps({
              'status': 'passed', 'pointer_sha256': digest,
              'read_only': True, 'mutations_performed': []
          }, indent=2, sort_keys=True) + '\n')
          PY
      - name: Run request and closure tests
        run: |
          python -m pytest -q \
            tests/test_m9_request_spec.py \
            tests/test_m9_planned_batch.py
      - name: Write request-history summary
        run: |
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          from knowledge_engine.batch_lifecycle import next_action
          from knowledge_engine.batch_spec import load_batch_spec

          request_path = Path('production_promotions/m9-001-agent-planning-strategies.json')
          spec = load_batch_spec('governed_batches/m9-001-agent-planning-strategies.json')
          promotion = json.loads(Path('governed_batches/evidence/m9-001-production-promotion-observation.json').read_text())
          replay = json.loads(Path('governed_batches/evidence/m9-001-idempotent-replay-observation.json').read_text())
          live = json.loads(Path(os.environ['EVIDENCE_DIR'], 'live-production-observation.json').read_text())
          assert spec.lifecycle_state == 'closed'
          assert promotion['ledger']['appended'] is True
          assert replay['replay']['status'] == 'already_promoted'
          assert replay['replay']['idempotent'] is True
          assert replay['production_target']['pointer_byte_exact_unchanged'] is True
          summary = {
              'schema_version': 'm9-request-spec-validation/v3',
              'status': 'passed',
              'batch_id': spec.batch_id,
              'lifecycle_state': spec.lifecycle_state,
              'framework_next_action': next_action(spec.lifecycle_state),
              'request_path': str(request_path),
              'request_sha256': hashlib.sha256(request_path.read_bytes()).hexdigest(),
              'live_production_pointer_sha256': live['pointer_sha256'],
              'request_consumed': True,
              'production_promotion_observed': True,
              'idempotent_replay_observed': True,
              'replay_mutated_production': False,
              'rollback_observed': False,
              'next_legal_action': 'start_next_batch',
          }
          root = Path(os.environ['EVIDENCE_DIR'])
          (root / 'summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True) + '\n')
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY
      - name: Upload request history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m9-request-spec-history-${{ github.sha }}
          path: evidence/m9-request-spec/
          if-no-files-found: error
          retention-days: 90
