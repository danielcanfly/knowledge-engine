name: M9 Request Spec Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "production_promotions/m9-001-agent-planning-strategies.json"
      - "governed_batches/m9-001-agent-planning-strategies.json"
      - "governed_batches/registry-v2.json"
      - "governed_batches/evidence/m9-001-request-spec-authorization.json"
      - "governed_batches/evidence/m9-001-production-promotion-observation.json"
      - "governed_batches/evidence/m9-001-lifecycle-history.json"
      - "tests/test_m9_request_spec.py"
      - "tests/test_m9_planned_batch.py"
      - ".github/workflows/m9-request-spec-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      REQUEST_PATH: production_promotions/m9-001-agent-planning-strategies.json
      SPEC_PATH: governed_batches/m9-001-agent-planning-strategies.json
      REGISTRY_PATH: governed_batches/registry-v2.json
      EVIDENCE_DIR: evidence/m9-request-spec
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install exact Engine
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Verify read-only R2 configuration
        run: |
          set -euo pipefail
          test -n "$R2_ACCESS_KEY_ID"
          test -n "$R2_SECRET_ACCESS_KEY"
          test -n "$R2_BUCKET"
          test -n "$R2_ENDPOINT_URL"

      - name: Capture lifecycle-aware live production pointer
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          from knowledge_engine.config import Settings
          from knowledge_engine.storage import create_object_store

          spec = json.loads(Path(os.environ["SPEC_PATH"]).read_text())
          promotion = json.loads(
              Path(
                  "governed_batches/evidence/"
                  "m9-001-production-promotion-observation.json"
              ).read_text()
          )
          state = spec["lifecycle_state"]
          if state == "request_spec_committed":
              expected = promotion["previous_production"]
              role = "expected_previous"
          elif state in {"production_promoted", "closed"}:
              expected = promotion["production_target"]
              role = "expected_target"
          else:
              raise SystemExit(f"unsupported lifecycle state: {state}")

          store = create_object_store(Settings.from_env())
          pointer_bytes = store.get("channels/production.json")
          pointer = json.loads(pointer_bytes)
          pointer_sha256 = hashlib.sha256(pointer_bytes).hexdigest()
          assert pointer["release_id"] == expected["release_id"]
          assert pointer["manifest_sha256"] == expected["manifest_sha256"]
          assert pointer_sha256 == expected["pointer_sha256"]

          Path("/tmp/m9-live-production-pointer.json").write_bytes(pointer_bytes)
          Path("/tmp/m9-live-production-observation.json").write_text(
              json.dumps(
                  {
                      "status": "passed",
                      "lifecycle_state": state,
                      "expected_role": role,
                      "release_id": pointer["release_id"],
                      "manifest_sha256": pointer["manifest_sha256"],
                      "pointer_sha256": pointer_sha256,
                      "read_only": True,
                      "mutations_performed": [],
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run clean-checkout operator preflight
        run: |
          set -euo pipefail
          python -m knowledge_engine.batch_cli preflight \
            --spec-path "$SPEC_PATH" \
            --registry-path "$REGISTRY_PATH" \
            --production-pointer-path /tmp/m9-live-production-pointer.json \
            --output "$EVIDENCE_DIR/operator-preflight.json"
          mkdir -p "$EVIDENCE_DIR"
          cp /tmp/m9-live-production-pointer.json \
            "$EVIDENCE_DIR/live-production-pointer.json"
          cp /tmp/m9-live-production-observation.json \
            "$EVIDENCE_DIR/live-production-observation.json"

      - name: Validate immutable committed request
        run: |
          set -euo pipefail
          knowledge-engine validate-promotion-request \
            --request-path "$REQUEST_PATH" \
            --control-plane-sha "$GITHUB_SHA" \
            --evidence-dir "$EVIDENCE_DIR" \
            > "$EVIDENCE_DIR/request-validation-cli.json"

      - name: Run request and lifecycle regression tests
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_m9_request_spec.py \
            tests/test_m9_planned_batch.py

      - name: Write lifecycle-aware request summary
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          from knowledge_engine.batch_lifecycle import next_action
          from knowledge_engine.batch_spec import load_batch_spec
          from knowledge_engine.promotion_request import load_promotion_request_spec

          request_path = Path(
              "production_promotions/m9-001-agent-planning-strategies.json"
          )
          request = load_promotion_request_spec(
              request_path=request_path,
              control_plane_sha="0" * 40,
          )
          spec = load_batch_spec(
              "governed_batches/m9-001-agent-planning-strategies.json"
          )
          preflight = json.loads(
              Path("evidence/m9-request-spec/operator-preflight.json").read_text()
          )
          live = json.loads(
              Path("evidence/m9-request-spec/live-production-observation.json")
              .read_text()
          )
          promotion = json.loads(
              Path(
                  "governed_batches/evidence/"
                  "m9-001-production-promotion-observation.json"
              ).read_text()
          )
          normalized = request.normalized()

          assert preflight["status"] == "ready"
          assert preflight["lifecycle_state"] == spec.lifecycle_state
          assert preflight["production_workflow_inputs"] == ["request_path"]
          assert preflight["mutations_performed"] == []
          assert live["status"] == "passed"
          assert live["lifecycle_state"] == spec.lifecycle_state
          assert live["read_only"] is True
          assert live["mutations_performed"] == []
          assert "control_plane_sha" not in request.raw

          consumed = spec.lifecycle_state in {"production_promoted", "closed"}
          if consumed:
              assert promotion["status"] == "passed"
              assert promotion["promotion"]["operation_id"] == normalized[
                  "operation_id"
              ]
              assert promotion["production_target"]["release_id"] == normalized[
                  "release_id"
              ]
              assert promotion["ledger"]["appended"] is True

          summary = {
              "schema_version": "m9-request-spec-validation/v2",
              "status": "passed",
              "batch_id": spec.batch_id,
              "lifecycle_state": spec.lifecycle_state,
              "framework_next_action": next_action(spec.lifecycle_state),
              "operation_id": normalized["operation_id"],
              "request_path": str(request_path),
              "request_sha256": hashlib.sha256(request_path.read_bytes()).hexdigest(),
              "release_id": normalized["release_id"],
              "manifest_sha256": normalized["manifest_sha256"],
              "expected_previous_release_id": normalized[
                  "expected_previous_release_id"
              ],
              "expected_previous_manifest_sha256": normalized[
                  "expected_previous_manifest_sha256"
              ],
              "live_production_pointer_sha256": live["pointer_sha256"],
              "request_consumed": consumed,
              "production_mutated": consumed,
              "permanent_ledger_appended": consumed,
              "idempotent_replay_observed": False,
              "rollback_observed": False,
              "next_legal_action": (
                  promotion["next_legal_action"] if consumed
                  else "review_production_promotion"
              ),
          }
          output = Path("evidence/m9-request-spec/summary.json")
          output.write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Upload request-spec history evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m9-request-spec-history-${{ github.sha }}
          path: evidence/m9-request-spec/
          if-no-files-found: error
          retention-days: 90
