name: M21.5 Bootstrap Materializer

on:
  pull_request:
    paths:
      - '.github/workflows/m21-5-bootstrap.yml'

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - name: Materialize exact M21.5 implementation
        run: |
          python - <<'PY'
          import base64
          from pathlib import Path
          import zlib

          payloads = {
              '.github/workflows/m21-5-entity-resolution.yml': '.m21-5-bootstrap/workflow.b64',
              'docs/architecture/m21/m21-5-entity-resolution.md': '.m21-5-bootstrap/docs.b64',
              'src/knowledge_engine/m21_entity_resolution.py': '.m21-5-bootstrap/source.b64',
              'tests/test_m21_5_entity_resolution.py': '.m21-5-bootstrap/tests.b64',
          }
          for target_name, payload_name in payloads.items():
              target = Path(target_name)
              target.parent.mkdir(parents=True, exist_ok=True)
              payload = Path(payload_name).read_text().strip()
              target.write_bytes(zlib.decompress(base64.b64decode(payload)))
          for payload_name in payloads.values():
              Path(payload_name).unlink()
          Path('.m21-5-bootstrap').rmdir()
          Path('.github/workflows/m21-5-bootstrap.yml').unlink()
          PY
      - name: Commit exact four-file implementation scope
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          test "$(git diff --cached --name-only | sort | tr '\n' ' ')" = ".github/workflows/m21-5-bootstrap.yml .github/workflows/m21-5-entity-resolution.yml .m21-5-bootstrap/docs.b64 .m21-5-bootstrap/source.b64 .m21-5-bootstrap/tests.b64 .m21-5-bootstrap/workflow.b64 docs/architecture/m21/m21-5-entity-resolution.md src/knowledge_engine/m21_entity_resolution.py tests/test_m21_5_entity_resolution.py "
          git commit -m 'feat: implement M21.5 resolution evidence'
          git push origin "HEAD:${HEAD_BRANCH}"
