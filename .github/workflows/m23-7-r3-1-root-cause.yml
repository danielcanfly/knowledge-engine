name: M23.7 Repair R3.1 Root-Cause Diagnostics

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_7_r3_1_root_cause.py"
      - "src/knowledge_engine/m23_7_r3_1_fixture.py"
      - "scripts/m23_7_r3_1_root_cause.py"
      - "tests/test_m23_7_r3_1_root_cause.py"
      - "docs/architecture/m23-7-r3-1-root-cause.md"
      - ".github/workflows/m23-7-r3-1-root-cause.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  query-root-cause:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Ruff accepted scope
        run: |
          ruff check \
            src/knowledge_engine/m23_7_r3_1_root_cause.py \
            src/knowledge_engine/m23_7_r3_1_fixture.py \
            scripts/m23_7_r3_1_root_cause.py \
            tests/test_m23_7_r3_1_root_cause.py
      - name: Adversarial tests
        run: |
          pytest -q \
            tests/test_m23_7_r1_semantic_alignment.py \
            tests/test_m23_7_r3_bounded_live_reobservation.py \
            tests/test_m23_7_r3_1_root_cause.py
      - name: Deterministic replay
        run: |
          mkdir -p .artifacts/m23
          python scripts/m23_7_r3_1_root_cause.py \
            --output .artifacts/m23/r3-1-a.json
          python scripts/m23_7_r3_1_root_cause.py \
            --output .artifacts/m23/r3-1-b.json
          cmp .artifacts/m23/r3-1-a.json .artifacts/m23/r3-1-b.json
      - name: Privacy and authority scan
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path('.artifacts/m23/r3-1-a.json').read_text(encoding='utf-8')
          )
          assert report['status'] == 'phase_a_b_complete_vector_diagnostics_pending'
          assert report['root_cause']['primary'] == 'identifier_humanisation_query_collision'
          assert report['root_cause']['final_seal'] is False
          assert report['query_identity']['probe_bound_digest_masks_text_collision'] is True
          assert report['exit']['r3_1_complete'] is False
          assert report['exit']['parent_r3_complete'] is False
          assert report['authority']['production_retrieval'] == 'lexical'
          assert report['authority']['promotion_eligibility_granted'] is False
          assert report['authority']['qdrant_write'] == 0
          encoded = json.dumps(report, sort_keys=True)
          for forbidden in (
              'What does',
              'What is',
              'How does',
              'Which source',
              'QDRANT_API_KEY',
              'CLOUDFLARE_API_TOKEN',
              'https://',
          ):
              assert forbidden not in encoded
          PY
      - name: Compile accepted Python scope
        run: python -m compileall -q src tests scripts
