name: M23.7 R3.8.8 Recovery Probe Evidence Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-8/recovery-probe-29509724551-seal.json"
      - "docs/architecture/m23-7-r3-8-8-recovery-probe-29509724551-seal.md"
      - ".github/workflows/m23-7-r3-8-8-recovery-probe-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 4bbabf12a526135b5f31c68b1e9b371d6fc6e5d9 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-8/recovery-probe-29509724551-seal.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "41149bd725bde45e5eb8552d4a0a3d21a714481da5be65615eac5ee7fbd59b38"
          assert value["artifact"]["zip_sha256"] == "64fb4af6fb120cfb255b7d5e68e146d5e730c684bec584e7cc24df7e4e29bd47"
          assert value["artifact"]["receipt_file_sha256"] == "ac2852f1fc32c4a87474de62b173d5add5009fb2fcec27099f3e4219c549ebeb"
          assert value["artifact"]["receipt_self_digest"] == "4889aaf284675563120accc1252a250e5e5d906c28f6688de9323a5b97d4102c"
          assert value["receipt"]["status"] == "completed_fail_closed_recovery_probe"
          assert value["receipt"]["worker_state"] == "worker_state_indeterminate"
          assert value["schema_diagnosis"]["worker_presence_inferred"] is False
          assert value["schema_diagnosis"]["worker_absence_inferred"] is False
          assert value["authority"]["production_retrieval"] == "lexical"
          assert value["authority"]["maximum_worker_internal_shadow_ms"] == 1200
          assert value["authority"]["blockers_cleared"] is False
          assert all(flag is False for flag in value["strict_zero"].values())
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-8/recovery-probe-29509724551-seal.json",
              "docs/architecture/m23-7-r3-8-8-recovery-probe-29509724551-seal.md",
              ".github/workflows/m23-7-r3-8-8-recovery-probe-seal.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "4bbabf12a526135b5f31c68b1e9b371d6fc6e5d9", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 4bbabf12a526135b5f31c68b1e9b371d6fc6e5d9 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-8-recovery-probe.yml \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
      - name: Privacy and authority scan
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text = "\n".join(path.read_text(encoding="utf-8") for path in (
              Path(".github/evidence/m23-7-r3-8-8/recovery-probe-29509724551-seal.json"),
              Path("docs/architecture/m23-7-r3-8-8-recovery-probe-29509724551-seal.md"),
          ))
          for forbidden in ("CLOUDFLARE_API_TOKEN=", "QDRANT_API_KEY=", "R2_SECRET_ACCESS_KEY=", "r2.cloudflarestorage.com"):
              assert forbidden not in text
          PY
