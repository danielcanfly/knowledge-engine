name: M23.7 R3.8.21 Worker-Present Seal Reconciliation

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-21/worker-present-seal-reconciliation-29551723834.json"
      - "docs/architecture/m23-7-r3-8-21-worker-present-seal-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-21-worker-present-seal-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and worker-present seal ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 5b139a3d489c3a9de5fc065a6b7b1f4c53cef926 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic reconciliation
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(".github/evidence/m23-7-r3-8-21/worker-present-seal-reconciliation-29551723834.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "5e5a49796be69f3686700a911358ac9d7f6fdfeab331941129631d6f957dbd24"
          assert value["issue"] == 666
          assert value["seal"]["pr"] == 665
          assert value["seal"]["merge_sha"] == "5b139a3d489c3a9de5fc065a6b7b1f4c53cef926"
          assert value["seal"]["seal_sha256"] == "308bc22893ff2fbf24ae3b2cf7030e30a9f7f0ade6c16912c42ab5d7510a608a"
          assert value["artifact"]["artifact_id"] == 8395963532
          assert value["artifact"]["run_id"] == "29551723834"
          assert value["worker"]["name"] == "knowledge-engine-r3-8-29550965495"
          assert value["worker"]["state"] == "worker_present"
          assert len(set(value["worker"]["version_identities"])) == 4
          assert len(set(value["worker"]["deployment_identities"])) == 4
          assert value["authority"]["deletion_authorization_record_may_be_created"] is True
          assert value["authority"]["worker_deletion_executed"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["blocker_clearance_authorized"] is False
          assert value["authority"]["parent_closure_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          assert value["authority"]["production_retrieval"] == "lexical"
          for field, observed in value["strict_zero"].items():
              assert observed is False, field
          PY
      - name: Verify exact reconciliation scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-21/worker-present-seal-reconciliation-29551723834.json",
              "docs/architecture/m23-7-r3-8-21-worker-present-seal-reconciliation.md",
              ".github/workflows/m23-7-r3-8-21-worker-present-seal-reconciliation.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "5b139a3d489c3a9de5fc065a6b7b1f4c53cef926", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 5b139a3d489c3a9de5fc065a6b7b1f4c53cef926 HEAD -- \
            .github/evidence/m23-7-r3-8-21/worker-present-recovery-seal-29551723834.json \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
