name: M23.7 R3 One-shot Float Normalization

on:
  pull_request:
    paths:
      - ".github/workflows/m23-7-r3-float-normalization.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'agent/m23-7-r3-bounded-live-reobservation' }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply cross-version metric quantization
        run: |
          python - <<'PY'
          from pathlib import Path

          module = Path('src/knowledge_engine/m23_7_r3_bounded_live_reobservation.py')
          text = module.read_text(encoding='utf-8')
          old = '            return 1.0 / math.log2(index + 1)\n'
          new = '            return round(1.0 / math.log2(index + 1), 12)\n'
          assert old in text
          text = text.replace(old, new, 1)

          old = '''    recall_at_5 = sum(case["target_in_top_5"] for case in cases) / SAMPLE_CAP
    mrr_at_10 = sum(case["reciprocal_rank_at_10"] for case in cases) / SAMPLE_CAP
    ndcg_at_10 = sum(case["ndcg_at_10"] for case in cases) / SAMPLE_CAP
'''
          new = '''    recall_at_5 = round(
        sum(case["target_in_top_5"] for case in cases) / SAMPLE_CAP,
        12,
    )
    mrr_at_10 = round(
        sum(case["reciprocal_rank_at_10"] for case in cases) / SAMPLE_CAP,
        12,
    )
    ndcg_at_10 = round(
        sum(case["ndcg_at_10"] for case in cases) / SAMPLE_CAP,
        12,
    )
'''
          assert old in text
          module.write_text(text.replace(old, new, 1), encoding='utf-8')

          replacements = {
              'tests/test_m23_7_r3_bounded_live_reobservation.py': [
                  ('9bdd7404907e532530dc277051c8d4347bc4cf03290f76c538624aaf05154338', '74f3c589c00e1c4814531a2d2bc41be165fda5252b23773115e78205fb15e4a8'),
                  ('0.8615986575892965', '0.861598657589'),
              ],
              'docs/architecture/m23-7-r3-bounded-live-reobservation.md': [
                  ('9bdd7404907e532530dc277051c8d4347bc4cf03290f76c538624aaf05154338', '74f3c589c00e1c4814531a2d2bc41be165fda5252b23773115e78205fb15e4a8'),
              ],
              '.github/workflows/m23-7-r3-bounded-live-reobservation.yml': [
                  ('9bdd7404907e532530dc277051c8d4347bc4cf03290f76c538624aaf05154338', '74f3c589c00e1c4814531a2d2bc41be165fda5252b23773115e78205fb15e4a8'),
              ],
          }
          for filename, pairs in replacements.items():
              path = Path(filename)
              value = path.read_text(encoding='utf-8')
              for source, target in pairs:
                  assert source in value
                  value = value.replace(source, target)
              path.write_text(value, encoding='utf-8')
          PY
      - name: Regenerate deterministic fixture under Python 3.11
        run: |
          python -m pip install -e .
          python scripts/m23_7_r3_bounded_live_reobservation.py \
            --mode fixture \
            --output pilot/m23/m23-7-r3-bounded-live-reobservation-fixture-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path(
                  'pilot/m23/m23-7-r3-bounded-live-reobservation-fixture-report.json'
              ).read_text(encoding='utf-8')
          )
          assert report['report_sha256'] == '74f3c589c00e1c4814531a2d2bc41be165fda5252b23773115e78205fb15e4a8'
          assert report['metrics']['ndcg_at_10'] == 0.861598657589
          PY
      - name: Remove one-shot workflow and commit
        run: |
          rm .github/workflows/m23-7-r3-float-normalization.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/knowledge_engine/m23_7_r3_bounded_live_reobservation.py \
            tests/test_m23_7_r3_bounded_live_reobservation.py \
            pilot/m23/m23-7-r3-bounded-live-reobservation-fixture-report.json \
            docs/architecture/m23-7-r3-bounded-live-reobservation.md \
            .github/workflows/m23-7-r3-bounded-live-reobservation.yml \
            .github/workflows/m23-7-r3-float-normalization.yml
          git commit -m "fix: normalize R3 metric precision across Python versions"
          git push origin HEAD:agent/m23-7-r3-bounded-live-reobservation
