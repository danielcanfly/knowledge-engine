name: M25.9 Workers AI Credential Repair Builder

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-ai-token-repair-builder.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-ai-token-repair-builder.yml'

permissions:
  contents: write
  issues: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 50
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify one-file builder boundary and syntax
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-ai-token-repair-builder.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-ai-token-repair-builder.yml'
          fi

  build-repair-object:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      OUTPUT_DIR: /tmp/m25-9-ai-token-repair
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify fresh attempt-1 builder authority
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git merge-base --is-ancestor 31a2ff0df1e44ab80681b138a53b3d1ff732726c HEAD
          mkdir -p "$OUTPUT_DIR"
      - name: Apply deterministic role-isolated Workers AI repair
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one replacement, found {count}')
              file.write_text(text.replace(old, new, 1))

          workflow = '.github/workflows/m25-9-blog-full-population-pilot.yml'
          replace_once(
              workflow,
              '''      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          ''',
              '''      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          ''',
          )
          replace_once(
              workflow,
              '''            QDRANT_URL QDRANT_API_KEY CLOUDFLARE_ACCOUNT_ID \
          CLOUDFLARE_PAGES_TOKEN CLOUDFLARE_WORKERS_TOKEN \
          ''',
              '''            QDRANT_URL QDRANT_API_KEY CLOUDFLARE_ACCOUNT_ID \
          CLOUDFLARE_AI_TOKEN CLOUDFLARE_PAGES_TOKEN CLOUDFLARE_WORKERS_TOKEN \
          ''',
          )
          replace_once(
              workflow,
              '''          mkdir -p "$WORK_DIR/evidence"
          - name: Install runtime dependencies
          ''',
              '''          mkdir -p "$WORK_DIR/evidence"
          - name: Verify explicit Workers AI embedding capability
            run: |
              set -euo pipefail
              python - <<'PYAI'
              import json
              import os
              import urllib.error
              import urllib.parse
              import urllib.request

              account = os.environ['CLOUDFLARE_ACCOUNT_ID']
              token = os.environ['CLOUDFLARE_AI_TOKEN']
              model = '@cf/baai/bge-m3'
              query = urllib.parse.urlencode({'model': model})
              request = urllib.request.Request(
                  url=(
                      'https://api.cloudflare.com/client/v4/accounts/'
                      f'{account}/ai/models/schema?{query}'
                  ),
                  method='GET',
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/json',
                      'User-Agent': 'knowledge-engine-m25.9-workers-ai-preflight/1',
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      body = response.read(524288)
                      status = response.status
              except urllib.error.HTTPError as exc:
                  status = exc.code
                  body = exc.read(524288)
              try:
                  payload = json.loads(body.decode('utf-8'))
              except Exception as exc:
                  raise SystemExit(
                      f'Workers AI model-schema preflight returned invalid JSON (HTTP {status})'
                  ) from exc
              if (
                  status != 200
                  or not isinstance(payload, dict)
                  or payload.get('success') is not True
                  or not isinstance(payload.get('result'), dict)
              ):
                  code = None
                  errors = payload.get('errors') if isinstance(payload, dict) else None
                  if isinstance(errors, list) and errors and isinstance(errors[0], dict):
                      code = errors[0].get('code')
                  raise SystemExit(
                      f'Workers AI model-schema preflight failed (HTTP {status}, code {code})'
                  )
              print('workers_ai_embedding_capability=pass')
              PYAI
          - name: Install runtime dependencies
          ''',
          )
          replace_once(
              workflow,
              '''      - name: Build, embed, fully verify Qdrant, and publish R2 candidate
            env:
              GITHUB_TOKEN: ${{ github.token }}
          ''',
              '''      - name: Build, embed, fully verify Qdrant, and publish R2 candidate
            env:
              GITHUB_TOKEN: ${{ github.token }}
              CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_AI_TOKEN }}
          ''',
          )

          docs = 'docs/architecture/m25/m25-9-live-preflight-repair.md'
          replace_once(
              docs,
              'The M25.9 pilot uses three explicit credentials and never falls back silently:',
              'The M25.9 pilot uses four explicit credential roles and never falls back silently:',
          )
          replace_once(
              docs,
              '''| `CLOUDFLARE_PAGES_TOKEN` | Read, deploy and roll back the existing Pages project | Account `Pages Write`, scoped to the exact account |
          ''',
              '''| `CLOUDFLARE_API_TOKEN`, exposed only as `CLOUDFLARE_AI_TOKEN` | Run BGE-M3 embedding through the Workers AI REST API | Account `Workers AI Read` and `Workers AI Edit`, scoped to the exact account |
          | `CLOUDFLARE_PAGES_TOKEN` | Read, deploy and roll back the existing Pages project | Account `Pages Write`, scoped to the exact account |
          ''',
          )
          replace_once(
              docs,
              'The existing `CLOUDFLARE_ACCOUNT_ID` remains the account identity. Secret values must be entered only in GitHub Settings and must never be pasted into issues, pull requests, logs or chat.',
              'The existing `CLOUDFLARE_ACCOUNT_ID` remains the account identity. The Workers AI source secret is exposed to the candidate build only through the role-specific `CLOUDFLARE_AI_TOKEN` alias and is never used as a Pages, Workers management or Access fallback. Secret values must be entered only in GitHub Settings and must never be pasted into issues, pull requests, logs or chat.',
          )
          replace_once(
              docs,
              '''3. lists the exact Pages project and captures the previous production deployment;
          4. lists Workers scripts, resolves the exact active zone and verifies Workers route access;
          5. finds the exact Access application for `m24-internal.danielcanfly.com`;
          6. verifies the Access organization and auth-domain binding;
          7. records HTTP status, Cloudflare success, bounded error code/category and retry attempts;
          8. uploads only sanitized evidence;
          9. exits before external mutation if any capability is missing.
          ''',
              '''3. validates the BGE-M3 Workers AI model schema with the role-specific AI credential;
          4. lists the exact Pages project and captures the previous production deployment;
          5. lists Workers scripts, resolves the exact active zone and verifies Workers route access;
          6. finds the exact Access application for `m24-internal.danielcanfly.com`;
          7. verifies the Access organization and auth-domain binding;
          8. records HTTP status, Cloudflare success, bounded error code/category and retry attempts;
          9. uploads only sanitized evidence;
          10. exits before external mutation if any capability is missing.
          ''',
          )
          replace_once(
              docs,
              'The repair pull request must remain unmerged until all three dedicated GitHub environment secrets exist.',
              'The repair pull request must remain unmerged until all four credential roles exist in the GitHub environment.',
          )
          PY
      - name: Validate repaired boundary and credential isolation
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/m25-9-blog-full-population-pilot.yml').read_text()
          docs = Path('docs/architecture/m25/m25-9-live-preflight-repair.md').read_text()
          assert 'CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}' in workflow
          assert 'CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_AI_TOKEN }}' in workflow
          assert "ai/models/schema?{query}" in workflow
          assert 'workers_ai_embedding_capability=pass' in workflow
          assert 'CLOUDFLARE_AI_TOKEN CLOUDFLARE_PAGES_TOKEN' in workflow
          assert 'role-specific `CLOUDFLARE_AI_TOKEN` alias' in docs
          assert workflow.count('CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}') == 1
          assert workflow.count('CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_AI_TOKEN }}') == 1
          PY
          python -m pip install -q --disable-pip-version-check -e '.[dev]'
          python -m pytest -q \
            tests/test_m25_9_cloudflare_live_preflight.py \
            tests/test_m25_10_blog_live_candidate.py
          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/m25-9-blog-full-population-pilot.yml' \
            'docs/architecture/m25/m25-9-live-preflight-repair.md' | sort)"
          test "$changed" = "$expected"
      - name: Create unreachable exact repair commit object
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request
          from pathlib import Path

          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          parent = os.environ['GITHUB_SHA']
          output_dir = Path(os.environ['OUTPUT_DIR'])

          def api(method: str, path: str, payload: dict) -> dict:
              request = urllib.request.Request(
                  url=f'https://api.github.com/repos/{repository}/{path}',
                  method=method,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'Content-Type': 'application/json',
                  },
                  data=json.dumps(payload).encode(),
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  value = json.loads(response.read().decode())
              if not isinstance(value, dict):
                  raise SystemExit(f'GitHub API returned non-object for {path}')
              return value

          def create_blob(path: str) -> str:
              content = Path(path).read_bytes()
              value = api(
                  'POST',
                  'git/blobs',
                  {
                      'content': base64.b64encode(content).decode(),
                      'encoding': 'base64',
                  },
              )
              return str(value['sha'])

          workflow_blob = create_blob('.github/workflows/m25-9-blog-full-population-pilot.yml')
          docs_blob = create_blob('docs/architecture/m25/m25-9-live-preflight-repair.md')

          def existing_blob(path: str) -> str:
              output = subprocess.check_output(
                  ['git', 'ls-tree', 'HEAD', '--', path], text=True
              ).strip()
              fields = output.split()
              if len(fields) < 3:
                  raise SystemExit(f'cannot resolve blob for {path}')
              return fields[2]

          tree = api(
              'POST',
              'git/trees',
              {
                  'base_tree': parent,
                  'tree': [
                      {
                          'path': '.github/workflows/m25-9-blog-full-population-pilot.yml',
                          'mode': '100644',
                          'type': 'blob',
                          'sha': workflow_blob,
                      },
                      {
                          'path': 'docs/architecture/m25/m25-9-live-preflight-repair.md',
                          'mode': '100644',
                          'type': 'blob',
                          'sha': docs_blob,
                      },
                      {
                          'path': 'scripts/m25_9_cloudflare_live_preflight.py',
                          'mode': '100644',
                          'type': 'blob',
                          'sha': existing_blob('scripts/m25_9_cloudflare_live_preflight.py'),
                      },
                      {
                          'path': 'tests/test_m25_9_cloudflare_live_preflight.py',
                          'mode': '100644',
                          'type': 'blob',
                          'sha': existing_blob('tests/test_m25_9_cloudflare_live_preflight.py'),
                      },
                  ],
              },
          )
          commit = api(
              'POST',
              'git/commits',
              {
                  'message': 'Repair M25.9 Workers AI credential injection',
                  'tree': tree['sha'],
                  'parents': [parent],
              },
          )
          evidence = {
              'schema_version': 'knowledge-engine-m25-9-ai-token-repair-object/v1',
              'parent_sha': parent,
              'tree_sha': tree['sha'],
              'commit_sha': commit['sha'],
              'changed_paths': [
                  '.github/workflows/m25-9-blog-full-population-pilot.yml',
                  'docs/architecture/m25/m25-9-live-preflight-repair.md',
                  'scripts/m25_9_cloudflare_live_preflight.py',
                  'tests/test_m25_9_cloudflare_live_preflight.py',
              ],
              'workflow_content_changed': True,
              'docs_content_changed': True,
              'preflight_script_content_changed': False,
              'preflight_test_content_changed': False,
              'external_service_mutations': 0,
          }
          output_dir.mkdir(parents=True, exist_ok=True)
          (output_dir / 'repair-commit.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n'
          )
          print(json.dumps(evidence, sort_keys=True))
          PY
      - name: Upload exact repair object evidence
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-ai-token-repair-object-${{ github.sha }}
          path: /tmp/m25-9-ai-token-repair/repair-commit.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish repair object result
        run: |
          set -euo pipefail
          evidence="$OUTPUT_DIR/repair-commit.json"
          commit="$(jq -r '.commit_sha' "$evidence")"
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-ai-token-repair-object' \
            -f description="run $GITHUB_RUN_ID repair object ready" \
            -f target_url="$run_url" >/dev/null
          gh issue comment 1092 \
            --repo "$GITHUB_REPOSITORY" \
            --body "M25.9 role-isolated Workers AI credential repair object created at commit \`$commit\` from exact parent \`$GITHUB_SHA\`. It adds a GET-only BGE-M3 model-schema gate and exposes the existing AI source secret only as \`CLOUDFLARE_AI_TOKEN\` to the candidate build. External service mutations: \`0\`."
