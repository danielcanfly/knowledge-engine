name: M25.6 Materialize Implementation

on:
  pull_request:
    paths:
      - '.github/workflows/m25-6-materialize.yml'
      - '.m25-6-materialize/**'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true
      - name: Verify exact base and materialize bounded archive
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          git merge-base --is-ancestor d68be491f8d07a727bcf1f521a2e5e75256eede3 HEAD
          python - <<'PY'
          import base64
          import hashlib
          import io
          import json
          import tarfile
          from pathlib import Path, PurePosixPath

          root = Path('.m25-6-materialize')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          parts = sorted(root.glob('part-*'))
          assert len(parts) == manifest['part_count'] == 15
          encoded = b''.join(path.read_bytes() for path in parts)
          assert len(encoded) == manifest['base64_size']
          archive = base64.b64decode(encoded, validate=True)
          assert len(archive) == manifest['archive_size']
          assert hashlib.sha256(archive).hexdigest() == manifest['archive_sha256']
          expected = sorted(manifest['allowlist'])
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as bundle:
              members = bundle.getmembers()
              assert sorted(member.name for member in members) == expected
              for member in members:
                  path = PurePosixPath(member.name)
                  assert member.isfile()
                  assert not path.is_absolute() and '..' not in path.parts
                  source = bundle.extractfile(member)
                  assert source is not None
                  target = Path(member.name)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(source.read())
          PY
          rm -rf .m25-6-materialize
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact dependencies
        run: |
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m pip install --disable-pip-version-check 'jsonschema>=4.23,<5'
      - name: Lint bounded M25.6 scope
        run: |
          files=(
            src/knowledge_engine/m25_review_surface.py
            src/knowledge_engine/m25_review_surface_cli.py
            src/knowledge_engine/m25_review_demo.py
            tests/test_m25_6_review_surface.py
            tests/test_m25_6_review_surface_contracts.py
            scripts/m25_6_browser_acceptance.py
          )
          python -m ruff check --output-format=json "${files[@]}" > /tmp/m25-6-ruff.json || true
          python -m ruff check --fix "${files[@]}"
          python -m ruff check "${files[@]}"
      - name: Test M25.6 and inherited M25.5 contracts
        run: |
          python -m pytest -q \
            tests/test_m25_6_review_surface.py \
            tests/test_m25_6_review_surface_contracts.py \
            tests/test_m25_5_identity_governance.py \
            tests/test_m25_5_identity_governance_contracts.py \
            tests/test_m25_5_reconciliation.py
      - name: Rebuild deterministic review batch
        run: |
          mkdir -p /tmp/m25-6
          knowledge-m25-review-surface build \
            --suite pilot/m25/m25-4-gold-suite.json \
            --baseline pilot/m25/m25-4-baseline-report.json \
            --policy pilot/m25/m25-5-calibration-policy.json \
            --report pilot/m25/m25-5-calibrated-report.json \
            --acceptance pilot/m25/m25-5-acceptance.json \
            --output /tmp/m25-6/review-batch.json
          cmp /tmp/m25-6/review-batch.json pilot/m25/m25-6-review-batch.json
      - name: Enforce candidate-only readiness
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          batch=json.loads(Path('pilot/m25/m25-6-review-batch.json').read_text())
          plan=json.loads(Path('pilot/m25/m25-6-browser-acceptance-plan.json').read_text())
          gate=json.loads(Path('pilot/m25/m25-6-readiness-gate.json').read_text())
          assert batch['item_count']==30 and batch['bulk_approval_permitted'] is False
          assert set(batch['decision_actions'])=={'approve','map','edit','split','reject','defer'}
          assert plan['daniel_browser_acceptance_required'] is True
          assert gate['status']=='m25_6_awaiting_daniel_browser_acceptance'
          assert gate['exit_gates']['daniel_browser_acceptance_recorded'] is False
          assert gate['source_write_permitted'] is False
          assert gate['github_pr_creation_permitted'] is False
          assert gate['m25_7_authorized'] is False
          assert not any(gate['protected_mutations'].values())
          PY
      - name: Compile M25.6 scope
        run: |
          python -m compileall -q \
            src/knowledge_engine/m25_review_surface.py \
            src/knowledge_engine/m25_review_surface_cli.py \
            src/knowledge_engine/m25_review_demo.py \
            tests/test_m25_6_review_surface.py \
            tests/test_m25_6_review_surface_contracts.py \
            scripts/m25_6_browser_acceptance.py
      - name: Upload materializer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m25-6-materializer-diagnostics
          path: /tmp/m25-6-ruff.json
          if-no-files-found: warn
          retention-days: 7
      - name: Commit verified non-workflow implementation
        id: commit
        continue-on-error: true
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -o pipefail
          {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git diff --cached --stat
            git commit -m 'Implement M25.6 review surface'
            git push origin "HEAD:$BRANCH"
          } > /tmp/m25-6-commit.txt 2>&1
      - name: Upload commit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m25-6-materializer-commit
          path: /tmp/m25-6-commit.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce materializer commit
        if: always()
        env:
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          cat /tmp/m25-6-commit.txt
          test "$COMMIT_OUTCOME" = success
