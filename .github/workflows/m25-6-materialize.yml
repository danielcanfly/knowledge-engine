name: M25.6 Materialize Implementation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/m25-6-materialize.yml'
      - '.m25-6-materialize/**'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true
      - name: Verify and expand bounded archive
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          git merge-base --is-ancestor d68be491f8d07a727bcf1f521a2e5e75256eede3 HEAD
          python - <<'PY'
          import base64, hashlib, io, json, tarfile
          from pathlib import Path, PurePosixPath
          root=Path('.m25-6-materialize')
          m=json.loads((root/'manifest.json').read_text())
          parts=sorted(root.glob('part-*'))
          assert len(parts)==m['part_count']==15
          encoded=b''.join(p.read_bytes() for p in parts)
          assert len(encoded)==m['base64_size']
          archive=base64.b64decode(encoded,validate=True)
          assert len(archive)==m['archive_size']
          assert hashlib.sha256(archive).hexdigest()==m['archive_sha256']
          with tarfile.open(fileobj=io.BytesIO(archive),mode='r:gz') as bundle:
              members=bundle.getmembers()
              assert sorted(x.name for x in members)==sorted(m['allowlist'])
              for member in members:
                  path=PurePosixPath(member.name)
                  assert member.isfile() and not path.is_absolute() and '..' not in path.parts
                  source=bundle.extractfile(member); assert source is not None
                  target=Path(member.name); target.parent.mkdir(parents=True,exist_ok=True)
                  target.write_bytes(source.read())
          PY
          rm -rf .m25-6-materialize
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate implementation
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m pip install --disable-pip-version-check 'jsonschema>=4.23,<5'
          files=(src/knowledge_engine/m25_review_surface.py src/knowledge_engine/m25_review_surface_cli.py src/knowledge_engine/m25_review_demo.py tests/test_m25_6_review_surface.py tests/test_m25_6_review_surface_contracts.py scripts/m25_6_browser_acceptance.py)
          python -m ruff check --fix "${files[@]}"
          python -m ruff check "${files[@]}"
          python -m pytest -q tests/test_m25_6_review_surface.py tests/test_m25_6_review_surface_contracts.py tests/test_m25_5_identity_governance.py tests/test_m25_5_identity_governance_contracts.py tests/test_m25_5_reconciliation.py
          mkdir -p /tmp/m25-6
          knowledge-m25-review-surface build --suite pilot/m25/m25-4-gold-suite.json --baseline pilot/m25/m25-4-baseline-report.json --policy pilot/m25/m25-5-calibration-policy.json --report pilot/m25/m25-5-calibrated-report.json --acceptance pilot/m25/m25-5-acceptance.json --output /tmp/m25-6/review-batch.json
          cmp /tmp/m25-6/review-batch.json pilot/m25/m25-6-review-batch.json
          python - <<'PY'
          import json
          from pathlib import Path
          b=json.loads(Path('pilot/m25/m25-6-review-batch.json').read_text())
          p=json.loads(Path('pilot/m25/m25-6-browser-acceptance-plan.json').read_text())
          g=json.loads(Path('pilot/m25/m25-6-readiness-gate.json').read_text())
          assert b['item_count']==30 and b['bulk_approval_permitted'] is False
          assert set(b['decision_actions'])=={'approve','map','edit','split','reject','defer'}
          assert p['daniel_browser_acceptance_required'] is True
          assert g['status']=='m25_6_awaiting_daniel_browser_acceptance'
          assert g['exit_gates']['daniel_browser_acceptance_recorded'] is False
          assert not g['source_write_permitted'] and not g['github_pr_creation_permitted']
          assert not g['m25_7_authorized'] and not any(g['protected_mutations'].values())
          PY
          python -m compileall -q "${files[@]}"
      - name: Commit verified implementation
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git commit -m 'Implement M25.6 review surface'
          git push origin "HEAD:$BRANCH"
