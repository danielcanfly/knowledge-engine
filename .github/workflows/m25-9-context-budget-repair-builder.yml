name: M25.9 Context Budget Repair Builder

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-context-budget-repair-builder.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/m25-9-context-budget-repair-builder.yml'

permissions:
  contents: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 20
          show-progress: false
      - name: Verify one-file compatibility publisher boundary
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          test -f .github/workflows/m25-9-context-budget-repair-builder.yml
          if test "${{ github.event_name }}" = 'pull_request'; then
            git fetch --quiet --no-tags origin main
            test "$(git diff --name-only origin/main...HEAD)" = \
              '.github/workflows/m25-9-context-budget-repair-builder.yml'
          fi

  publish-response-compatibility:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      REPAIR_BRANCH: chatgpt/m25-9-context-budget-repair-v1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REPAIR_BRANCH }}
          fetch-depth: 200
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact semantic repair branch
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = 'a28016ef6362674d3046d3f332343da4251fe046'
          grep -q 'MAX_BATCH_TEXT_CHARACTERS = 16_000' \
            src/knowledge_engine/m23_cloudflare_qdrant.py
          grep -q 'if response.is_error:' \
            src/knowledge_engine/m23_cloudflare_qdrant.py
      - name: Apply response compatibility repair
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/knowledge_engine/m23_cloudflare_qdrant.py')
          lines = path.read_text().splitlines()

          status_line = '    if response.status_code != 400:'
          status_indexes = [
              index for index, line in enumerate(lines) if line == status_line
          ]
          if len(status_indexes) != 1:
              raise SystemExit(
                  f'expected one status compatibility line, found {len(status_indexes)}'
              )
          lines[status_indexes[0]] = (
              '    if getattr(response, "status_code", 200) != 400:'
          )

          error_start = next(
              index for index, line in enumerate(lines)
              if line == '    if response.is_error:'
          )
          payload_start = next(
              index for index in range(error_start + 1, len(lines))
              if lines[index] == '    payload = response.json()'
          )
          old = lines[error_start:payload_start]
          if not any('response.raise_for_status()' in line for line in old):
              raise SystemExit('error block has no raise_for_status authority')
          replacement = [
              '    if _is_context_limit_response(response) and len(batch) > 1:',
              '        midpoint = len(batch) // 2',
              '        return _embed_batch(',
              '            http,',
              '            url=url,',
              '            token=token,',
              '            batch=batch[:midpoint],',
              '        ) + _embed_batch(',
              '            http,',
              '            url=url,',
              '            token=token,',
              '            batch=batch[midpoint:],',
              '        )',
              '    response.raise_for_status()',
          ]
          lines[error_start:payload_start] = replacement
          path.write_text('\n'.join(lines) + '\n')
          PY
          test "$(git diff --name-only)" = \
            'src/knowledge_engine/m23_cloudflare_qdrant.py'
      - name: Validate compatibility and context behavior
        run: |
          set -euo pipefail
          python -m pip install -q --disable-pip-version-check -e '.[dev]'
          python -m ruff check --output-format=concise \
            src/knowledge_engine/m23_cloudflare_qdrant.py \
            tests/test_m23_5_cloudflare_qdrant.py
          python -m pytest -q \
            tests/test_m23_5_cloudflare_qdrant.py \
            tests/test_m23_7_5_qdrant_strict_mode.py::test_embedding_requests_reuse_one_cloudflare_session_and_close \
            tests/test_m23_7_r2_latency_path.py::test_batch_provider_uses_one_request_for_eight_texts
          python -m compileall -q src/knowledge_engine/m23_cloudflare_qdrant.py
      - name: Commit compatibility repair to semantic branch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/knowledge_engine/m23_cloudflare_qdrant.py
          git commit -m 'Preserve M25.9 response compatibility'
          git push origin "HEAD:refs/heads/$REPAIR_BRANCH"
          echo "REPAIR_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Publish compatibility result
        run: |
          set -euo pipefail
          run_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state='success' \
            -f context='m25-9-response-compatibility-publisher' \
            -f description="run $GITHUB_RUN_ID a$GITHUB_RUN_ATTEMPT repair $REPAIR_HEAD" \
            -f target_url="$run_url" >/dev/null
