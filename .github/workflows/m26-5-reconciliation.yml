name: M26.5 Reconciliation

on:
  pull_request:
    paths:
      - '.github/workflows/m26-5-reconciliation.yml'
      - 'pilot/m26/m26-5-acceptance.json'
      - 'docs/architecture/m26/m26-5-reconciliation.md'
      - 'tests/test_m26_5_reconciliation.py'

permissions:
  contents: read

jobs:
  reconciliation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and implementation ancestry
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor f94f1ff4ccb8162b4e60112ccbd20c69744949c6 HEAD
          python - <<'PY'
          import json
          from pathlib import Path
          acceptance = json.loads(Path('pilot/m26/m26-5-acceptance.json').read_text())
          assert acceptance['status'] == 'm26_5_draft_answer_contract_accepted'
          assert acceptance['implementation']['merge_sha'] == 'f94f1ff4ccb8162b4e60112ccbd20c69744949c6'
          assert acceptance['implementation']['final_head_sha'] == '488ccee804a31130311a5ec3ddb1aff908f5b332'
          assert acceptance['evidence_artifact']['artifact_id'] == 8562827517
          assert acceptance['evidence_artifact']['digest'] == 'sha256:aa00165e68767ceb598a44c026e3a91586f8e9f196d475caf80528d99112049a'
          assert acceptance['issue']['state'] == 'closed'
          assert acceptance['next_stage']['stage_id'] == 'M26.6'
          assert acceptance['next_stage']['live_provider_calls_permitted'] is False
          assert acceptance['next_stage']['production_answer_serving_permitted'] is False
          assert acceptance['next_stage']['verified_final_answer_permitted'] is False
          PY
      - name: Install dev dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Validate reconciliation contract
        run: |
          python -m ruff check tests/test_m26_5_reconciliation.py
          python -m pytest -q tests/test_m26_5_reconciliation.py tests/test_m26_5_draft_answer.py
      - name: Reject protected mutations
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD | sort)"
          printf '%s\n' "$changed"
          test "$changed" = ".github/workflows/m26-5-reconciliation.yml
          docs/architecture/m26/m26-5-reconciliation.md
          pilot/m26/m26-5-acceptance.json
          tests/test_m26_5_reconciliation.py"
