name: M23.5 Cloudflare Qdrant contract

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_cloudflare_qdrant.py"
      - "src/knowledge_engine/m23_cloudflare_qdrant_cli.py"
      - "tests/test_m23_5_cloudflare_qdrant.py"
      - "docs/architecture/m23-5-cloudflare-workers-ai-qdrant.md"
      - "pilot/m23/m23-5-cloudflare-workers-ai-qdrant-decision.json"
      - "pyproject.toml"
      - ".github/workflows/m23-5-cloudflare-qdrant.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/knowledge_engine/m23_cloudflare_qdrant.py src/knowledge_engine/m23_cloudflare_qdrant_cli.py tests/test_m23_5_cloudflare_qdrant.py
      - name: Tests
        run: pytest -q tests/test_m23_5_cloudflare_qdrant.py
      - name: Secret and authority guard
        run: |
          ! grep -R "CLOUDFLARE_API_TOKEN=.*" -n src tests docs pilot
          ! grep -R "QDRANT_API_KEY=.*" -n src tests docs pilot
          grep -q '"production_authority": false' pilot/m23/m23-5-cloudflare-workers-ai-qdrant-decision.json
          grep -q '"retrieval_default": "lexical"' pilot/m23/m23-5-cloudflare-workers-ai-qdrant-decision.json
