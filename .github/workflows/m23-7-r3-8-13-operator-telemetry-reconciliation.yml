name: M23.7 R3.8.13 Operator Telemetry Reconciliation

on:
  pull_request:
    paths:
      - "pilot/m23/m23-7-r3-8-13-operator-telemetry-reconciliation.json"
      - "docs/architecture/m23-7-r3-8-13-operator-telemetry-reconciliation.md"
      - ".github/workflows/m23-7-r3-8-13-operator-telemetry-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact head and implementation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 9944f387a4f748b78a91485c54c5012d3b0013b6 HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Re-run telemetry and command-bus adversarial tests
        run: |
          ruff check scripts/m23_operator_status_comment.py tests/test_m23_operator_status_comment.py
          python -m py_compile scripts/m23_operator_status_comment.py
          pytest -q tests/test_m23_operator_status_comment.py tests/test_m23_operator_command_bus.py tests/test_m23_7_r3_8_post_delete_recovery.py

      - name: Verify reconciliation digest and accepted identities
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path(
              "pilot/m23/"
              "m23-7-r3-8-13-operator-telemetry-reconciliation.json"
          )
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("reconciliation_sha256")
          encoded = json.dumps(
              value,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
              allow_nan=False,
          ).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "73b93dcc5b7f77f8c5d0e99c131f8bac75d837ed97775ee52b9ecf4049154cd3"
          implementation = value["implementation"]
          assert implementation["accepted_head"] == "3b9d3a1f206c78b46d475872ef06a8a457fcdd15"
          assert implementation["merge_sha"] == "9944f387a4f748b78a91485c54c5012d3b0013b6"
          assert implementation["authorization_sha256"] == "bd3b54dae6566aac70f521ac3ff3bedb7d3d2fa7b9ed915c8659ecb603e62496"
          assert implementation["contract_sha256"] == "39849c636a825aacc55656db5b7c6359eeb89a5a7db0b386859942650e043149"
          assert len(implementation["changed_files"]) == 7
          assert all(
              item["conclusion"] == "success"
              for item in value["exact_head_workflows"].values()
          )
          findings = value["findings"]
          assert findings["issue_number"] == 565
          assert findings["issue_locked"] is True
          assert findings["issues_write_scope"] == "status_comments_only"
          assert findings["status_can_trigger_command"] is False
          assert findings["fresh_nonce_bits"] == 256
          assert findings["first_command_repost_authorized"] is False
          authority = value["authority"]
          assert authority["production_retrieval"] == "lexical"
          assert authority["retrieval_quality_blocker"] == "active"
          assert authority["latency_blocker"] == "active"
          assert authority["blocker_clearance_authorized"] is False
          PY

      - name: Verify exact implementation file set
        shell: bash
        run: |
          python - <<'PY'
          import subprocess

          expected = {
              ".github/workflows/m23-7-r3-8-13-operator-telemetry-ci.yml",
              ".github/workflows/m23-operator-command-bus.yml",
              "docs/architecture/m23-7-r3-8-13-operator-telemetry.md",
              "operator_authorizations/m23/r3-8/post-delete-recovery-29521901629-v2.json",
              "pilot/m23/m23-7-r3-8-13-operator-telemetry-contract.json",
              "scripts/m23_operator_status_comment.py",
              "tests/test_m23_operator_status_comment.py",
          }
          changed = set(
              subprocess.check_output(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      "498beca5893642b348f1ec6afe17529dc7197f44",
                      "9944f387a4f748b78a91485c54c5012d3b0013b6",
                  ],
                  text=True,
              ).splitlines()
          )
          assert changed == expected, (changed, expected)
          PY

      - name: Verify command bus issue remains locked
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          url = (
              "https://api.github.com/repos/"
              f"{os.environ['GITHUB_REPOSITORY']}/issues/565"
          )
          request = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              issue = json.load(response)
          assert issue["number"] == 565
          assert issue["state"] == "open"
          assert issue["locked"] is True
          PY

      - name: Verify fixed status destination and non-triggering prefix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          status = Path("scripts/m23_operator_status_comment.py").read_text(
              encoding="utf-8"
          )
          assert 'REPOSITORY = "danielcanfly/knowledge-engine"' in status
          assert "BUS_ISSUE_NUMBER = 565" in status
          assert 'STATUS_PREFIX = "M23_OPERATOR_STATUS "' in status
          assert 'COMMAND_PREFIX = "M23_OPERATOR_COMMAND "' in status
          workflow = Path(".github/workflows/m23-operator-command-bus.yml").read_text(
              encoding="utf-8"
          )
          assert "issues: write" in workflow
          assert "Report accepted command identity" in workflow
          assert "Report final governed route result" in workflow
          assert "startsWith(github.event.comment.body, 'M23_OPERATOR_COMMAND ')" in workflow
          PY

      - name: Verify reconciliation-only change scope
        run: |
          python - <<'PY'
          import subprocess

          expected = {
              ".github/workflows/m23-7-r3-8-13-operator-telemetry-reconciliation.yml",
              "docs/architecture/m23-7-r3-8-13-operator-telemetry-reconciliation.md",
              "pilot/m23/m23-7-r3-8-13-operator-telemetry-reconciliation.json",
          }
          changed = set(
              subprocess.check_output(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      "9944f387a4f748b78a91485c54c5012d3b0013b6",
                      "HEAD",
                  ],
                  text=True,
              ).splitlines()
          )
          assert changed == expected, (changed, expected)
          PY
          git diff --exit-code 9944f387a4f748b78a91485c54c5012d3b0013b6 HEAD -- .github/workflows/m23-operator-command-bus.yml scripts/m23_operator_status_comment.py tests/test_m23_operator_status_comment.py operator_authorizations/m23/r3-8/post-delete-recovery-29521901629-v2.json pilot/m23/m23-7-r3-8-13-operator-telemetry-contract.json
