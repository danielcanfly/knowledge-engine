name: M23.7 Repair R3.2 Reconciliation

on:
  pull_request:
    paths:
      - "pilot/m23/m23-7-r3-2-reconciliation.json"
      - "docs/architecture/m23-7-r3-2-reconciliation.md"
      - ".github/workflows/m23-7-r3-2-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Verify implementation ancestry
        run: git merge-base --is-ancestor 41199beba5eb9275bfe1378be2d1c1ee3ef5f8f0 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Verify reconciliation record
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path('pilot/m23/m23-7-r3-2-reconciliation.json')
          record = json.loads(path.read_text(encoding='utf-8'))
          digest = record.pop('reconciliation_record_sha256')
          canonical = json.dumps(
              record,
              ensure_ascii=False,
              sort_keys=True,
              separators=(',', ':'),
              allow_nan=False,
          )
          assert hashlib.sha256(canonical.encode('utf-8')).hexdigest() == digest
          assert digest == '254697028341215cec2789e111fe82a7644d86c1bb43cf2839d0668921ecd289'
          assert record['issue'] == 484
          assert record['parent_issue'] == 474
          assert record['implementation']['pr'] == 485
          assert record['implementation']['head_sha'] == '912baf83793a1e9f15a0b4ba64e7234d8d8aea64'
          assert record['implementation']['merge_sha'] == '41199beba5eb9275bfe1378be2d1c1ee3ef5f8f0'
          assert record['implementation']['repair_contract_sha256'] == '9ed7a5bea7ce85aed67bf6f263c8b06420e1c67bd7cac62f9368f0f48c29c33e'
          assert len(record['exact_head_workflows']) == 5
          assert all(item['conclusion'] == 'success' for item in record['exact_head_workflows'])
          assert record['repair']['payload_schema'] == 'knowledge-engine-m23-qdrant-payload/v2'
          assert record['repair']['payload_additions'] == ['section_title', 'language']
          assert record['repair']['embedding_model_changed'] is False
          assert record['repair']['embedding_prefix_changed'] is False
          assert record['authority']['production_retrieval'] == 'lexical'
          assert record['authority']['qdrant_write_dispatched'] is False
          assert record['authority']['promotion_eligibility_granted'] is False
          assert record['remaining_blockers'] == ['blocked_pending_retrieval_quality']
          assert record['exit']['r3_2_complete'] is True
          assert record['exit']['parent_issue_474_must_remain_open'] is True
          PY
      - name: Verify merged repair contract
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          contract = json.loads(
              Path('pilot/m23/m23-7-r3-2-semantic-payload-repair-contract.json')
              .read_text(encoding='utf-8')
          )
          digest = contract.pop('contract_sha256')
          canonical = json.dumps(
              contract,
              ensure_ascii=False,
              sort_keys=True,
              separators=(',', ':'),
              allow_nan=False,
          )
          assert hashlib.sha256(canonical.encode('utf-8')).hexdigest() == digest
          assert digest == '9ed7a5bea7ce85aed67bf6f263c8b06420e1c67bd7cac62f9368f0f48c29c33e'
          PY
      - name: Repair regression
        run: |
          pytest -q \
            tests/test_m23_6_2_qdrant_ingestion_manifest.py \
            tests/test_m23_7_r3_2_semantic_payload_repair.py
      - name: Privacy and authority scan
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = (
              Path('pilot/m23/m23-7-r3-2-reconciliation.json'),
              Path('docs/architecture/m23-7-r3-2-reconciliation.md'),
          )
          encoded = '\n'.join(path.read_text(encoding='utf-8') for path in paths)
          for forbidden in (
              'QDRANT_API_KEY',
              'CLOUDFLARE_API_TOKEN',
              'https://',
          ):
              assert forbidden not in encoded
          PY
