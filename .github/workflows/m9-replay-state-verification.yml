name: M9 Replay State Verification

on:
  pull_request:
    types: [opened]
    paths:
      - ".github/workflows/m9-replay-state-verification.yml"

permissions:
  contents: read

jobs:
  verify-state:
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'ops/m9-replay-state-verification'
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      OPERATION_ID: m9-001-agent-planning-strategies-001
      REQUEST_PATH: production_promotions/m9-001-agent-planning-strategies.json
      APPROVAL_PATH: governed_batches/evidence/m9-001-idempotent-replay-approval.json
      TARGET_RELEASE_ID: 20260708T040116Z-69a9f445699a
      TARGET_MANIFEST_SHA256: 2b2630cfe3e8a6e25a8f210d68c70f3b9a31b3b26f33c6e3e41b8cc1676fc0bb
      TARGET_POINTER_SHA256: 38e12c8686ee4ccf2beae0f073dead41b78e8f4548fdf7a4b0d0e273353906b5
      PREVIOUS_RELEASE_ID: 20260707T111252Z-aebf06593f89
      PREVIOUS_MANIFEST_SHA256: 1a2f2014073e9e97f9e1fdd5df4e43bf19cb2b2679532b6e52ea38480ec4d2ec
      ORIGINAL_CONTROL_PLANE_SHA: 230d57d777a3c7898f789407f5372761541eef6c
      EVIDENCE_DIR: evidence/m9-replay-state-verification
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install exact Engine
        run: python -m pip install -e '.[dev]'

      - name: Verify original intent and receipt read-only
        run: |
          set -euo pipefail
          for name in R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET R2_ENDPOINT_URL; do
            test -n "${!name:-}" || { echo "Missing $name"; exit 2; }
          done
          python - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path

          from knowledge_engine.config import Settings
          from knowledge_engine.storage import create_object_store

          store = create_object_store(Settings.from_env())
          prefix = f"operations/promotions/{os.environ['OPERATION_ID']}"
          intent_key = f"{prefix}/intent.json"
          receipt_key = f"{prefix}/promotion-receipt.json"
          rollback_key = f"{prefix}/rollback-receipt.json"

          intent_bytes = store.get(intent_key)
          receipt_bytes = store.get(receipt_key)
          production_bytes = store.get("channels/production.json")
          intent = json.loads(intent_bytes)
          receipt = json.loads(receipt_bytes)
          production = json.loads(production_bytes)

          assert store.head(rollback_key) is None
          assert intent["operation_id"] == os.environ["OPERATION_ID"]
          assert intent["previous_release_id"] == os.environ["PREVIOUS_RELEASE_ID"]
          assert intent["previous_manifest_sha256"] == os.environ[
              "PREVIOUS_MANIFEST_SHA256"
          ]
          assert intent["target_release_id"] == os.environ["TARGET_RELEASE_ID"]
          assert intent["target_pointer_sha256"] == os.environ[
              "TARGET_POINTER_SHA256"
          ]
          assert base64.b64decode(intent["target_pointer_b64"]) == production_bytes

          request = intent["request"]
          assert request["operation_id"] == os.environ["OPERATION_ID"]
          assert request["expected_release_id"] == os.environ["TARGET_RELEASE_ID"]
          assert request["expected_manifest_sha256"] == os.environ[
              "TARGET_MANIFEST_SHA256"
          ]
          assert request["control_plane_sha"] == os.environ[
              "ORIGINAL_CONTROL_PLANE_SHA"
          ]

          assert receipt["operation_id"] == os.environ["OPERATION_ID"]
          assert receipt["status"] == "promoted"
          assert receipt["intent_key"] == intent_key
          assert receipt["previous_release_id"] == os.environ[
              "PREVIOUS_RELEASE_ID"
          ]
          assert receipt["previous_manifest_sha256"] == os.environ[
              "PREVIOUS_MANIFEST_SHA256"
          ]
          assert receipt["release_id"] == os.environ["TARGET_RELEASE_ID"]
          assert receipt["manifest_sha256"] == os.environ[
              "TARGET_MANIFEST_SHA256"
          ]
          assert receipt["control_plane_sha"] == os.environ[
              "ORIGINAL_CONTROL_PLANE_SHA"
          ]
          assert receipt["production_pointer_sha256"] == os.environ[
              "TARGET_POINTER_SHA256"
          ]

          assert production["release_id"] == os.environ["TARGET_RELEASE_ID"]
          assert production["manifest_sha256"] == os.environ[
              "TARGET_MANIFEST_SHA256"
          ]
          assert hashlib.sha256(production_bytes).hexdigest() == os.environ[
              "TARGET_POINTER_SHA256"
          ]

          root = Path(os.environ["EVIDENCE_DIR"])
          root.mkdir(parents=True, exist_ok=True)
          (root / "intent.json").write_bytes(intent_bytes)
          (root / "promotion-receipt.json").write_bytes(receipt_bytes)
          (root / "production-pointer.json").write_bytes(production_bytes)
          summary = {
              "schema_version": "m9-replay-state-verification/v1",
              "status": "passed",
              "operation_id": os.environ["OPERATION_ID"],
              "intent_key": intent_key,
              "intent_sha256": hashlib.sha256(intent_bytes).hexdigest(),
              "receipt_key": receipt_key,
              "receipt_sha256": hashlib.sha256(receipt_bytes).hexdigest(),
              "rollback_receipt_present": False,
              "production_pointer_sha256": hashlib.sha256(
                  production_bytes
              ).hexdigest(),
              "intent_target_pointer_matches_live_production": True,
              "intent_reused_as_authoritative_record": True,
              "receipt_reused_as_authoritative_record": True,
              "read_only": True,
              "mutations_performed": [],
          }
          (root / "summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Upload replay-state evidence
        uses: actions/upload-artifact@v4
        with:
          name: m9-replay-state-verification-${{ github.sha }}
          path: evidence/m9-replay-state-verification/
          if-no-files-found: error
          retention-days: 90
