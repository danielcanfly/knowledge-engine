name: M25.9 R2 Builder Log Extractor

on:
  pull_request:
    paths:
      - '.github/workflows/m25-9-r2-builder-log-extractor.yml'

permissions:
  contents: read
  actions: read

jobs:
  extract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_RUN_ID: '30070203276'
      TARGET_JOB_ID: '89409293164'
      OUTPUT_DIR: /tmp/m25-9-r2-builder-log
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 20
          show-progress: false
      - name: Verify one-file read-only boundary
        run: |
          set -euo pipefail
          git fetch --quiet --no-tags origin main
          test "$(git diff --name-only origin/main...HEAD)" = \
            '.github/workflows/m25-9-r2-builder-log-extractor.yml'
          mkdir -p "$OUTPUT_DIR"
      - name: Extract sanitized traceback
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$TARGET_JOB_ID/logs" \
            > "$OUTPUT_DIR/full.log"
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          root = Path(os.environ['OUTPUT_DIR'])
          lines = root.joinpath('full.log').read_text(errors='replace').splitlines()
          selected = set(range(max(0, len(lines) - 110), len(lines)))
          for index, line in enumerate(lines):
              if any(value in line for value in (
                  'generated changed files', 'expected files', 'Traceback',
                  'RuntimeError', 'SyntaxError', 'ValueError', 'line not found',
                  'expected one', '##[error]', 'Process completed with exit code',
              )):
                  selected.update(range(max(0, index - 12), min(len(lines), index + 40)))
          def clean(value):
              value = re.sub(r'https?://\S+', '<redacted-url>', value)
              value = re.sub(r'\b[0-9a-fA-F]{40,64}\b', '<redacted-sha>', value)
              return value[:2000]
          evidence = {
              'source_run_id': int(os.environ['TARGET_RUN_ID']),
              'source_job_id': int(os.environ['TARGET_JOB_ID']),
              'source_run_rerun': False,
              'external_service_mutations': 0,
              'excerpt': [
                  {'line_number': index + 1, 'text': clean(lines[index])}
                  for index in sorted(selected)
              ],
          }
          root.joinpath('r2-builder-failure.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n'
          )
          root.joinpath('full.log').unlink()
          PY
      - name: Upload sanitized evidence
        uses: actions/upload-artifact@v4
        with:
          name: m25-9-r2-builder-failure-${{ github.event.pull_request.head.sha }}
          path: /tmp/m25-9-r2-builder-log/r2-builder-failure.json
          if-no-files-found: error
          retention-days: 7
