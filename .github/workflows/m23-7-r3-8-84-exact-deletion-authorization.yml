name: M23.7 R3.8.84 Exact Deletion Authorization

on:
  pull_request:
    paths:
      - "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29578234650.json"
      - "docs/architecture/m23-7-r3-8-84-exact-deletion-authorization.md"
      - ".github/workflows/m23-7-r3-8-84-exact-deletion-authorization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and reconciliation ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor d56ec04f24cf45135a63afe3b6227663e90e8b81 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Validate exact committed authorization through production validator
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.m23_7_r3_8_remote_delete import validate_authorization

          path = "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29578234650.json"
          value = validate_authorization(Path(path))
          assert value["authorization_sha256"] == "3b06ef148bb5663269bf1005b278404f60ab98f1f8919af09c2ce8f025264cfd"
          assert value["worker_name"] == "knowledge-engine-r3-8-29578234650"
          assert value["observation_run_id"] == "29578234650"
          assert value["recovery_run_id"] == "29578467800"
          assert value["receipt_sha256"] == "ba104a12791c2123643b0a0ae604465438daa0aee1024963bfc1034f02e93c80"
          assert value["evidence_seal_sha256"] == "481e94cd91a7eb0e8a0fcb11fe95c2095b41c22de9412af3d7eb637804f61f8d"
          assert value["independent_reconciliation_sha256"] == "7f74a726c1af0ba5054ec23129b122cdb92df38e392d6ed5ac87c72d71546d54"
          assert len(value["worker_version_ids"]) == 4
          assert len(value["worker_deployment_ids"]) == 4
          PY
      - name: Verify exact authorization scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              "deletion_authorizations/m23-7/r3-8/knowledge-engine-r3-8-29578234650.json",
              "docs/architecture/m23-7-r3-8-84-exact-deletion-authorization.md",
              ".github/workflows/m23-7-r3-8-84-exact-deletion-authorization.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "d56ec04f24cf45135a63afe3b6227663e90e8b81", "HEAD"],
              text=True,
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code d56ec04f24cf45135a63afe3b6227663e90e8b81 HEAD -- \
            scripts/m23_7_r3_8_remote_delete.py \
            tests/test_m23_7_r3_8_remote_delete.py \
            .github/workflows/m23-7-r3-8-remote-delete.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py
