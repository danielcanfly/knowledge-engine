name: M26.1 Architecture Authority
on:
  pull_request:
    paths:
      - '.github/workflows/m26-1-architecture-authority.yml'
      - 'docs/architecture/m26/**'
      - 'pilot/m26/m26-1-*.json'
      - 'schemas/m26-*.schema.json'
      - 'tests/test_m26_1_architecture_authority.py'
permissions:
  contents: read
jobs:
  architecture-authority:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify exact head and accepted M25.5 predecessor
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          git merge-base --is-ancestor d68be491f8d07a727bcf1f521a2e5e75256eede3 HEAD
          python - <<'PY'
          import json
          from pathlib import Path

          accepted = json.loads(Path('pilot/m25/m25-5-acceptance.json').read_text())
          baseline = json.loads(Path('pilot/m26/m26-1-entry-baseline.json').read_text())
          assert accepted['status'] == 'm25_5_identity_governance_accepted'
          assert baseline['accepted_predecessors']['m25_5']['status'] == accepted['status']
          assert baseline['accepted_predecessors']['m25_5']['implementation_merge_sha'] == accepted['implementation']['merge_sha']
          assert not any(baseline['protected_mutations'].values())
          PY
      - name: Validate architecture contracts
        run: |
          python -m pip install --disable-pip-version-check -e '.[dev]'
          python -m ruff check tests/test_m26_1_architecture_authority.py
          python -m pytest -q \
            tests/test_m26_1_architecture_authority.py \
            tests/test_m25_1_architecture.py \
            tests/test_m25_3_extraction_contracts.py \
            tests/test_m25_4_identity_benchmark_contracts.py \
            tests/test_m25_5_identity_governance_contracts.py
          python -m compileall -q tests/test_m26_1_architecture_authority.py
      - name: Reject protected mutations and secret material
        run: |
          set -euo pipefail
          changed="$(git diff --name-only origin/main...HEAD)"
          ! printf '%s\n' "$changed" | grep -Eq '^(src/|workers/|channels/|foundation/|release/|r2/|qdrant/|production/|pilot/m24/|pilot/m25/)'
          python - <<'PY'
          import pathlib
          import re
          import subprocess

          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', 'origin/main...HEAD'],
              text=True,
          ).splitlines()
          patterns = [
              re.compile(r'\bsk-[A-Za-z0-9_-]{12,}'),
              re.compile(r'\bBearer\s+[A-Za-z0-9._-]{12,}', re.I),
              re.compile(
                  r'(?:api[_-]?key|password|client[_-]?secret)\s*[:=]\s*["\'][^"\']{8,}["\']',
                  re.I,
              ),
          ]
          for name in changed:
              path = pathlib.Path(name)
              if path.is_file() and path.suffix in {'.json', '.md', '.py', '.yml', '.yaml'}:
                  text = path.read_text(errors='ignore')
                  assert not any(pattern.search(text) for pattern in patterns), name
          PY
      - name: Build exact-head evidence
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p /tmp/m26-1-evidence
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          files = [
              'pilot/m26/m26-1-entry-baseline.json',
              'pilot/m26/m26-1-architecture-freeze.json',
              'pilot/m26/m26-1-schema-registry.json',
              'pilot/m26/m26-1-downstream-inputs.json',
          ]
          freeze = json.loads(Path(files[1]).read_text())
          evidence = {
              'schema_version': 'knowledge-engine-m26-1-exact-head-evidence/v1',
              'head_sha': os.environ['HEAD_SHA'],
              'workflow_run_id': int(os.environ['GITHUB_RUN_ID']),
              'issue_number': 1052,
              'artifacts': {
                  path: hashlib.sha256(Path(path).read_bytes()).hexdigest()
                  for path in files
              },
              'exit_gate': freeze['exit_gate'],
              'provider_calls': False,
              'credentials_used': False,
              'real_corpus_bound': False,
              'production_answer_serving': False,
              'semantic_or_hybrid_enabled': False,
              'protected_mutations': False,
              'm26_2_authorized': False,
          }
          Path('/tmp/m26-1-evidence/evidence.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n'
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: m26-1-architecture-authority-evidence
          path: /tmp/m26-1-evidence
          if-no-files-found: error
          retention-days: 30
