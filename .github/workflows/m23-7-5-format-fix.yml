name: M23.7.5 One-Shot Formatting Repair

on:
  pull_request:
    paths:
      - ".github/workflows/m23-7-5-format-fix.yml"

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m23-7-5-bounded-live-shadow
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.9,<1'
      - name: Format new module and remove one-shot workflow
        run: |
          ruff check --fix src/knowledge_engine/m23_7_5_live_shadow.py
          ruff format src/knowledge_engine/m23_7_5_live_shadow.py
          rm .github/workflows/m23-7-5-format-fix.yml
      - name: Commit formatted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: format M23.7.5 live shadow module"
          git push origin HEAD:agent/m23-7-5-bounded-live-shadow
