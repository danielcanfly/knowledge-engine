name: R2 Canary

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/knowledge_engine/runtime.py'
      - 'src/knowledge_engine/query_evaluation.py'
      - 'src/knowledge_engine/golden_query_suite.py'
      - 'src/knowledge_engine/golden_query_baseline.py'
      - 'src/knowledge_engine/release_quality_gate.py'
      - 'src/knowledge_engine/retrieval_citation_metrics.py'
      - 'src/knowledge_engine/retrieval_citation_metrics_v2.py'
      - 'src/knowledge_engine/answer_performance_metrics.py'
      - 'src/knowledge_engine/answer_performance_metrics_v2.py'
      - 'src/knowledge_engine/m12_final_gate.py'
      - 'src/knowledge_engine/m12_final_gate_v2.py'
      - 'src/knowledge_engine/compiler_m11_closure_v2.py'
      - 'src/knowledge_engine/m13_contracts.py'
      - 'src/knowledge_engine/m13_registry.py'
      - 'tests/fixtures/**'
      - 'tests/test_golden_query_suite.py'
      - 'tests/test_golden_query_baseline.py'
      - 'tests/test_release_quality_gate.py'
      - 'tests/test_m12_metrics_and_final_gate.py'
      - 'tests/test_m11_m12_hardening_v2.py'
      - 'tests/test_m13_contracts.py'
      - 'tests/test_m13_registry.py'
      - 'tests/test_m13_registry_hardening.py'
      - 'docs/m12-golden-query-suite.md'
      - 'docs/m12-golden-query-baseline.md'
      - 'docs/m12-release-quality-gate.md'
      - 'docs/m12/**'
      - 'docs/architecture/m11/**'
      - 'docs/architecture/m13/**'
      - 'src/knowledge_engine/storage.py'
      - 'scripts/r2_canary.py'
      - '.github/workflows/r2-canary.yml'
      - 'pyproject.toml'
      - 'docs/architecture/m10/**'
      - 'scripts/m10_verify_production_baseline.py'
      - 'tests/test_m10_closure.py'
      - '.github/workflows/m10-closure-verification.yml'

permissions:
  contents: read

jobs:
  round-trip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - name: Validate required configuration
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
        run: |
          set -euo pipefail
          for name in R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_ACCOUNT_ID R2_BUCKET R2_ENDPOINT_URL; do
            test -n "${!name:-}" || { echo "Missing $name"; exit 2; }
          done
      - name: R2 write-read-delete canary
        env:
          APP_ENV: test
          AUTH_MODE: disabled
          OBJECT_STORE_BACKEND: r2
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
          R2_REGION: auto
        shell: bash
        run: |
          set -o pipefail
          python scripts/r2_canary.py \
            --run-id '${{ github.run_id }}-${{ github.run_attempt }}' \
            > /tmp/r2-canary.log 2>&1 || {
              cat /tmp/r2-canary.log
              exit 1
            }
          cat /tmp/r2-canary.log
      - name: Upload canary failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: r2-canary-log
          path: /tmp/r2-canary.log
          if-no-files-found: ignore
          retention-days: 7
