name: M17 Failure Atlas Acceptance

on:
  pull_request:
    paths:
      - "docs/troubleshooting/**"
      - "docs/operations/README.md"
      - "src/knowledge_engine/m17_failure_atlas.py"
      - "scripts/m17_failure_atlas_acceptance.py"
      - "tests/test_m17_failure_atlas.py"
      - ".github/workflows/m17-failure-atlas.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  failure-atlas:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run M17.3 failure atlas tests
        run: |
          mkdir -p .artifacts/m17
          python -m pytest -q tests/test_m17_failure_atlas.py \
            --junitxml=.artifacts/m17/failure-atlas-junit.xml
      - name: Emit deterministic acceptance evidence
        if: always()
        run: |
          python scripts/m17_failure_atlas_acceptance.py \
            --root . \
            --registry docs/troubleshooting/m17/failure-registry.json \
            --output .artifacts/m17/failure-atlas-acceptance.json
      - name: Verify diagnostic-only authority surface
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("src/knowledge_engine/m17_failure_atlas.py").read_text()
          forbidden = (
              "def append_ledger",
              "def approve_request",
              "def close_batch",
              "def copy_object",
              "def create_source_pr",
              "def delete_object",
              "def execute_rollback",
              "def merge_pull_request",
              "def promote_release",
              "def publish_candidate",
              "def purge_cache",
              "def put_object",
              "def repair_pointer",
              "def rotate_credentials",
              "def write_source",
          )
          found = [item for item in forbidden if item in source]
          if found:
              raise SystemExit(f"forbidden failure-atlas executor surface: {found}")
          PY
      - name: Upload acceptance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m17-failure-atlas-acceptance
          path: .artifacts/m17/
          if-no-files-found: error
          retention-days: 30
