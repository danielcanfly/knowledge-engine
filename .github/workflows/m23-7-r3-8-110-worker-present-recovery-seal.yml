name: M23.7 R3.8.110 Worker-Present Recovery Seal

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-110/worker-present-recovery-seal-29587564980.json"
      - "docs/architecture/m23-7-r3-8-110-worker-present-recovery-seal.md"
      - ".github/workflows/m23-7-r3-8-110-worker-present-recovery-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery authorization ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor fbbbf2afb6c9f35bc12bd9d4da589bb5e9695157 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present evidence seal
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          path = Path(".github/evidence/m23-7-r3-8-110/worker-present-recovery-seal-29587564980.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          digest = value.pop("seal_sha256")
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":"), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == "5a3e9b01940acb8b453f4cd3ebfd8622897a1dab9a1f897f1e67103a2480555f"
          assert value["recovery_authorization_prs"] == [809]
          assert value["recovery_authorization_merge_sha"] == "fbbbf2afb6c9f35bc12bd9d4da589bb5e9695157"
          assert value["recovery_run_id"] == "29587564980"
          assert value["artifact"]["artifact_id"] == 8409646279
          assert value["artifact"]["zip_sha256"] == "eba774747dbb9d4f9e41c8918112f9ed173e02c5b87ffa5fb588aa285f13c7d4"
          assert value["artifact"]["receipt_file_sha256"] == "308e6a51eb28d19c4849b235031f7d3c84fb82ec4b38a8543b22f85186ea5a9d"
          assert value["artifact"]["receipt_self_digest"] == "eaadc828b631564e0a51dd434572afde8824851f71a87ed5e0e2d8444bf2ad57"
          receipt = value["receipt"]
          assert receipt["worker_state"] == "worker_present"
          assert receipt["worker_name"] == "knowledge-engine-r3-8-29587264678"
          assert receipt["affected_run_id"] == "29587264678"
          assert receipt["versions"]["identity_count"] == 4
          assert receipt["deployments"]["identity_count"] == 4
          for field in ("worker_delete_dispatched","worker_deploy_dispatched","worker_route_invoked","worker_secret_mutation_dispatched","qdrant_read_dispatched","qdrant_mutation_dispatched","r2_read_dispatched","r2_mutation_dispatched","protected_mutations_dispatched"):
              assert receipt[field] is False
          assert value["authority"]["worker_deletion_authorized"] is False
          assert value["authority"]["fresh_observation_authorized"] is False
          assert value["authority"]["m23_7_closure_authorized"] is False
          PY
      - name: Verify exact seal scope and runtime preservation
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              ".github/evidence/m23-7-r3-8-110/worker-present-recovery-seal-29587564980.json",
              "docs/architecture/m23-7-r3-8-110-worker-present-recovery-seal.md",
              ".github/workflows/m23-7-r3-8-110-worker-present-recovery-seal.yml",
          }
          changed = set(subprocess.check_output(["git", "diff", "--name-only", "fbbbf2afb6c9f35bc12bd9d4da589bb5e9695157", "HEAD"], text=True).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code fbbbf2afb6c9f35bc12bd9d4da589bb5e9695157 HEAD --             scripts/m23_7_r3_8_remote_recovery_probe.py             .github/workflows/m23-7-r3-8-9-recovery-probe.yml             scripts/m23_7_r3_8_remote_operator.py             scripts/m23_7_r3_8_remote_delete.py             src/knowledge_engine/m23_7_r3_8_latency_repair.py             workers/m23-7-r3-8-latency-repair/worker.mjs
