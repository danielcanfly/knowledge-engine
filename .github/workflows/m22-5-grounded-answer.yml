name: M22.5 Grounded Answer Validation

on:
  pull_request:
    paths:
      - '.github/workflows/m22-5-grounded-answer.yml'
      - 'docs/architecture/m22/m22-5-grounded-answer.md'
      - 'src/knowledge_engine/m22_grounded_answer.py'
      - 'tests/test_m22_5_grounded_answer.py'

permissions:
  contents: read

jobs:
  grounded-answer:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify exact workflow head
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install exact project dependencies
        run: python -m pip install --disable-pip-version-check -q -e '.[dev]'
      - name: Lint M22.5 scope
        run: >-
          python -m ruff check --output-format concise
          src/knowledge_engine/m22_grounded_answer.py
          tests/test_m22_5_grounded_answer.py
      - name: Test M22.1 through M22.5 contracts
        run: >-
          python -m pytest -q
          tests/test_m22_1_reasoning_modes.py
          tests/test_m22_2_activation_decision.py
          tests/test_m22_3_bounded_plan.py
          tests/test_m22_4_execution_trace.py
          tests/test_m22_5_grounded_answer.py
      - name: Prove answer validation and fallback boundary
        run: |
          python - <<'PY'
          from knowledge_engine.m22_grounded_answer import (
              ANSWER_DISPOSITIONS,
              FALLBACK_REASONS,
          )

          assert ANSWER_DISPOSITIONS == ('answered', 'fallback')
          assert FALLBACK_REASONS[:2] == ('reasoning_failed', 'budget_exceeded')
          assert 'direct_answer_preserved' in FALLBACK_REASONS
          PY
      - name: Scan provider, content-generation, and mutation boundary
        run: |
          if grep -nE 'requests|httpx|aiohttp|urllib.request|subprocess|boto3|openai|anthropic|sentence_transformers|raw_query|answer_text|api_key|token=' \
            src/knowledge_engine/m22_grounded_answer.py; then
            exit 1
          fi
          test -z "$(find . -type f \( -name '*ab-evaluation.json' -o -name '*reasoning-rollout.json' \) -print -quit)"
      - name: Compile M22.5 scope
        run: >-
          python -m compileall -q
          src/knowledge_engine/m22_grounded_answer.py
          tests/test_m22_5_grounded_answer.py
