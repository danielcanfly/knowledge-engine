name: M23.4 Human Review Source PR

on:
  pull_request:
    paths:
      - "src/knowledge_engine/m23_human_review_source_pr.py"
      - "src/knowledge_engine/m23_human_review_source_pr_cli.py"
      - "tests/test_m23_4_human_review_source_pr.py"
      - "pilot/m23/m23-4-human-review-source-pr-receipt.json"
      - "docs/architecture/m23/m23-4-human-review-source-pr.md"
      - "pyproject.toml"
      - ".github/workflows/m23-4-human-review-source-pr.yml"

permissions:
  contents: read

jobs:
  exact-head:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify exact head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q tests/test_m23_4_human_review_source_pr.py
      - run: >-
          python -m ruff check
          src/knowledge_engine/m23_human_review_source_pr.py
          src/knowledge_engine/m23_human_review_source_pr_cli.py
          tests/test_m23_4_human_review_source_pr.py
      - run: >-
          python -m compileall -q
          src/knowledge_engine/m23_human_review_source_pr.py
          src/knowledge_engine/m23_human_review_source_pr_cli.py
