name: M19.2 Graphology adapter

on:
  pull_request:
    paths:
      - "packages/graphology-adapter/**"
      - "docs/architecture/m19/m19-2-graphology-adapter.md"
      - "docs/architecture/m19/m19-2-graphology-adapter-reconciliation.md"
      - ".github/workflows/m19-2-graphology-adapter.yml"
  push:
    branches:
      - main
    paths:
      - "packages/graphology-adapter/**"
      - "docs/architecture/m19/m19-2-graphology-adapter.md"
      - "docs/architecture/m19/m19-2-graphology-adapter-reconciliation.md"
      - ".github/workflows/m19-2-graphology-adapter.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  graphology-adapter:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/graphology-adapter/package-lock.json
      - name: Install exact locked dependencies
        run: npm ci --prefix packages/graphology-adapter
      - name: Build and test renderer-neutral adapter
        run: npm run check --prefix packages/graphology-adapter
      - name: Audit runtime dependency
        run: npm audit --prefix packages/graphology-adapter --omit=dev --audit-level=high
