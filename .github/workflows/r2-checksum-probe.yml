name: R2 Checksum Probe

on:
  pull_request:
    paths:
      - '.github/workflows/r2-checksum-probe.yml'
      - 'scripts/r2_release_integration.py'
      - 'src/knowledge_engine/**'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      AUTH_MODE: disabled
      OBJECT_STORE_BACKEND: r2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
      R2_REGION: auto
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -q .
      - run: python scripts/r2_release_integration.py --run-id 'checksum-${{ github.run_id }}'
