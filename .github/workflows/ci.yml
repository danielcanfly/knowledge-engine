name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: make ci
      - name: Reference vertical slice
        run: |
          set -euo pipefail
          make build
          make query | grep -F 'concepts/knowledge-compiler'
      - name: Build container
        run: docker build --tag knowledge-engine:ci .
