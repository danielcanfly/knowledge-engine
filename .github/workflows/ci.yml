name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Run quality gates
        shell: bash
        run: |
          set -o pipefail
          make ci > /tmp/knowledge-engine-ci.log 2>&1 || {
            cat /tmp/knowledge-engine-ci.log
            exit 1
          }
          cat /tmp/knowledge-engine-ci.log
      - name: Upload CI failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-engine-ci-log
          path: /tmp/knowledge-engine-ci.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Reference vertical slice
        run: |
          set -euo pipefail
          make build
          make query | grep -F 'concepts/knowledge-compiler'
      - name: Build container
        run: docker build --tag knowledge-engine:ci .
