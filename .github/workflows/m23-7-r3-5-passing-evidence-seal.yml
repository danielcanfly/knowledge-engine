name: M23.7 Repair R3.5 Passing Evidence Seal

on:
  pull_request:
    paths:
      - "pilot/m23/m23-7-r3-5-passing-evidence-seal.json"
      - "docs/architecture/m23-7-r3-5-passing-evidence-seal.md"
      - ".github/workflows/m23-7-r3-5-passing-evidence-seal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal-passing-evidence:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact workflow head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Verify implementation ancestry
        run: git merge-base --is-ancestor dd10d66083a3a4b81546467f26f0f3253b3a8a22 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify passing evidence seal
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path("pilot/m23/m23-7-r3-5-passing-evidence-seal.json")
          seal = json.loads(path.read_text(encoding="utf-8"))
          digest = seal.pop("seal_sha256")
          canonical = json.dumps(
              seal,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
              allow_nan=False,
          )
          assert hashlib.sha256(canonical.encode("utf-8")).hexdigest() == digest
          assert digest == "811942ecb900daba1fdde8ebd4baa33e6e31e8dd5e69ecbd44115f5b79dcf3a8"
          assert seal["seal_issue"] == 504
          assert seal["implementation_issue"] == 502
          assert seal["parent_issue"] == 474
          assert seal["implementation_pr"] == 503
          assert seal["operator_engine_head"] == "dd10d66083a3a4b81546467f26f0f3253b3a8a22"
          assert seal["operator_report_file_sha256"] == "7a84c7e98b6e50d294b5bbbe1433e61f627f1550e740d0e50e8c57994cba5f36"
          assert seal["operator_report_sha256"] == "410a5781504d2906f96191627e4e5cae46bb6eb1fa5dc907c1e84ec111c01bc2"
          assert seal["operator_status"] == "pass_rank_quality_calibration"
          assert seal["contract_sha256"] == "3b486845009926842662fbefb197086ce6658641e27ec5bc6cc239f0506ae2bc"
          assert seal["candidate_artifact_sha256"] == "8eed54902c73314ac2e5d5e187a788e44941dae250d9823d45b71ec57d1e1371"
          assert seal["metrics"] == {
              "recall_at_5": 0.875,
              "mrr_at_10": 0.807291666667,
              "ndcg_at_10": 0.851933109598,
          }
          assert seal["thresholds"] == {
              "recall_at_5": 0.82,
              "mrr_at_10": 0.68,
              "ndcg_at_10": 0.72,
          }
          assert seal["target_ranks"] == {
              "m23q-01": 1,
              "m23q-02": 8,
              "m23q-03": 3,
              "m23q-04": 1,
              "m23q-07": 1,
              "m23q-08": 1,
              "m23q-09": 1,
              "m23q-10": 1,
          }
          assert seal["query_variant_identity_count"] == 24
          assert seal["maximum_top10_hub_frequency"] == 3
          assert all(value is True for value in seal["gates"].values())
          assert seal["external_calls"] == {
              "workers_ai_bge_m3_batches": 1,
              "workers_ai_query_count": 24,
              "qdrant_reads": 0,
              "qdrant_writes": 0,
          }
          assert all(value is False for value in seal["privacy"].values())
          authority = seal["authority"]
          assert authority["production_retrieval"] == "lexical"
          assert authority["candidate_reingestion_authorized"] is False
          assert authority["live_acceptance_authorized"] is False
          assert authority["promotion_eligibility_granted"] is False
          assert authority["retrieval_quality_blocker_cleared"] is False
          assert authority["qdrant_reads"] == 0
          assert authority["qdrant_writes"] == 0
          assert authority["protected_mutations_dispatched"] is False
          exit_state = seal["exit"]
          assert exit_state["r3_5_complete"] is True
          assert exit_state["r3_5_disposition"] == "completed_passed"
          assert exit_state["parent_issue_must_remain_open"] is True
          assert exit_state["next_legal_action"] == "separately_governed_candidate_reingestion_proposal"
          PY
      - name: Privacy and authority scan
        run: |
          python - <<'PY'
          from pathlib import Path
          text = "\n".join(
              path.read_text(encoding="utf-8")
              for path in (
                  Path("pilot/m23/m23-7-r3-5-passing-evidence-seal.json"),
                  Path("docs/architecture/m23-7-r3-5-passing-evidence-seal.md"),
              )
          )
          for forbidden in ("CLOUDFLARE_API_TOKEN", "QDRANT_API_KEY", "https://"):
              assert forbidden not in text
          PY
