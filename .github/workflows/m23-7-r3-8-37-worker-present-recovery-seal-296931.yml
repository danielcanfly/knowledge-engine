name: M23.7 R3.8.37 Worker-Present Recovery Seal 296931

on:
  pull_request:
    paths:
      - ".github/evidence/m23-7-r3-8-37/worker-present-recovery-seal-29693171225.json"
      - "docs/architecture/m23-7-r3-8-37-worker-present-recovery-seal-29693171225.md"
      - ".github/workflows/m23-7-r3-8-37-worker-present-recovery-seal-296931.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact head and recovery ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git merge-base --is-ancestor 9faa0e300f68f51650bcc469d7b1284e98800e26 HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify deterministic worker-present seal
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path('.github/evidence/m23-7-r3-8-37/worker-present-recovery-seal-29693171225.json')
          value = json.loads(path.read_text(encoding='utf-8'))
          digest = value.pop('seal_sha256')
          encoded = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(',', ':'), allow_nan=False).encode()
          assert hashlib.sha256(encoded).hexdigest() == digest
          assert digest == '67952491ef6fe004ddb33ca9672b0385ce207d5c21c69ff02b49bf6f69218983'
          assert value['seal_issue'] == 941
          assert value['recovery_authorization_pr'] == 940
          assert value['recovery_authorization_merge_sha'] == '9faa0e300f68f51650bcc469d7b1284e98800e26'
          assert value['recovery_run_id'] == '29693171225'
          assert value['artifact']['artifact_id'] == 8444193996
          assert value['artifact']['zip_sha256'] == '8814cc61ef129646f3e70992b193ec8f3c01b9b19e7ee8783b93fe425f3e9e13'
          assert value['artifact']['receipt_file_sha256'] == 'a71010a194e7e27ba5178b506a80fcc0ce6e41f5572a870c966943dfd3c38c95'
          assert value['artifact']['receipt_self_digest'] == '95cad3e49f8fc925a055d64b9c974340d5f6d5369109d993d9b75c4d7dccf35e'
          receipt = value['receipt']
          assert receipt['status'] == 'completed_read_only_recovery_probe'
          assert receipt['worker_state'] == 'worker_present'
          assert receipt['worker_name'] == 'knowledge-engine-r3-8-29667556969'
          assert receipt['affected_run_id'] == '29667556969'
          assert receipt['affected_engine_sha'] == 'd0459fee41f747fb79cd32feaa673ef6fcf9e58a'
          assert receipt['probe_engine_sha'] == '9faa0e300f68f51650bcc469d7b1284e98800e26'
          assert receipt['recovery_probe_sha256'] == '95cad3e49f8fc925a055d64b9c974340d5f6d5369109d993d9b75c4d7dccf35e'
          assert receipt['versions']['identities'] == [
              '2db04b30-6e49-4bd2-9b58-13eda5b3968d',
              '6612f564-7ef0-4e10-93b0-039142e5929f',
              'a92db2fe-6ccd-4c4a-8c4e-1f8832e49dad',
              'd8e7a3c5-1c14-4ae8-8ff1-ea8e6f80afda',
          ]
          assert receipt['deployments']['identities'] == [
              '190b3ad3-e9d5-4229-ae60-95f0a1dd6f8f',
              '2beff67b-6122-4cb2-a1f5-ebb6387f01c4',
              '33933e68-38f2-4f57-988c-86a452544abb',
              '9434bcd7-dc05-4f70-9d35-fcaa61b67d48',
          ]
          assert receipt['versions']['identity_count'] == 4
          assert receipt['deployments']['identity_count'] == 4
          assert 'd8e7a3c5-1c14-4ae8-8ff1-ea8e6f80afda' in receipt['versions']['identities']
          assert receipt['production_retrieval'] == 'lexical'
          assert receipt['blockers_cleared'] is False
          for field in (
              'worker_delete_dispatched', 'worker_deploy_dispatched',
              'worker_route_invoked', 'worker_secret_mutation_dispatched',
              'qdrant_read_dispatched', 'qdrant_mutation_dispatched',
              'r2_read_dispatched', 'r2_mutation_dispatched',
              'protected_mutations_dispatched',
          ):
              assert receipt[field] is False
          assert value['authority']['evidence_seal_only'] is True
          assert value['authority']['worker_deletion_authorized'] is False
          assert value['authority']['fresh_observation_authorized'] is False
          assert value['authority']['blocker_clearance_authorized'] is False
          assert value['authority']['m23_7_closure_authorized'] is False
          PY
      - name: Verify exact three-file scope and runtime preservation
        run: |
          python - <<'PY'
          import subprocess
          allowed = {
              '.github/evidence/m23-7-r3-8-37/worker-present-recovery-seal-29693171225.json',
              'docs/architecture/m23-7-r3-8-37-worker-present-recovery-seal-29693171225.md',
              '.github/workflows/m23-7-r3-8-37-worker-present-recovery-seal-296931.yml',
          }
          changed = set(subprocess.check_output(
              ['git', 'diff', '--name-only', '9faa0e300f68f51650bcc469d7b1284e98800e26', 'HEAD'], text=True
          ).splitlines())
          assert changed == allowed, (changed, allowed)
          PY
          git diff --exit-code 9faa0e300f68f51650bcc469d7b1284e98800e26 HEAD -- \
            scripts/m23_7_r3_8_remote_recovery_probe.py \
            scripts/m23_7_r3_8_remote_recovery_probe_296675.py \
            .github/workflows/m23-7-r3-8-9-recovery-probe.yml \
            scripts/m23_7_r3_8_remote_operator.py \
            scripts/m23_7_r3_8_remote_operator_region_v3.py \
            scripts/m23_7_r3_8_remote_delete.py \
            src/knowledge_engine/m23_7_r3_8_latency_repair.py \
            workers/m23-7-r3-8-latency-repair/worker.mjs
